<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>БРОНИ БИЛЬЯРД</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png" />
  <style>
    :root {
      --cell-size: 50px;
      --main-color: #1e3a8a;
      --highlight-color: #ef4444;
      --highlight-bg: #1a2f40;
      --confirmed-color: #16a34a;
      --rejected-color: #b91c1c;
      --background-color: #1a2f40;
      --card-color: #e0f2fe;
      --blue-color: #2563eb;
      --red-color: #ef4444;
      --green-color: #22c55e;
      --custom-dark: #1a2f40;
      --border-spacing: 2px;
    }

    @media (max-width: 768px) {
      :root { 
        --cell-size: calc((100vw - 20px) / 13);
        --border-spacing: 2px;
      }
      
      table {
        width: auto !important;
        margin: 0 auto;
      }
      
      td, th {
        aspect-ratio: 1;
        width: var(--cell-size) !important;
        height: var(--cell-size) !important;
        min-width: auto !important;
        max-width: none !important;
      }
      
      body {
        padding: 5px;
      }
      
      .table-container {
        padding: 0;
        width: 100%;
      }
      
      #controls {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: stretch;
        gap: 12px;
        width: 100%;
        max-width: 480px;
        margin: 15px auto 0;
        padding: 0 10px;
        box-sizing: border-box;
      }
      
      #dateInput {
        flex: 1;
        margin: 0;
        min-width: 0;
        box-sizing: border-box;
      }
      
      .booking-button {
        flex: 1;
        margin: 0;
        min-width: 0;
        text-align: center;
        box-sizing: border-box;
      }
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a2f40;
      padding: 10px;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .table-container {
      position: relative;
      width: 100%;
      max-width: 100vw;
      overflow-x: auto;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      background: transparent;
    }

    /* ТАБЛИЦА с тёмным фоном — цвет как у кнопки */
    table {
      border-collapse: separate;
      border-spacing: var(--border-spacing);
      table-layout: fixed;
      max-width: 100vw;
      user-select: none;
      touch-action: manipulation;
      margin: 0 auto;
      background: #1a2f40;
      padding: var(--border-spacing);
    }

    thead th {
      position: sticky;
      top: 0;
      color: white;
      z-index: 2;
      transition: background-color 0.2s, color 0.2s;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* ВСЕ ЗАГОЛОВКИ СТОЛОВ (1-12) И ВРЕМЯ - цвет как у кнопки */
    thead th:nth-child(1),
    thead th:nth-child(2),
    thead th:nth-child(3),
    thead th:nth-child(4),
    thead th:nth-child(5),
    thead th:nth-child(6),
    thead th:nth-child(7),
    thead th:nth-child(8),
    thead th:nth-child(9),
    thead th:nth-child(10),
    thead th:nth-child(11),
    thead th:nth-child(12),
    thead th.time-col {
      background: #1a2f40 !important;
    }

    /* столбец времени (правый столбец) */
    th.time-col, .time-right {
      background: #1a2f40 !important;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    /* Все ячейки - без скруглений, белый фон */
    th, td {
      width: var(--cell-size);
      height: var(--cell-size);
      border: none;
      text-align: center;
      vertical-align: middle;
      box-sizing: border-box;
      background: white;
      font-size: 12px;
      position: relative;
    }

    /* Цвета для ячеек столбцов (фон слотов) */
    td.slot[data-lane="0"],
    td.slot[data-lane="1"],
    td.slot[data-lane="2"],
    td.slot[data-lane="4"],
    td.slot[data-lane="5"] {
      background-color: rgba(167, 199, 231, 0.9);
    }

    td.slot[data-lane="3"] {
      background-color: rgba(181, 228, 140, 0.9);
    }

    td.slot[data-lane="6"],
    td.slot[data-lane="7"],
    td.slot[data-lane="8"],
    td.slot[data-lane="9"],
    td.slot[data-lane="10"],
    td.slot[data-lane="11"] {
      background-color: rgba(248, 173, 157, 0.9);
    }

    th.highlight-header {
      background: #1a2f40 !important;
      color: white !important;
    }

    /* Вертикальные красные линии */
    td.vertical-line::before,
    td.vertical-line::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 3px;
      background-color: var(--highlight-color);
      z-index: 10;
    }
    td.vertical-line::before { left: -1px; }
    td.vertical-line::after  { right: -1px; }

    td.slot { 
      cursor: pointer; 
      transition: all 0.2s ease;
    }
    
    td.slot:hover {
      filter: brightness(0.95);
    }

    /* выделенные ячейки — цвет как у кнопки */
    td.selected {
      background: #1a2f40 !important;
      border: none !important;
      z-index: 1;
      color: white;
      font-weight: 500;
    }

    td.start-time-chosen {
      background: #ef4444 !important;
      border: none !important;
      z-index: 2;
    }

    #cardsContainer {
      margin: 20px auto 10px;
      padding: 0;
      max-width: 100vw;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      box-sizing: border-box;
    }

    .booking-card {
      position: relative;
      background: var(--card-color);
      border: 1px solid var(--main-color);
      border-radius: 12px;
      padding: 12px 45px 12px 15px;
      color: var(--main-color);
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      user-select: none;
      box-shadow: 0 3px 8px rgba(30, 58, 138, 0.15);
      transition: transform 0.2s;
    }
    
    .booking-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(30, 58, 138, 0.2);
    }
    
    .booking-card .close-btn {
      position: absolute;
      top: 0;
      right: 0;
      transform: translate(50%, -50%);
      color: var(--main-color);
      background: white;
      border: 1px solid var(--main-color);
      border-radius: 50%;
      font-weight: bold;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      padding: 6px 10px;
      box-shadow: 0 0 8px rgba(30, 58, 138, 0.3);
      transition: all 0.2s ease;
    }
    .booking-card .close-btn:hover {
      background-color: var(--main-color);
      color: white;
      transform: translate(50%, -50%) scale(1.1);
    }

    #controls {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 15px;
      flex-wrap: wrap;
      width: 100%;
      max-width: 500px;
    }
    
    #dateInput, .booking-button {
      flex: 1 1 0;
      min-width: 140px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }
    
    #dateInput {
      background: white;
      color: #1e293b;
      border: 2px solid var(--custom-dark);
      box-shadow: 0 2px 5px rgba(26, 47, 64, 0.1);
    }
    
    #dateInput:hover {
      background: #f8fafc;
      border-color: #0e1f2c;
      transform: translateY(-1px);
    }
    
    .booking-button {
      background: #1a2f40;
      color: white;
      border: none;
      box-shadow: 0 4px 8px rgba(26, 47, 64, 0.2);
      letter-spacing: 0.5px;
    }
    
    .booking-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(26, 47, 64, 0.3);
      background: #1f3e55;
    }
    
    .booking-button:active, .booking-button.pressed {
      transform: translateY(1px);
      background: #1a2f40;
      box-shadow: 0 2px 4px rgba(239, 68, 68, 0.2);
    }

    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #00000066;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #modal > div {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
    #modal h3 { 
      margin-top: 0; 
      color: var(--custom-dark);
      text-align: center;
      font-size: 1.5rem;
    }
    #modal label { 
      display: block; 
      margin-bottom: 15px; 
      color: #334155;
      font-weight: 500;
    }
    #modal input, #modal textarea {
      width: 100%;
      padding: 10px 12px;
      box-sizing: border-box;
      margin-top: 6px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      transition: border 0.3s;
    }
    #modal input:focus, #modal textarea:focus {
      outline: none;
      border-color: var(--custom-dark);
      box-shadow: 0 0 0 3px rgba(26, 47, 64, 0.1);
    }
    #modal button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    #modal button:first-of-type {
      background: #1a2f40;
      color: white;
    }
    #modal button:first-of-type:hover {
      transform: translateY(-2px);
    }
    #modal button:last-of-type {
      margin-left: 10px;
      background: #f1f5f9;
      color: #64748b;
    }

    .image-popup {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0,0,0,0.8);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    .image-popup .popup-content {
      position: relative;
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 90vw;
      max-height: 90vh;
      overflow: auto;
    }
    .image-popup .popup-content img {
      width: 100%; height: auto; border-radius: 8px;
    }
    .image-popup .close-popup {
      position: absolute;
      top: 10px; right: 10px;
      background: var(--custom-dark);
      color: white;
      border: none;
      border-radius: 50%;
      width: 35px; height: 35px; font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .image-popup .close-popup:hover {
      background: var(--highlight-color);
    }

    #slidersContainer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    .existing-slider {
      position: absolute;
      background: #1a2f40;
      border: none;
      border-radius: 0;
      pointer-events: auto;
      box-sizing: border-box;
      cursor: pointer;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 4px;
      user-select: none;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }
    .existing-slider:hover {
      transform: scale(1.02);
      z-index: 10;
    }
    .existing-slider.confirmed {
      background: var(--confirmed-color);
    }
    .existing-slider.rejected {
      background: var(--rejected-color);
    }

    .booking-info-popup {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0,0,0,0.6);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .booking-info-popup .popup-content {
      position: relative;
      background: white;
      padding: 25px;
      border-radius: 12px;
      max-width: 90vw;
      width: 400px;
    }
    .booking-info-popup .close-btn {
      position: absolute;
      top: 12px; right: 12px;
      background: var(--custom-dark);
      color: white;
      border: none;
      border-radius: 50%;
      width: 32px; height: 32px; 
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .booking-info-popup .close-btn:hover {
      background: var(--highlight-color);
    }
    .booking-info-popup h3 {
      margin-top: 0;
      color: var(--custom-dark);
      text-align: center;
      padding-bottom: 10px;
      border-bottom: 1px solid #e2e8f0;
      margin-bottom: 20px;
    }
    .info-row {
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
    }
    .info-label {
      font-weight: 600;
      color: var(--custom-dark);
      min-width: 120px;
    }
    .info-value {
      text-align: right;
      flex-grow: 1;
    }
    .confirmation-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 25px;
      gap: 15px;
    }
    .confirmation-buttons button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      flex: 1;
      transition: 0.2s;
    }
    .confirm-yes { background: var(--confirmed-color); color: white; }
    .confirm-no { background: var(--rejected-color); color: white; }
    .delete-btn {
      background: #475569;
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      margin-top: 20px;
      width: 100%;
      transition: 0.3s;
    }
    .delete-btn:hover { background: #1a2f40; }

    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid var(--custom-dark);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="table-container">
    <table id="bookingTable">
      <thead>
        <tr>
          <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th>
          <th>7</th><th>8</th><th>9</th><th>10</th><th>11</th><th>12</th>
          <th class="time-col">
            <button id="openImage" style="padding:6px 12px; border:none; background:#1a2f40; color:white; cursor:pointer; font-weight:bold;">СТОЛЫ</button>
          </th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="slidersContainer"></div>
  </div>

  <div id="cardsContainer"></div>

  <div id="controls">
    <input type="date" id="dateInput" />
    <button class="booking-button" onclick="openModal()">ЗАБРОНИРОВАТЬ</button>
  </div>

  <div id="modal">
    <div>
      <h3>Введите данные</h3>
      <label>Имя:<br><input id="nameInput" autocomplete="off"></label>
      <label>Телефон:<br><input id="phoneInput" type="tel" inputmode="tel" autocomplete="tel"></label>
      <label>Комментарий:<br><textarea id="commentInput"></textarea></label>
      <div style="text-align: right;">
        <button onclick="submitForm()">ЗАБРОНИРОВАТЬ</button>
        <button onclick="closeModal()">ОТМЕНА</button>
      </div>
    </div>
  </div>

  <div id="imagePopup" class="image-popup">
    <div class="popup-content">
      <button class="close-popup" onclick="closeImagePopup()">&times;</button>
      <img src="https://i.postimg.cc/52ZDKDDw/55.png" />
    </div>
  </div>

  <div id="bookingInfoPopup" class="booking-info-popup">
    <div class="popup-content">
      <button class="close-btn" onclick="closeBookingInfoPopup()">&times;</button>
      <h3>Информация о бронировании</h3>
      <div class="info-row"><span class="info-label">Стол:</span> <span id="info-table" class="info-value"></span></div>
      <div class="info-row"><span class="info-label">Дата:</span> <span id="info-date" class="info-value"></span></div>
      <div class="info-row"><span class="info-label">Время:</span> <span id="info-time" class="info-value"></span></div>
      <div class="info-row"><span class="info-label">Имя:</span> <span id="info-name" class="info-value"></span></div>
      <div class="info-row"><span class="info-label">Телефон:</span> <span id="info-phone" class="info-value"></span></div>
      <div class="info-row"><span class="info-label">Комментарий:</span> <span id="info-comment" class="info-value"></span></div>
      <div class="info-row"><span class="info-label">Посещение состоялось?</span><span id="info-confirmed" class="info-value"></span></div>
      <div class="confirmation-buttons"><button class="confirm-yes" onclick="confirmBooking(true)">Да</button><button class="confirm-no" onclick="confirmBooking(false)">Нет</button></div>
      <button class="delete-btn" onclick="deleteBooking()">УДАЛИТЬ БРОНЬ</button>
    </div>
  </div>
  <div id="loadingOverlay" class="loading-overlay" style="display: none;"><div class="loading-spinner"></div></div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
  const dateInput = document.getElementById('dateInput');
  const today = new Date().toISOString().split('T')[0];
  dateInput.min = today;
  dateInput.value = today;
  const startHour = 11, endHour = 22, lanes = 12;
  const tableBody = document.getElementById("tableBody"), cardsContainer = document.getElementById("cardsContainer"), slidersContainer = document.getElementById("slidersContainer"), tableContainer = document.querySelector(".table-container"), loadingOverlay = document.getElementById("loadingOverlay");
  const timeSlots = [];
  for (let h = startHour; h <= endHour; h++) {
    if (h < endHour) { timeSlots.push({ display: `${h}:00`, key: h }); timeSlots.push({ display: `${h}:30`, key: h + 0.5 }); }
    else timeSlots.push({ display: `${h}:00`, key: h });
  }
  timeSlots.forEach(slot => {
    const row = document.createElement("tr");
    for (let lane = 0; lane < lanes; lane++) {
      const cell = document.createElement("td");
      cell.className = "slot";
      cell.dataset.lane = lane;
      cell.dataset.time = slot.key;
      cell.dataset.display = slot.display;
      row.appendChild(cell);
    }
    const timeCell = document.createElement("th");
    timeCell.className = "time-right";
    timeCell.textContent = slot.display;
    row.appendChild(timeCell);
    tableBody.appendChild(row);
  });

  let intervalsByLane = {}, currentLane = null, currentStart = null, currentBookingId = null;
  function clearStartTimeHighlight() { document.querySelectorAll('td.start-time-chosen').forEach(c => c.classList.remove('start-time-chosen')); }
  function clearHeaderHighlight() { document.querySelectorAll('thead th.highlight-header').forEach(th => th.classList.remove('highlight-header')); }
  function clearVerticalLines() { document.querySelectorAll('td.vertical-line').forEach(td => td.classList.remove('vertical-line')); }
  function highlightHeader(lane) { clearHeaderHighlight(); const headerCells = document.querySelectorAll('thead th'); if (lane >= 0 && lane < lanes) headerCells[lane].classList.add('highlight-header'); }
  function highlightColumn(lane) { clearVerticalLines(); document.querySelectorAll(`td.slot[data-lane="${lane}"]`).forEach(td => td.classList.add('vertical-line')); }
  function updateTableSelection() {
    document.querySelectorAll("td.selected").forEach(c => c.classList.remove("selected"));
    for (let laneStr in intervalsByLane) {
      intervalsByLane[laneStr].forEach(interval => {
        const start = Math.min(interval.start, interval.end), end = Math.max(interval.start, interval.end);
        document.querySelectorAll(`td.slot[data-lane="${laneStr}"]`).forEach(cell => { const t = parseFloat(cell.dataset.time); if (t >= start && t <= end) cell.classList.add("selected"); });
      });
    }
    cardsContainer.innerHTML = "";
    const selDate = dateInput.value.split("-").reverse().join(".");
    for (let laneStr in intervalsByLane) {
      intervalsByLane[laneStr].forEach((interval, idx) => {
        const s = Math.min(interval.start, interval.end), e = Math.max(interval.start, interval.end);
        const card = document.createElement("div"); card.className = "booking-card"; card.textContent = `Стол № ${+laneStr+1} | ${selDate} | с ${Math.floor(s)}:${s%1===0.5?"30":"00"} по ${Math.floor(e)}:${e%1===0.5?"30":"00"}`;
        const btn = document.createElement("button"); btn.className = "close-btn"; btn.innerHTML = "&times;"; btn.onclick = ev => { ev.stopPropagation(); intervalsByLane[laneStr].splice(idx,1); updateTableSelection(); };
        card.appendChild(btn); cardsContainer.appendChild(card);
      });
    }
  }

  tableBody.addEventListener("click", e => {
    if (e.target.classList.contains("slot")) { currentLane = +e.target.dataset.lane; clearStartTimeHighlight(); highlightHeader(currentLane); highlightColumn(currentLane); }
    if (e.target.classList.contains("time-right") && currentLane !== null) {
      const time = parseFloat(e.target.textContent.replace(":30",".5").replace(":00",".0"));
      if (currentStart === null) { currentStart = time; clearStartTimeHighlight(); const sc = document.querySelector(`td.slot[data-lane="${currentLane}"][data-time="${currentStart}"]`); if(sc) sc.classList.add("start-time-chosen"); }
      else {
        if (time <= currentStart) return alert("Время конца должно быть больше времени начала.");
        if (!intervalsByLane[currentLane]) intervalsByLane[currentLane] = [];
        intervalsByLane[currentLane].push({ start: currentStart, end: time });
        currentLane = null; currentStart = null; clearStartTimeHighlight(); clearHeaderHighlight(); clearVerticalLines(); updateTableSelection();
      }
    }
  });
  tableBody.addEventListener("dblclick", e => { if(!e.target.classList.contains("slot")) return; const lane = +e.target.dataset.lane, time = parseFloat(e.target.dataset.time); if(intervalsByLane[lane]){ const idx = intervalsByLane[lane].findIndex(iv => time >= Math.min(iv.start, iv.end) && time <= Math.max(iv.start, iv.end)); if(idx !== -1){ intervalsByLane[lane].splice(idx,1); updateTableSelection(); } } });

  function openModal() { if (!Object.values(intervalsByLane).some(a=>a.length)) return alert("Сначала выберите время."); document.getElementById("modal").style.display = "flex"; const btn = document.querySelector('.booking-button'); btn.classList.add('pressed'); setTimeout(()=>btn.classList.remove('pressed'),200); }
  function closeModal() { document.getElementById("modal").style.display = "none"; }
  async function submitForm() {
    const name = document.getElementById("nameInput").value.trim(), phone = document.getElementById("phoneInput").value.trim(), comment = document.getElementById("commentInput").value.trim(), date = dateInput.value;
    if (!name || !phone) return alert("Введите имя и телефон."); if (!date) return alert("Выберите дату.");
    const bookings = []; for (let lane in intervalsByLane) intervalsByLane[lane].forEach(iv => { bookings.push({ date, tableNumber: +lane+1, start: iv.start, end: iv.end, name, phone, comment }); });
    if (!bookings.length) return alert("Нет выбранных интервалов.");
    try {
      loadingOverlay.style.display = 'flex';
      await Promise.all(bookings.map(b => fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ bookings: [b] }) })));
      loadingOverlay.style.display = 'none';
      closeModal(); for(let l in intervalsByLane) intervalsByLane[l] = []; currentLane = currentStart = null; clearStartTimeHighlight(); clearHeaderHighlight(); clearVerticalLines(); updateTableSelection();
      document.getElementById("nameInput").value = ""; document.getElementById("phoneInput").value = ""; document.getElementById("commentInput").value = "";
      await loadExisting();
    } catch (error) { loadingOverlay.style.display = 'none'; alert("Ошибка при отправке бронирования"); }
  }
  function showBookingInfo(b) { document.getElementById('info-table').textContent = `№${b.table}`; document.getElementById('info-date').textContent = b.date.split('-').reverse().join('.'); document.getElementById('info-time').textContent = `${Math.floor(b.start)}:${b.start%1===0.5?"30":"00"} - ${Math.floor(b.end)}:${b.end%1===0.5?"30":"00"}`; document.getElementById('info-name').textContent = b.name; document.getElementById('info-phone').textContent = b.phone; document.getElementById('info-comment').textContent = b.comment || 'нет комментария'; document.getElementById('info-confirmed').textContent = b.confirmed || ''; document.getElementById('bookingInfoPopup').style.display = 'flex'; currentBookingId = b.id; }
  function closeBookingInfoPopup() { document.getElementById('bookingInfoPopup').style.display = 'none'; currentBookingId = null; }
  async function confirmBooking(confirmed) { if(!currentBookingId) return; try{ loadingOverlay.style.display='flex'; await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"confirm",id:currentBookingId,confirmed})}); loadingOverlay.style.display='none'; closeBookingInfoPopup(); await loadExisting(); } catch(e){ loadingOverlay.style.display='none'; alert("Ошибка обновления статуса"); } }
  async function deleteBooking() { if(!currentBookingId || !confirm("Удалить бронь?")) return; try{ loadingOverlay.style.display='flex'; await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"delete",id:currentBookingId})}); loadingOverlay.style.display='none'; closeBookingInfoPopup(); await loadExisting(); } catch(e){ loadingOverlay.style.display='none'; alert("Ошибка удаления"); } }
  async function loadExisting() {
    try{ loadingOverlay.style.display='flex'; slidersContainer.innerHTML=""; const res = await fetch(GAS_URL+"?action=get&date="+dateInput.value); const data = await res.json(); loadingOverlay.style.display='none'; if(!data.bookings?.length) return; const timeCells = Array.from(document.querySelectorAll('th.time-right')), tableCells = Array.from(document.querySelectorAll('td.slot')), containerRect = tableContainer.getBoundingClientRect();
      data.bookings.forEach(b => { if(b.date===dateInput.value){ const laneIndex = b.table-1; const startIndex = timeSlots.findIndex(ts => ts.key===parseFloat(b.start)), endIndex = timeSlots.findIndex(ts => ts.key===parseFloat(b.end)); if(startIndex===-1||endIndex===-1) return; const startCell = tableCells.find(cell => parseInt(cell.dataset.lane)===laneIndex && parseFloat(cell.dataset.time)===parseFloat(b.start)); if(!startCell) return; const startCellRect = startCell.getBoundingClientRect(); const startTimeCell = timeCells[startIndex], endTimeCell = timeCells[endIndex]; const height = endTimeCell.offsetTop + endTimeCell.offsetHeight - startTimeCell.offsetTop; const left = startCellRect.left - containerRect.left, top = startTimeCell.offsetTop; const slider = document.createElement("div"); slider.className = "existing-slider"; if (b.confirmed === "Да") slider.classList.add("confirmed"); else if (b.confirmed === "Нет") slider.classList.add("rejected"); slider.style.top = `${top}px`; slider.style.left = `${left}px`; slider.style.width = `${startCellRect.width}px`; slider.style.height = `${height}px`; slider.addEventListener('click', (e) => { e.stopPropagation(); showBookingInfo(b); }); slidersContainer.appendChild(slider); } });
    } catch(e){ loadingOverlay.style.display='none'; console.error(e); }
  }
  dateInput.addEventListener('change', async () => { await loadExisting(); intervalsByLane = {}; currentLane = currentStart = null; clearStartTimeHighlight(); clearHeaderHighlight(); clearVerticalLines(); updateTableSelection(); });
  document.addEventListener('DOMContentLoaded', async () => { await loadExisting(); updateTableSelection(); });
  document.getElementById("openImage").onclick = () => { document.getElementById("imagePopup").style.display = "flex"; };
  function closeImagePopup() { document.getElementById("imagePopup").style.display = "none"; }
</script>
</body>
</html>
