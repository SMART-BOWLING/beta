<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lucky Strike — Бильярд Клуб | Бронирование столов</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f1f2f6;
            --surface: #ffffff;
            --surface-2: #f8f9fc;
            --border: #e2e4e8;
            --border-dark: #cbd0d6;
            --text: #1e293b;
            --text-light: #5b677b;
            --text-muted: #8e99ab;
            --blue: #3b82f6;
            --blue-hover: #2563eb;
            --blue-bg: #eff6ff;
            --green: #10b981;
            --green-bg: #ecfdf5;
            --amber: #f59e0b;
            --amber-bg: #fffbeb;
            --red: #ef4444;
            --red-bg: #fef2f2;
            --gray: #94a3b8;
            --radius: 1rem;
            --radius-sm: 0.75rem;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.08);
            --cell-height: 56px;
            --cell-width: 80px;
            --lane-width: 100px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Text', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2);
        }

        .login-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .login-sub {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: var(--border);
            margin: 1rem auto;
        }

        /* Main App */
        .app {
            display: none;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .map-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .map-btn:hover {
            background: var(--blue-bg);
            border-color: var(--blue);
        }

        /* Main Container */
        .main {
            padding: 1.5rem 1.5rem 3rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Control Bar */
        .control-bar {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .date-picker {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--surface-2);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            border: 1px solid var(--border);
        }

        .date-picker input {
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--blue);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: var(--blue-hover);
            transform: scale(0.98);
        }

        /* Draft Cards */
        .draft-strip {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .draft-badge {
            background: var(--amber-bg);
            border: 1px solid var(--amber);
            border-radius: 2rem;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--amber);
        }

        .draft-card {
            background: var(--blue-bg);
            border: 1px solid var(--blue);
            border-radius: 2rem;
            padding: 0.35rem 0.75rem 0.35rem 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .draft-card button {
            background: var(--red-bg);
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--red);
            font-weight: bold;
            transition: all 0.1s;
        }

        .draft-card button:hover {
            background: var(--red);
            color: white;
        }

        /* Legends */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 0.75rem 1rem;
            background: var(--surface);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .legend-dot.table-1-3 { background: #3b82f6; }
        .legend-dot.table-4-6 { background: #10b981; }
        .legend-dot.table-7-12 { background: #f97316; }
        .legend-dot.pending { background: var(--amber); }
        .legend-dot.confirmed { background: var(--green); }
        .legend-dot.rejected { background: var(--red); }
        .legend-dot.draft { background: var(--blue); }

        /* Table Grid */
        .grid-wrapper {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: auto;
            box-shadow: var(--shadow-lg);
            position: relative;
        }

        .schedule-table {
            border-collapse: collapse;
            min-width: 1100px;
            font-size: 0.8rem;
        }

        .schedule-table th {
            background: var(--surface-2);
            padding: 0.75rem 0.5rem;
            text-align: center;
            font-weight: 600;
            color: var(--text-light);
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--surface-2);
            z-index: 5;
        }

        .schedule-table th:first-child {
            position: sticky;
            left: 0;
            z-index: 10;
            background: var(--surface-2);
        }

        .schedule-table td {
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            height: var(--cell-height);
        }

        .lane-cell {
            position: sticky;
            left: 0;
            background: var(--surface-2);
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
            width: var(--lane-width);
            z-index: 2;
        }

        .slot-cell {
            cursor: crosshair;
            transition: background 0.05s;
            background: #ffffff;
        }

        .slot-cell:hover {
            background: #fef9e3 !important;
        }

        .slot-cell.drag-highlight {
            background: #fde68a !important;
        }

        .slot-cell.temp-highlight {
            background: #bfdbfe !important;
            border: 2px solid var(--blue) !important;
        }

        /* Slider Layer */
        .sliders-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        .booking-card {
            position: absolute;
            border-radius: 0.6rem;
            pointer-events: auto;
            cursor: grab;
            padding: 0.4rem 0.6rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.05s ease;
            z-index: 25;
        }

        .booking-card:active {
            cursor: grabbing;
        }

        .booking-card:hover {
            transform: scale(1.01);
            z-index: 30;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .booking-card.pending {
            background: rgba(245, 158, 11, 0.35);
            border-left: 4px solid var(--amber);
        }

        .booking-card.confirmed {
            background: rgba(16, 185, 129, 0.3);
            border-left: 4px solid var(--green);
        }

        .booking-card.rejected {
            background: rgba(239, 68, 68, 0.25);
            border-left: 4px solid var(--red);
        }

        .booking-card.draft {
            background: rgba(59, 130, 246, 0.25);
            border-left: 4px solid var(--blue);
        }

        .booking-name {
            font-size: 0.7rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .booking-time {
            font-size: 0.6rem;
            opacity: 0.85;
        }

        .resize-handle {
            position: absolute;
            width: 12px;
            height: 60%;
            top: 20%;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            cursor: ew-resize;
        }

        .resize-handle-left {
            left: 2px;
        }

        .resize-handle-right {
            right: 2px;
        }

        .drag-area {
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            height: 100%;
            cursor: grab;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.open {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 1.5rem;
            width: 90%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-light);
            display: block;
            margin-bottom: 0.25rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn-secondary {
            flex: 1;
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: 0.7rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        /* Loader */
        .loader-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5000;
        }

        .loader-card {
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .control-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .draft-strip {
                margin-left: 0;
            }
            .main {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<script>
    // ==================== CONFIG ====================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzLxSrpcGOIm34gLlFZS-EYZmG8liMLcUST3MRMoAp56y6XDC2ClapCDB18yiYmdrHZ/exec";
    const ALLOWED_EMAILS = ["vadiksss900@gmail.com","sergey99belov@gmail.com","popadinecvasil3@gmail.com","veronicadiakova04@gmail.com","info.luckystrike.kh@gmail.com","sashavolobuev123890@gmail.com","egorgorbushko@gmail.com","shatrava.o@gmail.com","Craftmax30@gmail.com","bowlingblock.b@gmail.com","lana.arnaut@gmail.com","polosinnikita1224@gmail.com","sofialat1506@gmail.com","ll3991940@gmail.com","ken040888@gmail.com"];
    
    const HOURS = [];
    for (let h = 11; h <= 22; h++) {
        HOURS.push({ key: h, label: `${h}:00` });
        if (h < 22) HOURS.push({ key: h + 0.5, label: `${h}:30` });
    }
    
    const LANE_COUNT = 12;
    const LANE_GROUPS = [0,0,0,1,1,1,2,2,2,2,2,2];
    const GROUP_CLASS = ['table-1-3', 'table-4-6', 'table-7-12'];
    
    let bookings = [];
    let drafts = [];        // { lane, start, end, tempId }
    let nextTempId = 1;
    let currentBooking = null;
    let dragState = { active: false, lane: null, startIdx: null, endIdx: null };
    
    // ==================== HELPERS ====================
    function formatTime(key) {
        return `${Math.floor(key)}:${key % 1 === 0.5 ? '30' : '00'}`;
    }
    
    function showLoader() { document.getElementById('loader').style.display = 'flex'; }
    function hideLoader() { document.getElementById('loader').style.display = 'none'; }
    
    function getSlotCell(lane, slotIdx) {
        const row = document.getElementById('tableBody')?.rows[lane];
        return row?.cells[slotIdx + 1];
    }
    
    function parseJwt(token) {
        return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    }
    
    function onGoogleLogin(response) {
        const payload = parseJwt(response.credential);
        if (ALLOWED_EMAILS.includes(payload.email)) {
            localStorage.setItem('userEmail', payload.email);
            initApp();
        } else {
            alert('Доступ запрещен. Обратитесь к администратору.');
        }
    }
    
    // ==================== UI BUILD ====================
    function buildTable() {
        const thead = document.getElementById('tableHeader');
        const tbody = document.getElementById('tableBody');
        thead.innerHTML = '';
        tbody.innerHTML = '';
        
        // Header row
        const headerRow = document.createElement('tr');
        const cornerTh = document.createElement('th');
        cornerTh.textContent = 'СТОЛ';
        headerRow.appendChild(cornerTh);
        HOURS.forEach(slot => {
            const th = document.createElement('th');
            th.textContent = slot.label;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        
        // Body rows
        for (let lane = 0; lane < LANE_COUNT; lane++) {
            const tr = document.createElement('tr');
            const laneTd = document.createElement('td');
            laneTd.className = 'lane-cell';
            laneTd.textContent = `№ ${lane + 1}`;
            tr.appendChild(laneTd);
            
            for (let si = 0; si < HOURS.length; si++) {
                const td = document.createElement('td');
                td.className = 'slot-cell';
                td.dataset.lane = lane;
                td.dataset.slotIdx = si;
                td.dataset.timeKey = HOURS[si].key;
                tr.appendChild(td);
            }
            tbody.appendChild(tr);
        }
    }
    
    // ==================== RENDER SLIDERS ====================
    function renderAllSliders() {
        const container = document.getElementById('slidersLayer');
        container.innerHTML = '';
        const wrapper = document.querySelector('.schedule-table');
        const wrapperRect = wrapper.getBoundingClientRect();
        const scrollArea = document.getElementById('scrollArea');
        const scrollLeft = scrollArea.scrollLeft;
        const scrollTop = scrollArea.scrollTop;
        
        // Render real bookings
        bookings.forEach(booking => {
            const startIdx = HOURS.findIndex(h => h.key === booking.start);
            const endIdx = HOURS.findIndex(h => h.key === booking.end);
            if (startIdx === -1 || endIdx === -1) return;
            const row = document.getElementById('tableBody').rows[booking.lane];
            if (!row) return;
            const startCell = row.cells[startIdx + 1];
            const endCell = row.cells[endIdx + 1];
            if (!startCell || !endCell) return;
            
            const left = startCell.offsetLeft - scrollLeft;
            const top = row.offsetTop - scrollTop;
            const width = (endCell.offsetLeft + endCell.offsetWidth) - startCell.offsetLeft;
            const height = row.offsetHeight;
            
            const status = booking.confirmed === true ? 'confirmed' : (booking.confirmed === false ? 'rejected' : 'pending');
            const slider = document.createElement('div');
            slider.className = `booking-card ${status}`;
            slider.style.cssText = `left:${left}px;top:${top}px;width:${width}px;height:${height}px;`;
            slider.innerHTML = `
                <div class="booking-name">${booking.name || 'Бронь'}</div>
                <div class="booking-time">${formatTime(booking.start)} — ${formatTime(booking.end)}</div>
                <div class="drag-area"></div>
                <div class="resize-handle resize-handle-left"></div>
                <div class="resize-handle resize-handle-right"></div>
            `;
            
            slider.querySelector('.drag-area').addEventListener('mousedown', (e) => startDragBooking(booking, e));
            slider.querySelector('.resize-handle-left').addEventListener('mousedown', (e) => startResizeBooking(booking, 'left', e));
            slider.querySelector('.resize-handle-right').addEventListener('mousedown', (e) => startResizeBooking(booking, 'right', e));
            slider.addEventListener('click', (e) => { if (e.target === slider || e.target.classList.contains('booking-name')) showBookingInfo(booking); });
            container.appendChild(slider);
        });
        
        // Render drafts
        drafts.forEach(draft => {
            const startIdx = HOURS.findIndex(h => h.key === draft.start);
            const endIdx = HOURS.findIndex(h => h.key === draft.end);
            if (startIdx === -1 || endIdx === -1) return;
            const row = document.getElementById('tableBody').rows[draft.lane];
            if (!row) return;
            const startCell = row.cells[startIdx + 1];
            const endCell = row.cells[endIdx + 1];
            if (!startCell || !endCell) return;
            
            const left = startCell.offsetLeft - scrollLeft;
            const top = row.offsetTop - scrollTop;
            const width = (endCell.offsetLeft + endCell.offsetWidth) - startCell.offsetLeft;
            const height = row.offsetHeight;
            
            const slider = document.createElement('div');
            slider.className = 'booking-card draft';
            slider.style.cssText = `left:${left}px;top:${top}px;width:${width}px;height:${height}px;`;
            slider.innerHTML = `
                <div class="booking-name">Черновик</div>
                <div class="booking-time">${formatTime(draft.start)} — ${formatTime(draft.end)}</div>
                <div class="drag-area"></div>
                <div class="resize-handle resize-handle-left"></div>
                <div class="resize-handle resize-handle-right"></div>
            `;
            slider.querySelector('.drag-area').addEventListener('mousedown', (e) => startDragDraft(draft, e));
            slider.querySelector('.resize-handle-left').addEventListener('mousedown', (e) => startResizeDraft(draft, 'left', e));
            slider.querySelector('.resize-handle-right').addEventListener('mousedown', (e) => startResizeDraft(draft, 'right', e));
            container.appendChild(slider);
        });
    }
    
    // ==================== DRAFT MANAGEMENT ====================
    function renderDraftCards() {
        const container = document.getElementById('draftContainer');
        if (drafts.length === 0) {
            container.innerHTML = '';
            return;
        }
        container.innerHTML = `<div class="draft-badge">✏️ Черновики ${drafts.length}</div>`;
        drafts.forEach((draft, idx) => {
            const card = document.createElement('div');
            card.className = 'draft-card';
            card.innerHTML = `Стол ${draft.lane+1} ${formatTime(draft.start)}–${formatTime(draft.end)} <button data-idx="${idx}">✕</button>`;
            card.querySelector('button').onclick = () => {
                drafts.splice(idx, 1);
                renderDraftCards();
                clearTempHighlight();
                highlightTempSlots();
                renderAllSliders();
            };
            container.appendChild(card);
        });
    }
    
    function clearTempHighlight() {
        document.querySelectorAll('.slot-cell.temp-highlight').forEach(cell => cell.classList.remove('temp-highlight'));
    }
    
    function highlightTempSlots() {
        clearTempHighlight();
        drafts.forEach(draft => {
            const startIdx = HOURS.findIndex(h => h.key === draft.start);
            const endIdx = HOURS.findIndex(h => h.key === draft.end);
            for (let i = startIdx; i <= endIdx; i++) {
                const cell = getSlotCell(draft.lane, i);
                if (cell) cell.classList.add('temp-highlight');
            }
        });
    }
    
    // ==================== DRAG CREATE ====================
    function attachDragEvents() {
        document.querySelectorAll('.slot-cell').forEach(cell => {
            cell.removeEventListener('mousedown', onSlotMouseDown);
            cell.addEventListener('mousedown', onSlotMouseDown);
        });
    }
    
    function onSlotMouseDown(e) {
        e.preventDefault();
        const lane = parseInt(e.currentTarget.dataset.lane);
        const idx = parseInt(e.currentTarget.dataset.slotIdx);
        dragState = { active: true, lane, startIdx: idx, endIdx: idx };
        highlightDragInterval(lane, idx, idx);
    }
    
    function highlightDragInterval(lane, start, end) {
        document.querySelectorAll('.slot-cell.drag-highlight').forEach(cell => cell.classList.remove('drag-highlight'));
        for (let i = Math.min(start, end); i <= Math.max(start, end); i++) {
            const cell = getSlotCell(lane, i);
            if (cell) cell.classList.add('drag-highlight');
        }
    }
    
    function onGlobalMouseMove(e) {
        if (!dragState.active) return;
        const hoverCell = document.elementsFromPoint(e.clientX, e.clientY).find(el => el.classList?.contains('slot-cell'));
        if (hoverCell && hoverCell.dataset.lane == dragState.lane) {
            const newIdx = parseInt(hoverCell.dataset.slotIdx);
            dragState.endIdx = newIdx;
            highlightDragInterval(dragState.lane, dragState.startIdx, dragState.endIdx);
        }
    }
    
    function onGlobalMouseUp() {
        if (dragState.active && dragState.startIdx !== dragState.endIdx) {
            const start = HOURS[Math.min(dragState.startIdx, dragState.endIdx)].key;
            const end = HOURS[Math.max(dragState.startIdx, dragState.endIdx)].key;
            const hasConflict = bookings.some(b => b.lane === dragState.lane && !(b.end <= start || b.start >= end));
            if (!hasConflict) {
                drafts.push({ id: nextTempId++, lane: dragState.lane, start, end });
                renderDraftCards();
                highlightTempSlots();
                renderAllSliders();
            } else {
                alert('Это время уже занято');
            }
        }
        dragState.active = false;
        document.querySelectorAll('.slot-cell.drag-highlight').forEach(cell => cell.classList.remove('drag-highlight'));
    }
    
    // ==================== MOVING & RESIZING (simplified) ====================
    function startDragBooking(booking, e) { e.stopPropagation(); alert('Перетаскивание броней в разработке'); }
    function startResizeBooking(booking, side, e) { e.stopPropagation(); alert('Изменение броней в разработке'); }
    function startDragDraft(draft, e) { e.stopPropagation(); alert('Перетаскивание черновиков в разработке'); }
    function startResizeDraft(draft, side, e) { e.stopPropagation(); alert('Изменение черновиков в разработке'); }
    
    // ==================== API ====================
    async function loadBookings() {
        showLoader();
        const date = document.getElementById('dateInput').value;
        try {
            const res = await fetch(`${GAS_URL}?action=get&date=${date}`);
            const data = await res.json();
            bookings = (data.bookings || []).map(b => ({
                id: b.id,
                lane: b.table - 1,
                start: parseFloat(b.start),
                end: parseFloat(b.end),
                name: b.name,
                phone: b.phone,
                comment: b.comment,
                confirmed: b.confirmed === "Да" ? true : (b.confirmed === "Нет" ? false : null)
            }));
            renderAllSliders();
        } catch (err) {
            console.error(err);
            alert('Ошибка загрузки данных');
        }
        hideLoader();
    }
    
    async function saveDrafts() {
        if (drafts.length === 0) { alert('Нет черновиков для сохранения'); return; }
        const name = document.getElementById('guestName').value.trim();
        if (!name) { alert('Введите имя гостя'); return; }
        const phone = document.getElementById('guestPhone').value;
        const comment = document.getElementById('guestComment').value;
        const date = document.getElementById('dateInput').value;
        showLoader();
        const payload = drafts.map(d => ({
            date, tableNumber: d.lane + 1, start: d.start, end: d.end,
            name, phone, comment
        }));
        try {
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            drafts = [];
            renderDraftCards();
            clearTempHighlight();
            await loadBookings();
            closeBookingModal();
        } catch(err) { alert('Ошибка сохранения'); }
        hideLoader();
    }
    
    async function confirmBookingAction(confirmed) {
        if (!currentBooking) return;
        showLoader();
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'confirm', id: currentBooking.id, confirmed }) });
        closeInfoModal();
        await loadBookings();
        hideLoader();
    }
    
    async function deleteBookingAction() {
        if (!currentBooking || !confirm('Удалить бронь навсегда?')) return;
        showLoader();
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', id: currentBooking.id }) });
        closeInfoModal();
        await loadBookings();
        hideLoader();
    }
    
    // ==================== UI CONTROLS ====================
    function openNewBooking() {
        if (drafts.length === 0) { alert('Сначала выделите время: зажмите мышку и протяните по ячейкам'); return; }
        document.getElementById('guestName').value = '';
        document.getElementById('guestPhone').value = '';
        document.getElementById('guestComment').value = '';
        document.getElementById('bookingModal').classList.add('open');
    }
    
    function closeBookingModal() { document.getElementById('bookingModal').classList.remove('open'); }
    function closeInfoModal() { document.getElementById('infoModal').classList.remove('open'); currentBooking = null; }
    function openHallMap() { document.getElementById('mapModal').classList.add('open'); }
    function closeMapModal() { document.getElementById('mapModal').classList.remove('open'); }
    
    function showBookingInfo(booking) {
        currentBooking = booking;
        document.getElementById('infoTable').textContent = `№ ${booking.lane + 1}`;
        document.getElementById('infoTime').textContent = `${formatTime(booking.start)} — ${formatTime(booking.end)}`;
        document.getElementById('infoName').textContent = booking.name;
        document.getElementById('infoPhone').textContent = booking.phone || '—';
        document.getElementById('infoComment').textContent = booking.comment || '—';
        document.getElementById('infoModal').classList.add('open');
    }
    
    function initApp() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        buildTable();
        const today = new Date().toISOString().split('T')[0];
        const dateInput = document.getElementById('dateInput');
        dateInput.min = today;
        dateInput.value = today;
        dateInput.addEventListener('change', () => { loadBookings(); clearTempHighlight(); drafts = []; renderDraftCards(); });
        document.getElementById('newBookingBtn').addEventListener('click', openNewBooking);
        loadBookings();
        document.addEventListener('mousemove', onGlobalMouseMove);
        document.addEventListener('mouseup', onGlobalMouseUp);
        setTimeout(() => attachDragEvents(), 200);
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('open'); });
        });
    }
    
    if (localStorage.getItem('userEmail') && ALLOWED_EMAILS.includes(localStorage.getItem('userEmail'))) {
        initApp();
    }
</script>
