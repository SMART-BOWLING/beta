<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Lucky Strike · Бильярд Бронирование</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    /* ══════════════════════════════════════════
       RESET
    ══════════════════════════════════════════ */
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
    input,textarea{user-select:text;-webkit-user-select:text;}

    /* ══════════════════════════════════════════
       ПЕРЕМЕННЫЕ — цвета ПК версии
    ══════════════════════════════════════════ */
    :root{
      --bg:#f2f2f2;
      --surface:#ffffff;
      --surface2:#f8f8f8;
      --border:#e5e5e5;
      --border2:#cccccc;
      --label:#1e1e1e;
      --label2:#4a4a4a;
      --label3:#7c7c7c;
      --label4:#9a9a9a;
      --blue:#3b6e8f;
      --blue-h:#2c5a77;
      --blue-dim:rgba(59,110,143,0.12);
      --green:#4f6b4e;
      --red:#b33f3f;
      /* lane colors — как на ПК */
      --g-blue:#2c5f7a;
      --g-green:#4f6b4e;
      --g-red:#9b4b4b;
      /* cell tints */
      --cb-blue:rgba(167,199,231,0.55);
      --cb-green:rgba(167,220,150,0.55);
      --cb-red:rgba(248,173,157,0.55);
      /* highlight (выбор) */
      --hl:#ef4444;
      --hl-bg:#ef4444;
      /* status */
      --st-pending:#faf2e0;
      --st-confirmed:#e3efe2;
      --st-rejected:#f2e0e0;
      /* table */
      --cell-size:50px;
      --safe-b:env(safe-area-inset-bottom,0px);
      --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",system-ui,sans-serif;
    }

    body{font-family:var(--font);background:var(--bg);color:var(--label);min-height:100vh;-webkit-font-smoothing:antialiased;}

    /* ══════════════════════════════════════════
       LOGIN
    ══════════════════════════════════════════ */
    #login{
      position:fixed;inset:0;background:var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:20px;z-index:9999;padding:32px;
    }
    .login-glyph{font-size:48px;color:var(--label2);}
    .login-title{font-size:30px;font-weight:700;letter-spacing:-0.6px;color:var(--label);}
    .login-sub{font-size:15px;color:var(--label3);}
    .login-sep{width:32px;height:2px;background:var(--border2);}
    #content{display:none;}

    /* ══════════════════════════════════════════
       LOADER
    ══════════════════════════════════════════ */
    #loader{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.8);z-index:5000;align-items:center;justify-content:center;}
    .loader-box{text-align:center;}
    .spin{width:46px;height:46px;border:4px solid #f0f0f0;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ══════════════════════════════════════════
       DESKTOP NAV
    ══════════════════════════════════════════ */
    .d-nav{
      position:sticky;top:0;z-index:100;
      background:rgba(255,255,255,0.88);backdrop-filter:blur(28px) saturate(180%);
      border-bottom:.5px solid var(--border);
      height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 36px;
    }
    .d-nav-title{font-size:22px;font-weight:600;letter-spacing:-.4px;color:var(--label);display:flex;align-items:center;gap:8px;}
    .d-nav-right{display:flex;gap:12px;align-items:center;}
    .user-bar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.88);backdrop-filter:blur(20px);padding:5px 14px 5px 10px;border-radius:6px;border:.5px solid var(--border);}
    .user-pic{width:30px;height:30px;border-radius:4px;object-fit:cover;}
    .user-email{font-size:13px;font-weight:500;color:var(--label);user-select:text;-webkit-user-select:text;}
    .user-role{font-size:11px;color:var(--label3);background:var(--surface2);padding:2px 8px;border-radius:4px;margin-left:4px;}
    .logout-btn{background:none;border:none;padding:6px 10px;cursor:pointer;color:var(--label3);font-size:13px;}
    .logout-btn:hover{color:var(--red);}
    .d-nav-btn{background:rgba(255,255,255,.92);border:.5px solid var(--border2);border-radius:6px;padding:7px 22px;font-size:14px;font-weight:510;color:var(--blue);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .2s;}
    .d-nav-btn:hover{background:var(--blue-dim);}

    /* ══════════════════════════════════════════
       DESKTOP PAGE
    ══════════════════════════════════════════ */
    .d-page{padding:28px 36px 80px;display:flex;flex-direction:column;gap:28px;}
    .d-ctrl{display:flex;gap:16px;align-items:center;flex-wrap:wrap;background:var(--surface);border-radius:6px;padding:16px 24px;border:.5px solid var(--border);}
    .d-cal-btn{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:0 18px 0 14px;height:52px;cursor:pointer;font-family:var(--font);transition:all .2s;}
    .d-cal-btn:hover{background:#fff;border-color:var(--blue);}
    .d-cal-icon{color:var(--blue);font-size:16px;}
    .d-cal-text{font-size:15px;font-weight:560;color:var(--label);white-space:nowrap;user-select:text;-webkit-user-select:text;}
    .d-cal-chev{opacity:.5;font-size:12px;margin-left:4px;}
    .d-btn-book{height:52px;padding:0 36px;background:var(--blue);color:white;border:none;border-radius:6px;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .2s;}
    .d-btn-book:hover{background:var(--blue-h);}
    .d-btn-drag{height:52px;padding:0 28px;background:var(--surface2);color:var(--label2);border:.5px solid var(--border2);border-radius:6px;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;}
    .d-btn-drag.active{background:var(--blue);color:white;border-color:var(--blue);}
    .d-temp-cards{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto;}
    .d-temp-card{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.9);border:.5px solid var(--border);border-radius:6px;padding:6px 14px 6px 18px;font-size:13px;}
    .d-temp-card strong{font-size:13px;font-weight:600;margin-right:3px;}
    .d-temp-card .tc-time{font-family:monospace;font-size:11px;background:#efefef;padding:3px 10px;border-radius:3px;}
    .d-temp-card .tc-rm{width:26px;height:26px;border-radius:3px;background:#f2eaea;border:none;cursor:pointer;color:#b33f3f;font-size:13px;}
    .d-grid-card{background:var(--surface);overflow:hidden;border:.5px solid var(--border);}
    .d-grid-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;position:relative;}
    #dtable{display:table;border-collapse:collapse;table-layout:fixed;width:100%;min-width:1100px;font-size:14px;}
    #dtable thead th{height:52px;font-size:12px;font-weight:600;color:var(--label3);border-bottom:.5px solid var(--border2);border-right:.5px solid var(--border);text-align:center;background:#fafafa;}
    #dtable thead th.d-corner{width:52px;position:sticky;left:0;z-index:5;font-size:14px;font-weight:700;color:var(--label);background:#efefef;}
    #dtable thead th.d-th-time{width:74px;}
    #dtable tbody tr{height:52px;}
    #dtable tbody td.d-lane-hdr{width:52px;font-size:16px;font-weight:700;border-bottom:.5px solid var(--border2);border-right:.5px solid var(--border2);text-align:center;position:sticky;left:0;z-index:2;}
    .d-lane-hdr.lb{background:#2c5f7a;color:white;}
    .d-lane-hdr.lg{background:#4f6b4e;color:white;}
    .d-lane-hdr.lr{background:#9b4b4b;color:white;}
    #dtable tbody td.d-slot{background:#fff;border-bottom:.5px solid var(--border);border-right:.5px solid var(--border);transition:background .1s;}
    #dtable tbody tr:hover td.d-slot{background:#f6f6f6;}
    #dtable tbody td.d-slot.sp{background:var(--st-pending)!important;}
    #dtable tbody td.d-slot.sc{background:var(--st-confirmed)!important;}
    #dtable tbody td.d-slot.sr{background:var(--st-rejected)!important;}
    #dtable tbody td.d-slot.st{background:#dde9f0!important;border:1px solid var(--blue)!important;}
    #dtable tbody td.d-slot.sd{background:#e2dfcf!important;}
    #dsliders{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;}
    .d-slider{position:absolute;border-radius:4px;pointer-events:auto;cursor:default;padding:5px 10px 5px 28px;display:flex;flex-direction:column;justify-content:center;gap:3px;box-shadow:0 2px 8px rgba(0,0,0,.14);border:.5px solid rgba(255,255,255,.2);font-weight:510;font-family:var(--font);overflow:hidden;white-space:nowrap;transition:all .12s;}
    .d-slider[data-lt="blue"]{background:rgba(44,95,122,.92);color:white;}
    .d-slider[data-lt="green"]{background:rgba(79,107,78,.92);color:white;}
    .d-slider[data-lt="red"]{background:rgba(155,75,75,.92);color:white;}
    .d-slider.sc[data-lt="blue"]{background:#2c5f7a;}
    .d-slider.sc[data-lt="green"]{background:#4f6b4e;}
    .d-slider.sc[data-lt="red"]{background:#9b4b4b;}
    .d-slider.sr{opacity:.65;}
    .d-slider.st[data-lt="blue"]{background:rgba(44,95,122,.7);border:1px solid #c9b16b;}
    .d-slider.st[data-lt="green"]{background:rgba(79,107,78,.7);border:1px solid #c9b16b;}
    .d-slider.st[data-lt="red"]{background:rgba(155,75,75,.7);border:1px solid #c9b16b;}
    .d-slider.dragging{opacity:.3;}
    .d-ghost{position:absolute;border-radius:4px;pointer-events:none;padding:5px 10px 5px 28px;display:flex;flex-direction:column;justify-content:center;gap:3px;background:rgba(0,0,0,.42)!important;backdrop-filter:blur(10px);border:2px dashed rgba(255,215,0,.9)!important;z-index:999;font-weight:510;color:#fff;text-shadow:0 1px 1px black;transition:none;font-family:var(--font);overflow:hidden;white-space:nowrap;}
    .d-status-dot{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;box-shadow:0 0 0 1px rgba(255,255,255,.5);}
    .d-slider.sp .d-status-dot{background:#f5b042;}
    .d-slider.sc .d-status-dot{background:#3bc43b;}
    .d-slider.sr .d-status-dot{background:#e55a5a;}
    .d-slider.st .d-status-dot{background:#aaa;opacity:.6;}
    .d-ghost .d-status-dot{background:#ffc107;}
    .d-sl-name{font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;padding-right:6px;}
    .d-sl-time{font-size:9px;opacity:.82;padding-right:6px;}
    .d-drag-handle{position:absolute;inset:0;z-index:2;pointer-events:auto;}
    .d-slider.drag-enabled .d-drag-handle{cursor:grab;}
    .d-slider.drag-enabled .d-drag-handle:active{cursor:grabbing;}
    .d-slider:not(.drag-enabled) .d-drag-handle{cursor:pointer;}
    .d-drag-ind{position:fixed;bottom:24px;right:24px;background:#2c2c2ecc;backdrop-filter:blur(16px);color:white;padding:9px 22px;border-radius:4px;font-size:13px;z-index:1000;pointer-events:none;}

    /* ══════════════════════════════════════════
       SHARED MODALS (desktop)
    ══════════════════════════════════════════ */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(18px);z-index:2000;justify-content:center;align-items:center;}
    .overlay.open{display:flex;}
    .sheet{background:#fff;border-radius:6px;width:100%;max-width:520px;box-shadow:0 20px 48px rgba(0,0,0,.18);}
    .sh-head{padding:22px 26px 10px;display:flex;justify-content:space-between;align-items:center;}
    .sh-title{font-size:24px;font-weight:700;letter-spacing:-.4px;display:flex;align-items:center;gap:10px;user-select:text;-webkit-user-select:text;}
    .sh-x{width:38px;height:38px;border-radius:4px;background:#f2f2f5;border:none;font-size:20px;cursor:pointer;}
    .sh-body{padding:14px 26px 28px;}
    .f-grp{margin-bottom:18px;}
    .f-lbl{font-size:12px;font-weight:600;color:var(--label3);margin-bottom:5px;display:block;}
    .f-inp{width:100%;background:var(--surface2);border:.5px solid var(--border2);border-radius:4px;font-size:15px;padding:11px 14px;font-family:var(--font);}
    .f-inp:focus{outline:none;border-color:var(--blue);}
    .f-row{display:flex;gap:12px;margin-top:20px;}
    .f-ok{flex:1;height:50px;background:var(--blue);color:white;border:none;border-radius:4px;font-weight:600;font-size:15px;cursor:pointer;}
    .f-ok:hover{background:var(--blue-h);}
    .f-cancel{flex:1;height:50px;background:#f2f2f5;border:none;border-radius:4px;font-weight:500;font-size:15px;cursor:pointer;}
    .i-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:.5px solid var(--border);font-size:15px;}
    .i-row:last-child{border:none;}
    .i-row strong,.i-row span{user-select:text;-webkit-user-select:text;}
    .del-btn{width:100%;height:48px;background:#f2eaea;border:none;border-radius:4px;margin-top:20px;cursor:pointer;font-weight:700;color:var(--red);font-size:15px;}
    .cb-row{display:flex;gap:12px;margin:16px 0 4px;}
    .cb-yes,.cb-no{flex:1;height:48px;border-radius:4px;font-weight:700;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px;}
    .cb-yes{background:rgba(79,107,78,.12);color:#3c5a3b;}
    .cb-no{background:rgba(179,63,63,.1);color:#a33a3a;}

    /* ══════════════════════════════════════════
       ADMIN
    ══════════════════════════════════════════ */
    .admin-panel{max-width:780px;width:92%;max-height:82vh;overflow-y:auto;}
    .adm-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border);}
    .adm-title{font-size:20px;font-weight:700;}
    .adm-add{background:var(--green);color:white;border:none;padding:9px 18px;border-radius:4px;cursor:pointer;font-weight:500;display:flex;align-items:center;gap:7px;}
    .u-table{width:100%;border-collapse:collapse;}
    .u-table th,.u-table td{padding:10px;text-align:left;border-bottom:1px solid var(--border);}
    .u-table th{background:var(--surface2);font-weight:600;color:var(--label2);}
    .u-edit,.u-del{padding:5px 10px;border:none;border-radius:3px;cursor:pointer;font-size:11px;}
    .u-edit{background:var(--blue-dim);color:var(--blue);}
    .u-del{background:rgba(179,63,63,.1);color:var(--red);}
    .u-form{display:flex;flex-direction:column;gap:14px;}
    .u-form input{width:100%;padding:10px;border:1px solid var(--border2);border-radius:4px;font-size:14px;font-family:var(--font);}
    .u-form-row{display:flex;gap:10px;margin-top:6px;}
    .u-form-row button{flex:1;padding:11px;border:none;border-radius:4px;cursor:pointer;font-weight:500;font-size:14px;}
    .u-save{background:var(--blue);color:white;}
    .u-cancel-btn{background:var(--surface2);color:var(--label2);}

    /* ══════════════════════════════════════════
       MOBILE — ОРИГИНАЛЬНЫЙ ФУНКЦИОНАЛ
       Цвета ПК, закругления минимальные (≤4px)
    ══════════════════════════════════════════ */
    @media (max-width: 767px) {
      /* Скрыть desktop */
      .d-nav{display:none!important;}
      .d-page{display:none!important;}

      /* Sheet на мобиле — снизу, без закруглений */
      .overlay{align-items:flex-end;}
      .sheet{border-radius:0;max-width:100%;max-height:88dvh;overflow-y:auto;padding-bottom:var(--safe-b);}

      /* ─ Хедер ─ */
      .m-header{
        display:flex;align-items:center;justify-content:space-between;
        padding:0 12px;height:52px;
        background:linear-gradient(to right,#1e3c72,#2a5298);
        border-bottom:1px solid rgba(255,255,255,.12);
        position:sticky;top:0;z-index:100;
      }
      .m-logo{font-size:15px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px;letter-spacing:-.2px;}
      .m-hdr-right{display:flex;gap:6px;align-items:center;}
      .m-icon-btn{
        width:32px;height:32px;border-radius:4px;
        background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);
        display:flex;align-items:center;justify-content:center;
        cursor:pointer;font-size:13px;color:#fff;
      }
      .m-icon-btn:active{background:rgba(255,255,255,.25);}
      .m-user-pic{width:20px;height:20px;border-radius:3px;object-fit:cover;}

      /* ─ Дата-чипы ─ */
      .m-date-bar{
        display:flex;align-items:center;gap:4px;
        padding:8px 10px;
        background:linear-gradient(to right,#1e3c72,#2a5298);
        border-bottom:1px solid rgba(255,255,255,.1);
        overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
      }
      .m-date-bar::-webkit-scrollbar{display:none;}
      .m-date-chip{
        display:flex;flex-direction:column;align-items:center;
        padding:5px 10px;border-radius:3px;cursor:pointer;flex-shrink:0;
        border:1px solid transparent;min-width:42px;transition:all .12s;
      }
      .m-date-chip.active{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.5);}
      .m-date-chip:not(.active){background:rgba(255,255,255,.08);}
      .m-date-chip:active{background:rgba(255,255,255,.3);}
      .dc-day{font-size:15px;font-weight:700;color:#fff;line-height:1.2;}
      .dc-dow{font-size:9px;color:rgba(255,255,255,.7);font-weight:500;margin-top:1px;}

      /* ─ Hint-бар (шаг выбора) ─ */
      .m-hint-bar{
        padding:7px 12px;
        background:#fffbeb;border-bottom:1px solid #fde68a;
        font-size:12px;color:#92400e;
        display:none;align-items:center;gap:8px;
      }
      .m-hint-bar.visible{display:flex;}
      .m-hint-cancel{margin-left:auto;background:none;border:none;color:#92400e;cursor:pointer;font-size:12px;font-weight:700;}

      /* ─ Бар выбранных интервалов ─ */
      .m-sel-bar{
        padding:6px 10px;display:none;flex-wrap:wrap;gap:5px;
        background:var(--surface);border-bottom:1px solid var(--border);
      }
      .m-sel-bar.visible{display:flex;}
      .m-sel-chip{
        display:flex;align-items:center;gap:6px;
        background:var(--blue-dim);border:1px solid rgba(59,110,143,.25);
        border-radius:3px;padding:4px 9px;font-size:12px;color:var(--blue);font-weight:600;
      }
      .m-sel-chip button{background:none;border:none;cursor:pointer;color:var(--red);font-size:14px;line-height:1;padding:0;}

      /* ─ FAB «Забронировать» ─ */
      .m-fab{
        position:fixed;bottom:calc(14px + var(--safe-b));right:14px;
        background:linear-gradient(to right,#1e3c72,#2a5298);
        color:white;border:none;border-radius:4px;
        height:46px;padding:0 20px;
        font-size:14px;font-weight:700;cursor:pointer;
        box-shadow:0 4px 14px rgba(30,60,114,.4);
        display:flex;align-items:center;gap:8px;z-index:190;
        transition:opacity .15s;
      }
      .m-fab:active{opacity:.8;}
      .m-fab.hidden{display:none;}

      /* ─ Тело (скролл таблицы) ─ */
      .m-body{
        overflow-y:auto;-webkit-overflow-scrolling:touch;
        /* высота = 100dvh - header(52) - datebar(≈54) */
        height:calc(100dvh - 52px - 54px);
        background:var(--bg);
      }

      /* ─ Враппер таблицы ─ */
      .m-grid-wrap{
        position:relative;
        overflow-x:auto;-webkit-overflow-scrolling:touch;
        background:var(--surface);
      }
      .m-grid-wrap::-webkit-scrollbar{height:2px;}
      .m-grid-wrap::-webkit-scrollbar-thumb{background:var(--border2);}

      /* ─ Таблица ─ */
      #mTable{
        border-collapse:collapse;table-layout:fixed;
        font-family:var(--font);
      }

      /* Угловая ячейка */
      #mTable thead th.m-corner{
        background:linear-gradient(to right,#1e3c72,#2a5298);
        color:white;font-size:10px;font-weight:700;
        width:var(--cell-size);height:var(--cell-size);
        position:sticky;left:0;top:0;z-index:6;
        border-bottom:1px solid rgba(255,255,255,.15);
        border-right:1px solid rgba(255,255,255,.15);
        text-align:center;vertical-align:middle;
      }

      /* Заголовки столов (кликабельные) */
      #mTable thead th.m-lane-hdr{
        height:var(--cell-size);width:var(--cell-size);
        font-size:11px;font-weight:700;color:white;
        border-bottom:1px solid rgba(255,255,255,.15);
        border-right:1px solid rgba(255,255,255,.1);
        text-align:center;vertical-align:middle;
        cursor:pointer;position:sticky;top:0;z-index:4;
        white-space:nowrap;
      }
      #mTable thead th.m-lane-hdr.lb{background:linear-gradient(to right,#1e3c72,#2a5298);}
      #mTable thead th.m-lane-hdr.lg{background:linear-gradient(135deg,#3a6b38,#4f6b4e);}
      #mTable thead th.m-lane-hdr.lr{background:linear-gradient(135deg,#7b2c2c,#9b4b4b);}
      /* подсветка выбранного столбца */
      #mTable thead th.m-lane-hdr.col-sel{
        background:var(--hl-bg)!important;
        color:white!important;
      }

      /* Ячейки времени — левый столбец (липкий) */
      #mTable tbody td.m-time-l{
        width:var(--cell-size);height:var(--cell-size);
        background:linear-gradient(145deg,#1e3a8a,#0f2a5f);
        color:white;font-size:10px;font-weight:700;
        border-bottom:1px solid rgba(255,255,255,.08);
        border-right:2px solid rgba(255,255,255,.2);
        text-align:center;vertical-align:middle;
        position:sticky;left:0;z-index:3;cursor:pointer;
        white-space:nowrap;
      }
      #mTable tbody td.m-time-l:hover,
      #mTable tbody td.m-time-l:active{background:linear-gradient(145deg,#2a5298,#1e3a8a);}

      /* Ячейки времени — правый столбец */
      #mTable tbody td.m-time-r{
        width:var(--cell-size);height:var(--cell-size);
        background:linear-gradient(145deg,#1e3a8a,#0f2a5f);
        color:white;font-size:10px;font-weight:700;
        border-bottom:1px solid rgba(255,255,255,.08);
        border-left:2px solid rgba(255,255,255,.2);
        text-align:center;vertical-align:middle;
        cursor:pointer;white-space:nowrap;
      }
      #mTable tbody td.m-time-r:hover,
      #mTable tbody td.m-time-r:active{background:linear-gradient(145deg,#2a5298,#1e3a8a);}

      /* Слоты */
      #mTable tbody td.m-slot{
        height:var(--cell-size);width:var(--cell-size);
        border-bottom:1px solid var(--border);
        border-right:1px solid var(--border);
        text-align:center;vertical-align:middle;
        cursor:pointer;transition:background .1s;
        position:relative;
      }
      /* цвета групп — как на ПК */
      #mTable tbody td.m-slot.cb{background:var(--cb-blue);}
      #mTable tbody td.m-slot.cg{background:var(--cb-green);}
      #mTable tbody td.m-slot.cr{background:var(--cb-red);}
      /* статусы броней */
      #mTable tbody td.m-slot.bk-p{background:var(--st-pending)!important;}
      #mTable tbody td.m-slot.bk-c{background:var(--st-confirmed)!important;}
      #mTable tbody td.m-slot.bk-r{background:var(--st-rejected)!important;}
      /* выделение (выбранный интервал) */
      #mTable tbody td.m-slot.sel{background:var(--hl-bg)!important;border-color:transparent;}
      #mTable tbody td.m-slot.sel.rt{border-top-left-radius:0;border-top-right-radius:0;}
      #mTable tbody td.m-slot.sel.rb{border-bottom-left-radius:0;border-bottom-right-radius:0;}
      /* точка начала */
      #mTable tbody td.m-slot.sel-start{
        background:rgba(239,68,68,.22)!important;
        border:2px solid var(--hl)!important;
      }
      /* вертикальные красные линии выбранного столбца */
      #mTable tbody td.m-slot.v-line::before,
      #mTable tbody td.m-slot.v-line::after{
        content:"";position:absolute;top:0;bottom:0;width:2px;
        background:var(--hl);z-index:5;
      }
      #mTable tbody td.m-slot.v-line::before{left:0;}
      #mTable tbody td.m-slot.v-line::after{right:0;}

      /* ─ Ползунки на мобиле ─ */
      #mSliders{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
      .m-slider{
        position:absolute;border-radius:3px;pointer-events:auto;cursor:pointer;
        padding:3px 5px 3px 16px;
        display:flex;flex-direction:column;justify-content:center;gap:2px;
        box-shadow:0 2px 6px rgba(0,0,0,.2);
        border:.5px solid rgba(255,255,255,.18);
        overflow:hidden;white-space:nowrap;font-family:var(--font);
        transition:transform .1s;
      }
      .m-slider:active{transform:scale(.97);}
      /* цвета как ПК */
      .m-slider[data-lt="blue"]{background:rgba(44,95,122,.92);color:white;}
      .m-slider[data-lt="green"]{background:rgba(79,107,78,.92);color:white;}
      .m-slider[data-lt="red"]{background:rgba(155,75,75,.92);color:white;}
      .m-slider.sc[data-lt="blue"]{background:#2c5f7a;}
      .m-slider.sc[data-lt="green"]{background:#4f6b4e;}
      .m-slider.sc[data-lt="red"]{background:#9b4b4b;}
      .m-slider.sr{opacity:.6;}
      .m-dot{
        position:absolute;left:4px;top:50%;transform:translateY(-50%);
        width:8px;height:8px;border-radius:50%;
        box-shadow:0 0 0 1px rgba(255,255,255,.4);
      }
      .m-slider.sp .m-dot{background:#f5b042;}
      .m-slider.sc .m-dot{background:#3bc43b;}
      .m-slider.sr .m-dot{background:#e55a5a;}
      .m-sl-name{font-size:9px;font-weight:700;overflow:hidden;text-overflow:ellipsis;}
      .m-sl-time{font-size:8px;opacity:.8;}

      /* ─ Мобильный info-sheet ─ */

      .m-i-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:.5px solid var(--border);}
      .m-i-row:last-child{border:none;}

</head>

function enc(s){return encodeURIComponent(s);}

function loadGAPI(){return new Promise((res,rej)=>{if(window.gapi&&gapi.client){res();return;}gapi.load('client',{callback:()=>res(),onerror:()=>rej(),timeout:8000,ontimeout:()=>rej()});});}
function cacheU(e,n,r,p){try{localStorage.setItem('blsEmail',e);localStorage.setItem('blsName',n);localStorage.setItem('blsRole',r);localStorage.setItem('blsPic',p);localStorage.setItem('blsIn','1');}catch(e){}}

function dOnMouseDown(e){if(dragModeOn)return;const t=e.target;if(!t.classList.contains('d-slot'))return;e.preventDefault();dIsDragging=true;dDragStart={lane:+t.dataset.lane,si:+t.dataset.si};dDragInterval={lane:+t.dataset.lane,startIdx:+t.dataset.si,endIdx:+t.dataset.si};dHighlight(+t.dataset.lane,+t.dataset.si,+t.dataset.si);}
function dOnMouseMove(e){if(!dragModeOn&&dIsDragging&&dDragStart){const el=document.elementsFromPoint(e.clientX,e.clientY).find(el=>el.classList?.contains('d-slot'));if(el&&+el.dataset.lane===dDragStart.lane){const ns=Math.min(dDragStart.si,+el.dataset.si),ne=Math.max(dDragStart.si,+el.dataset.si);dDragInterval={lane:dDragStart.lane,startIdx:ns,endIdx:ne};dHighlight(dDragStart.lane,ns,ne);}}}
function dHighlight(lane,si,ei){document.querySelectorAll('#dtable td.d-slot.sd').forEach(td=>td.classList.remove('sd'));for(let i=si;i<=ei;i++){const c=getDCell(lane,i);if(c)c.classList.add('sd');}}
function dOnMouseUp(){if(!dragModeOn&&dIsDragging&&dDragInterval){const{lane,startIdx,endIdx}=dDragInterval;if(hasConflict(lane,startIdx,endIdx))alert('Это время уже занято');else dTempBookings.push({id:dNextTid++,lane,startSlotIdx:startIdx,endSlotIdx:endIdx});renderDesktop();}dIsDragging=false;dDragInterval=null;dDragStart=null;document.querySelectorAll('#dtable td.d-slot.sd').forEach(td=>td.classList.remove('sd'));}
function dStartMove(b,e,rows){const sl=e.currentTarget.closest('.d-slider');if(!sl)return;const dur=b.endSlotIdx-b.startSlotIdx;const ghost=dCreateGhost(sl);dMoveLogic(ghost,sl,rows,dur,(fl,fsi)=>{if(!hasConflict(fl,fsi,fsi+dur,b.id)){b.lane=fl;b.startSlotIdx=fsi;b.endSlotIdx=fsi+dur;b.start=slots[fsi].key;b.end=slots[fsi+dur+1]?.key||(slots[fsi+dur].key+0.5);postAction({action:'update',id:b.id,date:curDate,tableNumber:b.lane+1,start:b.start,end:b.end,name:b.name,phone:b.phone,comment:b.comment});}else alert('Конфликт');renderDesktop();updateDCells();},b.lane,b.startSlotIdx);}
function dStartMoveTemp(tmp,e,rows){const sl=e.currentTarget.closest('.d-slider');if(!sl)return;const dur=tmp.endSlotIdx-tmp.startSlotIdx;const ghost=dCreateGhost(sl);dMoveLogic(ghost,sl,rows,dur,(fl,fsi)=>{if(!hasConflict(fl,fsi,fsi+dur)){tmp.lane=fl;tmp.startSlotIdx=fsi;tmp.endSlotIdx=fsi+dur;}else alert('Конфликт');renderDesktop();},tmp.lane,tmp.startSlotIdx);}
function dCreateGhost(sl){const g=document.createElement('div');g.className='d-ghost';const nc=sl.querySelector('.d-sl-name')?.cloneNode(true),tc=sl.querySelector('.d-sl-time')?.cloneNode(true),dc=sl.querySelector('.d-status-dot')?.cloneNode(true);if(dc)g.appendChild(dc);if(nc)g.appendChild(nc);if(tc)g.appendChild(tc);g.style.cssText=sl.style.cssText;g.style.opacity='0.88';g.style.transition='none';$('dsliders').appendChild(g);sl.classList.add('dragging');return g;}
function dMoveLogic(ghost,slider,rows,dur,onDrop,iL,iSi){let cL=iL,cSi=iSi;function upd(l,si){const r=rows[l];if(!r)return;const sc=r.cells[si+1],ec=r.cells[si+dur+1];if(sc&&ec){ghost.style.left=(sc.offsetLeft+1)+'px';ghost.style.top=(r.offsetTop+1)+'px';ghost.style.width=(ec.offsetLeft+ec.offsetWidth-sc.offsetLeft-2)+'px';ghost.style.height=(r.offsetHeight-2)+'px';}}function getT(e){const el=document.elementsFromPoint(e.clientX,e.clientY).find(el=>el.classList?.contains('d-slot'));if(!el)return null;return{lane:+el.dataset.lane,idx:+el.dataset.si};}function mv(ev){const t=getT(ev);if(t){const ns=Math.min(Math.max(0,t.idx),slots.length-dur-1);if(t.lane!==cL||ns!==cSi){cL=t.lane;cSi=ns;upd(cL,cSi);}}}function up(ev){const t=getT(ev);if(t)onDrop(t.lane,Math.min(Math.max(0,t.idx),slots.length-dur-1));ghost?.remove();slider?.classList.remove('dragging');document.body.style.cursor='';document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}document.body.style.cursor='grabbing';document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);upd(cL,cSi);}

// ══════════════════════════════════════════════════

const DOW=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

// Состояние выбора
let mSelLane=null, mSelStart=null;

// ── Обновить классы ячеек ──
function updateMCells(){
  if(!$('mBody'))return;
  document.querySelectorAll('#mTable td.m-slot').forEach(td=>td.classList.remove('bk-p','bk-c','bk-r','sel','sel-start','v-line'));
  document.querySelectorAll('#mTable thead th.m-lane-hdr').forEach(th=>th.classList.remove('col-sel'));

  // Статусы броней
  for(const b of bookings){
    for(let i=b.startSlotIdx;i<=b.endSlotIdx;i++){
      const c=getMCell(b.lane,i);if(c)c.classList.add(b.confirmed===true?'bk-c':(b.confirmed===false?'bk-r':'bk-p'));
    }
  }
  // Выбранный столбец
  if(mSelLane!==null){
    document.querySelectorAll('#mTable td.m-slot').forEach(td=>{if(+td.dataset.lane===mSelLane)td.classList.add('v-line');});
    document.querySelectorAll('#mTable thead th.m-lane-hdr').forEach(th=>{if(+th.dataset.lane===mSelLane)th.classList.add('col-sel');});
  }
  // Точка начала
  if(mSelLane!==null&&mSelStart!==null){
    const c=getMCell(mSelLane,mSelStart);if(c)c.classList.add('sel-start');
  }
}

function getMCell(lane,si){const row=$('mBody').rows[si];if(!row)return null;return row.cells[lane+1];}

// ── Ползунки ──
function renderMSliders(){
  const c=$('mSliders');if(!c)return;c.innerHTML='';
  const wrap=$('mGridWrap');if(!wrap)return;
  // Нужен reflow чтобы getBoundingClientRect работал корректно
  bookings.forEach(b=>{
    const startRow=$('mBody').rows[b.startSlotIdx];
    const endRow=$('mBody').rows[b.endSlotIdx];
    if(!startRow||!endRow)return;
    const startCell=startRow.cells[b.lane+1];
    const endCell=endRow.cells[b.lane+1];
    if(!startCell||!endCell)return;
    const wRect=wrap.getBoundingClientRect();
    const scRect=startCell.getBoundingClientRect();
    const ecRect=endCell.getBoundingClientRect();
    const left=scRect.left-wRect.left+wrap.scrollLeft+1;
    const top=scRect.top-wRect.top+wrap.scrollTop+1;
    const width=scRect.width-2;
    const height=ecRect.bottom-scRect.top-2;
    const status=b.confirmed===true?'sc':(b.confirmed===false?'sr':'sp');
    const lt=GRP_LT[laneGroup(b.lane)];
    const sl=document.createElement('div');sl.className=`m-slider ${status}`;sl.setAttribute('data-lt',lt);
    sl.style.cssText=`left:${left}px;top:${top}px;width:${width}px;height:${height}px;`;
    const dot=document.createElement('div');dot.className='m-dot';sl.appendChild(dot);
    const nm=document.createElement('div');nm.className='m-sl-name';nm.textContent=b.name||'Бронь';
    const tm=document.createElement('div');tm.className='m-sl-time';tm.textContent=slotLabel(b.startSlotIdx,b.endSlotIdx);
    sl.append(nm,tm);
    sl.addEventListener('click',e=>{e.stopPropagation();showInfoModal(b);});
    c.appendChild(sl);
  });
}

function
