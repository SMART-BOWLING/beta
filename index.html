      color: white;
      padding: 10px 18px;
      border-radius: 40px;

      z-index: 20000;

  </style>

<!-- Основной контент (изначально скрыт, показывается после успешного входа) -->

<script>
  // ==================== АВТОРИЗАЦИЯ (ПРОВЕРКА EMAIL) ====================
  const AUTH_SPREADSHEET_ID = '1zwi1CInK3NZ8YRAegRMAdjin6XPacVkAkFsjAiqVE0w';
  const AUTH_SHEET_NAME = '1';
  const API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
  
  let gapiInitialized = false;
  let appLoaded = false;

  // Показ временного сообщения
  function showToast(text, isError = true) {
    const old = document.querySelector('.loading-toast');
    if (old) old.remove();
    const toast = document.createElement('div');
    toast.className = 'loading-toast';
    toast.style.background = isError ? '#b91c1c' : '#16a34a';
    toast.innerHTML = text;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  // Парсинг JWT
  function parseJwt(token) {
    try {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
      return JSON.parse(jsonPayload);
    } catch(e) { return {}; }
  }

  // Инициализация GAPI
  function initGapi() {
    return new Promise((resolve, reject) => {
      if (gapiInitialized) { resolve(); return; }
      gapi.load('client', {
        callback: async () => {
          try {
            await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] });
            gapiInitialized = true;
            resolve();
          } catch(e) { reject(e); }
        },
        onerror: reject,
        timeout: 8000
      });
    });
  }

  // Проверка email в таблице
  async function checkEmailInSheet(email) {
    try {
      await initGapi();
      const response = await gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: AUTH_SPREADSHEET_ID,
        range: `${AUTH_SHEET_NAME}!A:C`,
      });
      const rows = response.result.values || [];
      for (let i = 1; i < rows.length; i++) {
        if (!rows[i] || !rows[i][0]) continue;
        if (rows[i][0].toLowerCase().trim() === email) {
          return { found: true, name: rows[i][1]?.trim() || email.split('@')[0], role: rows[i][2]?.trim() || '' };
        }
      }
      return { found: false };
    } catch(err) {
      console.error(err);
      return { found: false, error: true };
    }
  }

  // ПОЛНОСТЬЮ РАБОЧЕЕ ПРИЛОЖЕНИЕ БРОНИРОВАНИЯ (вставляется динамически)
  function injectFullApp() {
    if (appLoaded) return;
    appLoaded = true;
    
    const mainDiv = document.getElementById('mainContent');
    // Весь HTML интерфейса бронирования (полностью рабочий, без дублирования экрана входа)
    mainDiv.innerHTML = `
      <style>

        }

          td, th { width: var(--cell-size) !important; height: var(--cell-size) !important; }
          #controls { flex-direction: row; gap: 12px; max-width: 480px; }
        }
        body { font-family: 'Segoe UI', sans-serif; background: #1a2f40; margin: 0; padding: 5px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .table-container { position: relative; width: 100%; max-width: 100vw; overflow-x: auto; display: flex; flex-direction: column; align-items: center; }
        table { border-collapse: separate; border-spacing: var(--border-spacing); table-layout: fixed; margin: 0 auto; background: #1a2f40; padding: var(--border-spacing); }
        .table-wrapper { display: inline-block; position: relative; }
        thead th { position: sticky; top: 0; color: white; background: #1a2f40 !important; font-weight: 600; }
        th.time-col, .time-right { background: #1a2f40 !important; color: white; font-weight: bold; cursor: pointer; }
        th, td { width: var(--cell-size); height: var(--cell-size); border: none; text-align: center; vertical-align: middle; background: white !important; font-size: 12px; position: relative; }
        td.slot { cursor: pointer; transition: 0.2s; }
        td.slot:hover { background: #f0f0f0 !important; }
        td.selected { background: #1a2f40 !important; color: white; font-weight: 500; }
        td.start-time-chosen { background: #ef4444 !important; color: white; }
        .column-markers { display: flex; gap: var(--border-spacing); margin-top: 5px; }
        .marker { height: 6px; border-radius: 3px; }
        .marker.blue { background-color: #3b82f6; }
        .marker.green { background-color: #22c55e; }
        .marker.red { background-color: #ef4444; }
        .marker.empty { background: transparent; }
        #cardsContainer { margin: 8px auto; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .booking-card { position: relative; background: var(--card-color); border-radius: 12px; padding: 12px 45px 12px 15px; font-weight: 600; font-size: 14px; white-space: nowrap; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .booking-card .close-btn { position: absolute; top: 0; right: 0; transform: translate(50%, -50%); background: white; border-radius: 50%; font-weight: bold; cursor: pointer; padding: 6px 10px; border: 1px solid #1e3a8a; }
        #controls { margin-top: 6px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; width: 100%; max-width: 500px; }
        #dateInput, .booking-button { flex: 1; padding: 8px 12px; font-size: 16px; font-weight: 600; border-radius: 10px; cursor: pointer; text-align: center; border: none; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        #modal > div { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; }
        #modal input, #modal textarea { width: 100%; padding: 8px; margin-top: 6px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        #modal button { padding: 8px 16px; border-radius: 8px; margin: 5px; cursor: pointer; }
        .image-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; }
        .image-popup .popup-content { position: relative; background: white; padding: 20px; border-radius: 12px; max-width: 90vw; }
        .image-popup .close-popup { position: absolute; top: 5px; right: 5px; background: #1a2f40; color: white; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; }
        .booking-info-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .booking-info-popup .popup-content { background: white; padding: 25px; border-radius: 12px; width: 400px; max-width: 90vw; }
        .confirmation-buttons { display: flex; gap: 15px; margin: 15px 0; }
        .delete-btn { background: #475569; color: white; width: 100%; padding: 8px; border-radius: 8px; cursor: pointer; margin-top: 15px; }
        .existing-slider { position: absolute; background: #1a2f40; border-radius: 6px; pointer-events: auto; cursor: pointer; padding: 2px 4px; font-size: 10px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .existing-slider.confirmed { background: var(--confirmed-color); }
        .existing-slider.rejected { background: var(--rejected-color); }
        .loading-overlay-app { position: fixed; inset: 0; background: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .spinner { width: 45px; height: 45px; border: 5px solid #ccc; border-top-color: #1a2f40; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .info-label { font-weight: 600; }
      </style>
      <div class="table-container">
        <div class="table-wrapper">
          <table id="bookingTable">
            <thead><tr><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th><th>11</th><th>12</th><th class="time-col"><button id="openImageBtn" style="padding:6px 12px; background:#1a2f40; color:white; cursor:pointer; border-radius:8px; border:none;">СТОЛЫ</button></th></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
          <div id="columnMarkers" class="column-markers"></div>
        </div>
        <div id="slidersContainer"></div>
      </div>
      <div id="cardsContainer"></div>
      <div id="controls"><input type="date" id="dateInput" /><button class="booking-button" id="bookBtn">ЗАБРОНИРОВАТЬ</button></div>
      <div id="modal"><div><h3>Введите данные</h3><label>Имя:<br><input id="nameInput" autocomplete="off"></label><label>Телефон:<br><input id="phoneInput" type="tel"></label><label>Комментарий:<br><textarea id="commentInput"></textarea></label><div style="text-align:right"><button id="submitBookingBtn">ЗАБРОНИРОВАТЬ</button><button id="cancelModalBtn">ОТМЕНА</button></div></div></div>
      <div id="imagePopup" class="image-popup"><div class="popup-content"><button class="close-popup" id="closeImagePopupBtn">&times;</button><img src="https://i.postimg.cc/52ZDKDDw/55.png" style="max-width:100%;border-radius:8px;" /></div></div>
      <div id="bookingInfoPopup" class="booking-info-popup"><div class="popup-content"><button class="close-btn" id="closeInfoPopupBtn">&times;</button><h3>Информация о бронировании</h3><div class="info-row"><span class="info-label">Стол:</span> <span id="info-table"></span></div><div class="info-row"><span class="info-label">Дата:</span> <span id="info-date"></span></div><div class="info-row"><span class="info-label">Время:</span> <span id="info-time"></span></div><div class="info-row"><span class="info-label">Имя:</span> <span id="info-name"></span></div><div class="info-row"><span class="info-label">Телефон:</span> <span id="info-phone"></span></div><div class="info-row"><span class="info-label">Комментарий:</span> <span id="info-comment"></span></div><div class="confirmation-buttons"><button class="confirm-yes" id="confirmYesBtn">Да</button><button class="confirm-no" id="confirmNoBtn">Нет</button></div><button class="delete-btn" id="deleteBookingBtn">УДАЛИТЬ БРОНЬ</button></div></div>
      <div id="loadingAppOverlay" class="loading-overlay-app" style="display: none;"><div class="spinner"></div></div>
    `;
    
    // Теперь инициализируем всю логику бронирования
    initBookingLogic();
  }
  
  // Логика бронирования (полностью рабочая)
  function initBookingLogic() {
    const dateInput = document.getElementById('dateInput');
    const today = new Date().toISOString().split('T')[0];
    dateInput.min = today;
    dateInput.value = today;
    const startHour = 11, endHour = 22, lanes = 12;
    const tableBody = document.getElementById("tableBody");
    const cardsContainer = document.getElementById("cardsContainer");
    const slidersContainer = document.getElementById("slidersContainer");
    const tableContainer = document.querySelector(".table-container");
    const loadingOverlay = document.getElementById("loadingAppOverlay");
    
    const timeSlots = [];
    for (let h = startHour; h <= endHour; h++) {
      if (h < endHour) { timeSlots.push({ display: `${h}:00`, key: h }); timeSlots.push({ display: `${h}:30`, key: h + 0.5 }); }
      else timeSlots.push({ display: `${h}:00`, key: h });
    }
    timeSlots.forEach(slot => {
      const row = document.createElement("tr");
      for (let lane = 0; lane < lanes; lane++) {
        const cell = document.createElement("td");
        cell.className = "slot";
        cell.dataset.lane = lane;
        cell.dataset.time = slot.key;
        cell.dataset.display = slot.display;
        row.appendChild(cell);
      }
      const timeCell = document.createElement("th");
      timeCell.className = "time-right";
      timeCell.textContent = slot.display;
      row.appendChild(timeCell);
      tableBody.appendChild(row);
    });
    
    let intervalsByLane = {}, currentLane = null, currentStart = null, currentBookingId = null;
    
    function clearStartHighlight() { document.querySelectorAll('td.start-time-chosen').forEach(c => c.classList.remove('start-time-chosen')); }
    function clearHeaderHighlight() { document.querySelectorAll('thead th.highlight-header').forEach(th => th.classList.remove('highlight-header')); }
    function clearVerticalLines() { document.querySelectorAll('td.vertical-line').forEach(td => td.classList.remove('vertical-line')); }
    function highlightHeader(lane) { clearHeaderHighlight(); const headers = document.querySelectorAll('thead th'); if (lane >= 0 && lane < lanes) headers[lane].classList.add('highlight-header'); }
    function highlightColumn(lane) { clearVerticalLines(); document.querySelectorAll(`td.slot[data-lane="${lane}"]`).forEach(td => td.classList.add('vertical-line')); }
    
    function updateSelection() {
      document.querySelectorAll("td.selected").forEach(c => c.classList.remove("selected"));
      for (let laneStr in intervalsByLane) {
        intervalsByLane[laneStr].forEach(interval => {
          const s = Math.min(interval.start, interval.end), e = Math.max(interval.start, interval.end);
          document.querySelectorAll(`td.slot[data-lane="${laneStr}"]`).forEach(cell => {
            const t = parseFloat(cell.dataset.time);
            if (t >= s && t <= e) cell.classList.add("selected");
          });
        });
      }
      cardsContainer.innerHTML = "";
      const selDate = dateInput.value.split("-").reverse().join(".");
      for (let laneStr in intervalsByLane) {
        intervalsByLane[laneStr].forEach((interval, idx) => {
          const s = Math.min(interval.start, interval.end), e = Math.max(interval.start, interval.end);
          const card = document.createElement("div"); card.className = "booking-card"; 
          card.textContent = `Стол № ${+laneStr+1} | ${selDate} | с ${Math.floor(s)}:${s%1===0.5?"30":"00"} по ${Math.floor(e)}:${e%1===0.5?"30":"00"}`;
          const btn = document.createElement("button"); btn.className = "close-btn"; btn.innerHTML = "&times;"; 
          btn.onclick = (ev) => { ev.stopPropagation(); intervalsByLane[laneStr].splice(idx,1); updateSelection(); };
          card.appendChild(btn); cardsContainer.appendChild(card);
        });
      }
    }
    
    tableBody.addEventListener("click", (e) => {
      if (e.target.classList.contains("slot")) {
        currentLane = +e.target.dataset.lane;
        clearStartHighlight();
        highlightHeader(currentLane);
        highlightColumn(currentLane);
      }
      if (e.target.classList.contains("time-right") && currentLane !== null) {
        const time = parseFloat(e.target.textContent.replace(":30",".5").replace(":00",".0"));
        if (currentStart === null) {
          currentStart = time;
          const sc = document.querySelector(`td.slot[data-lane="${currentLane}"][data-time="${currentStart}"]`);
          if (sc) sc.classList.add("start-time-chosen");
        } else {
          if (time <= currentStart) return alert("Время конца должно быть больше времени начала.");
          if (!intervalsByLane[currentLane]) intervalsByLane[currentLane] = [];
          intervalsByLane[currentLane].push({ start: currentStart, end: time });
          currentLane = null; currentStart = null;
          clearStartHighlight(); clearHeaderHighlight(); clearVerticalLines();
          updateSelection();
        }
      }
    });
    
    const bookBtn = document.getElementById('bookBtn');
    const modalDiv = document.getElementById('modal');
    const submitBtn = document.getElementById('submitBookingBtn');
    const cancelBtn = document.getElementById('cancelModalBtn');
    const nameInput = document.getElementById('nameInput');
    const phoneInput = document.getElementById('phoneInput');
    const commentInput = document.getElementById('commentInput');
    
    function openModal() { if (!Object.values(intervalsByLane).some(a=>a.length)) return alert("Сначала выберите время."); modalDiv.style.display = "flex"; }
    function closeModal() { modalDiv.style.display = "none"; }
    bookBtn.onclick = openModal;
    cancelBtn.onclick = closeModal;
    
    submitBtn.onclick = async () => {
      const name = nameInput.value.trim(), phone = phoneInput.value.trim(), comment = commentInput.value.trim(), date = dateInput.value;
      if (!name || !phone) return alert("Введите имя и телефон.");
      const bookings = [];
      for (let lane in intervalsByLane) {
        intervalsByLane[lane].forEach(iv => { bookings.push({ date, tableNumber: +lane+1, start: iv.start, end: iv.end, name, phone, comment }); });
      }
      if (!bookings.length) return alert("Нет выбранных интервалов.");
      try {
        loadingOverlay.style.display = 'flex';
        await Promise.all(bookings.map(b => fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ bookings: [b] }) })));
        loadingOverlay.style.display = 'none';
        closeModal();
        for (let l in intervalsByLane) intervalsByLane[l] = [];
        currentLane = currentStart = null;
        clearStartHighlight(); clearHeaderHighlight(); clearVerticalLines();
        updateSelection();
        nameInput.value = ""; phoneInput.value = ""; commentInput.value = "";
        await loadExistingBookings();
      } catch(e) { loadingOverlay.style.display = 'none'; alert("Ошибка отправки"); }
    };
    
    async function loadExistingBookings() {
      try {
        loadingOverlay.style.display = 'flex';
        slidersContainer.innerHTML = "";
        const res = await fetch(GAS_URL + "?action=get&date=" + dateInput.value);
        const data = await res.json();
        loadingOverlay.style.display = 'none';
        if (!data.bookings?.length) return;
        const timeCells = Array.from(document.querySelectorAll('th.time-right'));
        const tableCells = Array.from(document.querySelectorAll('td.slot'));
        const containerRect = tableContainer.getBoundingClientRect();
        data.bookings.forEach(b => {
          if (b.date === dateInput.value) {
            const laneIndex = b.table - 1;
            const startIdx = timeSlots.findIndex(ts => ts.key === parseFloat(b.start));
            const endIdx = timeSlots.findIndex(ts => ts.key === parseFloat(b.end));
            if (startIdx === -1 || endIdx === -1) return;
            const startCell = tableCells.find(cell => parseInt(cell.dataset.lane) === laneIndex && parseFloat(cell.dataset.time) === parseFloat(b.start));
            if (!startCell) return;
            const startRect = startCell.getBoundingClientRect();
            const startTimeCell = timeCells[startIdx], endTimeCell = timeCells[endIdx];
            const height = endTimeCell.offsetTop + endTimeCell.offsetHeight - startTimeCell.offsetTop;
            const left = startRect.left - containerRect.left;
            const top = startTimeCell.offsetTop;
            const slider = document.createElement("div");
            slider.className = "existing-slider";
            if (b.confirmed === "Да") slider.classList.add("confirmed");
            else if (b.confirmed === "Нет") slider.classList.add("rejected");
            slider.style.top = `${top}px`;
            slider.style.left = `${left}px`;
            slider.style.width = `${startRect.width}px`;
            slider.style.height = `${height}px`;
            slider.addEventListener('click', (e) => { e.stopPropagation(); showInfo(b); });
            slidersContainer.appendChild(slider);
          }
        });
      } catch(e) { loadingOverlay.style.display = 'none'; console.error(e); }
    }
    
    const infoPopup = document.getElementById('bookingInfoPopup');
    function showInfo(b) {
      document.getElementById('info-table').innerText = `№${b.table}`;
      document.getElementById('info-date').innerText = b.date.split('-').reverse().join('.');
      document.getElementById('info-time').innerText = `${Math.floor(b.start)}:${b.start%1===0.5?"30":"00"} - ${Math.floor(b.end)}:${b.end%1===0.5?"30":"00"}`;
      document.getElementById('info-name').innerText = b.name;
      document.getElementById('info-phone').innerText = b.phone;
      document.getElementById('info-comment').innerText = b.comment || '—';
      currentBookingId = b.id;
      infoPopup.style.display = 'flex';
    }
    function closeInfoPopup() { infoPopup.style.display = 'none'; currentBookingId = null; }
    document.getElementById('closeInfoPopupBtn').onclick = closeInfoPopup;
    document.getElementById('confirmYesBtn').onclick = async () => { if(currentBookingId){ await updateConfirm(currentBookingId, true); closeInfoPopup(); await loadExistingBookings(); } };
    document.getElementById('confirmNoBtn').onclick = async () => { if(currentBookingId){ await updateConfirm(currentBookingId, false); closeInfoPopup(); await loadExistingBookings(); } };
    document.getElementById('deleteBookingBtn').onclick = async () => { if(currentBookingId && confirm("Удалить бронь?")) { await deleteBookingById(currentBookingId); closeInfoPopup(); await loadExistingBookings(); } };
    
    async function updateConfirm(id, confirmed) {
      try { loadingOverlay.style.display = 'flex'; await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "confirm", id, confirmed: confirmed ? "Да" : "Нет" }) }); loadingOverlay.style.display = 'none'; } catch(e){ loadingOverlay.style.display = 'none'; alert("Ошибка"); }
    }
    async function deleteBookingById(id) {
      try { loadingOverlay.style.display = 'flex'; await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "delete", id }) }); loadingOverlay.style.display = 'none'; } catch(e){ loadingOverlay.style.display = 'none'; alert("Ошибка"); }
    }
    
    dateInput.addEventListener('change', async () => { await loadExistingBookings(); intervalsByLane = {}; updateSelection(); });
    document.getElementById('openImageBtn').onclick = () => document.getElementById('imagePopup').style.display = 'flex';
    document.getElementById('closeImagePopupBtn').onclick = () => document.getElementById('imagePopup').style.display = 'none';
    
    function createMarkers() {
      const container = document.getElementById('columnMarkers');
      container.innerHTML = "";
      for (let i=0; i<lanes; i++) {
        const m = document.createElement('div'); m.className = 'marker';
        if (i===0||i===1||i===2||i===4||i===5) m.classList.add('blue');
        else if (i===3) m.classList.add('green');
        else if (i>=6 && i<=11) m.classList.add('red');
        container.appendChild(m);
      }
      container.appendChild(document.createElement('div')).className = 'marker empty';
    }
    createMarkers();
    loadExistingBookings();
    updateSelection();
  }
  
  // Обработчик ответа Google
  async function handleCredentialResponse(response) {
    const loginScreen = document.getElementById('loginScreen');
    const mainContent = document.getElementById('mainContent');
    // Покажем лёгкий индикатор, что процесс идёт
    const toast = document.createElement('div');
    toast.className = 'loading-toast';
    toast.innerHTML = '<span class="spinner-mini"></span> Проверка доступа...';
    document.body.appendChild(toast);
    
    try {
      const payload = parseJwt(response.credential);
      const email = payload.email?.toLowerCase().trim();
      if (!email) throw new Error("Нет email");
      
      const check = await checkEmailInSheet(email);
      if (check.found) {
        // Успех — скрываем экран входа, показываем приложение
        loginScreen.style.display = 'none';
        mainContent.style.display = 'block';
        toast.remove();
        injectFullApp();  // загружаем интерфейс бронирования
      } else {
        toast.remove();
        const errToast = document.createElement('div');
        errToast.className = 'loading-toast';
        errToast.style.background = '#b91c1c';
        errToast.textContent = '❌ Доступ запрещён: email не найден';
        document.body.appendChild(errToast);
        setTimeout(() => errToast.remove(), 2500);
      }
    } catch (err) {
      toast.remove();
      const errToast = document.createElement('div');
      errToast.className = 'loading-toast';
      errToast.style.background = '#b91c1c';
      errToast.textContent = 'Ошибка входа';
      document.body.appendChild(errToast);
      setTimeout(() => errToast.remove(), 2000);
    }
  }
  
  window.handleCredentialResponse = handleCredentialResponse;
</script>
