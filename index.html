<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>Бильярд · Брони | На весь экран без скролла</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png"/>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg:       #f5f5f7;
      --surface:  #ffffff;
      --surface2: #f5f5f7;
      --border:   rgba(0,0,0,.08);
      --border2:  rgba(0,0,0,.14);
      --ink:      #1d1d1f;
      --ink2:     #3d3d3f;
      --ink3:     #6e6e73;
      --ink4:     #aeaeb2;
      --blue:     #0071e3;
      --blue-h:   #0077ed;
      --blue-dim: rgba(0,113,227,.08);
      --green:    #34c759;
      --red:      #ff3b30;
      --amber:    #ff9f0a;
      --r:  12px;
      --r2: 18px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      
      /* 🖥️ РАЗМЕРЫ ДЛЯ ПК — широко, без скролла */
      --cell-h: 64px;      /* высота строки (столы) */
      --cell-w: 88px;      /* ширина колонки времени */
      --lane-w: 110px;     /* ширина левой колонки (№ стола) */
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* LOGIN */
    #login {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; z-index: 9999; padding: 32px;
    }
    .login-glyph { font-size: 58px; }
    .login-title { font-size: 32px; font-weight: 700; letter-spacing: -.5px; }
    .login-sub   { font-size: 16px; color: var(--ink3); margin-top: -8px; }
    .login-sep   { width: 1px; height: 28px; background: var(--border2); }

    /* APP */
    #content { display: none; min-height: 100vh; }

    /* NAVBAR */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,.92);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: .5px solid var(--border2);
      height: 64px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 32px;
    }
    .nav-title { font-size: 22px; font-weight: 600; letter-spacing: -.3px; }
    .nav-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: .5px solid var(--border2);
      border-radius: 980px; padding: 8px 20px;
      font-family: var(--font); font-size: 15px; font-weight: 500; color: var(--blue);
      cursor: pointer; transition: background .15s;
    }
    .nav-btn:hover { background: var(--blue-dim); }

    /* PAGE — максимальная ширина, чтобы таблица дышала */
    .page {
      max-width: 100%;
      margin: 0 auto;
      padding: 28px 32px 80px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* CONTROLS */
    .ctrl {
      display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
      background: var(--surface); border-radius: var(--r2);
      padding: 20px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,.04);
    }
    .date-field {
      flex: 0 1 auto; min-width: 260px;
      display: flex; align-items: center; gap: 12px;
      background: var(--surface2); border-radius: 14px;
      padding: 0 20px; height: 56px; border: .5px solid var(--border2);
    }
    .date-field svg { flex-shrink: 0; color: var(--ink3); width: 20px; height: 20px; }
    #dateInput {
      flex: 1; border: none; background: transparent;
      font-family: var(--font); font-size: 18px; font-weight: 500; color: var(--ink);
      cursor: pointer;
    }
    #dateInput:focus { outline: none; }
    .btn-book {
      height: 56px; padding: 0 36px;
      background: var(--blue); color: white; border: none; border-radius: 980px;
      font-family: var(--font); font-size: 18px; font-weight: 600;
      cursor: pointer; transition: all .15s;
      box-shadow: 0 2px 8px rgba(0,113,227,.3);
      white-space: nowrap;
    }
    .btn-book:hover { background: var(--blue-h); transform: scale(0.98); }

    /* LEGEND */
    .pills { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 4px; }
    .pill {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 500; color: var(--ink3);
      background: var(--surface); border: .5px solid var(--border2);
      border-radius: 980px; padding: 8px 20px;
    }
    .dot { width: 11px; height: 11px; border-radius: 50%; }
    .dot-navy  { background: #3a7bd5; }
    .dot-sage  { background: #30a862; }
    .dot-rust  { background: #e05c2a; }
    .dot-amber { background: var(--amber); }
    .dot-green { background: var(--green); }
    .dot-red   { background: var(--red); }

    /* GRID CARD — без скролла на ПК */
    .grid-card {
      background: var(--surface); border-radius: 28px;
      box-shadow: 0 6px 24px rgba(0,0,0,.06);
      overflow: hidden;
      border: .5px solid var(--border);
      width: 100%;
    }
    .grid-scroll {
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      position: relative;
      width: 100%;
    }
    /* На ПК отключаем скролл, таблица занимает всю ширину */
    @media (min-width: 1024px) {
      .grid-scroll {
        overflow-x: visible;
      }
    }

    /* ========== ДЕСКТОПНАЯ ТАБЛИЦА (строки = столы) ========== */
    #tableDesktop {
      display: table;
      border-collapse: collapse;
      table-layout: fixed;
      width: 100%;
      min-width: 100%;
      user-select: none;
      font-size: 15px;
    }
    #tableDesktop thead th {
      height: var(--cell-h);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .2px;
      color: var(--ink4);
      border-bottom: 1px solid var(--border2);
      border-right: .5px solid var(--border);
      text-align: center;
      vertical-align: middle;
      background: var(--surface2);
      position: sticky;
      top: 0;
      z-index: 3;
    }
    #tableDesktop thead th:last-child { border-right: none; }
    #tableDesktop thead th.corner {
      width: var(--lane-w);
      min-width: var(--lane-w);
      background: var(--surface2);
      font-size: 16px;
      font-weight: 700;
      color: var(--ink2);
      border-right: 1px solid var(--border2);
      position: sticky;
      left: 0;
      z-index: 5;
    }
    #tableDesktop thead th.th-time {
      cursor: pointer;
      width: var(--cell-w);
      min-width: var(--cell-w);
      transition: all .12s;
    }
    #tableDesktop thead th.th-time:hover { background: #fff4e0; color: var(--amber); }
    #tableDesktop thead th.th-time.hl { background: #fff4e0 !important; color: var(--amber) !important; }

    /* строки */
    #tableDesktop tbody tr { height: var(--cell-h); }
    #tableDesktop tbody td.lane-hdr {
      width: var(--lane-w);
      min-width: var(--lane-w);
      font-size: 19px;
      font-weight: 700;
      border-bottom: .5px solid var(--border2);
      border-right: 1px solid var(--border2);
      text-align: center;
      vertical-align: middle;
      background: var(--surface2);
      position: sticky;
      left: 0;
      z-index: 2;
    }
    .lane-hdr.grp-navy { color: #1d4f9f; background: #eef3fc !important; }
    .lane-hdr.grp-sage { color: #1a6640; background: #edf7f0 !important; }
    .lane-hdr.grp-rust { color: #a83418; background: #fdf0ea !important; }
    #tableDesktop tbody td.lane-hdr.hl-row { background: #fff4e0 !important; color: var(--amber) !important; }

    /* слоты */
    #tableDesktop tbody td.slot {
      cursor: pointer;
      border-bottom: .5px solid var(--border);
      border-right: .5px solid var(--border);
      vertical-align: middle;
      text-align: center;
      font-size: 13px;
      transition: background 0.08s;
    }
    #tableDesktop tbody td:last-child { border-right: none; }
    #tableDesktop tbody td.slot.shade { background: rgba(0,0,0,.02); }

    /* группы строк */
    #tableDesktop tbody tr.row-navy td.slot { background: #f8fafd; }
    #tableDesktop tbody tr.row-sage td.slot { background: #f6fcf8; }
    #tableDesktop tbody tr.row-rust td.slot { background: #fef8f4; }

    #tableDesktop tbody td.slot:hover { background: #fff8ec !important; }
    #tableDesktop tbody td.slot.selected {
      background: #fff3c4 !important;
      border-top: 2px solid var(--amber);
      border-bottom: 2px solid var(--amber);
    }
    #tableDesktop tbody td.slot.sel-left  { border-left: 2px solid var(--amber); border-radius: 8px 0 0 8px; }
    #tableDesktop tbody td.slot.sel-right { border-right: 2px solid var(--amber) !important; border-radius: 0 8px 8px 0; }
    #tableDesktop tbody td.slot.anchored { background: #ffe7a3 !important; outline: 2px solid var(--amber); outline-offset: -2px; border-radius: 10px; }
    #tableDesktop tbody td.slot.vline { background: #fffdf5; }

    /* ========== МОБИЛЬНАЯ ТАБЛИЦА (скрыта на ПК) ========== */
    #tableMobile {
      display: none;
      border-collapse: collapse;
      width: 100%;
    }
    @media (max-width: 900px) {
      #tableDesktop { display: none; }
      #tableMobile { display: table; }
      :root {
        --cell-h: 52px;
        --cell-w: 62px;
        --lane-w: 85px;
      }
      .page { padding: 16px 12px 70px; gap: 16px; }
      .ctrl { flex-direction: column; align-items: stretch; }
      .btn-book { width: 100%; justify-content: center; }
      .nav-title { font-size: 18px; }
      .grid-scroll { overflow-x: auto; }
    }

    #tableMobile thead th {
      height: 48px; font-size: 14px; font-weight: 600;
      border-bottom: .5px solid var(--border2);
      border-right: .5px solid var(--border);
      text-align: center;
    }
    #tableMobile thead th.hdr-navy { background: #eef3fc; color: #1d4f9f; }
    #tableMobile thead th.hdr-sage { background: #edf7f0; color: #1a6640; }
    #tableMobile thead th.hdr-rust { background: #fdf0ea; color: #a83418; }
    #tableMobile thead th.hl { background: #fff4e0 !important; color: var(--amber) !important; }
    #tableMobile th.tcol {
      background: var(--surface2); color: var(--ink4); font-size: 12px; font-weight: 600;
      border-left: .5px solid var(--border2); cursor: pointer;
      position: sticky; top: 0; z-index: 3;
    }
    #tableMobile td {
      height: 46px; border-bottom: .5px solid var(--border);
      border-right: .5px solid var(--border); text-align: center;
      font-size: 12px; cursor: pointer;
    }
    #tableMobile td.slot.selected { background: #fff3c4 !important; border-left: 2px solid var(--amber); border-right: 2px solid var(--amber); }
    #tableMobile td.slot.sel-top { border-top: 2px solid var(--amber); border-radius: 8px 8px 0 0; }
    #tableMobile td.slot.sel-bot { border-bottom: 2px solid var(--amber) !important; border-radius: 0 0 8px 8px; }
    #tableMobile td.slot.anchored { background: #ffe7a3 !important; outline: 2px solid var(--amber); outline-offset: -2px; border-radius: 10px; }
    #tableMobile td.slot.vline { background: #fffdf0; }

    /* SLIDERS LAYER (поверх таблицы) */
    #slidersLayer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    .slider {
      position: absolute; border-radius: 14px;
      pointer-events: auto; cursor: pointer;
      padding: 8px 12px; overflow: hidden;
      display: flex; flex-direction: column; justify-content: center;
      gap: 3px; transition: all 0.1s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .slider:hover { opacity: 0.92; transform: scale(1.01); z-index: 20; }
    .slider.pending   { background: rgba(255,159,10,0.25); border: 1px solid rgba(255,159,10,0.8); }
    .slider.confirmed { background: rgba(52,199,89,0.25); border: 1px solid rgba(52,199,89,0.8); }
    .slider.rejected  { background: rgba(255,59,48,0.25); border: 1px solid rgba(255,59,48,0.8); }
    .sl-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sl-time { font-size: 10px; opacity: 0.85; white-space: nowrap; }
    .pending  .sl-name, .pending  .sl-time { color: #7d4a00; }
    .confirmed .sl-name, .confirmed .sl-time { color: #1a5e2a; }
    .rejected  .sl-name, .rejected  .sl-time { color: #8c1a14; }

    /* CARDS */
    #cardsContainer { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 8px; }
    .bcard {
      display: flex; align-items: center; gap: 16px;
      background: var(--surface); border: .5px solid var(--border2);
      border-radius: 24px; padding: 14px 22px;
      box-shadow: 0 2px 10px rgba(0,0,0,.05);
    }
    .bcard-title { font-size: 16px; font-weight: 700; }
    .bcard-sub { font-size: 14px; color: var(--ink3); margin-top: 4px; }
    .bcard-rm {
      width: 34px; height: 34px; border-radius: 34px;
      background: var(--surface2); border: .5px solid var(--border2);
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* OVERLAY / MODAL */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(12px);
      z-index: 2000; justify-content: center; align-items: flex-end;
    }
    .overlay.open { display: flex; }
    @media(min-width: 600px) {
      .overlay { align-items: center; padding: 28px; }
      .sheet { border-radius: 36px !important; max-width: 520px; }
    }
    .sheet {
      background: var(--surface); border-radius: 32px 32px 0 0;
      width: 100%; box-shadow: 0 -6px 40px rgba(0,0,0,.2);
      animation: sheetUp .28s ease;
    }
    @keyframes sheetUp { from{transform:translateY(70px);opacity:0} to{transform:translateY(0);opacity:1} }
    .sheet-handle { width: 44px; height: 5px; background: var(--border2); border-radius: 6px; margin: 16px auto 0; }
    .sheet-head { padding: 22px 28px 12px; display: flex; justify-content: space-between; align-items: center; }
    .sheet-title { font-size: 28px; font-weight: 700; letter-spacing: -0.4px; }
    .sheet-x {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--surface2); border: .5px solid var(--border2);
      font-size: 24px; cursor: pointer;
    }
    .sheet-body { padding: 16px 28px 32px; }
    .f-group { margin-bottom: 24px; }
    .f-label { font-size: 14px; font-weight: 600; color: var(--ink3); margin-bottom: 8px; display: block; }
    .f-input {
      width: 100%; background: var(--surface2); border: .5px solid var(--border2);
      border-radius: 16px; font-size: 17px; padding: 15px 18px;
    }
    .f-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,113,227,.1); background: white; }
    .f-actions { display: flex; gap: 14px; margin-top: 28px; }
    .f-btn-ok {
      flex:1; height: 56px; background: var(--blue); color: white; border: none;
      border-radius: 980px; font-weight: 600; font-size: 17px; cursor: pointer;
    }
    .f-btn-cancel {
      height: 56px; padding: 0 28px; background: var(--surface2);
      border: .5px solid var(--border2); border-radius: 980px; font-size: 17px; cursor: pointer;
    }
    .info-list { border-radius: 20px; border: .5px solid var(--border2); margin-bottom: 28px; overflow: hidden; }
    .info-row { display: flex; justify-content: space-between; padding: 16px 20px; border-bottom: .5px solid var(--border); background: var(--surface2); }
    .info-lbl { font-weight: 500; color: var(--ink3); font-size: 14px; }
    .info-val { font-weight: 600; text-align: right; font-size: 15px; }
    .confirm-btns { display: flex; gap: 14px; margin: 16px 0 20px; }
    .cb-yes, .cb-no { flex:1; height: 52px; border-radius: 980px; font-weight: 600; border: none; cursor: pointer; font-size: 15px; }
    .cb-yes { background: rgba(52,199,89,.15); color: #1a6630; }
    .cb-no  { background: rgba(255,59,48,.1); color: #a81a10; }
    .del-btn { width:100%; height: 52px; background: transparent; border: .5px solid var(--border2); border-radius: 980px; margin-top: 16px; cursor: pointer; font-size: 15px; }

    /* IMAGE POPUP */
    #imgPopup {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(16px);
      z-index:3000; justify-content:center; align-items:center;
    }
    #imgPopup.open { display:flex; }
    .img-wrap { background:white; border-radius: 36px; padding: 8px; max-width: 94vw; max-height: 88vh; overflow: auto; position: relative; }
    .img-wrap img { max-width: 100%; max-height: 84vh; display: block; border-radius: 28px; }
    .img-x { position: absolute; top: 14px; right: 14px; width: 40px; height: 40px; border-radius: 40px; background: rgba(0,0,0,0.6); color: white; border: none; font-size: 22px; cursor: pointer; }

    /* LOADER */
    #loader { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); backdrop-filter: blur(6px); z-index:5000; align-items:center; justify-content:center; }
    .loader-box { background: white; border-radius: 40px; padding: 32px 48px; text-align: center; }
    .spin { width: 44px; height: 44px; border: 3px solid #ddd; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="login">
  <div class="login-glyph">🎱</div>
  <div class="login-title">Бильярд Клуб</div>
  <div class="login-sub">Бронирование столов</div>
  <div class="login-sep"></div>
  <div id="g_id_onload"
    data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com"
    data-callback="handleCredentialResponse"
    data-auto_prompt="false"></div>
  <div class="g_id_signin" data-type="standard"></div>
</div>

<div id="content">
  <nav class="nav">
    <span class="nav-title">🎱 LUCKY STRIKE · БРОНЬ (полноэкранный режим)</span>
    <button class="nav-btn" onclick="openImg()">📐 Схема зала</button>
  </nav>
  <div class="page">
    <div class="ctrl">
      <div class="date-field">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <input type="date" id="dateInput"/>
      </div>
      <button class="btn-book" onclick="openBookModal()">➕ Новая бронь</button>
    </div>
    <div class="pills">
      <div class="pill"><div class="dot dot-navy"></div>Столы 1–3</div>
      <div class="pill"><div class="dot dot-sage"></div>Столы 4–6</div>
      <div class="pill"><div class="dot dot-rust"></div>Столы 7–12</div>
      <div class="pill"><div class="dot dot-amber"></div>Ожидает</div>
      <div class="pill"><div class="dot dot-green"></div>Подтверждено</div>
      <div class="pill"><div class="dot dot-red"></div>Отменено</div>
    </div>

    <div class="grid-card">
      <div class="grid-scroll" id="gridScroll">
        <table id="tableDesktop">
          <thead id="dtHead"><tr><th class="corner">СТОЛ</th></tr></thead>
          <tbody id="dtBody"></tbody>
        </table>
        <table id="tableMobile">
          <thead id="mtHeadRow"></thead>
          <tbody id="mtBody"></tbody>
        </table>
        <div id="slidersLayer"></div>
      </div>
    </div>
    <div id="cardsContainer"></div>
  </div>
</div>

<!-- MODALS -->
<div id="bookModal" class="overlay"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-head"><div class="sheet-title">Новая бронь</div><button class="sheet-x" onclick="closeBookModal()">×</button></div><div class="sheet-body"><div class="f-group"><label class="f-label">Имя клиента</label><input class="f-input" id="nameInput" placeholder="Иван Петров"/></div><div class="f-group"><label class="f-label">Телефон</label><input class="f-input" id="phoneInput" placeholder="+380 99 123 45 67"/></div><div class="f-group"><label class="f-label">Комментарий</label><textarea class="f-input" id="commentInput" rows="2" placeholder="Пожелания..."></textarea></div><div class="f-actions"><button class="f-btn-ok" onclick="submitForm()">Подтвердить</button><button class="f-btn-cancel" onclick="closeBookModal()">Отмена</button></div></div></div></div>

<div id="infoModal" class="overlay"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-head"><div class="sheet-title">Детали</div><button class="sheet-x" onclick="closeInfoModal()">×</button></div><div class="sheet-body"><div class="info-list"><div class="info-row"><span class="info-lbl">Стол</span><span id="i-table"></span></div><div class="info-row"><span class="info-lbl">Дата</span><span id="i-date"></span></div><div class="info-row"><span class="info-lbl">Время</span><span id="i-time"></span></div><div class="info-row"><span class="info-lbl">Имя</span><span id="i-name"></span></div><div class="info-row"><span class="info-lbl">Телефон</span><span id="i-phone"></span></div><div class="info-row"><span class="info-lbl">Комментарий</span><span id="i-comment"></span></div><div class="info-row"><span class="info-lbl">Статус</span><span id="i-status"></span></div></div><div class="confirm-lbl">Подтверждение визита</div><div class="confirm-btns"><button class="cb-yes" onclick="confirmBooking(true)">✅ Состоялось</button><button class="cb-no" onclick="confirmBooking(false)">❌ Не пришли</button></div><button class="del-btn" onclick="deleteBooking()">🗑 Удалить бронь</button></div></div></div></div>

<div id="imgPopup"><div class="img-wrap"><button class="img-x" onclick="closeImg()">×</button><img src="https://i.postimg.cc/52ZDKDDw/55.png" alt="Схема столов"/></div></div>
<div id="loader"><div class="loader-box"><div class="spin"></div><div class="loader-txt">Загрузка...</div></div></div>

<script>
  const GAS = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
  const ALLOWED = ["vadiksss900@gmail.com","sergey99belov@gmail.com","popadinecvasil3@gmail.com","veronicadiakova04@gmail.com","info.luckystrike.kh@gmail.com","sashavolobuev123890@gmail.com","egorgorbushko@gmail.com","shatrava.o@gmail.com","Craftmax30@gmail.com","bowlingblock.b@gmail.com","lana.arnaut@gmail.com","polosinnikita1224@gmail.com","sofialat1506@gmail.com","ll3991940@gmail.com","ken040888@gmail.com"];
  const LANES = 12, SH = 11, EH = 22;
  const slots = []; for(let h=SH; h<=EH; h++) { slots.push({ label: `${h}:00`, key: h }); if(h<EH) slots.push({ label: `${h}:30`, key: h+0.5 }); }
  const LANE_GROUPS = [0,0,0,1,1,1,2,2,2,2,2,2];
  const GRP_CLASS = ['grp-navy','grp-sage','grp-rust'];
  const ROW_CLASS = ['row-navy','row-sage','row-rust'];

  let ivs = {};
  let selLane = null, selStart = null, curId = null;
  const $ = id => document.getElementById(id);
  const qs = (s, p=document) => p.querySelector(s);
  const qsa = (s, p=document) => Array.from(p.querySelectorAll(s));

  function parseJwt(t){ return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
  function handleCredentialResponse(r){ let d=parseJwt(r.credential); if(ALLOWED.includes(d.email)){ localStorage.setItem("ue",d.email); location.reload(); } else alert("Доступ запрещён"); }
  window.onload = ()=>{ if(localStorage.getItem("ue") && ALLOWED.includes(localStorage.getItem("ue"))){ $("login").style.display="none"; $("content").style.display="block"; init(); } };

  function init(){
    let today = new Date().toISOString().split('T')[0];
    $("dateInput").min = today; $("dateInput").value = today;
    buildDesktopTable(); buildMobileTable();
    $("tableDesktop").addEventListener("click", onDesktopClick);
    $("tableDesktop").addEventListener("dblclick", onDesktopDbl);
    $("tableMobile").addEventListener("click", onMobileClick);
    $("tableMobile").addEventListener("dblclick", onMobileDbl);
    $("dateInput").addEventListener("change", ()=>{ resetSel(); loadSliders(); });
    renderCards(); loadSliders();
  }
  function buildDesktopTable(){
    let headRow = qs("tr", $("dtHead"));
    slots.forEach((sl,i)=>{ let th=document.createElement("th"); th.className="th-time"; th.dataset.si=i; th.dataset.key=sl.key; th.textContent=sl.label; headRow.appendChild(th); });
    let body=$("dtBody");
    for(let lane=0; lane<LANES; lane++){
      let tr=document.createElement("tr"); tr.className=ROW_CLASS[LANE_GROUPS[lane]]; tr.dataset.lane=lane;
      let lhdr=document.createElement("td"); lhdr.className=`lane-hdr ${GRP_CLASS[LANE_GROUPS[lane]]}`; lhdr.textContent=`№ ${lane+1}`; tr.appendChild(lhdr);
      slots.forEach((sl,si)=>{ let td=document.createElement("td"); td.className="slot"+(si%2===1?" shade":""); td.dataset.lane=lane; td.dataset.time=sl.key; td.dataset.si=si; tr.appendChild(td); });
      body.appendChild(tr);
    }
  }
  function buildMobileTable(){
    let mtHead=$("mtHeadRow");
    for(let i=0;i<LANES;i++){ let th=document.createElement("th"); let grp=LANE_GROUPS[i]; th.className=grp===0?"hdr-navy":grp===1?"hdr-sage":"hdr-rust"; th.textContent=i+1; mtHead.appendChild(th); }
    let thTime=document.createElement("th"); thTime.className="tcol no-click"; thTime.textContent="ВРЕМЯ"; mtHead.appendChild(thTime);
    let mtBody=$("mtBody");
    slots.forEach(sl=>{ let tr=document.createElement("tr");
      for(let lane=0; lane<LANES; lane++){ let td=document.createElement("td"); td.className="slot"; td.dataset.lane=lane; td.dataset.time=sl.key; tr.appendChild(td); }
      let th=document.createElement("th"); th.className="tcol"; th.textContent=sl.label; tr.appendChild(th); mtBody.appendChild(tr);
    });
  }
  function fmt(v){ return `${Math.floor(v)}:${v%1===0.5?'30':'00'}`; }
  function onDesktopClick(e){
    let el=e.target;
    if(el.classList.contains("slot") && selStart===null){ selLane=+el.dataset.lane; clearDtHighlights(); let lhdr=$("dtBody").rows[selLane]?.cells[0]; if(lhdr)lhdr.classList.add("hl-row"); qsa(`#tableDesktop td.slot[data-lane="${selLane}"]`).forEach(c=>c.classList.add("vline")); return; }
    if(el.classList.contains("th-time") && selLane!==null && selStart===null){ selStart=+el.dataset.key; clearDtHighlights(); let lhdr=$("dtBody").rows[selLane]?.cells[0]; if(lhdr)lhdr.classList.add("hl-row"); let anc=qs(`#tableDesktop td.slot[data-lane="${selLane}"][data-time="${selStart}"]`); if(anc)anc.classList.add("anchored"); return; }
    if(el.classList.contains("th-time") && selLane!==null && selStart!==null){ let t=+el.dataset.key; if(t<=selStart){ alert("Конец должен быть позже начала"); return; } if(!ivs[selLane])ivs[selLane]=[]; ivs[selLane].push({start:selStart,end:t}); selLane=selStart=null; clearDtHighlights(); renderCards(); }
  }
  function onDesktopDbl(e){ let el=e.target; if(!el.classList.contains("slot"))return; let lane=+el.dataset.lane, time=+el.dataset.time; if(ivs[lane]){ let idx=ivs[lane].findIndex(iv=>time>=Math.min(iv.start,iv.end) && time<=Math.max(iv.start,iv.end)); if(idx!==-1){ ivs[lane].splice(idx,1); renderCards(); } } }
  function onMobileClick(e){
    let el=e.target;
    if(el.classList.contains("slot") && selStart===null){ selLane=+el.dataset.lane; qsa("#tableMobile td.slot.vline").forEach(c=>c.classList.remove("vline")); qsa("#tableMobile thead th.hl").forEach(c=>c.classList.remove("hl")); $("mtHeadRow")?.cells[selLane]?.classList.add("hl"); qsa(`#tableMobile td.slot[data-lane="${selLane}"]`).forEach(c=>c.classList.add("vline")); return; }
    if(el.classList.contains("tcol") && selLane!==null && selStart===null){ let txt=el.textContent; selStart=parseFloat(txt.includes(":30")?txt.replace(":30",".5"):txt.replace(":00",".0")); qsa("#tableMobile td.slot.anchored").forEach(c=>c.classList.remove("anchored")); let anc=qs(`#tableMobile td.slot[data-lane="${selLane}"][data-time="${selStart}"]`); if(anc)anc.classList.add("anchored"); return; }
    if(el.classList.contains("tcol") && selLane!==null && selStart!==null){ let txt=el.textContent; let t=parseFloat(txt.includes(":30")?txt.replace(":30",".5"):txt.replace(":00",".0")); if(t<=selStart){ alert("Конец должен быть позже"); return; } if(!ivs[selLane])ivs[selLane]=[]; ivs[selLane].push({start:selStart,end:t}); selLane=selStart=null; qsa("#tableMobile td.slot.vline").forEach(c=>c.classList.remove("vline")); qsa("#tableMobile thead th.hl").forEach(c=>c.classList.remove("hl")); renderCards(); }
  }
  function onMobileDbl(e){ if(!e.target.classList.contains("slot"))return; let lane=+e.target.dataset.lane, time=parseFloat(e.target.dataset.time); if(ivs[lane]){ let idx=ivs[lane].findIndex(iv=>time>=Math.min(iv.start,iv.end) && time<=Math.max(iv.start,iv.end)); if(idx!==-1){ ivs[lane].splice(idx,1); renderCards(); } } }
  function clearDtHighlights(){ qsa("#tableDesktop td.slot.vline").forEach(c=>c.classList.remove("vline")); qsa("#tableDesktop td.slot.anchored").forEach(c=>c.classList.remove("anchored")); qsa("#tableDesktop td.lane-hdr.hl-row").forEach(c=>c.classList.remove("hl-row")); qsa("#tableDesktop thead th.th-time.hl").forEach(c=>c.classList.remove("hl")); }
  function renderCards(){
    qsa("#tableDesktop td.slot.selected, #tableDesktop td.slot.sel-left, #tableDesktop td.slot.sel-right").forEach(c=>c.classList.remove("selected","sel-left","sel-right"));
    qsa("#tableMobile td.slot.selected, #tableMobile td.slot.sel-top, #tableMobile td.slot.sel-bot").forEach(c=>c.classList.remove("selected","sel-top","sel-bot"));
    for(let k in ivs){ let lane=+k; (ivs[lane]||[]).forEach(iv=>{ let s=Math.min(iv.start,iv.end), e=Math.max(iv.start,iv.end);
      qsa(`#tableDesktop td.slot[data-lane="${lane}"]`).forEach(td=>{ let t=+td.dataset.time; if(t>=s && t<=e) td.classList.add("selected"); });
      let lc=qs(`#tableDesktop td.slot[data-lane="${lane}"][data-time="${s}"]`), rc=qs(`#tableDesktop td.slot[data-lane="${lane}"][data-time="${e}"]`); if(lc)lc.classList.add("sel-left"); if(rc)rc.classList.add("sel-right");
      qsa(`#tableMobile td.slot[data-lane="${lane}"]`).forEach(td=>{ let t=parseFloat(td.dataset.time); if(t>=s && t<=e) td.classList.add("selected"); });
      let topCell=qs(`#tableMobile td.slot[data-lane="${lane}"][data-time="${s}"]`); if(topCell)topCell.classList.add("sel-top"); if(s!==e){ let bot=qs(`#tableMobile td.slot[data-lane="${lane}"][data-time="${e}"]`); if(bot)bot.classList.add("sel-bot"); }
    }); }
    $("cardsContainer").innerHTML=""; let dd=$("dateInput").value.split("-").reverse().join(".");
    for(let k in ivs){(ivs[k]||[]).forEach((iv,idx)=>{ let s=Math.min(iv.start,iv.end), e=Math.max(iv.start,iv.end); let div=document.createElement("div"); div.className="bcard"; div.innerHTML=`<div class="bcard-info"><div class="bcard-title">Стол №${+k+1}</div><div class="bcard-sub">${dd} · ${fmt(s)} – ${fmt(e)}</div></div>`; let rm=document.createElement("button"); rm.className="bcard-rm"; rm.innerHTML="✕"; rm.onclick=ev=>{ ev.stopPropagation(); ivs[k].splice(idx,1); renderCards(); }; div.appendChild(rm); $("cardsContainer").appendChild(div); }); }
  }
  function resetSel(){ selLane=selStart=null; Object.keys(ivs).forEach(k=>ivs[k]=[]); clearDtHighlights(); qsa("#tableMobile td.slot.vline").forEach(c=>c.classList.remove("vline")); qsa("#tableMobile thead th.hl").forEach(c=>c.classList.remove("hl")); renderCards(); }
  function openBookModal(){ if(!Object.values(ivs).some(a=>a.length)) return alert("Выберите интервалы на сетке"); $("bookModal").classList.add("open"); }
  function closeBookModal(){ $("bookModal").classList.remove("open"); }
  async function submitForm(){ let name=$("nameInput").value.trim(), phone=$("phoneInput").value.trim(), comment=$("commentInput").value.trim(), date=$("dateInput").value; if(!name||!phone) return alert("Введите имя и телефон"); let bookings=[]; for(let k in ivs) (ivs[k]||[]).forEach(iv=>bookings.push({date,tableNumber:+k+1,start:iv.start,end:iv.end,name,phone,comment})); if(!bookings.length) return; showLoad(); try{ await Promise.all(bookings.map(b=>fetch(GAS,{method:"POST",mode:"no-cors",body:JSON.stringify({bookings:[b]})}))); closeBookModal(); $("nameInput").value=$("phoneInput").value=$("commentInput").value=""; resetSel(); await loadSliders(); } catch(e){ alert("Ошибка"); } finally{ hideLoad(); } }
  function showInfoModal(b){ $("i-table").textContent="№ "+b.table; $("i-date").textContent=b.date.split("-").reverse().join("."); $("i-time").textContent=`${fmt(+b.start)} – ${fmt(+b.end)}`; $("i-name").textContent=b.name; $("i-phone").textContent=b.phone; $("i-comment").textContent=b.comment||"—"; let s=$("i-status"); if(b.confirmed==="Да") s.innerHTML='<span style="background:#e0f7e8; padding:5px 14px; border-radius:40px;">✓ Подтверждено</span>'; else if(b.confirmed==="Нет") s.innerHTML='<span style="background:#ffe5e2; padding:5px 14px; border-radius:40px;">✕ Не состоялось</span>'; else s.innerHTML='<span style="background:#fff1df; padding:5px 14px; border-radius:40px;">⏳ Ожидает</span>'; curId=b.id; $("infoModal").classList.add("open"); }
  function closeInfoModal(){ $("infoModal").classList.remove("open"); curId=null; }
  async function confirmBooking(yes){ if(!curId)return; showLoad(); try{ await fetch(GAS,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"confirm",id:curId,confirmed:yes})}); closeInfoModal(); await loadSliders(); } catch(e){} finally{ hideLoad(); } }
  async function deleteBooking(){ if(!curId||!confirm("Удалить бронь?"))return; showLoad(); try{ await fetch(GAS,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"delete",id:curId})}); closeInfoModal(); await loadSliders(); } catch(e){} finally{ hideLoad(); } }
  function isDesktop(){ return window.innerWidth>900; }
  async function loadSliders(){ showLoad(); $("slidersLayer").innerHTML=""; try{ let res=await fetch(GAS+"?action=get&date="+$("dateInput").value); let data=await res.json(); if(!data.bookings?.length) return; if(isDesktop()) renderSlidersDesktop(data.bookings); else renderSlidersMobile(data.bookings); } catch(e){} finally{ hideLoad(); } }
  function renderSlidersDesktop(bookings){ let rows=Array.from($("dtBody").querySelectorAll("tr")); let colByKey={}; slots.forEach((sl,i)=>{ colByKey[sl.key]=i+1; }); bookings.forEach(b=>{ if(b.date!==$("dateInput").value)return; let laneIdx=b.table-1, start=+b.start, end=+b.end, si=colByKey[start], ei=colByKey[end]; if(si==null||ei==null)return; let row=rows[laneIdx]; if(!row)return; let sc=row.cells[si], ec=row.cells[ei]; if(!sc||!ec)return; let left=sc.offsetLeft+1, top=row.offsetTop+1, width=(ec.offsetLeft+ec.offsetWidth)-sc.offsetLeft-2, height=row.offsetHeight-2; let slider=makeSlider(b,start,end); slider.style.cssText=`left:${left}px;top:${top}px;width:${width}px;height:${height}px;`; $("slidersLayer").appendChild(slider); }); }
  function renderSlidersMobile(bookings){ let mtRows=Array.from($("mtBody").querySelectorAll("tr")); let rowByKey={}; slots.forEach((sl,i)=>{ rowByKey[sl.key]=mtRows[i]; }); bookings.forEach(b=>{ if(b.date!==$("dateInput").value)return; let laneIdx=b.table-1, start=+b.start, end=+b.end, startRow=rowByKey[start], endRow=rowByKey[end]; if(!startRow||!endRow)return; let cell=startRow.cells[laneIdx]; if(!cell)return; let left=cell.offsetLeft+1, top=startRow.offsetTop+1, width=cell.offsetWidth-2, height=(endRow.offsetTop+endRow.offsetHeight)-startRow.offsetTop-2; let slider=makeSlider(b,start,end); slider.style.cssText=`left:${left}px;top:${top}px;width:${width}px;height:${height}px;`; $("slidersLayer").appendChild(slider); }); }
  function makeSlider(b,start,end){ let el=document.createElement("div"); el.className="slider "+(b.confirmed==="Да"?"confirmed":b.confirmed==="Нет"?"rejected":"pending"); let nd=document.createElement("div"); nd.className="sl-name"; nd.textContent=b.name||"—"; let td=document.createElement("div"); td.className="sl-time"; td.textContent=`${fmt(start)} – ${fmt(end)}`; el.append(nd,td); el.addEventListener("click",e=>{ e.stopPropagation(); showInfoModal(b); }); return el; }
  function showLoad(){ $("loader").style.display="flex"; } function hideLoad(){ $("loader").style.display="none"; }
  function openImg(){ $("imgPopup").classList.add("open"); } function closeImg(){ $("imgPopup").classList.remove("open"); }
  ["bookModal","infoModal"].forEach(id=>{ $(id).addEventListener("click",e=>{ if(e.target===$(id)){ $(id).classList.remove("open"); if(id==="infoModal")curId=null; } }); });
  $("imgPopup").addEventListener("click",e=>{ if(e.target===$("imgPopup")) closeImg(); });
  let lastDesktop=isDesktop(); window.addEventListener("resize",()=>{ if(isDesktop()!==lastDesktop){ lastDesktop=isDesktop(); loadSliders(); } });
</script>
</body>
</html>
