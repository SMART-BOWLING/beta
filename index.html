<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>БРОНИ БИЛЬЯРД</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    :root {
      --cell-size: 50px;
      --main-color: #1e3a8a;
      --highlight-color: #ef4444;
      --highlight-bg: #1a2f40;
      --confirmed-color: #16a34a;
      --rejected-color: #b91c1c;
      --background-color: #1a2f40;
      --card-color: #e0f2fe;
      --blue-color: #2563eb;
      --red-color: #ef4444;
      --green-color: #22c55e;
      --custom-dark: #1a2f40;
      --border-spacing: 2px;
    }

    @media (max-width: 768px) {
      :root { 
        --cell-size: calc((100vw - 20px) / 13);
        --border-spacing: 2px;
      }
      
      table {
        width: auto !important;
        margin: 0 auto;
      }
      
      td, th {
        aspect-ratio: 1;
        width: var(--cell-size) !important;
        height: var(--cell-size) !important;
        min-width: auto !important;
        max-width: none !important;
      }
      
      body {
        padding: 5px;
      }
      
      .table-container {
        padding: 0;
        width: 100%;
      }
      
      #controls {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: stretch;
        gap: 12px;
        width: 100%;
        max-width: 480px;
        margin: 4px auto 0;
        padding: 0 5px;
        box-sizing: border-box;
      }
      
      #dateInput {
        flex: 1;
        margin: 0;
        min-width: 0;
        box-sizing: border-box;
      }
      
      .booking-button {
        flex: 1;
        margin: 0;
        min-width: 0;
        text-align: center;
        box-sizing: border-box;
      }
      
      .column-markers {
        gap: var(--border-spacing);
        justify-content: center;
      }
      
      .marker {
        width: var(--cell-size);
      }
      
      /* Адаптация панели входа для мобильных */
      .login-container {
        padding: 20px !important;
      }
      .login-title {
        font-size: 24px !important;
      }
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a2f40;
      padding: 5px;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .table-container {
      position: relative;
      width: 100%;
      max-width: 100vw;
      overflow-x: auto;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: transparent;
    }

    table {
      border-collapse: separate;
      border-spacing: var(--border-spacing);
      table-layout: fixed;
      user-select: none;
      touch-action: manipulation;
      margin: 0 auto;
      background: #1a2f40;
      padding: var(--border-spacing);
    }

    .table-wrapper {
      display: inline-block;
      position: relative;
      margin: 0 auto;
    }

    thead th {
      position: sticky;
      top: 0;
      color: white;
      z-index: 2;
      transition: background-color 0.2s, color 0.2s;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    thead th:nth-child(1),
    thead th:nth-child(2),
    thead th:nth-child(3),
    thead th:nth-child(4),
    thead th:nth-child(5),
    thead th:nth-child(6),
    thead th:nth-child(7),
    thead th:nth-child(8),
    thead th:nth-child(9),
    thead th:nth-child(10),
    thead th:nth-child(11),
    thead th:nth-child(12),
    thead th.time-col {
      background: #1a2f40 !important;
    }

    th.time-col, .time-right {
      background: #1a2f40 !important;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    th, td {
      width: var(--cell-size);
      height: var(--cell-size);
      border: none;
      text-align: center;
      vertical-align: middle;
      box-sizing: border-box;
      background: white !important;
      font-size: 12px;
      position: relative;
    }

    th.highlight-header {
      background: #1a2f40 !important;
      color: white !important;
    }

    td.vertical-line::before,
    td.vertical-line::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 3px;
      background-color: var(--highlight-color);
      z-index: 10;
    }
    td.vertical-line::before { left: -1px; }
    td.vertical-line::after  { right: -1px; }

    td.slot { 
      cursor: pointer; 
      transition: all 0.2s ease;
    }
    
    td.slot:hover {
      background: #f0f0f0 !important;
    }

    td.selected {
      background: #1a2f40 !important;
      border: none !important;
      z-index: 1;
      color: white;
      font-weight: 500;
    }

    td.start-time-chosen {
      background: #ef4444 !important;
      border: none !important;
      z-index: 2;
      color: white;
    }

    .column-markers {
      display: flex;
      gap: var(--border-spacing);
      margin-top: 5px;
      padding: 0;
    }

    .marker {
      height: 6px;
      border-radius: 3px;
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    .marker:active {
      transform: scale(0.97);
    }

    .marker.blue {
      background-color: #3b82f6;
      box-shadow: 0 0 2px rgba(59,130,246,0.5);
    }

    .marker.green {
      background-color: #22c55e;
      box-shadow: 0 0 2px rgba(34,197,94,0.5);
    }

    .marker.red {
      background-color: #ef4444;
      box-shadow: 0 0 2px rgba(239,68,68,0.5);
    }

    .marker.empty {
      background: transparent;
      cursor: default;
    }
    .marker.empty:active {
      transform: none;
    }

    #cardsContainer {
      margin: 8px auto 6px;
      padding: 0;
      max-width: 100vw;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      box-sizing: border-box;
    }

    .booking-card {
      position: relative;
      background: var(--card-color);
      border: 1px solid var(--main-color);
      border-radius: 12px;
      padding: 12px 45px 12px 15px;
      color: var(--main-color);
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      user-select: none;
      box-shadow: 0 3px 8px rgba(30, 58, 138, 0.15);
      transition: transform 0.2s;
    }
    
    .booking-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(30, 58, 138, 0.2);
    }
    
    .booking-card .close-btn {
      position: absolute;
      top: 0;
      right: 0;
      transform: translate(50%, -50%);
      color: var(--main-color);
      background: white;
      border: 1px solid var(--main-color);
      border-radius: 50%;
      font-weight: bold;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      padding: 6px 10px;
      box-shadow: 0 0 8px rgba(30, 58, 138, 0.3);
      transition: all 0.2s ease;
    }
    .booking-card .close-btn:hover {
      background-color: var(--main-color);
      color: white;
      transform: translate(50%, -50%) scale(1.1);
    }

    #controls {
      margin-top: 6px;
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 15px;
      flex-wrap: wrap;
      width: 100%;
      max-width: 500px;
    }
    
    #dateInput, .booking-button {
      flex: 1 1 0;
      min-width: 140px;
      padding: 8px 12px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }
    
    #dateInput {
      background: white;
      color: #1e293b;
      border: 1px solid white;
      box-shadow: 0 2px 5px rgba(26, 47, 64, 0.1);
    }
    
    #dateInput:hover {
      background: #f8fafc;
      border-color: white;
      transform: translateY(-1px);
    }
    
    .booking-button {
      background: #1a2f40;
      color: white;
      border: 1px solid white;
      box-shadow: 0 4px 8px rgba(26, 47, 64, 0.2);
      letter-spacing: 0.5px;
    }
    
    .booking-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(26, 47, 64, 0.3);
      background: #1f3e55;
    }
    
    .booking-button:active, .booking-button.pressed {
      transform: translateY(1px);
      background: #1a2f40;
      box-shadow: 0 2px 4px rgba(239, 68, 68, 0.2);
    }

    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #00000066;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #modal > div {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
    #modal h3 { 
      margin-top: 0; 
      color: var(--custom-dark);
      text-align: center;
      font-size: 1.5rem;
    }
    #modal label { 
      display: block; 
      margin-bottom: 15px; 
      color: #334155;
      font-weight: 500;
    }
    #modal input, #modal textarea {
      width: 100%;
      padding: 10px 12px;
      box-sizing: border-box;
      margin-top: 6px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      transition: border 0.3s;
    }
    #modal input:focus, #modal textarea:focus {
      outline: none;
      border-color: var(--custom-dark);
      box-shadow: 0 0 0 3px rgba(26, 47, 64, 0.1);
    }
    #modal button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    #modal button:first-of-type {
      background: #1a2f40;
      color: white;
    }
    #modal button:first-of-type:hover {
      transform: translateY(-2px);
    }
    #modal button:last-of-type {
      margin-left: 10px;
      background: #f1f5f9;
      color: #64748b;
    }

    .image-popup {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0,0,0,0.8);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    .image-popup .popup-content {
      position: relative;
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 90vw;
      max-height: 90vh;
      overflow: auto;
    }
    .image-popup .popup-content img {
      width: 100%; height: auto; border-radius: 8px;
    }
    .image-popup .close-popup {
      position: absolute;
      top: 10px; right: 10px;
      background: var(--custom-dark);
      color: white;
      border: none;
      border-radius: 50%;
      width: 35px; height: 35px; font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .image-popup .close-popup:hover {
      background: var(--highlight-color);
    }

    #slidersContainer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    .existing-slider {
      position: absolute;
      background: #1a2f40;
      border: none;
      border-radius: 6px;
      pointer-events: auto;
      box-sizing: border-box;
      cursor: pointer;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 4px;
      user-select: none;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }
    .existing-slider:hover {
      transform: scale(1.02);
      z-index: 10;
    }
    .existing-slider.confirmed {
      background: var(--confirmed-color);
    }
    .existing-slider.rejected {
      background: var(--rejected-color);
    }
    
    .existing-slider::before,
    .existing-slider::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 3px;
      background-color: #ef4444;
      z-index: 15;
    }
    
    .existing-slider::before {
      top: 0;
      border-radius: 6px 6px 0 0;
    }
    
    .existing-slider::after {
      bottom: 0;
      border-radius: 0 0 6px 6px;
    }

    .booking-info-popup {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0,0,0,0.6);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .booking-info-popup .popup-content {
      position: relative;
      background: white;
      padding: 25px;
      border-radius: 12px;
      max-width: 90vw;
      width: 400px;
    }
    .booking-info-popup .close-btn {
      position: absolute;
      top: 12px; right: 12px;
      background: var(--custom-dark);
      color: white;
      border: none;
      border-radius: 50%;
      width: 32px; height: 32px; 
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .booking-info-popup .close-btn:hover {
      background: var(--highlight-color);
    }
    .booking-info-popup h3 {
      margin-top: 0;
      color: var(--custom-dark);
      text-align: center;
      padding-bottom: 10px;
      border-bottom: 1px solid #e2e8f0;
      margin-bottom: 20px;
    }
    .info-row {
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
    }
    .info-label {
      font-weight: 600;
      color: var(--custom-dark);
      min-width: 120px;
    }
    .info-value {
      text-align: right;
      flex-grow: 1;
    }
    .confirmation-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 25px;
      gap: 15px;
    }
    .confirmation-buttons button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      flex: 1;
      transition: 0.2s;
    }
    .confirm-yes { background: var(--confirmed-color); color: white; }
    .confirm-no { background: var(--rejected-color); color: white; }
    .delete-btn {
      background: #475569;
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      margin-top: 20px;
      width: 100%;
      transition: 0.3s;
    }
    .delete-btn:hover { background: #1a2f40; }

    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid var(--custom-dark);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* МАКСИМАЛЬНО ПРОСТОЙ ЭКРАН ВХОДА — ТОЛЬКО КНОПКА */
    .login-screen {
      position: fixed;
      inset: 0;
      background: #1a2f40;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    
    /* Центрируем кнопку, убираем все лишние тексты */
    .login-button-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    /* Легкий эффект нажатия для кнопки */
    .g_id_signin {
      transition: transform 0.1s ease;
    }
    .g_id_signin:active {
      transform: scale(0.97);
    }
    
    /* Кнопка "Выйти" теперь такая же, как была кнопка "СТОЛЫ" */
    .logout-like-tables-btn {
      padding: 6px 12px;
      border: 1px solid white;
      background: #1a2f40;
      color: white;
      cursor: pointer;
      font-weight: bold;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }
    .logout-like-tables-btn:hover {
      background: #2a4a62;
      transform: scale(1.02);
    }
    .logout-like-tables-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

<!-- ЭКРАН АВТОРИЗАЦИИ: только кнопка входа -->
<div id="loginScreen" class="login-screen">
  <div class="login-button-wrapper">
    <div id="g_id_onload" 
         data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" 
         data-callback="handleCredentialResponse" 
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" 
         data-type="standard" 
         data-shape="pill" 
         data-theme="outline" 
         data-text="signin_with" 
         data-size="large" 
         data-logo_alignment="left">
    </div>
  </div>
</div>

<!-- Основной контент (скрыт до авторизации) -->
<div id="mainContent" style="display: none;">
  <div class="table-container">
    <div class="table-wrapper">
      <table id="bookingTable">
        <thead>
          <tr>
            <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th>
            <th>7</th><th>8</th><th>9</th><th>10</th><th>11</th><th>12</th>
            <th class="time-col" style="padding: 0;">
              <button id="logoutButtonHeader" class="logout-like-tables-btn">Выйти</button>
            </th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      
      <div id="columnMarkers" class="column-markers"></div>
    </div>
    <div id="slidersContainer"></div>
  </div>

  <div id="cardsContainer"></div>

  <div id="controls">
    <input type="date" id="dateInput" />
    <button class="booking-button" onclick="openModal()">ЗАБРОНИРОВАТЬ</button>
  </div>

  <div id="modal">
    <div>
      <h3>Введите данные</h3>
      <label>Имя:<br><input id="nameInput" autocomplete="off"></label>
      <label>Телефон:<br><input id="phoneInput" type="tel" inputmode="tel" autocomplete="tel"></label>
      <label>Комментарий:<br><textarea id="commentInput"></textarea></label>
      <div style="text-align: right;">
        <button onclick="submitForm()">ЗАБРОНИРОВАТЬ</button>
        <button onclick="closeModal()">ОТМЕНА</button>
      </div>
    </div>
  </div>

  <div id="imagePopup" class="image-popup">
    <div class="popup-content">
      <button class="close-popup" onclick="closeImagePopup()">&times;</button>
      <img src="https://i.postimg.cc/52ZDKDDw/55.png" />
    </div>
  </div>

  <div id="bookingInfoPopup" class="booking-info-popup">
    <div class="popup-content">
      <button class="close-btn" onclick="closeBookingInfoPopup()">&times;</button>
      <h3>Информация о бронировании</h3>
      <div class="info-row"><span class="info-label">Стол:</span> <span id="info-table" class="info-value"></span></div>
      <div class="info-row"><span class="info-label">Дата:</span> <span id="info-date" class="info-value"></span></div>
      <div class="info-row"><span class="info-label">Время:</span> <span id="info-time" class="info-value"></span></div>
      <div class="info-row"><span class="info-label">Имя:</span> <span id="info-name" class="info-value"></span></div>
      <div class="info-row"><span class="info-label">Телефон:</span> <span id="info-phone" class="info-value"></span></div>
      <div class="info-row"><span class="info-label">Комментарий:</span> <span id="info-comment" class="info-value"></span></div>
      <div class="info-row"><span class="info-label">Посещение состоялось?</span><span id="info-confirmed" class="info-value"></span></div>
      <div class="confirmation-buttons"><button class="confirm-yes" onclick="confirmBooking(true)">Да</button><button class="confirm-no" onclick="confirmBooking(false)">Нет</button></div>
      <button class="delete-btn" onclick="deleteBooking()">УДАЛИТЬ БРОНЬ</button>
    </div>
  </div>
  <div id="loadingOverlay" class="loading-overlay" style="display: none;"><div class="loading-spinner"></div></div>
</div>

<script>
  // ==================== АВТОРИЗАЦИЯ С СОХРАНЕНИЕМ СЕССИИ ====================
  const AUTH_SPREADSHEET_ID = '1zwi1CInK3NZ8YRAegRMAdjin6XPacVkAkFsjAiqVE0w';
  const AUTH_SHEET_NAME = '1';
  const API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
  
  let currentUser = null;
  let gapiInitialized = false;
  
  // Ключи для localStorage
  const STORAGE_USER_KEY = 'billiard_user_data';
  const STORAGE_EXPIRY_KEY = 'billiard_user_expiry';
  const SESSION_DURATION_DAYS = 7; // 7 дней авторизации
  
  function parseJwt(token) {
    try {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    } catch (e) {
      console.error('Error parsing JWT:', e);
      return {};
    }
  }
  
  function initGapi() {
    return new Promise((resolve, reject) => {
      if (gapiInitialized) {
        resolve();
        return;
      }
      gapi.load('client', {
        callback: async () => {
          try {
            await gapi.client.init({
              apiKey: API_KEY,
              discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
            });
            gapiInitialized = true;
            console.log('GAPI initialized');
            resolve();
          } catch (error) {
            reject(error);
          }
        },
        onerror: reject,
        timeout: 10000,
        ontimeout: () => reject(new Error('GAPI load timeout'))
      });
    });
  }
  
  async function checkEmailInSheet(email) {
    try {
      await initGapi();
      
      const response = await gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: AUTH_SPREADSHEET_ID,
        range: `${AUTH_SHEET_NAME}!A:C`,
      });
      
      const rows = response.result.values;
      if (!rows || rows.length === 0) return { found: false };
      
      for (let i = 1; i < rows.length; i++) {
        if (!rows[i] || !rows[i][0]) continue;
        const rowEmail = rows[i][0].toLowerCase().trim();
        if (rowEmail === email) {
          const userName = rows[i][1] ? rows[i][1].trim() : email.split('@')[0];
          const userRole = rows[i][2] ? rows[i][2].trim() : '';
          return { found: true, name: userName, role: userRole };
        }
      }
      return { found: false };
    } catch (error) {
      console.error('Sheets API error:', error);
      return { found: false, error: true };
    }
  }
  
  function saveUserToStorage(userData) {
    const expiryDate = new Date();
    expiryDate.setDate(expiryDate.getDate() + SESSION_DURATION_DAYS);
    localStorage.setItem(STORAGE_USER_KEY, JSON.stringify(userData));
    localStorage.setItem(STORAGE_EXPIRY_KEY, expiryDate.toISOString());
  }
  
  function getUserFromStorage() {
    const userRaw = localStorage.getItem(STORAGE_USER_KEY);
    const expiryRaw = localStorage.getItem(STORAGE_EXPIRY_KEY);
    if (!userRaw || !expiryRaw) return null;
    
    const expiryDate = new Date(expiryRaw);
    if (expiryDate < new Date()) {
      // Сессия истекла
      localStorage.removeItem(STORAGE_USER_KEY);
      localStorage.removeItem(STORAGE_EXPIRY_KEY);
      return null;
    }
    
    try {
      return JSON.parse(userRaw);
    } catch(e) {
      return null;
    }
  }
  
  function clearStoredSession() {
    localStorage.removeItem(STORAGE_USER_KEY);
    localStorage.removeItem(STORAGE_EXPIRY_KEY);
  }
  
  function showLoadingOverlay(show) {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.style.display = show ? 'flex' : 'none';
  }
  
  // Функция выхода
  function logout() {
    if (confirm('Вы уверены, что хотите выйти из системы?')) {
      clearStoredSession();
      currentUser = null;
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      // Очищаем выбранные интервалы
      if (typeof intervalsByLane !== 'undefined') {
        for(let l in intervalsByLane) intervalsByLane[l] = [];
        if (typeof updateTableSelection === 'function') updateTableSelection();
      }
    }
  }
  
  window.handleCredentialResponse = async function(response) {
    try {
      showLoadingOverlay(true);
      const payload = parseJwt(response.credential);
      const email = payload.email.toLowerCase().trim();
      
      console.log('Checking email:', email);
      
      const checkResult = await checkEmailInSheet(email);
      
      if (checkResult.found) {
        currentUser = {
          email: email,
          name: checkResult.name || payload.name,
          role: checkResult.role || '',
          picture: payload.picture
        };
        // Сохраняем в localStorage
        saveUserToStorage(currentUser);
        
        // Успешный вход
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        showLoadingOverlay(false);
        
        // Привязываем кнопку выхода в шапке (стиль как у старой кнопки "СТОЛЫ")
        const logoutBtn = document.getElementById('logoutButtonHeader');
        if (logoutBtn) {
          logoutBtn.onclick = logout;
        }
        
        initAppAfterAuth();
      } else {
        showLoadingOverlay(false);
        alert('Доступ запрещен: Ваш email не найден в списке разрешенных');
        document.getElementById('loginScreen').style.display = 'flex';
      }
    } catch (e) {
      console.error("Error:", e);
      showLoadingOverlay(false);
      alert('Ошибка аутентификации');
    }
  };
  
  // Проверка сохраненной сессии при загрузке страницы
  function tryRestoreSession() {
    const savedUser = getUserFromStorage();
    if (savedUser && savedUser.email) {
      currentUser = savedUser;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      
      const logoutBtn = document.getElementById('logoutButtonHeader');
      if (logoutBtn) {
        logoutBtn.onclick = logout;
      }
      
      setTimeout(() => {
        initAppAfterAuth();
      }, 100);
      return true;
    }
    return false;
  }
  
  // ==================== ОСНОВНАЯ ЛОГИКА БРОНИРОВАНИЯ ====================
  
  const dateInput = document.getElementById('dateInput');
  const today = new Date().toISOString().split('T')[0];
  dateInput.min = today;
  dateInput.value = today;
  const startHour = 11, endHour = 22, lanes = 12;
  const tableBody = document.getElementById("tableBody"), cardsContainer = document.getElementById("cardsContainer"), slidersContainer = document.getElementById("slidersContainer"), tableContainer = document.querySelector(".table-container"), loadingOverlayEl = document.getElementById("loadingOverlay");
  const timeSlots = [];
  for (let h = startHour; h <= endHour; h++) {
    if (h < endHour) { timeSlots.push({ display: `${h}:00`, key: h }); timeSlots.push({ display: `${h}:30`, key: h + 0.5 }); }
    else timeSlots.push({ display: `${h}:00`, key: h });
  }
  timeSlots.forEach(slot => {
    const row = document.createElement("tr");
    for (let lane = 0; lane < lanes; lane++) {
      const cell = document.createElement("td");
      cell.className = "slot";
      cell.dataset.lane = lane;
      cell.dataset.time = slot.key;
      cell.dataset.display = slot.display;
      row.appendChild(cell);
    }
    const timeCell = document.createElement("th");
    timeCell.className = "time-right";
    timeCell.textContent = slot.display;
    row.appendChild(timeCell);
    tableBody.appendChild(row);
  });

  function updateMarkersWidth() {
    const headers = document.querySelectorAll('thead th');
    const markers = document.querySelectorAll('.marker');
    if (headers.length === markers.length) {
      for (let i = 0; i < headers.length; i++) {
        const width = headers[i].offsetWidth;
        markers[i].style.width = width + 'px';
      }
    }
  }

  const columnMarkers = document.getElementById("columnMarkers");
  function createMarkers() {
    columnMarkers.innerHTML = "";
    for (let lane = 0; lane < lanes; lane++) {
      const marker = document.createElement("div");
      marker.className = "marker";
      if (lane === 0 || lane === 1 || lane === 2 || lane === 4 || lane === 5) {
        marker.classList.add("blue");
      } else if (lane === 3) {
        marker.classList.add("green");
      } else if (lane >= 6 && lane <= 11) {
        marker.classList.add("red");
      }
      // Вешаем обработчик для показа картинки со столами (вместо старой кнопки)
      marker.onclick = () => {
        document.getElementById("imagePopup").style.display = "flex";
      };
      columnMarkers.appendChild(marker);
    }
    const timeMarker = document.createElement("div");
    timeMarker.className = "marker empty";
    columnMarkers.appendChild(timeMarker);
    setTimeout(updateMarkersWidth, 10);
  }
  createMarkers();

  window.addEventListener('resize', updateMarkersWidth);
  window.addEventListener('load', updateMarkersWidth);
  setTimeout(updateMarkersWidth, 100);

  let intervalsByLane = {}, currentLane = null, currentStart = null, currentBookingId = null;
  function clearStartTimeHighlight() { document.querySelectorAll('td.start-time-chosen').forEach(c => c.classList.remove('start-time-chosen')); }
  function clearHeaderHighlight() { document.querySelectorAll('thead th.highlight-header').forEach(th => th.classList.remove('highlight-header')); }
  function clearVerticalLines() { document.querySelectorAll('td.vertical-line').forEach(td => td.classList.remove('vertical-line')); }
  function highlightHeader(lane) { clearHeaderHighlight(); const headerCells = document.querySelectorAll('thead th'); if (lane >= 0 && lane < lanes) headerCells[lane].classList.add('highlight-header'); }
  function highlightColumn(lane) { clearVerticalLines(); document.querySelectorAll(`td.slot[data-lane="${lane}"]`).forEach(td => td.classList.add('vertical-line')); }
  function updateTableSelection() {
    document.querySelectorAll("td.selected").forEach(c => c.classList.remove("selected"));
    for (let laneStr in intervalsByLane) {
      intervalsByLane[laneStr].forEach(interval => {
        const start = Math.min(interval.start, interval.end), end = Math.max(interval.start, interval.end);
        document.querySelectorAll(`td.slot[data-lane="${laneStr}"]`).forEach(cell => { const t = parseFloat(cell.dataset.time); if (t >= start && t <= end) cell.classList.add("selected"); });
      });
    }
    cardsContainer.innerHTML = "";
    const selDate = dateInput.value.split("-").reverse().join(".");
    for (let laneStr in intervalsByLane) {
      intervalsByLane[laneStr].forEach((interval, idx) => {
        const s = Math.min(interval.start, interval.end), e = Math.max(interval.start, interval.end);
        const card = document.createElement("div"); card.className = "booking-card"; card.textContent = `Стол № ${+laneStr+1} | ${selDate} | с ${Math.floor(s)}:${s%1===0.5?"30":"00"} по ${Math.floor(e)}:${e%1===0.5?"30":"00"}`;
        const btn = document.createElement("button"); btn.className = "close-btn"; btn.innerHTML = "&times;"; btn.onclick = ev => { ev.stopPropagation(); intervalsByLane[laneStr].splice(idx,1); updateTableSelection(); };
        card.appendChild(btn); cardsContainer.appendChild(card);
      });
    }
  }

  tableBody.addEventListener("click", e => {
    if (e.target.classList.contains("slot")) { currentLane = +e.target.dataset.lane; clearStartTimeHighlight(); highlightHeader(currentLane); highlightColumn(currentLane); }
    if (e.target.classList.contains("time-right") && currentLane !== null) {
      const time = parseFloat(e.target.textContent.replace(":30",".5").replace(":00",".0"));
      if (currentStart === null) { currentStart = time; clearStartTimeHighlight(); const sc = document.querySelector(`td.slot[data-lane="${currentLane}"][data-time="${currentStart}"]`); if(sc) sc.classList.add("start-time-chosen"); }
      else {
        if (time <= currentStart) return alert("Время конца должно быть больше времени начала.");
        if (!intervalsByLane[currentLane]) intervalsByLane[currentLane] = [];
        intervalsByLane[currentLane].push({ start: currentStart, end: time });
        currentLane = null; currentStart = null; clearStartTimeHighlight(); clearHeaderHighlight(); clearVerticalLines(); updateTableSelection();
      }
    }
  });
  tableBody.addEventListener("dblclick", e => { if(!e.target.classList.contains("slot")) return; const lane = +e.target.dataset.lane, time = parseFloat(e.target.dataset.time); if(intervalsByLane[lane]){ const idx = intervalsByLane[lane].findIndex(iv => time >= Math.min(iv.start, iv.end) && time <= Math.max(iv.start, iv.end)); if(idx !== -1){ intervalsByLane[lane].splice(idx,1); updateTableSelection(); } } });

  window.openModal = function() { if (!Object.values(intervalsByLane).some(a=>a.length)) return alert("Сначала выберите время."); document.getElementById("modal").style.display = "flex"; const btn = document.querySelector('.booking-button'); btn.classList.add('pressed'); setTimeout(()=>btn.classList.remove('pressed'),200); }
  window.closeModal = function() { document.getElementById("modal").style.display = "none"; }
  window.submitForm = async function() {
    const name = document.getElementById("nameInput").value.trim(), phone = document.getElementById("phoneInput").value.trim(), comment = document.getElementById("commentInput").value.trim(), date = dateInput.value;
    if (!name || !phone) return alert("Введите имя и телефон."); if (!date) return alert("Выберите дату.");
    const bookings = []; for (let lane in intervalsByLane) intervalsByLane[lane].forEach(iv => { bookings.push({ date, tableNumber: +lane+1, start: iv.start, end: iv.end, name, phone, comment }); });
    if (!bookings.length) return alert("Нет выбранных интервалов.");
    try {
      loadingOverlayEl.style.display = 'flex';
      await Promise.all(bookings.map(b => fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ bookings: [b] }) })));
      loadingOverlayEl.style.display = 'none';
      closeModal(); for(let l in intervalsByLane) intervalsByLane[l] = []; currentLane = currentStart = null; clearStartTimeHighlight(); clearHeaderHighlight(); clearVerticalLines(); updateTableSelection();
      document.getElementById("nameInput").value = ""; document.getElementById("phoneInput").value = ""; document.getElementById("commentInput").value = "";
      await loadExisting();
    } catch (error) { loadingOverlayEl.style.display = 'none'; alert("Ошибка при отправке бронирования"); }
  }
  function showBookingInfo(b) { document.getElementById('info-table').textContent = `№${b.table}`; document.getElementById('info-date').textContent = b.date.split('-').reverse().join('.'); document.getElementById('info-time').textContent = `${Math.floor(b.start)}:${b.start%1===0.5?"30":"00"} - ${Math.floor(b.end)}:${b.end%1===0.5?"30":"00"}`; document.getElementById('info-name').textContent = b.name; document.getElementById('info-phone').textContent = b.phone; document.getElementById('info-comment').textContent = b.comment || 'нет комментария'; document.getElementById('info-confirmed').textContent = b.confirmed || ''; document.getElementById('bookingInfoPopup').style.display = 'flex'; currentBookingId = b.id; }
  window.closeBookingInfoPopup = function() { document.getElementById('bookingInfoPopup').style.display = 'none'; currentBookingId = null; }
  window.confirmBooking = async function(confirmed) { if(!currentBookingId) return; try{ loadingOverlayEl.style.display='flex'; await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"confirm",id:currentBookingId,confirmed})}); loadingOverlayEl.style.display='none'; closeBookingInfoPopup(); await loadExisting(); } catch(e){ loadingOverlayEl.style.display='none'; alert("Ошибка обновления статуса"); } }
  window.deleteBooking = async function() { if(!currentBookingId || !confirm("Удалить бронь?")) return; try{ loadingOverlayEl.style.display='flex'; await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"delete",id:currentBookingId})}); loadingOverlayEl.style.display='none'; closeBookingInfoPopup(); await loadExisting(); } catch(e){ loadingOverlayEl.style.display='none'; alert("Ошибка удаления"); } }
  async function loadExisting() {
    try{ loadingOverlayEl.style.display='flex'; slidersContainer.innerHTML=""; const res = await fetch(GAS_URL+"?action=get&date="+dateInput.value); const data = await res.json(); loadingOverlayEl.style.display='none'; if(!data.bookings?.length) return; const timeCells = Array.from(document.querySelectorAll('th.time-right')), tableCells = Array.from(document.querySelectorAll('td.slot')), containerRect = tableContainer.getBoundingClientRect();
      data.bookings.forEach(b => { if(b.date===dateInput.value){ const laneIndex = b.table-1; const startIndex = timeSlots.findIndex(ts => ts.key===parseFloat(b.start)), endIndex = timeSlots.findIndex(ts => ts.key===parseFloat(b.end)); if(startIndex===-1||endIndex===-1) return; const startCell = tableCells.find(cell => parseInt(cell.dataset.lane)===laneIndex && parseFloat(cell.dataset.time)===parseFloat(b.start)); if(!startCell) return; const startCellRect = startCell.getBoundingClientRect(); const startTimeCell = timeCells[startIndex], endTimeCell = timeCells[endIndex]; const height = endTimeCell.offsetTop + endTimeCell.offsetHeight - startTimeCell.offsetTop; const left = startCellRect.left - containerRect.left, top = startTimeCell.offsetTop; const slider = document.createElement("div"); slider.className = "existing-slider"; if (b.confirmed === "Да") slider.classList.add("confirmed"); else if (b.confirmed === "Нет") slider.classList.add("rejected"); slider.style.top = `${top}px`; slider.style.left = `${left}px`; slider.style.width = `${startCellRect.width}px`; slider.style.height = `${height}px`; slider.addEventListener('click', (e) => { e.stopPropagation(); showBookingInfo(b); }); slidersContainer.appendChild(slider); } });
    } catch(e){ loadingOverlayEl.style.display='none'; console.error(e); }
  }
  dateInput.addEventListener('change', async () => { await loadExisting(); intervalsByLane = {}; currentLane = currentStart = null; clearStartTimeHighlight(); clearHeaderHighlight(); clearVerticalLines(); updateTableSelection(); });
  
  function initAppAfterAuth() {
    loadExisting(); 
    updateTableSelection(); 
    updateMarkersWidth();
  }
  
  window.closeImagePopup = function() { document.getElementById("imagePopup").style.display = "none"; }
  
  // Пытаемся восстановить сессию при загрузке страницы
  if (!tryRestoreSession()) {
    document.getElementById('loginScreen').style.display = 'flex';
  }
  
  // Подгружаем FontAwesome для иконок
  const faLink = document.createElement('link');
  faLink.rel = 'stylesheet';
  faLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css';
  document.head.appendChild(faLink);
</script>
</body>
</html>
