<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>Бильярд Клуб · Бронирование столов</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png"/>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface2: #f5f5f7;
      --border: rgba(0,0,0,.08);
      --border2: rgba(0,0,0,.14);
      --ink: #1d1d1f;
      --ink2: #3d3d3f;
      --ink3: #6e6e73;
      --ink4: #aeaeb2;
      --blue: #0071e3;
      --blue-h: #0077ed;
      --blue-dim: rgba(0,113,227,.08);
      --green: #34c759;
      --red: #ff3b30;
      --amber: #ff9f0a;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      --cell-h: 58px;
      --cell-w: 68px;
      --lane-w: 100px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    #login {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; z-index: 9999; padding: 32px;
    }
    .login-glyph { font-size: 58px; }
    .login-title { font-size: 32px; font-weight: 700; letter-spacing: -.5px; }
    .login-sub { font-size: 16px; color: var(--ink3); margin-top: -8px; }
    .login-sep { width: 1px; height: 28px; background: var(--border2); }

    #content { display: none; min-height: 100vh; }

    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,.92);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: .5px solid var(--border2);
      height: 60px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 28px;
    }
    .nav-title { font-size: 20px; font-weight: 600; letter-spacing: -.3px; }
    .nav-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: .5px solid var(--border2);
      border-radius: 980px; padding: 8px 18px;
      font-family: var(--font); font-size: 14px; font-weight: 500; color: var(--blue);
      cursor: pointer;
    }

    .page {
      width: 100%;
      margin: 0;
      padding: 24px 28px 80px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .ctrl {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--surface);
      border-radius: 18px;
      padding: 18px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,.04);
    }
    .date-field {
      flex: 1; min-width: 220px; max-width: 280px;
      display: flex; align-items: center; gap: 12px;
      background: var(--surface2); border-radius: 14px;
      padding: 0 18px; height: 52px; border: .5px solid var(--border2);
    }
    #dateInput {
      flex: 1; border: none; background: transparent;
      font-family: var(--font); font-size: 17px; font-weight: 500;
      cursor: pointer;
      user-select: text;
    }
    .btn-book {
      height: 52px; padding: 0 32px;
      background: var(--blue); color: white; border: none; border-radius: 980px;
      font-family: var(--font); font-size: 17px; font-weight: 600;
      cursor: pointer;
    }

    .inline-temp-cards {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-left: auto;
    }
    .temp-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0,113,227,0.08);
      border-radius: 40px;
      padding: 4px 8px 4px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--blue);
      border: 0.5px solid rgba(0,113,227,0.3);
    }
    .temp-badge span {
      font-weight: 600;
      background: white;
      border-radius: 30px;
      padding: 4px 12px;
    }
    .temp-card-inline {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--blue);
      border-radius: 32px;
      padding: 6px 14px 6px 18px;
      font-size: 13px;
    }
    .temp-card-inline .temp-rm {
      width: 26px; height: 26px;
      border-radius: 30px;
      background: #ffe5e2;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      color: #b81c00;
    }

    .pills {
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .pill {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 500;
      background: var(--surface); border: .5px solid var(--border2);
      border-radius: 980px; padding: 6px 16px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-navy { background: #3a7bd5; }
    .dot-sage { background: #30a862; }
    .dot-rust { background: #e05c2a; }
    .dot-amber { background: var(--amber); }
    .dot-green { background: var(--green); }
    .dot-red { background: var(--red); }
    .dot-temp { background: #0071e3; }

    .grid-card {
      background: var(--surface);
      border-radius: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,.06);
      overflow: auto;
      position: relative;
    }

    .booking-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    .booking-table th {
      height: 58px;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink4);
      border-bottom: 1px solid var(--border2);
      border-right: 0.5px solid var(--border);
      background: var(--surface2);
      position: sticky;
      top: 0;
    }

    .booking-table th:first-child {
      width: 100px;
      background: var(--surface2);
      position: sticky;
      left: 0;
      z-index: 2;
    }

    .booking-table td {
      height: 58px;
      border-bottom: 0.5px solid var(--border);
      border-right: 0.5px solid var(--border);
    }

    .booking-table td:first-child {
      font-weight: 700;
      text-align: center;
      background: var(--surface2);
      position: sticky;
      left: 0;
    }

    .slot-cell {
      cursor: crosshair;
      transition: background 0.1s;
    }

    .slot-cell.drag-over {
      background: #ffe6a3 !important;
    }

    .slot-cell.temp-highlight {
      background: #b8e1fc !important;
      border: 2px solid #0071e3 !important;
    }

    .booking-bar {
      position: absolute;
      border-radius: 8px;
      cursor: grab;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      color: #1d1d1f;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: none;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .booking-bar:active { cursor: grabbing; }
    .booking-bar:hover { z-index: 30; transform: scale(1.01); }

    .booking-bar.pending { background: rgba(255,159,10,0.4); border-left: 4px solid #ff9f0a; }
    .booking-bar.confirmed { background: rgba(52,199,89,0.4); border-left: 4px solid #34c759; }
    .booking-bar.rejected { background: rgba(255,59,48,0.35); border-left: 4px solid #ff3b30; }
    .booking-bar.temp { background: rgba(0,113,227,0.35); border-left: 4px solid #0071e3; }

    .booking-bar .time {
      font-size: 9px;
      opacity: 0.8;
      font-weight: normal;
    }

    .resize-left, .resize-right {
      position: absolute;
      top: 0;
      width: 12px;
      height: 100%;
      cursor: ew-resize;
      background: rgba(0,0,0,0.15);
      border-radius: 4px;
    }
    .resize-left { left: 0; }
    .resize-right { right: 0; }
    .resize-left:hover, .resize-right:hover { background: rgba(0,0,0,0.4); width: 14px; }

    .drag-area {
      position: absolute;
      top: 0;
      left: 14px;
      right: 14px;
      height: 100%;
      cursor: grab;
    }
    .drag-area:active { cursor: grabbing; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .overlay.open { display: flex; }
    .sheet {
      background: var(--surface);
      border-radius: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .sheet-head {
      padding: 20px 24px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sheet-title { font-size: 24px; font-weight: 700; }
    .sheet-x {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--surface2);
      border: none;
      font-size: 20px;
      cursor: pointer;
    }
    .sheet-body { padding: 12px 24px 28px; }
    .f-group { margin-bottom: 20px; }
    .f-label { font-size: 13px; font-weight: 600; color: var(--ink3); margin-bottom: 6px; display: block; }
    .f-input {
      width: 100%;
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      border-radius: 14px;
      font-size: 16px;
      padding: 12px 14px;
    }
    .f-actions { display: flex; gap: 12px; margin-top: 24px; }
    .f-btn-ok {
      flex: 1; height: 52px;
      background: var(--blue); color: white;
      border: none; border-radius: 980px;
      font-weight: 600;
      cursor: pointer;
    }
    .f-btn-cancel {
      flex: 1; height: 52px;
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      border-radius: 980px;
      cursor: pointer;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .del-btn {
      width: 100%; height: 48px;
      background: #ffe5e2;
      border: none;
      border-radius: 980px;
      margin-top: 20px;
      cursor: pointer;
      font-weight: 600;
      color: #b81c00;
    }
    .confirm-btns { display: flex; gap: 12px; margin: 12px 0; }
    .cb-yes, .cb-no {
      flex: 1; height: 48px;
      border-radius: 980px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    .cb-yes { background: rgba(52,199,89,.15); color: #1a6630; }
    .cb-no { background: rgba(255,59,48,.1); color: #a81a10; }
    #loader {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      z-index: 5000;
      align-items: center;
      justify-content: center;
    }
    .loader-box { background: white; border-radius: 32px; padding: 28px 40px; }
    .spin {
      width: 38px; height: 38px;
      border: 3px solid #ddd;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="login">
  <div class="login-glyph">🎱</div>
  <div class="login-title">Бильярд Клуб</div>
  <div class="login-sub">Бронирование столов</div>
  <div class="login-sep"></div>
  <div id="g_id_onload"
    data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com"
    data-callback="handleCredentialResponse"
    data-auto_prompt="false"></div>
  <div class="g_id_signin" data-type="standard"></div>
</div>

<div id="content">
  <nav class="nav">
    <span class="nav-title">🎱 LUCKY STRIKE · Бронирование</span>
    <button class="nav-btn" onclick="openImg()">📐 Схема зала</button>
  </nav>
  <div class="page">
    <div class="ctrl">
      <div class="date-field">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <input type="date" id="dateInput"/>
      </div>
      <button class="btn-book" onclick="openBookModal()">➕ Новая бронь</button>
      <div id="inlineTempContainer" class="inline-temp-cards"></div>
    </div>

    <div class="pills">
      <div class="pill"><div class="dot dot-navy"></div>Столы 1–3</div>
      <div class="pill"><div class="dot dot-sage"></div>Столы 4–6</div>
      <div class="pill"><div class="dot dot-rust"></div>Столы 7–12</div>
      <div class="pill"><div class="dot dot-amber"></div>Ожидает</div>
      <div class="pill"><div class="dot dot-green"></div>Подтверждено</div>
      <div class="pill"><div class="dot dot-red"></div>Отменено</div>
      <div class="pill"><div class="dot dot-temp"></div>Черновик</div>
    </div>

    <div class="grid-card" id="gridContainer">
      <div style="position: relative; min-height: 700px;" id="tableContainer">
        <table class="booking-table" id="bookingTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="barsContainer" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none;"></div>
      </div>
    </div>
  </div>
</div>

<div id="bookModal" class="overlay"><div class="sheet"><div class="sheet-head"><div class="sheet-title">Подтверждение брони</div><button class="sheet-x" onclick="closeBookModal()">×</button></div><div class="sheet-body"><div class="f-group"><label class="f-label">Имя *</label><input class="f-input" id="nameInput" placeholder="Иван Петров"/></div><div class="f-group"><label class="f-label">Телефон</label><input class="f-input" id="phoneInput" placeholder="+7 123 456-78-90"/></div><div class="f-group"><label class="f-label">Комментарий</label><textarea class="f-input" id="commentInput" rows="2" placeholder="Пожелания / особые условия"></textarea></div><div class="f-actions"><button class="f-btn-ok" onclick="submitTempBookings()">Сохранить</button><button class="f-btn-cancel" onclick="closeBookModal()">Отмена</button></div></div></div></div>

<div id="infoModal" class="overlay"><div class="sheet"><div class="sheet-head"><div class="sheet-title">Детали брони</div><button class="sheet-x" onclick="closeInfoModal()">×</button></div><div class="sheet-body"><div class="info-list"><div class="info-row"><span>Стол</span><strong id="i-table"></strong></div><div class="info-row"><span>Время</span><strong id="i-time"></strong></div><div class="info-row"><span>Имя</span><strong id="i-name"></strong></div><div class="info-row"><span>Телефон</span><strong id="i-phone"></strong></div><div class="info-row"><span>Комментарий</span><strong id="i-comment" style="font-weight:normal;"></strong></div></div><div class="confirm-btns"><button class="cb-yes" onclick="confirmBooking(true)">✅ Пришла бронь</button><button class="cb-no" onclick="confirmBooking(false)">❌ Не пришли</button></div><button class="del-btn" onclick="deleteBooking()">🗑 Удалить бронь</button></div></div></div>

<div id="imgPopup" class="overlay"><div class="sheet" style="max-width:90vw; background:transparent; box-shadow:none;"><img src="https://i.postimg.cc/52ZDKDDw/55.png" style="width:100%; border-radius:28px;" onclick="closeImg()"/></div></div>
<div id="loader"><div class="loader-box"><div class="spin"></div><div>Загрузка...</div></div></div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzLxSrpcGOIm34gLlFZS-EYZmG8liMLcUST3MRMoAp56y6XDC2ClapCDB18yiYmdrHZ/exec";
  const ALLOWED = ["vadiksss900@gmail.com","sergey99belov@gmail.com","popadinecvasil3@gmail.com","veronicadiakova04@gmail.com","info.luckystrike.kh@gmail.com","sashavolobuev123890@gmail.com","egorgorbushko@gmail.com","shatrava.o@gmail.com","Craftmax30@gmail.com","bowlingblock.b@gmail.com","lana.arnaut@gmail.com","polosinnikita1224@gmail.com","sofialat1506@gmail.com","ll3991940@gmail.com","ken040888@gmail.com"];
  
  const LANES = 12;
  const TIME_SLOTS = [];
  for (let h = 11; h <= 22; h++) {
    TIME_SLOTS.push({ hour: h, minute: 0, key: h, label: `${h}:00` });
    if (h < 22) TIME_SLOTS.push({ hour: h, minute: 30, key: h + 0.5, label: `${h}:30` });
  }
  
  let bookings = [];
  let tempBookings = [];
  let nextTempId = 1;
  let currentBooking = null;
  
  let isSelecting = false;
  let selectStart = null;
  let currentSelection = null;
  
  function parseJwt(t) { return JSON.parse(atob(t.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))); }
  function handleCredentialResponse(r) { let d = parseJwt(r.credential); if (ALLOWED.includes(d.email)) { localStorage.setItem("ue", d.email); location.reload(); } else alert("Доступ запрещён"); }
  
  window.onload = () => {
    if (localStorage.getItem("ue") && ALLOWED.includes(localStorage.getItem("ue"))) {
      document.getElementById("login").style.display = "none";
      document.getElementById("content").style.display = "block";
      init();
    }
  };
  
  function init() {
    let today = new Date().toISOString().split('T')[0];
    let dateInput = document.getElementById("dateInput");
    dateInput.min = today;
    dateInput.value = today;
    buildTable();
    dateInput.addEventListener("change", () => { loadFromServer(); clearTempSelections(); });
    loadFromServer();
    setupSelectionEvents();
  }
  
  function buildTable() {
    const thead = document.getElementById("tableHead");
    const tbody = document.getElementById("tableBody");
    
    let headerRow = "<tr><th>СТОЛ</th>";
    TIME_SLOTS.forEach(slot => { headerRow += `<th>${slot.label}</th>`; });
    headerRow += "</tr>";
    thead.innerHTML = headerRow;
    
    tbody.innerHTML = "";
    const groupColors = { navy: "#eef3fc", sage: "#edf7f0", rust: "#fdf0ea" };
    
    for (let lane = 0; lane < LANES; lane++) {
      let group = "";
      if (lane < 3) group = "navy";
      else if (lane < 6) group = "sage";
      else group = "rust";
      
      let row = `<tr><td style="background:${groupColors[group]}; font-weight:700;">№ ${lane + 1}</td>`;
      for (let si = 0; si < TIME_SLOTS.length; si++) {
        row += `<td class="slot-cell" data-lane="${lane}" data-slot="${si}" data-time="${TIME_SLOTS[si].key}" style="background:${group === 'navy' ? '#f8fafd' : (group === 'sage' ? '#f6fcf8' : '#fef8f4')}"></td>`;
      }
      row += "</tr>";
      tbody.insertAdjacentHTML('beforeend', row);
    }
  }
  
  function setupSelectionEvents() {
    const container = document.getElementById("tableContainer");
    
    container.addEventListener("mousedown", (e) => {
      const cell = e.target.closest(".slot-cell");
      if (!cell) return;
      e.preventDefault();
      
      isSelecting = true;
      const lane = parseInt(cell.dataset.lane);
      const slot = parseInt(cell.dataset.slot);
      selectStart = { lane, slot };
      currentSelection = { lane, start: slot, end: slot };
      highlightSelection();
    });
    
    container.addEventListener("mousemove", (e) => {
      if (!isSelecting) return;
      const cell = e.target.closest(".slot-cell");
      if (!cell) return;
      
      const lane = parseInt(cell.dataset.lane);
      const slot = parseInt(cell.dataset.slot);
      
      if (lane === selectStart.lane) {
        const start = Math.min(selectStart.slot, slot);
        const end = Math.max(selectStart.slot, slot);
        currentSelection = { lane, start, end };
        highlightSelection();
      }
    });
    
    container.addEventListener("mouseup", (e) => {
      if (!isSelecting || !currentSelection || currentSelection.start === currentSelection.end) {
        isSelecting = false;
        clearHighlight();
        currentSelection = null;
        selectStart = null;
        return;
      }
      
      const { lane, start, end } = currentSelection;
      const timeStart = TIME_SLOTS[start].key;
      const timeEnd = TIME_SLOTS[end].key;
      
      const hasConflict = bookings.some(b => b.lane === lane && !(b.end <= timeStart || b.start >= timeEnd));
      if (hasConflict) {
        alert("Это время уже занято существующей бронью!");
      } else {
        const newTemp = { id: nextTempId++, lane, start: Math.min(timeStart, timeEnd), end: Math.max(timeStart, timeEnd) };
        tempBookings.push(newTemp);
        renderTempCards();
        renderAllBars();
      }
      
      isSelecting = false;
      clearHighlight();
      currentSelection = null;
      selectStart = null;
    });
  }
  
  function highlightSelection() {
    clearHighlight();
    if (!currentSelection) return;
    
    for (let i = currentSelection.start; i <= currentSelection.end; i++) {
      const cell = document.querySelector(`.slot-cell[data-lane="${currentSelection.lane}"][data-slot="${i}"]`);
      if (cell) cell.classList.add("drag-over");
    }
  }
  
  function clearHighlight() {
    document.querySelectorAll(".slot-cell.drag-over").forEach(cell => cell.classList.remove("drag-over"));
  }
  
  function clearTempSelections() {
    tempBookings = [];
    renderTempCards();
    renderAllBars();
    document.querySelectorAll(".slot-cell.temp-highlight").forEach(cell => cell.classList.remove("temp-highlight"));
  }
  
  function renderTempCards() {
    const container = document.getElementById("inlineTempContainer");
    if (!container) return;
    
    if (tempBookings.length === 0) {
      container.innerHTML = "";
      return;
    }
    
    container.innerHTML = `<div class="temp-badge">✏️ Черновики <span>${tempBookings.length}</span></div>`;
    
    tempBookings.forEach((tb, idx) => {
      const card = document.createElement("div");
      card.className = "temp-card-inline";
      card.innerHTML = `
        <strong>Стол ${tb.lane + 1}</strong>
        <span>${formatTime(tb.start)}–${formatTime(tb.end)}</span>
        <button class="temp-rm" data-idx="${idx}">✕</button>
      `;
      card.querySelector(".temp-rm").onclick = () => {
        tempBookings.splice(idx, 1);
        renderTempCards();
        renderAllBars();
      };
      container.appendChild(card);
    });
  }
  
  function formatTime(value) {
    const hours = Math.floor(value);
    const minutes = value % 1 === 0.5 ? "30" : "00";
    return `${hours}:${minutes}`;
  }
  
  function getStatusClass(booking) {
    if (booking.confirmed === true) return "confirmed";
    if (booking.confirmed === false) return "rejected";
    return "pending";
  }
  
  function renderAllBars() {
    const container = document.getElementById("barsContainer");
    if (!container) return;
    container.innerHTML = "";
    container.style.pointerEvents = "auto";
    
    const table = document.getElementById("bookingTable");
    const rows = table.querySelectorAll("tbody tr");
    if (rows.length === 0) return;
    
    // Render real bookings
    bookings.forEach(booking => {
      const row = rows[booking.lane];
      if (!row) return;
      
      const startIdx = TIME_SLOTS.findIndex(s => s.key === booking.start);
      const endIdx = TIME_SLOTS.findIndex(s => s.key === booking.end);
      if (startIdx === -1 || endIdx === -1) return;
      
      const startCell = row.cells[startIdx + 1];
      const endCell = row.cells[endIdx + 1];
      if (!startCell || !endCell) return;
      
      const rect = table.getBoundingClientRect();
      const startRect = startCell.getBoundingClientRect();
      const endRect = endCell.getBoundingClientRect();
      
      const bar = document.createElement("div");
      bar.className = `booking-bar ${getStatusClass(booking)}`;
      bar.style.position = "absolute";
      bar.style.left = (startRect.left - rect.left + 2) + "px";
      bar.style.top = (startRect.top - rect.top + 2) + "px";
      bar.style.width = (endRect.right - startRect.left - 4) + "px";
      bar.style.height = (startRect.height - 4) + "px";
      bar.innerHTML = `
        <div style="font-weight:700; font-size:11px;">${booking.name || "Бронь"}</div>
        <div class="time">${formatTime(booking.start)}–${formatTime(booking.end)}</div>
        <div class="drag-area"></div>
        <div class="resize-left"></div>
        <div class="resize-right"></div>
      `;
      
      // Drag
      const dragArea = bar.querySelector(".drag-area");
      dragArea.onmousedown = (e) => startDrag(booking, e, false);
      
      // Resize
      const leftResize = bar.querySelector(".resize-left");
      const rightResize = bar.querySelector(".resize-right");
      leftResize.onmousedown = (e) => startResize(booking, 'left', e, false);
      rightResize.onmousedown = (e) => startResize(booking, 'right', e, false);
      
      // Двойной клик на ВСЕМ ползунке
      bar.addEventListener("dblclick", (e) => {
        e.stopPropagation();
        e.preventDefault();
        showInfoModal(booking);
      });
      
      // Также на каждой части, чтобы гарантированно сработало
      dragArea.addEventListener("dblclick", (e) => {
        e.stopPropagation();
        showInfoModal(booking);
      });
      
      leftResize.addEventListener("dblclick", (e) => {
        e.stopPropagation();
        showInfoModal(booking);
      });
      
      rightResize.addEventListener("dblclick", (e) => {
        e.stopPropagation();
        showInfoModal(booking);
      });
      
      container.appendChild(bar);
    });
    
    // Render temp bookings
    tempBookings.forEach(temp => {
      const row = rows[temp.lane];
      if (!row) return;
      
      const startIdx = TIME_SLOTS.findIndex(s => s.key === temp.start);
      const endIdx = TIME_SLOTS.findIndex(s => s.key === temp.end);
      if (startIdx === -1 || endIdx === -1) return;
      
      const startCell = row.cells[startIdx + 1];
      const endCell = row.cells[endIdx + 1];
      if (!startCell || !endCell) return;
      
      const rect = table.getBoundingClientRect();
      const startRect = startCell.getBoundingClientRect();
      const endRect = endCell.getBoundingClientRect();
      
      const bar = document.createElement("div");
      bar.className = "booking-bar temp";
      bar.style.position = "absolute";
      bar.style.left = (startRect.left - rect.left + 2) + "px";
      bar.style.top = (startRect.top - rect.top + 2) + "px";
      bar.style.width = (endRect.right - startRect.left - 4) + "px";
      bar.style.height = (startRect.height - 4) + "px";
      bar.innerHTML = `
        <div style="font-weight:700; font-size:11px;">Черновик</div>
        <div class="time">${formatTime(temp.start)}–${formatTime(temp.end)}</div>
        <div class="drag-area"></div>
        <div class="resize-left"></div>
        <div class="resize-right"></div>
      `;
      
      const dragArea = bar.querySelector(".drag-area");
      dragArea.onmousedown = (e) => startDrag(temp, e, true);
      
      const leftResize = bar.querySelector(".resize-left");
      const rightResize = bar.querySelector(".resize-right");
      leftResize.onmousedown = (e) => startResize(temp, 'left', e, true);
      rightResize.onmousedown = (e) => startResize(temp, 'right', e, true);
      
      bar.addEventListener("dblclick", (e) => {
        e.stopPropagation();
        alert(`Черновик: Стол ${temp.lane+1}, ${formatTime(temp.start)}–${formatTime(temp.end)}`);
      });
      
      dragArea.addEventListener("dblclick", (e) => {
        e.stopPropagation();
        alert(`Черновик: Стол ${temp.lane+1}, ${formatTime(temp.start)}–${formatTime(temp.end)}`);
      });
      
      leftResize.addEventListener("dblclick", (e) => {
        e.stopPropagation();
        alert(`Черновик: Стол ${temp.lane+1}, ${formatTime(temp.start)}–${formatTime(temp.end)}`);
      });
      
      rightResize.addEventListener("dblclick", (e) => {
        e.stopPropagation();
        alert(`Черновик: Стол ${temp.lane+1}, ${formatTime(temp.start)}–${formatTime(temp.end)}`);
      });
      
      container.appendChild(bar);
    });
  }
  
  function startDrag(item, e, isTemp) {
    e.stopPropagation();
    const bar = e.target.closest(".booking-bar");
    if (!bar) return;
    
    const startX = e.clientX;
    const startLane = item.lane;
    const duration = item.end - item.start;
    const startSlotIdx = TIME_SLOTS.findIndex(s => s.key === item.start);
    
    const ghost = bar.cloneNode(true);
    ghost.style.opacity = "0.5";
    ghost.style.pointerEvents = "none";
    document.getElementById("barsContainer").appendChild(ghost);
    bar.style.opacity = "0.3";
    
    let currentLane = startLane;
    let currentStartIdx = startSlotIdx;
    
    function onMouseMove(moveEvent) {
      const target = document.elementsFromPoint(moveEvent.clientX, moveEvent.clientY).find(el => el.classList && el.classList.contains("slot-cell"));
      if (target) {
        const newLane = parseInt(target.dataset.lane);
        let newSlotIdx = parseInt(target.dataset.slot);
        newSlotIdx = Math.min(Math.max(0, newSlotIdx), TIME_SLOTS.length - Math.round(duration * 2) - 1);
        
        if (newLane !== currentLane || newSlotIdx !== currentStartIdx) {
          currentLane = newLane;
          currentStartIdx = newSlotIdx;
          
          const row = document.querySelector(`#bookingTable tbody tr:nth-child(${currentLane + 1})`);
          const startCell = row.cells[currentStartIdx + 1];
          const endCell = row.cells[currentStartIdx + Math.round(duration * 2) + 1];
          if (startCell && endCell) {
            const rect = document.getElementById("bookingTable").getBoundingClientRect();
            const startRect = startCell.getBoundingClientRect();
            const endRect = endCell.getBoundingClientRect();
            ghost.style.left = (startRect.left - rect.left + 2) + "px";
            ghost.style.top = (startRect.top - rect.top + 2) + "px";
            ghost.style.width = (endRect.right - startRect.left - 4) + "px";
          }
        }
      }
    }
    
    function onMouseUp(upEvent) {
      const target = document.elementsFromPoint(upEvent.clientX, upEvent.clientY).find(el => el.classList && el.classList.contains("slot-cell"));
      if (target) {
        const finalLane = parseInt(target.dataset.lane);
        let finalSlotIdx = parseInt(target.dataset.slot);
        finalSlotIdx = Math.min(Math.max(0, finalSlotIdx), TIME_SLOTS.length - Math.round(duration * 2) - 1);
        
        const newStart = TIME_SLOTS[finalSlotIdx].key;
        const newEnd = TIME_SLOTS[finalSlotIdx + Math.round(duration * 2)].key;
        
        let conflict = false;
        if (!isTemp) {
          conflict = bookings.some(b => b.id !== item.id && b.lane === finalLane && !(b.end <= newStart || b.start >= newEnd));
        }
        
        if (!conflict) {
          item.lane = finalLane;
          item.start = newStart;
          item.end = newEnd;
          if (!isTemp) saveToServer(item);
          renderAllBars();
          if (isTemp) renderTempCards();
        } else if (!isTemp) {
          alert("Конфликт с существующей бронью!");
        }
      }
      ghost.remove();
      bar.style.opacity = "1";
      document.removeEventListener("mousemove", onMouseMove);
      document.removeEventListener("mouseup", onMouseUp);
    }
    
    document.addEventListener("mousemove", onMouseMove);
    document.addEventListener("mouseup", onMouseUp);
  }
  
  function startResize(item, side, e, isTemp) {
    e.stopPropagation();
    const startX = e.clientX;
    const startSlotIdx = TIME_SLOTS.findIndex(s => s.key === item.start);
    const endSlotIdx = TIME_SLOTS.findIndex(s => s.key === item.end);
    const cellWidth = document.querySelector(".slot-cell")?.offsetWidth || 68;
    
    function onMouseMove(moveEvent) {
      const deltaX = moveEvent.clientX - startX;
      const deltaSlots = Math.round(deltaX / cellWidth);
      
      if (side === 'left') {
        let newStartIdx = Math.max(0, Math.min(endSlotIdx - 1, startSlotIdx + deltaSlots));
        let newStart = TIME_SLOTS[newStartIdx].key;
        if (newStart !== item.start) {
          item.start = newStart;
          if (!isTemp) scheduleUpdate(item);
          renderAllBars();
          if (isTemp) renderTempCards();
        }
      } else {
        let newEndIdx = Math.min(TIME_SLOTS.length - 1, Math.max(startSlotIdx + 1, endSlotIdx + deltaSlots));
        let newEnd = TIME_SLOTS[newEndIdx].key;
        if (newEnd !== item.end) {
          item.end = newEnd;
          if (!isTemp) scheduleUpdate(item);
          renderAllBars();
          if (isTemp) renderTempCards();
        }
      }
    }
    
    function onMouseUp() {
      if (!isTemp) saveToServer(item);
      document.removeEventListener("mousemove", onMouseMove);
      document.removeEventListener("mouseup", onMouseUp);
    }
    
    document.addEventListener("mousemove", onMouseMove);
    document.addEventListener("mouseup", onMouseUp);
  }
  
  let updateTimeout;
  function scheduleUpdate(booking) {
    if (updateTimeout) clearTimeout(updateTimeout);
    updateTimeout = setTimeout(() => { if (booking.id) saveToServer(booking); }, 100);
  }
  
  async function loadFromServer() {
    showLoad();
    try {
      const res = await fetch(GAS_URL + "?action=get&date=" + document.getElementById("dateInput").value);
      const data = await res.json();
      bookings = data.bookings ? data.bookings.map(b => ({
        id: b.id,
        lane: b.table - 1,
        start: parseFloat(b.start),
        end: parseFloat(b.end),
        name: b.name,
        phone: b.phone,
        comment: b.comment,
        confirmed: b.confirmed === "Да" ? true : (b.confirmed === "Нет" ? false : null)
      })) : [];
      renderAllBars();
    } catch(e) { console.error(e); }
    hideLoad();
  }
  
  async function saveToServer(booking) {
    if (!booking.id) return;
    const date = document.getElementById("dateInput").value;
    await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({
        action: "update",
        id: booking.id,
        date,
        tableNumber: booking.lane + 1,
        start: booking.start,
        end: booking.end,
        name: booking.name,
        phone: booking.phone,
        comment: booking.comment
      })
    });
  }
  
  function openBookModal() {
    if (tempBookings.length === 0) {
      alert("Сначала выделите время: зажмите левую кнопку и протяните по нужным ячейкам");
      return;
    }
    document.getElementById("nameInput").value = "";
    document.getElementById("phoneInput").value = "";
    document.getElementById("commentInput").value = "";
    document.getElementById("bookModal").classList.add("open");
  }
  
  function closeBookModal() { document.getElementById("bookModal").classList.remove("open"); }
  
  async function submitTempBookings() {
    const name = document.getElementById("nameInput").value.trim();
    const phone = document.getElementById("phoneInput").value.trim();
    const comment = document.getElementById("commentInput").value.trim();
    if (!name) { alert("Введите имя"); return; }
    if (tempBookings.length === 0) { alert("Нет черновиков"); closeBookModal(); return; }
    
    showLoad();
    const date = document.getElementById("dateInput").value;
    try {
      const payload = { bookings: tempBookings.map(tb => ({
        date,
        tableNumber: tb.lane + 1,
        start: tb.start,
        end: tb.end,
        name,
        phone,
        comment
      })) };
      await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
      clearTempSelections();
      await loadFromServer();
      closeBookModal();
    } catch(e) { console.error(e); alert("Ошибка сохранения"); }
    hideLoad();
  }
  
  async function confirmBooking(yes) {
    if (!currentBooking) return;
    showLoad();
    await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({ action: "confirm", id: currentBooking.id, confirmed: yes })
    });
    closeInfoModal();
    await loadFromServer();
    hideLoad();
  }
  
  async function deleteBooking() {
    if (!currentBooking || !confirm("Удалить бронь?")) return;
    showLoad();
    await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({ action: "delete", id: currentBooking.id })
    });
    closeInfoModal();
    await loadFromServer();
    hideLoad();
  }
  
  function showInfoModal(booking) {
    currentBooking = booking;
    document.getElementById("i-table").textContent = "№ " + (booking.lane + 1);
    document.getElementById("i-time").textContent = `${formatTime(booking.start)} – ${formatTime(booking.end)}`;
    document.getElementById("i-name").textContent = booking.name;
    document.getElementById("i-phone").textContent = booking.phone || "—";
    document.getElementById("i-comment").textContent = booking.comment || "—";
    document.getElementById("infoModal").classList.add("open");
  }
  
  function closeInfoModal() {
    document.getElementById("infoModal").classList.remove("open");
    currentBooking = null;
  }
  
  function showLoad() { document.getElementById("loader").style.display = "flex"; }
  function hideLoad() { document.getElementById("loader").style.display = "none"; }
  function openImg() { document.getElementById("imgPopup").classList.add("open"); }
  function closeImg() { document.getElementById("imgPopup").classList.remove("open"); }
  
  window.addEventListener("resize", () => renderAllBars());
</script>
</body>
