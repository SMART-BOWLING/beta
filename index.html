                    range: `${AUTH_SHEET_NAME}!A:Z`,
                });
                
                const rows = response.result.values;
                if (!rows || rows.length === 0) {
                    showLoading(false);
                    alert('Таблица пуста');
                    return;
                }
                
                let hasAccess = false;
                let foundName = null;
                
                for (let i = 0; i < rows.length; i++) {
                    if (!rows[i]?.[0]) continue;
                    
                    const rowEmail = rows[i][0].toLowerCase().trim();
                    if (rowEmail === email) {
                        // Проверяем доступ к сайту
                        for (let j = 1; j < rows[i].length; j++) {
                            const siteUrl = rows[i][j]?.trim().split('?')[0].split('#')[0] || '';
                            if (siteUrl === CURRENT_SITE || siteUrl.includes('SMB-LS-KH')) {
                                hasAccess = true;
                                break;
                            }
                        }
                        // Берем имя из столбца B (индекс 1)
                        if (rows[i].length > 1 && rows[i][1]) {
                            foundName = rows[i][1].trim();
                        }
                        break;
                    }
                }
                
                if (hasAccess) {
                    // Сохраняем имя из столбца B
                    currentUserNameFromSheet = foundName || currentUser.name;
                    loginUser(currentUser);
                } else {
                    showLoading(false);
                    alert('Доступ запрещен');
                }
                
            } catch (error) {
                console.error('Ошибка доступа к таблице:', error);
                showLoading(false);
                alert('Ошибка доступа к таблице');
            }
        }

        function loginUser(payload) {
            loginSection.style.display = 'none';

        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                console.error('Ошибка парсинга JWT:', e);
                return {};
            }
        }

        // ===== ОСНОВНЫЕ ФУНКЦИИ ПРИЛОЖЕНИЯ =====
        function convertGoogleDriveLink(driveLink) {
            if (!driveLink) return null;
            
            if (driveLink.includes('drive.google.com/file/d/')) {
                const match = driveLink.match(/\/d\/([^\/]+)/);
                if (match && match[1]) {
                    return `https://drive.google.com/uc?export=view&id=${match[1]}`;
                }
            }
            
            if (driveLink.includes('uc?export=view')) {
                return driveLink;
            }
            
            return null;
        }

        function openDriveLink(driveLink) {
            if (!driveLink) return;
            
            const viewLink = convertGoogleDriveLink(driveLink);
            if (viewLink) {
                window.open(viewLink, '_blank');
            } else {
                window.open(driveLink, '_blank');
            }
        }

        async function makeRequest(url, options = {}) {
            try {
                if (!options.method || options.method === 'GET') {
                    const separator = url.includes('?') ? '&' : '?';
                    url = `${url}${separator}_=${Date.now()}`;
                }
                
                const response = await fetch(url, options);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Ошибка запроса:', error);
                throw error;
            }
        }

        function scrollToTop() {
            const activeTab = document.querySelector('.tab-content.active');
            if (activeTab) {
                activeTab.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            }
        }

        function goToPage(type, pageNumber) {
            if (type === 'journal') {
                if (pageNumber >= 1 && pageNumber <= totalJournalPages && pageNumber !== currentJournalPage) {
                    currentJournalPage = pageNumber;
                    renderJournalCards(journalData);
                    updatePagination('journal', currentJournalPage, totalJournalPages);
                    scrollToTop();
                }
            } else if (type === 'instructor') {
                if (pageNumber >= 1 && pageNumber <= totalInstructorPages && pageNumber !== currentInstructorPage) {
                    currentInstructorPage = pageNumber;
                    renderInstructorCards(instructorData);
                    updatePagination('instructor', currentInstructorPage, totalInstructorPages);
                    scrollToTop();
                }
            } else if (type === 'engineer') {
                if (pageNumber >= 1 && pageNumber <= totalEngineerPages && pageNumber !== currentEngineerPage) {
                    currentEngineerPage = pageNumber;
                    renderEngineerCards(engineerData);
                    updatePagination('engineer', currentEngineerPage, totalEngineerPages);
                    scrollToTop();
                }
            }
        }

        function updatePagination(type, currentPage, totalPages) {
            const pagination = document.getElementById(`${type}-pagination`);
            if (!pagination) return;
            
            const currentPageSpan = document.getElementById(`${type}-current-page`);
            const totalPagesSpan = document.getElementById(`${type}-total-pages`);
            const firstBtn = pagination.querySelector('.first-btn');
            const prevBtn = pagination.querySelector('.prev-btn');
            const nextBtn = pagination.querySelector('.next-btn');
            const lastBtn = pagination.querySelector('.last-btn');
            
            currentPageSpan.textContent = currentPage;
            totalPagesSpan.textContent = totalPages;
            
            firstBtn.disabled = currentPage === 1;
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;
            lastBtn.disabled = currentPage === totalPages;
            
            lastBtn.onclick = function() {
                goToPage(type, totalPages);
            };
            
            pagination.style.display = totalPages > 1 ? 'flex' : 'none';
        }

        function changePage(type, direction) {
            if (type === 'journal') {
                const newPage = currentJournalPage + direction;
                goToPage('journal', newPage);
            } else if (type === 'instructor') {
                const newPage = currentInstructorPage + direction;
                goToPage('instructor', newPage);
            } else if (type === 'engineer') {
                const newPage = currentEngineerPage + direction;
                goToPage('engineer', newPage);
            }
        }

        function getCurrentPageData(data, currentPage) {
            const startIndex = (currentPage - 1) * CARDS_PER_PAGE;
            const endIndex = startIndex + CARDS_PER_PAGE;
            return data.slice(startIndex, endIndex);
        }

        function toggleDateFilter() {
            const dateFilterContainer = document.getElementById('date-filter-container');
            if (dateFilterContainer.classList.contains('show')) {
                dateFilterContainer.classList.remove('show');

        function initDatePicker() {
            if (datePicker) {
                datePicker.destroy();
            }
            
            const dateInput = document.getElementById('date-filter-input');
            
            datePicker = flatpickr(dateInput, {
                locale: "ru",
                dateFormat: "d.m.Y",
                allowInput: false,
                clickOpens: true,
                disableMobile: false,
                onChange: function(selectedDates, dateStr, instance) {
                    if (dateStr) {
                        const formattedDate = dateStr;
                        const activeTab = document.querySelector('.tab-content.active');
                        if (activeTab && activeTab.id === 'tab1') {
                            filterJournalByDate(formattedDate);
                        } else if (activeTab && activeTab.id === 'tab2') {
                            filterInstructorByDate(formattedDate);
                        } else if (activeTab && activeTab.id === 'tab3') {
                            filterEngineerByDate(formattedDate);
                        }
                    }
                },
                onOpen: function(selectedDates, dateStr, instance) {
                    if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                        setTimeout(() => {
                            dateInput.blur();
                            dateInput.focus();
                        }, 100);
                    }
                }
            });
            
            dateInput.value = '';
        }

        function filterJournalByDate(date) {
            if (!date || date === '') {
                isFilterActive = false;
                currentFilterDate = '';
                filterType = 'journal';
                journalData = originalJournalData ? filterTasksByTitle([...originalJournalData], ['PS', 'МЕХ', 'ps', 'мех']) : [];
                currentJournalPage = 1;
                renderJournalCards(journalData);
                updateCounterLabel();
                const dateInput = document.getElementById('date-filter-input');
                if (dateInput) dateInput.value = '';
                return;
            }
            isFilterActive = true;
            currentFilterDate = date;
            filterType = 'journal';
            const filteredData = originalJournalData.filter(task => {
                const titleMatch = ['PS', 'МЕХ', 'ps', 'мех'].some(keyword => 
                    (task.task || '').toLowerCase().includes(keyword.toLowerCase())
                );
                return task.completedDate === date && titleMatch;
            });
            journalData = filteredData;
            currentJournalPage = 1;
            renderJournalCards(journalData);
            updateCounterLabel();
        }

        function updateCounterLabel() {
            const openTasksCounter = document.getElementById('open-tasks-counter');
            const labelSpan = openTasksCounter.querySelector('.label');
            const countSpan = openTasksCounter.querySelector('.count');
            const activeTab = document.querySelector('.tab-content.active');
            
            if (isFilterActive && currentFilterDate) {
                if (activeTab && activeTab.id === 'tab1') {
                    const count = journalData ? journalData.length : 0;
                    labelSpan.innerHTML = `Задачи за ${currentFilterDate} (МЕХАНИК)`;
                    countSpan.textContent = count;
                } else if (activeTab && activeTab.id === 'tab2') {
                    const count = instructorData ? instructorData.length : 0;
                    labelSpan.innerHTML = `Задачи за ${currentFilterDate} (ИНСТРУКТОР)`;
                    countSpan.textContent = count;
                } else if (activeTab && activeTab.id === 'tab3') {
                    const count = engineerData ? engineerData.length : 0;
                    labelSpan.innerHTML = `Задачи за ${currentFilterDate} (КЛУБ)`;
                    countSpan.textContent = count;
                }
                countSpan.style.backgroundColor = '#dc143c';
            } else {
                let openTasksCount = 0;
                if (activeTab && activeTab.id === 'tab1') {
                    openTasksCount = journalData ? journalData.filter(task => !task.isCompleted).length : 0;
                } else if (activeTab && activeTab.id === 'tab2') {
                    openTasksCount = instructorData ? instructorData.filter(task => !task.isCompleted).length : 0;
                } else if (activeTab && activeTab.id === 'tab3') {
                    openTasksCount = engineerData ? engineerData.filter(task => !task.isCompleted).length : 0;
                }
                labelSpan.innerHTML = 'КОЛИЧЕСТВО НЕВЫПОЛНЕННЫХ ЗАДАЧ:';

        function clearDateFilter() {
            const dateInput = document.getElementById('date-filter-input');
            if (dateInput) dateInput.value = '';
            const activeTab = document.querySelector('.tab-content.active');
            if (activeTab && activeTab.id === 'tab1') {
                filterJournalByDate('');
            } else if (activeTab && activeTab.id === 'tab2') {
                filterInstructorByDate('');
            } else if (activeTab && activeTab.id === 'tab3') {
                filterEngineerByDate('');
            }
        }

        function filterTasksByTitle(tasks, keywords) {
            if (!tasks || tasks.length === 0) return [];
            return tasks.filter(task => {
                const title = task.task ? task.task.toLowerCase() : '';
                return keywords.some(keyword => title.includes(keyword.toLowerCase()));
            });
        }

        async function loadJournal() {
            try {
                if (journalData && !isInitialLoad) {
                    renderJournalCards(journalData);
                    return;
                }
                const journalCards = document.getElementById('journal-cards');
                journalCards.innerHTML = '';
                const journal = await makeRequest(`${BACKEND_URL}?action=getJournal`);
                originalJournalData = [...journal];
                const filteredJournal = filterTasksByTitle(originalJournalData, ['PS', 'МЕХ', 'ps', 'мех']);
                journalData = [...filteredJournal];
                renderJournalCards(journalData);
                updateCounterLabel();
            } catch (error) {
                console.error('Ошибка загрузки журнала:', error);
                document.getElementById('journal-cards').innerHTML = `<div class="task-card error">Ошибка загрузки: ${error.message}</div>`;
            }
        }

        async function loadInstructorTasks() {
            try {
                if (instructorData && !isInitialLoad) {
                    renderInstructorCards(instructorData);
                    return;
                }
                const instructorCards = document.getElementById('instructor-cards');
                instructorCards.innerHTML = '';
                const journal = await makeRequest(`${BACKEND_URL}?action=getJournal`);
                if (!originalJournalData) originalJournalData = [...journal];
                const filteredInstructor = filterTasksByTitle(journal, ['ИНСТ', 'инст']);
                instructorData = [...filteredInstructor];
                renderInstructorCards(instructorData);
                updateCounterLabel();
            } catch (error) {
                console.error('Ошибка загрузки задач инструктора:', error);
                document.getElementById('instructor-cards').innerHTML = `<div class="task-card error">Ошибка загрузки: ${error.message}</div>`;
            }
        }

        async function loadEngineerTasks() {
            try {
                if (engineerData && !isInitialLoad) {
                    renderEngineerCards(engineerData);
                    return;
                }
                const engineerCards = document.getElementById('engineer-cards');
                engineerCards.innerHTML = '';
                const journal = await makeRequest(`${BACKEND_URL}?action=getJournal`);
                if (!originalJournalData) originalJournalData = [...journal];
                const filteredEngineer = filterTasksByTitle(journal, ['КЛУБ']);
                engineerData = [...filteredEngineer];
                renderEngineerCards(engineerData);
                updateCounterLabel();

                document.getElementById('engineer-cards').innerHTML = `<div class="task-card error">Ошибка загрузки: ${error.message}</div>`;

        // Функция completeTask: обновляет ячейку B (столбец 2) с именем исполнителя
        async function completeTask(taskId, executorName, rowIndex) {
            showLoader();
            try {
                // Обновляем ячейку B (столбец 2) с именем исполнителя
                const updateUrl = `${BACKEND_URL}?action=updateCell&sheetName=B&column=E&row=${rowIndex}&value=${encodeURIComponent(executorName)}`;
                const result = await makeRequest(updateUrl);
                if (result.success) {
                    await makeRequest(`${BACKEND_URL}?action=updateFromRowNumber&rowNumber=${rowIndex}`);
                    journalData = null;
                    instructorData = null;
                    engineerData = null;
                    originalJournalData = null;
                    const wasFilterActive = isFilterActive;
                    const savedFilterDate = currentFilterDate;
                    const savedFilterType = filterType;
                    updateCounterLabel();
                    const dateFilterContainer = document.getElementById('date-filter-container');
                    dateFilterContainer.classList.remove('show');
                    await Promise.all([
                        loadJournal(),
                        loadInstructorTasks(),
                        loadEngineerTasks()
                    ]);
                    if (wasFilterActive && savedFilterDate) {
                        if (savedFilterType === 'journal') filterJournalByDate(savedFilterDate);
                        else if (savedFilterType === 'instructor') filterInstructorByDate(savedFilterDate);
                        else if (savedFilterType === 'engineer') filterEngineerByDate(savedFilterDate);
                    }
                    hideLoader();
                } else {
                    hideLoader();
                }
            } catch (error) {
                console.error('Ошибка выполнения задачи:', error);
                hideLoader();
            }
        }

        // Функция для показа модального окна подтверждения
        function showConfirmModal(taskId, rowIndex) {
            // Создаем модальное окно
            const modal = document.createElement('div');
            modal.className = 'confirm-modal';
            modal.innerHTML = `
                <div class="confirm-modal-content">
                    <div class="confirm-modal-icon">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <div class="confirm-modal-title">Подтверждение</div>
                    <div class="confirm-modal-message">Вы уверены, что нажатие было не случаным?</div>
                    <div class="confirm-modal-buttons">
                        <button class="confirm-modal-btn confirm" id="confirmYesBtn">Да, выполнить</button>
                        <button class="confirm-modal-btn cancel" id="confirmNoBtn">Отмена</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Обработчик для кнопки "Да"
            const confirmBtn = modal.querySelector('#confirmYesBtn');
            confirmBtn.onclick = function() {
                modal.remove();
                // Используем имя из столбца B таблицы (currentUserNameFromSheet)
                if (!currentUserNameFromSheet) {
                    console.error('Имя пользователя не найдено в таблице');
                    alert('Ошибка: не удалось определить имя пользователя');
                    return;
                }
                const executorName = currentUserNameFromSheet;
                console.log(`Отправка задачи ${taskId} с исполнителем: ${executorName} (из столбца B)`);
                completeTask(taskId, executorName, rowIndex);
            };
            
            // Обработчик для кнопки "Отмена"
            const cancelBtn = modal.querySelector('#confirmNoBtn');
            cancelBtn.onclick = function() {
                modal.remove();
            };
            
            // Закрытие при клике на фон
            modal.onclick = function(e) {
                if (e.target === modal) {
                    modal.remove();
                }
            };
        }

        // Функция для отправки задачи с подтверждением
        function submitTaskWithConfirm(event, taskId, rowIndex) {
            event.preventDefault();
            event.stopPropagation();
            showConfirmModal(taskId, rowIndex);
        }

        // Функция рендеринга карточек для МЕХАНИК (с модальным окном подтверждения)
        function renderJournalCards(journal) {
            const container = document.getElementById('journal-cards');
            if (!journal || journal.length === 0) {
                container.innerHTML = `<div class="task-card"><div class="loading-container"><div class="loading-card-text">Нет данных</div></div></div>`;
                updatePagination('journal', 1, 1);
                return;
            }
            const sorted = [...journal];
            totalJournalPages = Math.ceil(sorted.length / CARDS_PER_PAGE);
            if (currentJournalPage > totalJournalPages) currentJournalPage = 1;
            const current = getCurrentPageData(sorted, currentJournalPage);
            let html = '';
            current.forEach((task, idx) => {
                const rowIndex = task.rowIndex || (idx + 2);
                const hasLink = task.driveLink && task.driveLink.trim() !== '';
                const taskId = task.id || task.driveLink || '';
                if (!task.isCompleted) {
                    html += `
                        <div class="task-card pending" data-task-id="${taskId}" data-row-index="${rowIndex}">
                            <div class="task-header"><div class="task-title">${task.task}</div></div>
                            <div class="card-content">
                                <div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div>
                                <div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate || '-'}</span></div>
                                <div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value">-</span></div>
                            </div>
                            <div class="buttons-container">
                                ${hasLink ? `<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>` : '<div class="no-open">Недоступно</div>'}
                                <button class="submit-btn" onclick="submitTaskWithConfirm(event, '${taskId}', ${rowIndex})"><i class="fas fa-paper-plane"></i>ВЫПОЛНИТЬ</button>
                            </div>
                        </div>`;
                } else {
                    html += `
                        <div class="task-card completed">
                            <div class="task-header"><div class="task-title">${task.task}</div></div>
                            <div class="card-content">
                                <div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div>
                                <div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate}</span></div>
                                <div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value"><span class="executor-name">${task.executor}</span></span></div>
                            </div>
                            <div class="buttons-container">
                                ${hasLink ? `<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>` : '<div class="no-open">Недоступно</div>'}
                                <div class="submitted-text"><i class="fas fa-check-circle"></i>ВЫПОЛНЕНО</div>
                            </div>
                        </div>`;
                }
            });
            container.innerHTML = html;
            updatePagination('journal', currentJournalPage, totalJournalPages);
        }

        // Функция рендеринга для ИНСТРУКТОР (с модальным окном подтверждения)
        function renderInstructorCards(instructor) {
            const container = document.getElementById('instructor-cards');

            totalInstructorPages = Math.ceil(sorted.length / CARDS_PER_PAGE);
            if (currentInstructorPage > totalInstructorPages) currentInstructorPage = 1;
            const current = getCurrentPageData(sorted, currentInstructorPage);
            let html = '';
            current.forEach((task, idx) => {

        // Функция рендеринга для клуб (с модальным окном подтверждения)

                updatePagination('engineer', 1, 1);
                return;
            }
            const sorted = [...engineer];
            totalEngineerPages = Math.ceil(sorted.length / CARDS_PER_PAGE);
            if (currentEngineerPage > totalEngineerPages) currentEngineerPage = 1;
            const current = getCurrentPageData(sorted, currentEngineerPage);
            let html = '';
            current.forEach((task, idx) => {
                const rowIndex = task.rowIndex || (idx + 2);

        function initializeApp() {
            console.log('Инициализация приложения после авторизации');
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function(event) {
                const now = (new Date()).getTime();
                if (now - lastTouchEnd <= 300) event.preventDefault();
                lastTouchEnd = now;
            }, false);
            document.addEventListener('click', function(e) {
                const userDropdown = document.getElementById('userDropdown');
                const dateFilterContainer = document.getElementById('date-filter-container');
                if (!e.target.closest('.user-avatar') && userDropdown.style.display === 'block') userDropdown.style.display = 'none';
                if (!e.target.closest('#open-tasks-counter') && !e.target.closest('#date-filter-container') && dateFilterContainer.classList.contains('show')) dateFilterContainer.classList.remove('show');
            });
            showLoader();
            const tabButtons = document.querySelectorAll('.tab-btn');
            const tabContents = document.querySelectorAll('.tab-content');
            document.getElementById('open-tasks-counter').addEventListener('click', toggleDateFilter);
            document.getElementById('clear-filter-btn').addEventListener('click', clearDateFilter);
            const dateInput = document.getElementById('date-filter-input');
            if (dateInput && /iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                dateInput.addEventListener('focus', function() { this.style.fontSize = '16px'; });
                dateInput.addEventListener('blur', function() { this.style.fontSize = ''; });
            }
            Promise.all([
                loadJournal(),
                loadInstructorTasks(),
                loadEngineerTasks()
            ]).then(() => { setTimeout(() => hideLoader(), 100); }).catch(error => { console.error(error); hideLoader(); });
            tabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    tabButtons.forEach(btn => btn.classList.remove('active'));
                    tabContents.forEach(content => content.classList.remove('active'));
                    button.classList.add('active');
                    const tabId = button.getAttribute('data-tab');
                    document.getElementById(tabId).classList.add('active');
                    if (tabId === 'tab2') { currentInstructorPage = 1; loadInstructorTasks(); }
                    else if (tabId === 'tab1') { currentJournalPage = 1; loadJournal(); }
                    else if (tabId === 'tab3') { currentEngineerPage = 1; loadEngineerTasks(); }
                    if (isFilterActive && currentFilterDate) {
                        if (tabId === 'tab1') filterJournalByDate(currentFilterDate);
                        else if (tabId === 'tab2') filterInstructorByDate(currentFilterDate);
                        else if (tabId === 'tab3') filterEngineerByDate(currentFilterDate);
                    } else updateCounterLabel();
                    scrollToTop();
                });
            });
            setInterval(() => {
                const activeTab = document.querySelector('.tab-content.active');
                if (activeTab && activeTab.id === 'tab2') loadInstructorTasks();
                else if (activeTab && activeTab.id === 'tab1') loadJournal();
                else if (activeTab && activeTab.id === 'tab3') loadEngineerTasks();
            }, 30000);
            setTimeout(() => { isInitialLoad = false; }, 1000);
            document.addEventListener('click', function(e) {
                if (e.target.closest('.task-card')) {
                    const card = e.target.closest('.task-card');
                    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT' || e.target.tagName === 'OPTION' || e.target.tagName === 'A' || e.target.tagName === 'I') return;
                    document.querySelectorAll('.task-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                }
            });
        }

        window.addEventListener('load', function() {
            const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
            const email = localStorage.getItem('userEmail');
            const name = localStorage.getItem('userName');
            const nameFromSheet = localStorage.getItem('userNameFromSheet');
            const pic = localStorage.getItem('userPic');
            if (isLoggedIn && email) {
                loginSection.style.display = 'none';
                mainContent.style.display = 'block';
                currentUser = { email: email, name: name, picture: pic };
                currentUserNameFromSheet = nameFromSheet || name;
                updateUserAvatar(currentUser);
                showLoading(true);
                loadSheetsAPI()
                    .then(() => gapi.client.init({ apiKey: AUTH_API_KEY, discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] }))
                    .then(() => checkEmailInSheet(email))
                    .catch(() => signOut());
            } else {
                loginSection.style.display = 'flex';
                mainContent.style.display = 'none';
                setTimeout(() => loadingScreen.classList.add('fade-out'), 500);
            }
        });

        window.onload = function() {
            if (google && google.accounts && google.accounts.id) {
                google.accounts.id.initialize({ client_id: '328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com', callback: handleCredentialResponse });
                google.accounts.id.renderButton(document.querySelector('.g_id_signin'), { type: 'standard', shape: 'pill', theme: 'outline', text: 'signin_with', size: 'large', logo_alignment: 'left' });
            }
        };
        
        // Делаем функции доступными глобально
        window.openDriveLink = openDriveLink;
        window.submitTaskWithConfirm = submitTaskWithConfirm;
        window.goToPage = goToPage;
        window.changePage = changePage;
        window.toggleUserDropdown = toggleUserDropdown;
        window.signOut = signOut;
    </script>

    <!-- ИСПРАВЛЕНИЕ ДЛЯ КНОПОК -->
    <script>
        (function fixButtonsOnAllPages() {
            'use strict';
            let lastTouchEnd = 0;
            document.removeEventListener('touchend', document.touchEndHandler, false);
            document.addEventListener('touchend', function(event) {
                const target = event.target;
                const isInteractive = target.closest('button') || target.closest('a') || target.closest('select') || target.closest('.submit-btn') || target.closest('.open-button') || target.closest('.schema-button') || target.closest('.executor-select') || target.closest('.page-btn') || target.closest('.tab-btn') || target.closest('.menu-button') || target.closest('.clear-filter-btn') || target.closest('#open-tasks-counter') || target.closest('.user-avatar');
                if (isInteractive) { event.stopPropagation(); return true; }
                const now = Date.now();
                if (now - lastTouchEnd <= 300) event.preventDefault();
                lastTouchEnd = now;
            }, { passive: false });
            function forceButtonHandlers() {
                document.querySelectorAll('#tab1 .schema-button, #tab2 .schema-button, #tab3 .schema-button').forEach(btn => {
                    btn.removeEventListener('click', handleOpenClick);
                    btn.addEventListener('click', handleOpenClick);
                });
            }
            function handleOpenClick(e) {
                e.preventDefault();
                e.stopPropagation();
                const btn = e.currentTarget;
                const onclickAttr = btn.getAttribute('onclick');
                if (onclickAttr) {
                    try {
                        const match = onclickAttr.match(/'([^']+)'/);
                        if (match && match[1]) window.open(convertGoogleDriveLink(match[1]) || match[1], '_blank');
                    } catch (error) { console.log('Ошибка открытия ссылки:', error); }
                }
            }
            const style = document.createElement('style');
            style.textContent = `.schema-button, .submit-btn, .open-button, .executor-select { position: relative; z-index: 9999 !important; cursor: pointer !important; pointer-events: auto !important; touch-action: manipulation !important; -webkit-tap-highlight-color: rgba(220,20,60,0.2) !important; } .task-card:active { transform: none !important; } button, a, select, .schema-button, .submit-btn, .open-button, .user-avatar { pointer-events: auto !important; -webkit-user-select: none !important; user-select: none !important; } .schema-button:active, .submit-btn:active:not(:disabled), .open-button:active, .user-avatar:active { opacity: 0.7; transform: scale(0.98); }`;
            document.head.appendChild(style);
            const observer = new MutationObserver(function(mutations) { setTimeout(forceButtonHandlers, 50); setTimeout(forceButtonHandlers, 150); });
            const tab1 = document.getElementById('tab1'), tab2 = document.getElementById('tab2'), tab3 = document.getElementById('tab3');
            if (tab1) observer.observe(tab1, { childList: true, subtree: true });
            if (tab2) observer.observe(tab2, { childList: true, subtree: true });
            if (tab3) observer.observe(tab3, { childList: true, subtree: true });
            document.addEventListener('DOMContentLoaded', function() { setTimeout(forceButtonHandlers, 100); setTimeout(forceButtonHandlers, 500); setTimeout(forceButtonHandlers, 1000); });
            const originalGoToPage = window.goToPage;
            window.goToPage = function(type, pageNumber) { originalGoToPage(type, pageNumber); setTimeout(forceButtonHandlers, 100); };
            const originalChangePage = window.changePage;
            window.changePage = function(type, direction) { originalChangePage(type, direction); setTimeout(forceButtonHandlers, 100); };
            console.log('Фикс кнопок установлен (включая клуб)');
        })();
    </script>
