<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>Бильярд · Брони | Интерактивные ползунки (ресайз и протяжка)</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png"/>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    :root {
      --bg:       #f5f5f7;
      --surface:  #ffffff;
      --surface2: #f5f5f7;
      --border:   rgba(0,0,0,.08);
      --border2:  rgba(0,0,0,.14);
      --ink:      #1d1d1f;
      --ink2:     #3d3d3f;
      --ink3:     #6e6e73;
      --ink4:     #aeaeb2;
      --blue:     #0071e3;
      --blue-h:   #0077ed;
      --blue-dim: rgba(0,113,227,.08);
      --green:    #34c759;
      --red:      #ff3b30;
      --amber:    #ff9f0a;
      --r:  12px;
      --r2: 18px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      
      --cell-h: 58px;
      --cell-w: 68px;
      --lane-w: 100px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    #login {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; z-index: 9999; padding: 32px;
    }
    .login-glyph { font-size: 58px; }
    .login-title { font-size: 32px; font-weight: 700; letter-spacing: -.5px; }
    .login-sub   { font-size: 16px; color: var(--ink3); margin-top: -8px; }
    .login-sep   { width: 1px; height: 28px; background: var(--border2); }

    #content { display: none; min-height: 100vh; }

    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,.92);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: .5px solid var(--border2);
      height: 60px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 28px;
    }
    .nav-title { font-size: 20px; font-weight: 600; letter-spacing: -.3px; }
    .nav-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: .5px solid var(--border2);
      border-radius: 980px; padding: 8px 18px;
      font-family: var(--font); font-size: 14px; font-weight: 500; color: var(--blue);
      cursor: pointer; transition: background .15s;
    }
    .nav-btn:hover { background: var(--blue-dim); }

    .page {
      width: 100%;
      margin: 0;
      padding: 24px 28px 80px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .ctrl {
      display: flex; gap: 18px; align-items: center; flex-wrap: wrap;
      background: var(--surface); border-radius: var(--r2);
      padding: 18px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,.04);
    }
    .date-field {
      flex: 1; min-width: 220px; max-width: 280px;
      display: flex; align-items: center; gap: 12px;
      background: var(--surface2); border-radius: 14px;
      padding: 0 18px; height: 52px; border: .5px solid var(--border2);
    }
    .date-field svg { flex-shrink: 0; color: var(--ink3); width: 18px; height: 18px; }
    #dateInput {
      flex: 1; border: none; background: transparent;
      font-family: var(--font); font-size: 17px; font-weight: 500; color: var(--ink);
      cursor: pointer;
    }
    #dateInput:focus { outline: none; }
    .btn-book {
      height: 52px; padding: 0 32px;
      background: var(--blue); color: white; border: none; border-radius: 980px;
      font-family: var(--font); font-size: 17px; font-weight: 600;
      cursor: pointer; transition: all .15s;
      box-shadow: 0 2px 6px rgba(0,113,227,.3);
    }
    .btn-book:hover { background: var(--blue-h); transform: scale(0.98); }

    .pills { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
    .pill {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 500; color: var(--ink3);
      background: var(--surface); border: .5px solid var(--border2);
      border-radius: 980px; padding: 6px 16px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-navy  { background: #3a7bd5; }
    .dot-sage  { background: #30a862; }
    .dot-rust  { background: #e05c2a; }
    .dot-amber { background: var(--amber); }
    .dot-green { background: var(--green); }
    .dot-red   { background: var(--red); }

    .grid-card {
      background: var(--surface); border-radius: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,.06);
      overflow: hidden;
      border: .5px solid var(--border);
      width: 100%;
      position: relative;
    }
    .grid-scroll {
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      position: relative;
      width: 100%;
    }

    #tableDesktop {
      display: table;
      border-collapse: collapse;
      table-layout: fixed;
      width: 100%;
      min-width: 1100px;
      font-size: 14px;
    }
    #tableDesktop thead th {
      height: var(--cell-h);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .2px;
      color: var(--ink4);
      border-bottom: 1px solid var(--border2);
      border-right: .5px solid var(--border);
      text-align: center;
      vertical-align: middle;
      background: var(--surface2);
      position: sticky;
      top: 0;
      z-index: 3;
    }
    #tableDesktop thead th:last-child { border-right: none; }
    #tableDesktop thead th.corner {
      width: var(--lane-w);
      min-width: var(--lane-w);
      background: var(--surface2);
      font-size: 13px;
      font-weight: 600;
      color: var(--ink2);
      border-right: 1px solid var(--border2);
      position: sticky;
      left: 0;
      z-index: 5;
    }
    #tableDesktop tbody tr { height: var(--cell-h); }
    #tableDesktop tbody td.lane-hdr {
      width: var(--lane-w);
      min-width: var(--lane-w);
      font-size: 17px;
      font-weight: 700;
      border-bottom: .5px solid var(--border2);
      border-right: 1px solid var(--border2);
      text-align: center;
      vertical-align: middle;
      background: var(--surface2);
      position: sticky;
      left: 0;
      z-index: 2;
    }
    .lane-hdr.grp-navy { color: #1d4f9f; background: #eef3fc !important; }
    .lane-hdr.grp-sage { color: #1a6640; background: #edf7f0 !important; }
    .lane-hdr.grp-rust { color: #a83418; background: #fdf0ea !important; }
    #tableDesktop tbody td.slot {
      cursor: pointer;
      border-bottom: .5px solid var(--border);
      border-right: .5px solid var(--border);
      vertical-align: middle;
      text-align: center;
      transition: background 0.05s;
    }
    #tableDesktop tbody td.slot.shade { background: rgba(0,0,0,.02); }
    #tableDesktop tbody tr.row-navy td.slot { background: #f8fafd; }
    #tableDesktop tbody tr.row-sage td.slot { background: #f6fcf8; }
    #tableDesktop tbody tr.row-rust td.slot { background: #fef8f4; }
    #tableDesktop tbody td.slot:hover { background: #fff8ec !important; }
    #tableDesktop tbody td.slot.selected {
      background: #fff3c4 !important;
      border-top: 2px solid var(--amber);
      border-bottom: 2px solid var(--amber);
    }
    #tableDesktop tbody td.slot.sel-left  { border-left: 2px solid var(--amber); border-radius: 6px 0 0 6px; }
    #tableDesktop tbody td.slot.sel-right { border-right: 2px solid var(--amber) !important; border-radius: 0 6px 6px 0; }

    #tableMobile {
      display: none;
      border-collapse: collapse;
      width: 100%;
    }
    @media (max-width: 800px) {
      #tableDesktop { display: none; }
      #tableMobile { display: table; }
      :root { --cell-h: 48px; --cell-w: 52px; --lane-w: 80px; }
      .page { padding: 16px 12px 70px; gap: 16px; }
      .ctrl { flex-direction: column; align-items: stretch; }
      .btn-book { width: 100%; justify-content: center; }
    }
    #tableMobile thead th, #tableMobile td { border: .5px solid var(--border2); text-align: center; }

    #slidersLayer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .slider {
      position: absolute;
      border-radius: 12px;
      pointer-events: auto;
      cursor: pointer;
      padding: 6px 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
      transition: all 0.1s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      background-clip: padding-box;
    }
    .slider:hover { opacity: 0.92; transform: scale(1.01); z-index: 20; }
    .slider.pending   { background: rgba(255,159,10,0.25); border: 1px solid rgba(255,159,10,0.8); }
    .slider.confirmed { background: rgba(52,199,89,0.25); border: 1px solid rgba(52,199,89,0.8); }
    .slider.rejected  { background: rgba(255,59,48,0.25); border: 1px solid rgba(255,59,48,0.8); }
    .slider.local {
      background: rgba(255,159,10,0.4);
      border: 1.5px solid var(--amber);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.6);
    }
    .sl-name { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sl-time { font-size: 9px; opacity: 0.8; white-space: nowrap; }
    .pending  .sl-name, .pending  .sl-time { color: #7d4a00; }
    .confirmed .sl-name, .confirmed .sl-time { color: #1a5e2a; }
    .rejected  .sl-name, .rejected  .sl-time { color: #8c1a14; }
    .local .sl-name, .local .sl-time { color: #b45f06; font-weight: 600; }

    .resize-handle-left, .resize-handle-right {
      position: absolute;
      top: 0;
      width: 14px;
      height: 100%;
      cursor: ew-resize;
      background: rgba(0,0,0,0.08);
      z-index: 15;
      pointer-events: auto;
      border-radius: 12px;
      transition: background 0.1s;
    }
    .resize-handle-left:hover, .resize-handle-right:hover { background: rgba(0,0,0,0.25); }
    .resize-handle-left { left: 0; border-radius: 12px 0 0 12px; }
    .resize-handle-right { right: 0; border-radius: 0 12px 12px 0; }

    .bcard {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: .5px solid var(--border2);
      border-radius: 20px; padding: 12px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .bcard-title { font-size: 15px; font-weight: 700; }
    .bcard-sub { font-size: 13px; color: var(--ink3); margin-top: 4px; }
    .bcard-rm {
      width: 30px; height: 30px; border-radius: 30px;
      background: var(--surface2); border: .5px solid var(--border2);
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #cardsContainer { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
      z-index: 2000; justify-content: center; align-items: flex-end;
    }
    .overlay.open { display: flex; }
    @media(min-width: 560px) { .overlay { align-items: center; padding: 24px; } .sheet { border-radius: 32px !important; max-width: 480px; } }
    .sheet {
      background: var(--surface); border-radius: 28px 28px 0 0;
      width: 100%; box-shadow: 0 -4px 30px rgba(0,0,0,.2);
    }
    .sheet-head { padding: 20px 24px 8px; display: flex; justify-content: space-between; align-items: center; }
    .sheet-title { font-size: 24px; font-weight: 700; }
    .sheet-x { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); border: .5px solid var(--border2); font-size: 20px; cursor: pointer; }
    .sheet-body { padding: 12px 24px 28px; }
    .f-group { margin-bottom: 20px; }
    .f-label { font-size: 13px; font-weight: 600; color: var(--ink3); margin-bottom: 6px; display: block; }
    .f-input {
      width: 100%; background: var(--surface2); border: .5px solid var(--border2);
      border-radius: 14px; font-size: 16px; padding: 14px 16px;
    }
    .f-actions { display: flex; gap: 12px; margin-top: 24px; }
    .f-btn-ok {
      flex:1; height: 52px; background: var(--blue); color: white; border: none;
      border-radius: 980px; font-weight: 600; cursor: pointer;
    }
    .f-btn-cancel { height: 52px; padding: 0 24px; background: var(--surface2); border: .5px solid var(--border2); border-radius: 980px; cursor: pointer; }
    .info-list { border-radius: 18px; border: .5px solid var(--border2); margin-bottom: 24px; overflow: hidden; }
    .info-row { display: flex; justify-content: space-between; padding: 14px 18px; border-bottom: .5px solid var(--border); background: var(--surface2); }
    .confirm-btns { display: flex; gap: 12px; margin: 12px 0 16px; }
    .cb-yes, .cb-no { flex:1; height: 48px; border-radius: 980px; font-weight: 600; border: none; cursor: pointer; }
    .cb-yes { background: rgba(52,199,89,.15); color: #1a6630; }
    .cb-no  { background: rgba(255,59,48,.1); color: #a81a10; }
    .del-btn { width:100%; height: 48px; background: transparent; border: .5px solid var(--border2); border-radius: 980px; margin-top: 12px; cursor: pointer; }
    #imgPopup {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(14px);
      z-index:3000; justify-content:center; align-items:center;
    }
    #imgPopup.open { display:flex; }
    .img-wrap { background:white; border-radius: 32px; padding: 8px; max-width: 92vw; max-height: 88vh; position: relative; }
    .img-wrap img { max-width: 100%; max-height: 84vh; border-radius: 24px; }
    .img-x { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; border-radius: 36px; background: rgba(0,0,0,0.6); color: white; border: none; cursor: pointer; }
    #loader { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index:5000; align-items:center; justify-content:center; }
    .loader-box { background: white; border-radius: 32px; padding: 28px 40px; }
    .spin { width: 38px; height: 38px; border: 3px solid #ddd; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="login">
  <div class="login-glyph">🎱</div>
  <div class="login-title">Бильярд Клуб</div>
  <div class="login-sub">Бронирование столов</div>
  <div class="login-sep"></div>
  <div id="g_id_onload"
    data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com"
    data-callback="handleCredentialResponse"
    data-auto_prompt="false"></div>
  <div class="g_id_signin" data-type="standard"></div>
</div>

<div id="content">
  <nav class="nav"><span class="nav-title">🎱 LUCKY STRIKE · БРОНЬ</span><button class="nav-btn" onclick="openImg()">📐 Схема зала</button></nav>
  <div class="page">
    <div class="ctrl">
      <div class="date-field"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><input type="date" id="dateInput"/></div>
      <button class="btn-book" onclick="openBookModal()">➕ Новая бронь</button>
    </div>
    <div class="pills"><div class="pill"><div class="dot dot-navy"></div>Столы 1–3</div><div class="pill"><div class="dot dot-sage"></div>Столы 4–6</div><div class="pill"><div class="dot dot-rust"></div>Столы 7–12</div><div class="pill"><div class="dot dot-amber"></div>Ожидает</div><div class="pill"><div class="dot dot-green"></div>Подтверждено</div><div class="pill"><div class="dot dot-red"></div>Отменено</div></div>

    <div class="grid-card">
      <div class="grid-scroll" id="gridScroll">
        <table id="tableDesktop"><thead id="dtHead"><tr><th class="corner">СТОЛ</th></tr></thead><tbody id="dtBody"></tbody></table>
        <table id="tableMobile"><thead id="mtHeadRow"></thead><tbody id="mtBody"></tbody></table>
        <div id="slidersLayer"></div>
      </div>
    </div>
    <div id="cardsContainer"></div>
  </div>
</div>

<div id="bookModal" class="overlay"><div class="sheet"><div class="sheet-head"><div class="sheet-title">Новая бронь</div><button class="sheet-x" onclick="closeBookModal()">×</button></div><div class="sheet-body"><div class="f-group"><label class="f-label">Имя</label><input class="f-input" id="nameInput"/></div><div class="f-group"><label class="f-label">Телефон</label><input class="f-input" id="phoneInput"/></div><div class="f-group"><label class="f-label">Комментарий</label><textarea class="f-input" id="commentInput" rows="2"></textarea></div><div class="f-actions"><button class="f-btn-ok" onclick="submitForm()">Подтвердить</button><button class="f-btn-cancel" onclick="closeBookModal()">Отмена</button></div></div></div></div>

<div id="infoModal" class="overlay"><div class="sheet"><div class="sheet-head"><div class="sheet-title">Детали</div><button class="sheet-x" onclick="closeInfoModal()">×</button></div><div class="sheet-body"><div class="info-list"><div class="info-row"><span>Стол</span><span id="i-table"></span></div><div class="info-row"><span>Время</span><span id="i-time"></span></div><div class="info-row"><span>Имя</span><span id="i-name"></span></div><div class="info-row"><span>Телефон</span><span id="i-phone"></span></div><div class="info-row"><span>Статус</span><span id="i-status"></span></div></div><div class="confirm-btns"><button class="cb-yes" onclick="confirmBooking(true)">✅ Состоялось</button><button class="cb-no" onclick="confirmBooking(false)">❌ Не пришли</button></div><button class="del-btn" onclick="deleteBooking()">🗑 Удалить</button></div></div></div></div>

<div id="imgPopup"><div class="img-wrap"><button class="img-x" onclick="closeImg()">×</button><img src="https://i.postimg.cc/52ZDKDDw/55.png" alt="Схема"/></div></div>
<div id="loader"><div class="loader-box"><div class="spin"></div><div>Загрузка...</div></div></div>

<script>
  const GAS = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
  const ALLOWED = ["vadiksss900@gmail.com","sergey99belov@gmail.com","popadinecvasil3@gmail.com","veronicadiakova04@gmail.com","info.luckystrike.kh@gmail.com","sashavolobuev123890@gmail.com","egorgorbushko@gmail.com","shatrava.o@gmail.com","Craftmax30@gmail.com","bowlingblock.b@gmail.com","lana.arnaut@gmail.com","polosinnikita1224@gmail.com","sofialat1506@gmail.com","ll3991940@gmail.com","ken040888@gmail.com"];
  const LANES = 12, SH = 11, EH = 22;
  const slots = []; for(let h=SH; h<=EH; h++) { slots.push({ label: `${h}:00`, key: h }); if(h<EH) slots.push({ label: `${h}:30`, key: h+0.5 }); }
  const LANE_GROUPS = [0,0,0,1,1,1,2,2,2,2,2,2];
  const GRP_CLASS = ['grp-navy','grp-sage','grp-rust'];
  const ROW_CLASS = ['row-navy','row-sage','row-rust'];

  let localBookings = [];
  let savedBookings = [];
  let nextTempId = 1;
  let dragState = { active: false, lane: null, startIdx: null, currentIdx: null };
  let curInfoBooking = null;

  const $ = id => document.getElementById(id);
  const qs = (s, p=document) => p.querySelector(s);
  const qsa = (s, p=document) => Array.from(p.querySelectorAll(s));
  function parseJwt(t){ return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
  function handleCredentialResponse(r){ let d=parseJwt(r.credential); if(ALLOWED.includes(d.email)){ localStorage.setItem("ue",d.email); location.reload(); } else alert("Доступ запрещён"); }
  window.onload = ()=>{ if(localStorage.getItem("ue") && ALLOWED.includes(localStorage.getItem("ue"))){ $("login").style.display="none"; $("content").style.display="block"; init(); } };

  function init(){
    let today = new Date().toISOString().split('T')[0];
    $("dateInput").min = today; $("dateInput").value = today;
    buildDesktopTable(); buildMobileTable();
    $("dateInput").addEventListener("change", ()=>{ localBookings = []; loadSavedBookings(); renderAllSliders(); });
    $("tableDesktop").addEventListener("mousedown", onDragStart);
    document.body.addEventListener("mousemove", onDragMove);
    document.body.addEventListener("mouseup", onDragEnd);
    loadSavedBookings();
  }

  function buildDesktopTable(){
    let headRow = qs("tr", $("dtHead"));
    slots.forEach((sl,i)=>{ let th=document.createElement("th"); th.className="th-time"; th.dataset.si=i; th.dataset.key=sl.key; th.textContent=sl.label; headRow.appendChild(th); });
    let body=$("dtBody");
    for(let lane=0; lane<LANES; lane++){
      let tr=document.createElement("tr"); tr.className=ROW_CLASS[LANE_GROUPS[lane]]; tr.dataset.lane=lane;
      let lhdr=document.createElement("td"); lhdr.className=`lane-hdr ${GRP_CLASS[LANE_GROUPS[lane]]}`; lhdr.textContent=`№ ${lane+1}`; tr.appendChild(lhdr);
      slots.forEach((sl,si)=>{ let td=document.createElement("td"); td.className="slot"+(si%2===1?" shade":""); td.dataset.lane=lane; td.dataset.time=sl.key; td.dataset.si=si; tr.appendChild(td); });
      body.appendChild(tr);
    }
  }
  function buildMobileTable(){ let mtHead=$("mtHeadRow"); for(let i=0;i<LANES;i++){ let th=document.createElement("th"); th.textContent=i+1; mtHead.appendChild(th); } }

  function onDragStart(e){
    let td = e.target.closest('.slot');
    if(!td) return;
    let lane = parseInt(td.dataset.lane);
    let si = parseInt(td.dataset.si);
    dragState.active = true;
    dragState.lane = lane;
    dragState.startIdx = si;
    dragState.currentIdx = si;
    clearHighlightSelection();
    updateDragHighlight(lane, dragState.startIdx, dragState.currentIdx);
  }
  function onDragMove(e){
    if(!dragState.active) return;
    let target = e.target.closest('.slot');
    if(!target || parseInt(target.dataset.lane) !== dragState.lane) return;
    let newIdx = parseInt(target.dataset.si);
    if(newIdx !== dragState.currentIdx){
      dragState.currentIdx = newIdx;
      updateDragHighlight(dragState.lane, dragState.startIdx, dragState.currentIdx);
    }
  }
  function onDragEnd(e){
    if(!dragState.active) { dragState.active=false; return; }
    if(dragState.startIdx !== null && dragState.currentIdx !== null && dragState.startIdx !== dragState.currentIdx){
      let s = Math.min(dragState.startIdx, dragState.currentIdx);
      let eIdx = Math.max(dragState.startIdx, dragState.currentIdx);
      let startTime = slots[s].key;
      let endTime = slots[eIdx].key;
      localBookings.push({ lane: dragState.lane, start: startTime, end: endTime, tempId: nextTempId++ });
      renderAllSliders();
    }
    dragState.active = false; dragState.lane = null; dragState.startIdx = null; dragState.currentIdx = null;
    clearHighlightSelection();
  }
  function updateDragHighlight(lane, si1, si2){
    clearHighlightSelection();
    let min = Math.min(si1, si2), max = Math.max(si1, si2);
    let cells = qsa(`#tableDesktop td.slot[data-lane="${lane}"]`);
    cells.forEach((cell, idx)=>{
      if(idx >= min && idx <= max) cell.classList.add("selected");
      if(idx === min) cell.classList.add("sel-left");
      if(idx === max) cell.classList.add("sel-right");
    });
  }
  function clearHighlightSelection(){
    qsa("#tableDesktop td.slot.selected, #tableDesktop td.slot.sel-left, #tableDesktop td.slot.sel-right").forEach(c=>c.classList.remove("selected","sel-left","sel-right"));
  }

  async function loadSavedBookings(){
    showLoad();
    try{
      let res = await fetch(GAS+"?action=get&date="+$("dateInput").value);
      let data = await res.json();
      savedBookings = data.bookings || [];
      renderAllSliders();
    }catch(e){ console.warn(e); } finally{ hideLoad(); }
  }

  function renderAllSliders(){
    $("slidersLayer").innerHTML = "";
    if(!isDesktop()) return;
    let rows = Array.from($("dtBody").querySelectorAll("tr"));
    let colByKey = {};
    slots.forEach((sl,i)=>{ colByKey[sl.key]=i+1; });
    
    savedBookings.forEach(b=>{
      if(b.date !== $("dateInput").value) return;
      let laneIdx = b.table-1;
      let start = +b.start, end = +b.end;
      let si = colByKey[start], ei = colByKey[end];
      if(si==null || ei==null) return;
      let row = rows[laneIdx];
      if(!row) return;
      let sc = row.cells[si], ec = row.cells[ei];
      if(!sc||!ec) return;
      let left = sc.offsetLeft+1, top = row.offsetTop+1;
      let width = (ec.offsetLeft+ec.offsetWidth)-sc.offsetLeft-2, height = row.offsetHeight-2;
      let slider = createBookingSlider(b, start, end, laneIdx, false);
      slider.style.cssText = `left:${left}px;top:${top}px;width:${width}px;height:${height}px;position:absolute;`;
      $("slidersLayer").appendChild(slider);
    });
    
    localBookings.forEach(lb=>{
      let laneIdx = lb.lane;
      let start = lb.start, end = lb.end;
      let si = colByKey[start], ei = colByKey[end];
      if(si==null || ei==null) return;
      let row = rows[laneIdx];
      if(!row) return;
      let sc = row.cells[si], ec = row.cells[ei];
      if(!sc||!ec) return;
      let left = sc.offsetLeft+1, top = row.offsetTop+1;
      let width = (ec.offsetLeft+ec.offsetWidth)-sc.offsetLeft-2, height = row.offsetHeight-2;
      let fakeBooking = { id: `local_${lb.tempId}`, name: "Новая бронь", phone: "", comment: "", confirmed: null, start, end, table: laneIdx+1 };
      let slider = createBookingSlider(fakeBooking, start, end, laneIdx, true, lb);
      slider.style.cssText = `left:${left}px;top:${top}px;width:${width}px;height:${height}px;position:absolute;`;
      $("slidersLayer").appendChild(slider);
    });
    updateCardsList();
  }

  function getSlotIndexByTime(timeValue){
    for(let i=0; i<slots.length; i++) if(slots[i].key === timeValue) return i;
    return -1;
  }

  function createBookingSlider(booking, start, end, laneIdx, isLocal, localRef = null){
    let div = document.createElement("div");
    let statusClass = "pending";
    if(!isLocal){
      if(booking.confirmed==="Да") statusClass = "confirmed";
      else if(booking.confirmed==="Нет") statusClass = "rejected";
      else statusClass = "pending";
    } else {
      statusClass = "local";
    }
    div.className = `slider ${statusClass}`;
    let nameDiv = document.createElement("div"); nameDiv.className="sl-name"; nameDiv.textContent = isLocal ? "✏️ Новая" : (booking.name||"—");
    let timeDiv = document.createElement("div"); timeDiv.className="sl-time"; timeDiv.textContent=`${fmt(start)} – ${fmt(end)}`;
    div.append(nameDiv, timeDiv);
    div.addEventListener("click", (e)=>{
      e.stopPropagation();
      if(isLocal && localRef){
        if(confirm("Удалить этот интервал?")){
          localBookings = localBookings.filter(l=> l !== localRef);
          renderAllSliders();
        }
      } else if(!isLocal){
        curInfoBooking = booking;
        showInfoModal(booking);
      }
    });
    
    if(isLocal && localRef){
      let leftHandle = document.createElement("div"); leftHandle.className="resize-handle-left";
      let rightHandle = document.createElement("div"); rightHandle.className="resize-handle-right";
      div.appendChild(leftHandle); div.appendChild(rightHandle);
      
      let resizeActive = false, resizeEdge = null;
      const startResize = (edge, e) => {
        e.stopPropagation();
        resizeActive = true;
        resizeEdge = edge;
        document.body.style.cursor = 'ew-resize';
        
        const onMouseMove = (moveEvent) => {
          if(!resizeActive) return;
          const targetSlot = moveEvent.target.closest('.slot');
          if(!targetSlot) return;
          const targetLane = parseInt(targetSlot.dataset.lane);
          if(targetLane !== laneIdx) return;
          const newSlotIdx = parseInt(targetSlot.dataset.si);
          if(isNaN(newSlotIdx)) return;
          const newTimeValue = slots[newSlotIdx].key;
          
          let currentStart = localRef.start;
          let currentEnd = localRef.end;
          let startIdx = getSlotIndexByTime(currentStart);
          let endIdx = getSlotIndexByTime(currentEnd);
          if(startIdx === -1 || endIdx === -1) return;
          
          let newStart = currentStart, newEnd = currentEnd;
          if(edge === 'left'){
            if(newTimeValue < currentEnd && getSlotIndexByTime(newTimeValue) < endIdx){
              newStart = newTimeValue;
            } else return;
          } else {
            if(newTimeValue > currentStart && getSlotIndexByTime(newTimeValue) > startIdx){
              newEnd = newTimeValue;
            } else return;
          }
          if(newStart !== currentStart || newEnd !== currentEnd){
            localRef.start = newStart;
            localRef.end = newEnd;
            renderAllSliders();
          }
        };
        
        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          document.body.style.cursor = '';
          resizeActive = false;
        };
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      };
      leftHandle.addEventListener('mousedown', (e) => startResize('left', e));
      rightHandle.addEventListener('mousedown', (e) => startResize('right', e));
    }
    return div;
  }

  function updateCardsList(){
    $("cardsContainer").innerHTML = "";
    let dd = $("dateInput").value.split("-").reverse().join(".");
    localBookings.forEach((lb, idx)=>{
      let div = document.createElement("div"); div.className="bcard";
      div.innerHTML = `<div><div class="bcard-title">Стол №${lb.lane+1}</div><div class="bcard-sub">${dd} · ${fmt(lb.start)} – ${fmt(lb.end)}</div></div>`;
      let rm = document.createElement("button"); rm.className="bcard-rm"; rm.innerHTML="✕";
      rm.onclick = ()=>{ localBookings.splice(idx,1); renderAllSliders(); };
      div.appendChild(rm); $("cardsContainer").appendChild(div);
    });
  }

  function fmt(v){ return `${Math.floor(v)}:${v%1===0.5?'30':'00'}`; }
  function isDesktop(){ return window.innerWidth > 800; }

  function openBookModal(){ if(localBookings.length===0) return alert("Выделите интервалы на сетке (протяните мышкой)"); $("bookModal").classList.add("open"); }
  function closeBookModal(){ $("bookModal").classList.remove("open"); }
  async function submitForm(){
    let name=$("nameInput").value.trim(), phone=$("phoneInput").value.trim(), comment=$("commentInput").value.trim(), date=$("dateInput").value;
    if(!name||!phone) return alert("Введите имя и телефон");
    let bookingsToSend = localBookings.map(lb=>({ date, tableNumber: lb.lane+1, start: lb.start, end: lb.end, name, phone, comment }));
    if(bookingsToSend.length===0) return;
    showLoad();
    try{
      await Promise.all(bookingsToSend.map(b=>fetch(GAS,{method:"POST",mode:"no-cors",body:JSON.stringify({bookings:[b]})})));
      closeBookModal(); $("nameInput").value=$("phoneInput").value=$("commentInput").value="";
      localBookings = [];
      await loadSavedBookings();
    } catch(e){ alert("Ошибка"); } finally{ hideLoad(); }
  }
  function showInfoModal(b){
    $("i-table").textContent="№ "+b.table;
    $("i-time").textContent=`${fmt(+b.start)} – ${fmt(+b.end)}`;
    $("i-name").textContent=b.name;
    $("i-phone").textContent=b.phone;
    let s=$("i-status");
    if(b.confirmed==="Да") s.innerHTML='<span style="background:#e0f7e8; padding:4px 12px; border-radius:40px;">✓ Подтверждено</span>';
    else if(b.confirmed==="Нет") s.innerHTML='<span style="background:#ffe5e2; padding:4px 12px; border-radius:40px;">✕ Не состоялось</span>';
    else s.innerHTML='<span style="background:#fff1df; padding:4px 12px; border-radius:40px;">⏳ Ожидает</span>';
    $("infoModal").classList.add("open");
  }
  function closeInfoModal(){ $("infoModal").classList.remove("open"); curInfoBooking=null; }
  async function confirmBooking(yes){ if(!curInfoBooking) return; showLoad(); try{ await fetch(GAS,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"confirm",id:curInfoBooking.id,confirmed:yes})}); closeInfoModal(); await loadSavedBookings(); } catch(e){} finally{ hideLoad(); } }
  async function deleteBooking(){ if(!curInfoBooking||!confirm("Удалить бронь?"))return; showLoad(); try{ await fetch(GAS,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"delete",id:curInfoBooking.id})}); closeInfoModal(); await loadSavedBookings(); } catch(e){} finally{ hideLoad(); } }
  function showLoad(){ $("loader").style.display="flex"; } function hideLoad(){ $("loader").style.display="none"; }
  function openImg(){ $("imgPopup").classList.add("open"); } function closeImg(){ $("imgPopup").classList.remove("open"); }
  ["bookModal","infoModal"].forEach(id=>{ $(id).addEventListener("click",e=>{ if(e.target===$(id)) $(id).classList.remove("open"); }); });
  $("imgPopup").addEventListener("click",e=>{ if(e.target===$("imgPopup")) closeImg(); });
  let lastDesktop=true; window.addEventListener("resize",()=>{ if(isDesktop()!==lastDesktop){ lastDesktop=isDesktop(); renderAllSliders(); } });
</script>
</body>
</html>
