<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Lucky Strike · Бильярд Бронирование</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
    input,textarea,.sel-text{user-select:text;-webkit-user-select:text;}

    :root{
      --bg:#f2f2f2;
      --surface:#ffffff;
      --surface2:#f8f8f8;
      --border:#e5e5e5;
      --border2:#cccccc;
      --label:#1e1e1e;
      --label2:#4a4a4a;
      --label3:#7c7c7c;
      --label4:#9a9a9a;
      --blue:#3b6e8f;
      --blue-h:#2c5a77;
      --blue-dim:rgba(59,110,143,0.12);
      --green:#4f6b4e;
      --red:#b33f3f;
      --amber:#b87c2e;
      /* lane group colors */
      --g-blue:#2c5f7a;
      --g-green:#4f6b4e;
      --g-red:#9b4b4b;
      /* cell backgrounds */
      --cb-blue:rgba(167,199,231,0.55);
      --cb-green:rgba(167,220,150,0.55);
      --cb-red:rgba(248,173,157,0.55);
      /* table dims */
      --cell-h:52px;
      --cell-w:52px;
      --time-w:52px;
      --safe-b:env(safe-area-inset-bottom,0px);
      --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",system-ui,sans-serif;
    }

    body{font-family:var(--font);background:var(--bg);color:var(--label);min-height:100vh;-webkit-font-smoothing:antialiased;font-weight:450;}

    /* ═══════════════ LOGIN ═══════════════ */
    #login{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;z-index:9999;padding:32px;}
    .login-glyph{font-size:50px;color:var(--label2);}
    .login-title{font-size:32px;font-weight:700;letter-spacing:-0.6px;color:var(--label);}
    .login-sub{font-size:15px;color:var(--label3);}
    .login-sep{width:32px;height:2px;background:var(--border2);border-radius:2px;}
    #content{display:none;}

    /* ═══════════════ LOADER ═══════════════ */
    #loader{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.28);backdrop-filter:blur(18px);z-index:5000;align-items:center;justify-content:center;}
    .loader-box{background:rgba(255,255,255,0.96);border-radius:14px;padding:30px 48px;text-align:center;}
    .spin{width:42px;height:42px;border:3px solid #e5e5e5;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ═══════════════ DESKTOP NAV ═══════════════ */
    .d-nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.88);backdrop-filter:blur(28px) saturate(180%);border-bottom:.5px solid var(--border);height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 36px;}
    .d-nav-title{font-size:22px;font-weight:600;letter-spacing:-.4px;color:var(--label);display:flex;align-items:center;gap:8px;}
    .d-nav-right{display:flex;gap:12px;align-items:center;}
    .user-bar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.88);backdrop-filter:blur(20px);padding:5px 14px 5px 10px;border-radius:8px;border:.5px solid var(--border);}
    .user-pic{width:30px;height:30px;border-radius:6px;object-fit:cover;}
    .user-email{font-size:13px;font-weight:500;color:var(--label);}
    .user-role{font-size:11px;color:var(--label3);background:var(--surface2);padding:2px 8px;border-radius:6px;margin-left:4px;}
    .logout-btn{background:none;border:none;padding:6px 10px;cursor:pointer;color:var(--label3);font-size:13px;border-radius:7px;}
    .logout-btn:hover{background:rgba(0,0,0,.05);color:var(--red);}
    .d-nav-btn{background:rgba(255,255,255,.92);border:.5px solid var(--border2);border-radius:8px;padding:7px 22px;font-size:14px;font-weight:510;color:var(--blue);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;}
    .d-nav-btn:hover{background:var(--blue-dim);}

    /* ═══════════════ DESKTOP PAGE ═══════════════ */
    .d-page{padding:28px 36px 80px;display:flex;flex-direction:column;gap:28px;}
    .d-ctrl{display:flex;gap:16px;align-items:center;flex-wrap:wrap;background:var(--surface);border-radius:10px;padding:16px 24px;border:.5px solid var(--border);}
    .d-cal-btn{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:0 18px 0 14px;height:52px;cursor:pointer;font-family:var(--font);transition:all .2s;}
    .d-cal-btn:hover{background:#fff;border-color:var(--blue);}
    .d-cal-icon{color:var(--blue);font-size:16px;}
    .d-cal-text{font-size:15px;font-weight:560;color:var(--label);white-space:nowrap;}
    .d-cal-chev{opacity:.5;font-size:12px;margin-left:4px;}
    .d-btn-book{height:52px;padding:0 36px;background:var(--blue);color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;}
    .d-btn-book:hover{background:var(--blue-h);}
    .d-btn-drag{height:52px;padding:0 28px;background:var(--surface2);color:var(--label2);border:.5px solid var(--border2);border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;}
    .d-btn-drag.active{background:var(--blue);color:white;border-color:var(--blue);}
    .d-temp-cards{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto;}
    .d-temp-card{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.9);border:.5px solid var(--border);border-radius:8px;padding:6px 14px 6px 18px;font-size:13px;}
    .d-temp-card strong{font-size:13px;font-weight:600;margin-right:3px;}
    .d-temp-card .tc-time{font-family:monospace;font-size:11px;background:#efefef;padding:3px 10px;border-radius:5px;}
    .d-temp-card .tc-rm{width:26px;height:26px;border-radius:5px;background:#f2eaea;border:none;cursor:pointer;color:#b33f3f;font-size:13px;}
    .d-grid-card{background:var(--surface);border-radius:10px;overflow:hidden;border:.5px solid var(--border);}
    .d-grid-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;position:relative;}
    #dtable{display:table;border-collapse:collapse;table-layout:fixed;width:100%;min-width:1100px;font-size:14px;}
    #dtable thead th{height:var(--cell-h);font-size:12px;font-weight:600;color:var(--label3);border-bottom:.5px solid var(--border2);border-right:.5px solid var(--border);text-align:center;background:#fafafa;}
    #dtable thead th.d-corner{width:var(--time-w);position:sticky;left:0;z-index:5;font-size:14px;font-weight:700;color:var(--label);background:#efefef;}
    #dtable thead th.d-th-time{width:74px;cursor:pointer;}
    #dtable tbody tr{height:var(--cell-h);}
    #dtable tbody td.d-lane-hdr{width:var(--time-w);font-size:16px;font-weight:700;border-bottom:.5px solid var(--border2);border-right:.5px solid var(--border2);text-align:center;position:sticky;left:0;z-index:2;}
    .d-lane-hdr.lb{background:#2c5f7a;color:white;}
    .d-lane-hdr.lg{background:#4f6b4e;color:white;}
    .d-lane-hdr.lr{background:#9b4b4b;color:white;}
    #dtable tbody td.d-slot{background:#fff;border-bottom:.5px solid var(--border);border-right:.5px solid var(--border);transition:background .1s;}
    #dtable tbody tr:hover td.d-slot{background:#f6f6f6;}
    #dtable tbody td.d-slot.sp{background:#faf2e0!important;}
    #dtable tbody td.d-slot.sc{background:#e3efe2!important;}
    #dtable tbody td.d-slot.sr{background:#f2e0e0!important;}
    #dtable tbody td.d-slot.st{background:#dde9f0!important;border:1px solid var(--blue)!important;}
    #dtable tbody td.d-slot.sd{background:#e2dfcf!important;}
    #dsliders{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;}
    .d-slider{position:absolute;border-radius:6px;pointer-events:auto;cursor:default;padding:5px 10px 5px 32px;display:flex;flex-direction:column;justify-content:center;gap:3px;box-shadow:0 3px 10px rgba(0,0,0,.14);border:.5px solid rgba(255,255,255,.2);font-weight:510;font-family:var(--font);overflow:hidden;white-space:nowrap;transition:all .12s;}
    .d-slider[data-lt="blue"]{background:rgba(44,95,122,.92);color:white;}
    .d-slider[data-lt="green"]{background:rgba(79,107,78,.92);color:white;}
    .d-slider[data-lt="red"]{background:rgba(155,75,75,.92);color:white;}
    .d-slider.sc[data-lt="blue"]{background:#2c5f7a;}
    .d-slider.sc[data-lt="green"]{background:#4f6b4e;}
    .d-slider.sc[data-lt="red"]{background:#9b4b4b;}
    .d-slider.sr{opacity:.65;}
    .d-slider.st[data-lt="blue"]{background:rgba(44,95,122,.7);border:1px solid #c9b16b;}
    .d-slider.st[data-lt="green"]{background:rgba(79,107,78,.7);border:1px solid #c9b16b;}
    .d-slider.st[data-lt="red"]{background:rgba(155,75,75,.7);border:1px solid #c9b16b;}
    .d-slider.dragging{opacity:.3;}
    .d-ghost{position:absolute;border-radius:6px;pointer-events:none;padding:5px 10px 5px 32px;display:flex;flex-direction:column;justify-content:center;gap:3px;background:rgba(0,0,0,.42)!important;backdrop-filter:blur(10px);border:2px dashed rgba(255,215,0,.9)!important;z-index:999;font-weight:510;color:#fff;text-shadow:0 1px 1px black;transition:none;font-family:var(--font);overflow:hidden;white-space:nowrap;}
    .d-status-dot{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:11px;height:11px;border-radius:50%;box-shadow:0 0 0 1px rgba(255,255,255,.5);}
    .d-slider.sp .d-status-dot{background:#f5b042;}
    .d-slider.sc .d-status-dot{background:#3bc43b;}
    .d-slider.sr .d-status-dot{background:#e55a5a;}
    .d-slider.st .d-status-dot{background:#aaa;opacity:.6;}
    .d-ghost .d-status-dot{background:#ffc107;}
    .d-sl-name{font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;padding-right:6px;}
    .d-sl-time{font-size:9px;opacity:.82;padding-right:6px;}
    .d-drag-handle{position:absolute;inset:0;z-index:2;pointer-events:auto;}
    .d-slider.drag-enabled .d-drag-handle{cursor:grab;}
    .d-slider.drag-enabled .d-drag-handle:active{cursor:grabbing;}
    .d-slider:not(.drag-enabled) .d-drag-handle{cursor:pointer;}
    .d-drag-ind{position:fixed;bottom:24px;right:24px;background:#2c2c2ecc;backdrop-filter:blur(16px);color:white;padding:9px 22px;border-radius:8px;font-size:13px;z-index:1000;pointer-events:none;}

    /* ═══════════════ SHARED OVERLAYS ═══════════════ */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(18px);z-index:2000;justify-content:center;align-items:center;}
    .overlay.open{display:flex;}
    .sheet{background:rgba(255,255,255,.98);border-radius:14px;width:100%;max-width:520px;box-shadow:0 28px 52px rgba(0,0,0,.18);}
    .sh-head{padding:22px 26px 10px;display:flex;justify-content:space-between;align-items:center;}
    .sh-title{font-size:26px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:10px;}
    .sh-x{width:40px;height:40px;border-radius:8px;background:#f2f2f5;border:none;font-size:22px;cursor:pointer;}
    .sh-body{padding:14px 26px 30px;}
    .f-grp{margin-bottom:20px;}
    .f-lbl{font-size:12px;font-weight:600;color:var(--label3);margin-bottom:6px;display:block;}
    .f-inp{width:100%;background:var(--surface2);border:.5px solid var(--border2);border-radius:8px;font-size:15px;padding:12px 16px;font-family:var(--font);}
    .f-inp:focus{outline:none;border-color:var(--blue);}
    .f-row{display:flex;gap:14px;margin-top:24px;}
    .f-ok{flex:1;height:52px;background:var(--blue);color:white;border:none;border-radius:8px;font-weight:600;font-size:15px;cursor:pointer;}
    .f-cancel{flex:1;height:52px;background:#f2f2f5;border:none;border-radius:8px;font-weight:500;font-size:15px;cursor:pointer;}
    .i-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:.5px solid var(--border);font-size:15px;}
    .i-row:last-child{border:none;}
    .del-btn{width:100%;height:50px;background:#f2eaea;border:none;border-radius:8px;margin-top:24px;cursor:pointer;font-weight:700;color:var(--red);font-size:15px;}
    .cb-row{display:flex;gap:14px;margin:18px 0 6px;}
    .cb-yes,.cb-no{flex:1;height:50px;border-radius:8px;font-weight:700;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px;}
    .cb-yes{background:rgba(79,107,78,.12);color:#3c5a3b;}
    .cb-no{background:rgba(179,63,63,.1);color:#a33a3a;}

    /* ═══════════════ ADMIN ═══════════════ */
    .admin-panel{max-width:780px;width:92%;max-height:82vh;overflow-y:auto;}
    .adm-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);}
    .adm-title{font-size:22px;font-weight:700;}
    .adm-add{background:var(--green);color:white;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-weight:500;display:flex;align-items:center;gap:7px;}
    .u-table{width:100%;border-collapse:collapse;}
    .u-table th,.u-table td{padding:10px;text-align:left;border-bottom:1px solid var(--border);}
    .u-table th{background:var(--surface2);font-weight:600;color:var(--label2);}
    .u-edit,.u-del{padding:5px 10px;border:none;border-radius:5px;cursor:pointer;font-size:11px;}
    .u-edit{background:var(--blue-dim);color:var(--blue);}
    .u-del{background:rgba(179,63,63,.1);color:var(--red);}
    .u-form{display:flex;flex-direction:column;gap:14px;}
    .u-form input{width:100%;padding:11px;border:1px solid var(--border2);border-radius:8px;font-size:14px;font-family:var(--font);}
    .u-form-row{display:flex;gap:10px;margin-top:6px;}
    .u-form-row button{flex:1;padding:11px;border:none;border-radius:8px;cursor:pointer;font-weight:500;font-size:14px;}
    .u-save{background:var(--blue);color:white;}
    .u-cancel-btn{background:var(--surface2);color:var(--label2);}

    /* ═══════════════════════════════════════
       МОБИЛЬНАЯ ВЕРСИЯ — GRID-BASED
    ═══════════════════════════════════════ */
    @media (max-width: 767px) {
      /* Скрываем desktop */
      .d-nav{display:none!important;}
      .d-page{display:none!important;}

      /* Общие overlays остаются, но sheet на мобиле — bottom sheet */
      .overlay{align-items:flex-end;}
      .sheet{border-radius:18px 18px 0 0;max-width:100%;border-bottom-left-radius:0;border-bottom-right-radius:0;padding-bottom:var(--safe-b);}

      /* ── Мобильный хедер ── */
      .m-header{
        position:sticky;top:0;z-index:100;
        background:rgba(255,255,255,.92);backdrop-filter:blur(22px);
        border-bottom:.5px solid var(--border);
        height:56px;display:flex;align-items:center;justify-content:space-between;
        padding:0 14px;
      }
      .m-logo{font-size:16px;font-weight:700;letter-spacing:-.3px;color:var(--label);display:flex;align-items:center;gap:7px;}
      .m-hdr-right{display:flex;gap:8px;align-items:center;}
      .m-icon-btn{width:34px;height:34px;border-radius:9px;background:var(--surface2);border:.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--label2);}
      .m-user-pic{width:22px;height:22px;border-radius:5px;object-fit:cover;}

      /* ── Дата-чипы ── */
      .m-date-bar{
        display:flex;align-items:center;gap:6px;
        padding:10px 14px 8px;
        background:var(--surface);border-bottom:.5px solid var(--border);
        overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
      }
      .m-date-bar::-webkit-scrollbar{display:none;}
      .m-date-chip{
        display:flex;flex-direction:column;align-items:center;
        padding:6px 12px;border-radius:9px;cursor:pointer;flex-shrink:0;
        border:.5px solid transparent;min-width:46px;transition:all .14s;
      }
      .m-date-chip.active{background:var(--blue);border-color:var(--blue);}
      .m-date-chip.active .dc-day{color:white;font-weight:700;}
      .m-date-chip.active .dc-dow{color:rgba(255,255,255,.75);}
      .m-date-chip:not(.active){background:var(--surface2);}
      .dc-day{font-size:16px;font-weight:600;color:var(--label);line-height:1.2;}
      .dc-dow{font-size:10px;color:var(--label3);font-weight:500;margin-top:1px;}

      /* ── Подсказка выбора ── */
      .m-hint-bar{
        padding:8px 14px;background:#fffbeb;border-bottom:.5px solid #fde68a;
        font-size:12px;color:#92400e;display:none;align-items:center;gap:8px;
      }
      .m-hint-bar.visible{display:flex;}
      .m-hint-cancel{margin-left:auto;background:none;border:none;color:#92400e;cursor:pointer;font-size:12px;font-weight:600;}

      /* ── Выбранные интервалы-карточки (под таблицей) ── */
      .m-sel-bar{padding:6px 14px;display:none;flex-wrap:wrap;gap:6px;background:var(--surface);border-bottom:.5px solid var(--border);}
      .m-sel-bar.visible{display:flex;}
      .m-sel-chip{display:flex;align-items:center;gap:6px;background:var(--blue-dim);border:.5px solid rgba(59,110,143,.25);border-radius:7px;padding:5px 10px;font-size:12px;color:var(--blue);font-weight:600;}
      .m-sel-chip button{background:none;border:none;cursor:pointer;color:var(--red);font-size:14px;line-height:1;padding:0;}

      /* ── Кнопка "Забронировать" плавающая ── */
      .m-fab{
        position:fixed;bottom:calc(18px + var(--safe-b));right:16px;
        background:var(--blue);color:white;border:none;
        border-radius:15px;height:50px;padding:0 22px;
        font-size:15px;font-weight:700;cursor:pointer;
        box-shadow:0 4px 16px rgba(59,110,143,.45);
        display:flex;align-items:center;gap:8px;z-index:190;
        transition:all .2s;-webkit-tap-highlight-color:transparent;
      }
      .m-fab:active{transform:scale(.94);}
      .m-fab.hidden{display:none;}

      /* ── Основной скролл-враппер таблицы ── */
      .m-body{overflow-y:auto;-webkit-overflow-scrolling:touch;height:calc(100dvh - 56px - 60px);/* header+datebar */}

      /* ── Таблица-сетка ── */
      .m-grid-wrap{
        position:relative;
        overflow-x:auto;-webkit-overflow-scrolling:touch;
        background:var(--surface);
      }
      .m-grid-wrap::-webkit-scrollbar{height:3px;}
      .m-grid-wrap::-webkit-scrollbar-track{background:transparent;}
      .m-grid-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

      #mTable{
        border-collapse:collapse;
        table-layout:fixed;
        /* min-width computed by JS */
      }

      /* Заголовки столов */
      #mTable thead th.m-lane-hdr{
        height:var(--cell-h);
        width:var(--cell-w);
        font-size:12px;font-weight:700;
        border-bottom:.5px solid var(--border2);
        border-right:.5px solid var(--border);
        text-align:center;vertical-align:middle;
        white-space:nowrap;cursor:pointer;
        color:white;position:sticky;top:0;z-index:4;
      }
      #mTable thead th.m-lane-hdr.lb{background:var(--g-blue);}
      #mTable thead th.m-lane-hdr.lg{background:var(--g-green);}
      #mTable thead th.m-lane-hdr.lr{background:var(--g-red);}
      /* Подсветка выбранного столбца */
      #mTable thead th.m-lane-hdr.selected-col{filter:brightness(1.25);outline:3px solid #ef4444;outline-offset:-3px;}

      /* Угловая ячейка */
      #mTable thead th.m-corner{
        width:var(--time-w);
        background:#efefef;font-size:12px;font-weight:700;
        color:var(--label);position:sticky;left:0;top:0;z-index:6;
        border-bottom:.5px solid var(--border2);border-right:.5px solid var(--border2);
        text-align:center;vertical-align:middle;
      }

      /* Ячейки времени (левый столбец) */
      #mTable tbody td.m-time-cell{
        width:var(--time-w);
        background:#efefef;
        font-size:11px;font-weight:600;color:var(--label2);
        border-bottom:.5px solid var(--border);border-right:.5px solid var(--border2);
        text-align:center;vertical-align:middle;
        position:sticky;left:0;z-index:3;
        cursor:pointer;height:var(--cell-h);
        white-space:nowrap;
      }
      #mTable tbody td.m-time-cell:hover{background:#e5e5e5;}
      /* Правый столбец времени */
      #mTable tbody td.m-time-cell-r{
        width:var(--time-w);
        background:#efefef;
        font-size:11px;font-weight:600;color:var(--label2);
        border-bottom:.5px solid var(--border);border-left:.5px solid var(--border2);
        text-align:center;vertical-align:middle;
        cursor:pointer;height:var(--cell-h);
        white-space:nowrap;
      }
      #mTable tbody td.m-time-cell-r:hover{background:#e5e5e5;}

      /* Слоты */
      #mTable tbody td.m-slot{
        height:var(--cell-h);width:var(--cell-w);
        border-bottom:.5px solid var(--border);border-right:.5px solid var(--border);
        text-align:center;vertical-align:middle;
        cursor:pointer;transition:background .1s;
        position:relative;
      }
      /* Цвета групп */
      #mTable tbody td.m-slot.cb{background:var(--cb-blue);}
      #mTable tbody td.m-slot.cg{background:var(--cb-green);}
      #mTable tbody td.m-slot.cr{background:var(--cb-red);}
      /* Занятые */
      #mTable tbody td.m-slot.bk-p{background:#faf2e0!important;}
      #mTable tbody td.m-slot.bk-c{background:#e3efe2!important;}
      #mTable tbody td.m-slot.bk-r{background:#f2e0e0!important;}
      /* Выделение при выборе */
      #mTable tbody td.m-slot.sel{background:#ef4444!important;}
      #mTable tbody td.m-slot.sel-start{background:rgba(239,68,68,.3)!important;outline:2px solid #ef4444;outline-offset:-2px;}
      /* Вертикальные линии выбранного столбца */
      #mTable tbody td.m-slot.v-line::before,
      #mTable tbody td.m-slot.v-line::after{content:"";position:absolute;top:0;bottom:0;width:2px;background:#ef4444;z-index:5;}
      #mTable tbody td.m-slot.v-line::before{left:0;}
      #mTable tbody td.m-slot.v-line::after{right:0;}

      /* ── Ползунки на мобиле ── */
      #mSliders{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
      .m-slider{
        position:absolute;border-radius:5px;pointer-events:auto;cursor:pointer;
        padding:3px 6px 3px 18px;
        display:flex;flex-direction:column;justify-content:center;gap:2px;
        box-shadow:0 2px 8px rgba(0,0,0,.18);
        border:.5px solid rgba(255,255,255,.22);
        overflow:hidden;white-space:nowrap;
        font-family:var(--font);
      }
      .m-slider[data-lt="blue"]{background:rgba(44,95,122,.92);color:white;}
      .m-slider[data-lt="green"]{background:rgba(79,107,78,.92);color:white;}
      .m-slider[data-lt="red"]{background:rgba(155,75,75,.92);color:white;}

      .m-slider.sc[data-lt="red"]{background:#9b4b4b;}
      .m-slider.sr{opacity:.6;}
      .m-dot{position:absolute;left:5px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;box-shadow:0 0 0 1px rgba(255,255,255,.5);}

<script>
// ╔══════════════════════════════════════════════════════╗
// ║  CONFIG                                              ║
// ╚══════════════════════════════════════════════════════╝
const AUTH_SHEET_ID = '1zwi1CInK3NZ8YRAegRMAdjin6XPacVkAkFsjAiqVE0w';
const AUTH_SHEET    = '1';
const API_KEY       = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
const GAS_URL       = "https://script.google.com/macros/s/AKfycbyVH7brTDjP-ori4QFy_wAMkjPkqKYcd8WHtMYFlPH4Kl1wzAYSSWdN-C_CzBucuOhG/exec";

const LANES = 12, SH = 11, EH = 22;
const slots = [];
for (let h = SH; h <= EH; h++) {
  slots.push({ label: `${h}:00`, key: h });
  if (h < EH) slots.push({ label: `${h}:30`, key: h + 0.5 });
}

// Lane group: 0=blue,1=green,2=red
function laneGroup(l) { const n=l+1; if(n<=3)return 0; if(n===4)return 1; if(n<=6)return 0; return 2; }
const GRP_CLS  = ['lb','lg','lr'];
const GRP_LT   = ['blue','green','red'];
const CELL_BG  = ['cb','cg','cr'];

let bookings=[], tempBookings=[], nextTid=1, curBooking=null, dragModeOn=false;
let curDate = new Date().toISOString().split('T')[0];
const $ = id => document.getElementById(id);

// ╔══════════════════════════════════════════════════════╗
// ║  AUTH                                                ║
// ╚══════════════════════════════════════════════════════╝
let curUser = null;

function parseJwt(t){try{const b=t.split('.')[1];return JSON.parse(decodeURIComponent(atob(b.replace(/-/g,'+').replace(/_/g,'/')).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));}catch(e){return{};}}
function loadGAPI(){return new Promise((res,rej)=>{if(window.gapi&&gapi.client){res();return;}gapi.load('client',{callback:()=>res(),onerror:()=>rej(),timeout:8000,ontimeout:()=>rej()});});}
function cacheU(e,n,r,p){try{['Email','Name','Role','Pic'].forEach((k,i)=>localStorage.setItem('bls'+k,[e,n,r,p][i]));localStorage.setItem('blsIn','1');}catch(e){}}
function getCachedU(){try{if(localStorage.getItem('blsIn')==='1'){const e=localStorage.getItem('blsEmail');if(e)return{email:e.toLowerCase().trim(),name:localStorage.getItem('blsName'),role:localStorage.getItem('blsRole'),picture:localStorage.getItem('blsPic')};}}catch(e){}return null;}

async function checkEmail(email){
  try{
    await loadGAPI();
    await gapi.client.init({apiKey:API_KEY,discoveryDocs:['https://sheets.googleapis.com/$discovery/rest?version=v4']});
    const r=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId:AUTH_SHEET_ID,range:`${AUTH_SHEET}!A:C`});
    const rows=r.result.values||[];
    for(let i=1;i<rows.length;i++){
      if(rows[i][0]&&rows[i][0].toLowerCase().trim()===email)
        return{found:true,name:(rows[i][1]||email.split('@')[0]).trim(),role:(rows[i][2]||'').trim()};
    }
    return{found:false};
  }catch(e){return{found:false,error:true};}
}

async function handleCredentialResponse(resp){
  const pl=parseJwt(resp.credential), email=pl.email.toLowerCase().trim();
  showLoad();
  const check=await checkEmail(email);
  if(check.found){
    curUser={email,name:check.name||pl.name,role:check.role||'',picture:pl.picture};
    cacheU(email,curUser.name,curUser.role,curUser.picture);
    loginUser(curUser);
  }else{
    hideLoad();
    alert('Доступ запрещён: email не найден в списке');
  }
}

function loginUser(user){
  $('login').style.display='none';
  $('content').style.display='block';
  // Desktop user bar
  $('userInfo').style.display='flex';
  $('userPic').src=user.picture||'';
  $('userEmail').textContent=user.email;
  const rd=$('userRoleDisp');
  if(user.role){rd.textContent=user.role;rd.style.display='inline-block';}else rd.style.display='none';
  // Admin visibility
  const allow=['разработчик','управляющий'].includes((user.role||'').toLowerCase().trim());
  $('dAdminBtn').style.display=allow?'flex':'none';
  $('mAdminBtn').style.display=allow?'flex':'none';
  // Mobile user pic
  $('mUserPic').src=user.picture||'';
  $('mUserBtn').style.display='flex';
  hideLoad();
  initApp();
}

function signOut(){
  ['Email','Name','Role','Pic'].forEach(k=>localStorage.removeItem('bls'+k));
  localStorage.removeItem('blsIn');
  location.reload();
}

// ╔══════════════════════════════════════════════════════╗
// ║  ADMIN                                               ║
// ╚══════════════════════════════════════════════════════╝
async function openAdmin(){showLoad();$('adminModal').classList.add('open');await loadUsers();hideLoad();}
function closeAdmin(){$('adminModal').classList.remove('open');}
async function loadUsers(){
  try{
    const r=await fetch(`${GAS_URL}?action=getUsers&_=${Date.now()}`);
    const d=await r.json();
    if(!d.success)throw new Error(d.message);
    const c=$('adminUsersList');
    if(!d.users||!d.users.length){c.innerHTML='<div style="text-align:center;padding:40px;color:var(--label3)">Нет сотрудников</div>';return;}
    let h=`<table class="u-table"><thead><tr><th>Email</th><th>Имя</th><th>Должность</th><th></th></tr></thead><tbody>`;

function fmtKey(v){const h=Math.floor(v),m=v%1===0.5?'30':'00';return`${h}:${m}`;}
function slotLabel(si,ei){const s=slots[si];const e=slots[ei+1]||{label:fmtKey(slots[ei].key+0.5)};return`${s.label}–${e.label}`;}
function fmtDate(ds){
  if(!ds)return'—';const d=new Date(ds);
  const t=new Date();t.setHours(0,0,0,0);
  const tm=new Date(t);tm.setDate(tm.getDate()+1);
  if(d.getTime()===t.getTime())return'Сегодня';
  if(d.getTime()===tm.getTime())return'Завтра';
  const M=['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
  const D=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  return`${D[d.getDay()]}, ${d.getDate()} ${M[d.getMonth()]}`;
}
function hasConflict(lane,si,ei,exId=null){
  const st=slots[si].key, en=slots[ei+1]?.key||(slots[ei].key+0.5);
  return bookings.some(b=>{
    if(exId!==null&&b.id===exId)return false;
    if(b.lane!==lane)return false;
    return!(en<=b.start||st>=b.end);
  });
}
async function loadFromServer(){
  showLoad();
  try{
    const res=await fetch(`${GAS_URL}?action=get&date=${curDate}`);
    const data=await res.json();
    bookings=(data.bookings||[]).map(b=>{
      const sk=parseFloat(b.start),ek=parseFloat(b.end);
      const si=slots.findIndex(s=>s.key===sk);
      let ei=slots.findIndex(s=>s.key===ek)-1;
      if(ei<0)ei=slots.length-1;
      return{id:b.id,lane:b.table-1,start:sk,end:ek,startSlotIdx:si,endSlotIdx:ei,
             name:b.name,phone:b.phone,comment:b.comment,
             confirmed:b.confirmed==='Да'?true:(b.confirmed==='Нет'?false:null)};
    });
    renderDesktop();
    renderMobile();
  }catch(e){console.error(e);}
  hideLoad();
}
async function postBookings(arr){
  await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bookings:arr})});
}
async function postAction(obj){
  await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(obj)});
}

let dIsDragging=false, dDragStart=null, dDragInterval=null;

function buildDesktop(){
  const hr=$('dHeadRow');
  slots.forEach(sl=>{const th=document.createElement('th');th.className='d-th-time';th.textContent=sl.label;hr.appendChild(th);});

    slots.forEach((sl,si)=>{
      const td=document.createElement('td');td.className='d-slot';td.dataset.lane=lane;td.dataset.si=si;tr.appendChild(td);
    });

function getDCell(lane,si){return $('dBody')?.rows[lane]?.cells[si+1];}
function updateDCells(){
  for(const r of $('dBody').rows)for(let i=1;i<r.cells.length;i++)r.cells[i].classList.remove('sp','sc','sr','st');
  for(const b of bookings){
    for(let i=b.startSlotIdx;i<=b.endSlotIdx;i++){
      const c=getDCell(b.lane,i);if(c)c.classList.add(b.confirmed===true?'sc':(b.confirmed===false?'sr':'sp'));
    }
  }
  for(const t of dTempBookings){
    for(let i=t.startSlotIdx;i<=t.endSlotIdx;i++){const c=getDCell(t.lane,i);if(c)c.classList.add('st');}
  }
}
function renderDSliders(){
  const c=$('dsliders');c.innerHTML='';
  const rows=Array.from($('dBody')?.querySelectorAll('tr')||[]);
  if(!rows.length)return;
  [...bookings,...dTempBookings.map(t=>({...t,isTemp:true}))].forEach(item=>{
    const si=item.startSlotIdx,ei=item.endSlotIdx;
    const row=rows[item.lane];if(!row)return;
    const sc=row.cells[si+1],ec=row.cells[ei+1];if(!sc||!ec)return;
    const left=sc.offsetLeft+1,top=row.offsetTop+1,width=(ec.offsetLeft+ec.offsetWidth)-sc.offsetLeft-2,height=row.offsetHeight-2;
    const status=item.isTemp?'st':(item.confirmed===true?'sc':(item.confirmed===false?'sr':'sp'));
    const lt=GRP_LT[laneGroup(item.lane)];
    const sl=document.createElement('div');sl.className=`d-slider ${status}`;
    if(dDragMode)sl.classList.add('drag-enabled');
    sl.setAttribute('data-lt',lt);sl.style.cssText=`left:${left}px;top:${top}px;width:${width}px;height:${height}px;`;
    const dot=document.createElement('div');dot.className='d-status-dot';sl.appendChild(dot);
    const nd=document.createElement('div');nd.className='d-sl-name';nd.textContent=item.isTemp?'Ожидает':(item.name||'Бронь');
    const td=document.createElement('div');td.className='d-sl-time';td.textContent=slotLabel(si,ei);
    sl.append(nd,td);
    const dh=document.createElement('div');dh.className='d-drag-handle';
    if(dDragMode&&!item.isTemp)dh.addEventListener('mousedown',e=>{e.stopPropagation();dStartMove(item,e,rows);});
    else if(dDragMode&&item.isTemp)dh.addEventListener('mousedown',e=>{e.stopPropagation();dStartMoveTemp(item,e,rows);});
    else dh.addEventListener('click',e=>{e.stopPropagation();if(!item.isTemp&&item.id)showInfoModal(item);else if(item.isTemp)alert('Временная — сохраните сначала.');});
    sl.appendChild(dh);c.appendChild(sl);
  });
}

// Desktop drag-select
function dOnMouseDown(e){
  if(dDragMode)return;
  const t=e.target;if(!t.classList.contains('d-slot'))return;
  e.preventDefault();
  dIsDragging=true;dDragStart={lane:+t.dataset.lane,si:+t.dataset.si};dDragInterval={...dDragStart,startIdx:+t.dataset.si,endIdx:+t.dataset.si};
  dHighlight(+t.dataset.lane,+t.dataset.si,+t.dataset.si);
}
function dOnMouseMove(e){
  if(!dDragMode&&dIsDragging&&dDragStart){
    const el=document.elementsFromPoint(e.clientX,e.clientY).find(el=>el.classList?.contains('d-slot'));
    if(el&&+el.dataset.lane===dDragStart.lane){
      const ns=Math.min(dDragStart.si,+el.dataset.si),ne=Math.max(dDragStart.si,+el.dataset.si);
      dDragInterval={lane:dDragStart.lane,startIdx:ns,endIdx:ne};dHighlight(dDragStart.lane,ns,ne);
    }
  }
}
function dHighlight(lane,si,ei){
  document.querySelectorAll('#dtable td.d-slot.sd').forEach(td=>td.classList.remove('sd'));
  for(let i=si;i<=ei;i++){const c=getDCell(lane,i);if(c)c.classList.add('sd');}
}
function dOnMouseUp(){
  if(!dDragMode&&dIsDragging&&dDragInterval){
    const{lane,startIdx,endIdx}=dDragInterval;
    if(hasConflict(lane,startIdx,endIdx))alert('Это время уже занято');
    else dTempBookings.push({id:dNextTid++,lane,startSlotIdx:startIdx,endSlotIdx:endIdx});
    renderDesktop();
  }
  dIsDragging=false;dDragInterval=null;dDragStart=null;
  document.querySelectorAll('#dtable td.d-slot.sd').forEach(td=>td.classList.remove('sd'));
}
// Desktop drag-move
function dStartMove(b,e,rows){
  const sl=e.currentTarget.closest('.d-slider');if(!sl)return;
  const dur=b.endSlotIdx-b.startSlotIdx;
  const ghost=dCreateGhost(sl);
  dMoveLogic(ghost,sl,rows,dur,(fl,fsi)=>{
    const ni=fsi,ne=fsi+dur;
    if(!hasConflict(fl,ni,ne,b.id)){b.lane=fl;b.startSlotIdx=ni;b.endSlotIdx=ne;b.start=slots[ni].key;b.end=slots[ne+1]?.key||(slots[ne].key+0.5);dSaveMove(b);}
    else alert('Конфликт');
    renderDesktop();updateDCells();
  },b.lane,b.startSlotIdx);
}
function dStartMoveTemp(tmp,e,rows){
  const sl=e.currentTarget.closest('.d-slider');if(!sl)return;
  const dur=tmp.endSlotIdx-tmp.startSlotIdx;const ghost=dCreateGhost(sl);
  dMoveLogic(ghost,sl,rows,dur,(fl,fsi)=>{
    const ni=fsi,ne=fsi+dur;
    if(!hasConflict(fl,ni,ne)){tmp.lane=fl;tmp.startSlotIdx=ni;tmp.endSlotIdx=ne;}else alert('Конфликт');
    renderDesktop();
  },tmp.lane,tmp.startSlotIdx);
}
async function dSaveMove(b){
  await postAction({action:'update',id:b.id,date:curDate,tableNumber:b.lane+1,start:b.start,end:b.end,name:b.name,phone:b.phone,comment:b.comment});
}
function dCreateGhost(sl){
  const g=document.createElement('div');g.className='d-ghost';
  const nc=sl.querySelector('.d-sl-name')?.cloneNode(true),tc=sl.querySelector('.d-sl-time')?.cloneNode(true),dc=sl.querySelector('.d-status-dot')?.cloneNode(true);
  if(dc)g.appendChild(dc);if(nc)g.appendChild(nc);if(tc)g.appendChild(tc);
  g.style.cssText=sl.style.cssText;g.style.opacity='0.88';g.style.transition='none';
  $('dsliders').appendChild(g);sl.classList.add('dragging');return g;
}
function dMoveLogic(ghost,slider,rows,dur,onDrop,iL,iSi){
  let cL=iL,cSi=iSi;
  function upd(l,si){const r=rows[l];if(!r)return;const sc=r.cells[si+1],ec=r.cells[si+dur+1];if(sc&&ec){ghost.style.left=(sc.offsetLeft+1)+'px';ghost.style.top=(r.offsetTop+1)+'px';ghost.style.width=(ec.offsetLeft+ec.offsetWidth-sc.offsetLeft-2)+'px';ghost.style.height=(r.offsetHeight-2)+'px';}}
  function getT(e){const el=document.elementsFromPoint(e.clientX,e.clientY).find(el=>el.classList?.contains('d-slot'));if(!el)return null;return{lane:+el.dataset.lane,idx:+el.dataset.si};}
  function mv(ev){const t=getT(ev);if(t){const ns=Math.min(Math.max(0,t.idx),slots.length-dur-1);if(t.lane!==cL||ns!==cSi){cL=t.lane;cSi=ns;upd(cL,cSi);}}}
  function up(ev){const t=getT(ev);if(t){const fl=t.lane,fsi=Math.min(Math.max(0,t.idx),slots.length-dur-1);onDrop(fl,fsi);}ghost?.remove();slider?.classList.remove('dragging');document.body.style.cursor='';document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}
  document.body.style.cursor='grabbing';document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);upd(cL,cSi);
}

function renderMSliders(){
  const c=$('mSliders');if(!c)return;c.innerHTML='';
  const wrap=$('mGridWrap');if(!wrap)return;
  const wrapRect=wrap.getBoundingClientRect();
  bookings.forEach(b=>{
    const si=b.startSlotIdx,ei=b.endSlotIdx;
    const startRow=$('mBody2').rows[si];
    const endRow=$('mBody2').rows[ei];
    if(!startRow||!endRow)return;
    const startCell=startRow.cells[b.lane+1];
    const endCell=endRow.cells[b.lane+1];
    if(!startCell||!endCell)return;
    const scRect=startCell.getBoundingClientRect();
    const ecRect=endCell.getBoundingClientRect();
    const left=scRect.left-wrapRect.left+wrap.scrollLeft;
    const top=scRect.top-wrapRect.top+wrap.scrollTop;
    const width=scRect.width-2;
    const height=ecRect.bottom-scRect.top-2;
    const status=b.confirmed===true?'sc':(b.confirmed===false?'sr':'sp');
    const lt=GRP_LT[laneGroup(b.lane)];
    const sl=document.createElement('div');sl.className=`m-slider ${status}`;sl.setAttribute('data-lt',lt);
    sl.style.cssText=`left:${left}px;top:${top}px;width:${width}px;height:${height}px;`;
    const dot=document.createElement('div');dot.className='m-dot';sl.appendChild(dot);
    const nm=document.createElement('div');nm.className='m-sl-name';nm.textContent=b.name||'Бронь';
    const tm=document.createElement('div');tm.className='m-sl-time';tm.textContent=slotLabel(si,ei);
    sl.append(nm,tm);
    sl.onclick=e=>{e.stopPropagation();showMInfoModal(b);};
    c.appendChild(sl);
  });
}

// Мобильный выбор: шаг 1 — тап на заголовок стола
function mTapLane(lane){
  // Если уже есть начало на том же столе — игнорируем выбор нового стола
  mSelLane=lane;mSelStart=null;
  updateMCells();
  $('mHintBar').classList.add('visible');
  $('mHintText').textContent=`Стол №${lane+1} выбран. Нажмите на ВРЕМЯ НАЧАЛА (правый или левый столбец)`;
  $('mFab').classList.add('hidden');
}

// Тап по слоту — сокращение: сразу выбираем и стол и начало
function mTapSlot(lane,si){
  // Если стол уже выбран и стартовое время задано — ничего
  if(mSelLane===lane&&mSelStart!==null){
    // второй тап по тому же столу — переназначаем начало
    mSelStart=si;updateMCells();
    $('mHintText').textContent=`Стол №${lane+1}, начало ${slots[si].label}. Теперь нажмите на ВРЕМЯ КОНЦА.`;
    return;
  }
  // Если стол не выбран — выбираем + запоминаем начало
  mSelLane=lane;mSelStart=si;updateMCells();
  $('mHintBar').classList.add('visible');
  $('mHintText').textContent=`Стол №${lane+1}, начало ${slots[si].label}. Теперь нажмите на ВРЕМЯ КОНЦА (правый/левый столбец).`;
  $('mFab').classList.add('hidden');
}

// Шаг 2 — тап на время (правый/левый столбец): задаёт конец (или начало если начала нет)
function mTapTimeCell(si){
  if(mSelLane===null){alert('Сначала выберите стол (нажмите на заголовок столбца)');return;}
  if(mSelStart===null){
    // первый тап = начало
    mSelStart=si;updateMCells();
    $('mHintText').textContent=`Стол №${mSelLane+1}, начало ${slots[si].label}. Теперь нажмите на ВРЕМЯ КОНЦА.`;
    return;
  }
  // второй тап = конец
  const si2=si;
  if(si2<=mSelStart){alert('Время конца должно быть позже начала');return;}
  // endSlotIdx = si2 - 1 (конец — последний слот ПЕРЕД si2)
  const endSlotIdx=si2-1;
  if(hasConflict(mSelLane,mSelStart,endSlotIdx)){alert('Это время уже занято другой броней');return;}
  // Добавляем временную бронь для мобиля
  mTempBookings.push({id:nextTid++,lane:mSelLane,startSlotIdx:mSelStart,endSlotIdx});
  mSelLane=null;mSelStart=null;
  $('mHintBar').classList.remove('visible');
  updateMCells();renderMSelBar();
  if(mTempBookings.length)$('mFab').classList.remove('hidden');
}

let mTempBookings=[];

function renderMSelBar(){
  const bar=$('mSelBar');
  if(!mTempBookings.length){bar.classList.remove('visible');$('mFab').classList.add('hidden');return;}
  bar.classList.add('visible');bar.innerHTML='';
  mTempBookings.forEach((tb,i)=>{
    const chip=document.createElement('div');chip.className='m-sel-chip';
    chip.innerHTML=`<span>Стол ${tb.lane+1} · ${slotLabel(tb.startSlotIdx,tb.endSlotIdx)}</span><button onclick="mRemoveSel(${i})">×</button>`;
    bar.appendChild(chip);
  });
  $('mFab').classList.remove('hidden');
}

function mRemoveSel(i){mTempBookings.splice(i,1);renderMSelBar();updateMCells();}

function mCancelSel(){
  mSelLane=null;mSelStart=null;
  $('mHintBar').classList.remove('visible');
  document.querySelectorAll('#mTable td.m-slot').forEach(td=>td.classList.remove('v-line','sel','sel-start'));
  document.querySelectorAll('#mTable thead th.m-lane-hdr').forEach(th=>th.classList.remove('selected-col'));
}

function openMBookModal(){
  if(!mTempBookings.length){alert('Выберите интервал');return;}
  $('mPreviewTxt').textContent=mTempBookings.map(t=>`Стол ${t.lane+1} (${slotLabel(t.startSlotIdx,t.endSlotIdx)})`).join('; ');
  $('mNameInp').value='';$('mPhoneInp').value='';$('mCommentInp').value='';
  $('mBookModal').classList.add('open');
}
function closeMBookModal(){$('mBookModal').classList.remove('open');}

async function submitMBooking(){
  const name=$('mNameInp').value.trim();if(!name)return alert('Введите имя');
  showLoad();
  try{
    await postBookings(mTempBookings.map(tb=>({
      date:curDate,tableNumber:tb.lane+1,
      start:slots[tb.startSlotIdx].key,
      end:slots[tb.endSlotIdx+1]?.key||(slots[tb.endSlotIdx].key+0.5),
      name,phone:$('mPhoneInp').value.trim(),comment:$('mCommentInp').value.trim()
    })));
    mTempBookings=[];mCancelSel();closeMBookModal();$('mFab').classList.add('hidden');renderMSelBar();
    await loadFromServer();
  }catch(e){alert('Ошибка сохранения');}
  hideLoad();
}

function showMInfoModal(b){
  curBooking=b;
  const laneColors=['blue','blue','blue','green','blue','blue','red','red','red','red','red','red'];
  const col=laneColors[b.lane];
  const statusTxt=b.confirmed===true?'✅ Пришли':(b.confirmed===false?'❌ Не пришли':'⏳ Ожидание');
  $('mInfoContent').innerHTML=`
    <div class="m-info-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
        <div style="width:42px;height:42px;border-radius:9px;background:var(--g-${col});color:white;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;">№${b.lane+1}</div>
        <div>
          <div style="font-size:16px;font-weight:700;color:var(--label)">${esc(b.name)}</div>
          <div style="font-size:12px;color:var(--label3);margin-top:1px">${slotLabel(b.startSlotIdx,b.endSlotIdx)}</div>
        </div>
      </div>
      <div class="m-i-row"><span class="m-i-lbl">Телефон</span><span class="m-i-val sel-text">${esc(b.phone||'—')}</span></div>
      <div class="m-i-row"><span class="m-i-lbl">Комментарий</span><span class="m-i-val sel-text">${esc(b.comment||'—')}</span></div>
      <div class="m-i-row" style="border:none"><span class="m-i-lbl">Статус</span><span class="m-i-val">${statusTxt}</span></div>
    </div>
    <div class="m-cb-row">
      <button class="m-cb-yes" onclick="doConfirm(true)"><i class="fas fa-check-circle"></i> Пришли</button>
      <button class="m-cb-no" onclick="doConfirm(false)"><i class="fas fa-times-circle"></i> Не пришли</button>
    </div>
    <button class="m-del" onclick="doDelete()"><i class="fas fa-trash-alt"></i> Удалить бронь</button>
  `;
  $('mInfoModal').classList.add('open');
}
function closeMInfoModal(){$('mInfoModal').classList.remove('open');curBooking=null;}

// ╔══════════════════════════════════════════════════════╗
// ║  UTILS                                               ║
// ╚══════════════════════════════════════════════════════╝
function showLoad(){$('loader').style.display='flex';}
function hideLoad(){$('loader').style.display='none';}
function esc(s){if(!s)return'';return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function enc(s){return encodeURIComponent(s);}

// ╔══════════════════════════════════════════════════════╗
// ║  INIT                                                ║
// ╚══════════════════════════════════════════════════════╝
function initApp(){
  // Desktop date picker
  const dCalBtn=$('dCalBtn'),dPicker=$('dHiddenDate'),dTxt=$('dDateTxt');
  dPicker.value=curDate;dTxt.textContent=fmtDate(curDate);
  dCalBtn.addEventListener('click',e=>{e.preventDefault();if(dPicker.showPicker)dPicker.showPicker();else{dPicker.click();dPicker.focus();}});
  dPicker.addEventListener('change',e=>{if(e.target.value){curDate=e.target.value;dTxt.textContent=fmtDate(curDate);dTempBookings=[];mTempBookings=[];mCancelSel();renderMSelBar();loadFromServer();}});

  // Mobile date picker
  $('mHiddenDate').value=curDate;
  $('mHiddenDate').addEventListener('change',e=>{if(e.target.value){selectDate(e.target.value);}});

  // Desktop drag toggle
  $('dDragBtn').addEventListener('click',()=>{
    dDragMode=!dDragMode;
    $('dDragBtn').innerHTML=`<i class="fas fa-arrows-alt"></i> Перетяжка: ${dDragMode?'ВКЛ':'ВЫКЛ'}`;
    $('dDragBtn').classList.toggle('active',dDragMode);
    $('dDragInd').style.display=dDragMode?'block':'none';
    renderDSliders();
  });

  // Desktop mouse events
  $('dtable').addEventListener('mousedown',dOnMouseDown);
  document.body.addEventListener('mousemove',dOnMouseMove);
  document.body.addEventListener('mouseup',dOnMouseUp);
  document.addEventListener('dragstart',e=>{if(e.target.closest('.d-drag-handle')||e.target.closest('.d-slider'))e.preventDefault();});

  // Close overlays on backdrop click
  ['dBookModal','dInfoModal','mBookModal','mInfoModal','adminModal','userFormModal'].forEach(id=>{
    $(id)?.addEventListener('click',e=>{if(e.target===$(id))$(id).classList.remove('open');});
  });

  // Build structures
  buildDesktop();
  buildMobileGrid();
  buildMDateBar();

  // Load data
  loadFromServer();
}

window.addEventListener('load',()=>{
  const cu=getCachedU();
  if(cu&&cu.email){curUser=cu;loginUser(curUser);}
});
</script>
