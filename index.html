<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
  <title>Бильярд · Брони | Полноэкранная таблица</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f2f2f5;
      --surface: #ffffff;
      --surface2: #f8f8fc;
      --border: rgba(0, 0, 0, 0.06);
      --border2: rgba(0, 0, 0, 0.12);
      --ink: #1c1c1e;
      --ink2: #3a3a3c;
      --ink3: #6c6c70;
      --ink4: #8e8e93;
      --blue: #0066cc;
      --blue-h: #0055b3;
      --blue-dim: rgba(0, 102, 204, 0.1);
      --green: #28a745;
      --red: #dc3545;
      --amber: #ff9f0a;
      --r: 12px;
      --r2: 20px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* LOGIN */
    #login {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      padding: 32px;
    }
    .login-glyph { font-size: 56px; }
    .login-title { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
    .login-sub { font-size: 16px; color: var(--ink3); margin-top: -6px; }
    .login-sep { width: 1px; height: 28px; background: var(--border2); }

    /* APP */
    #content { display: none; min-height: 100vh; }

    /* NAVBAR */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(18px);
      border-bottom: 0.5px solid var(--border2);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .nav-title {
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #1e3c72, #2b4c7c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: 40px;
      padding: 8px 18px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      color: var(--blue);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .nav-btn:hover { background: var(--blue-dim); transform: scale(0.97); }

    /* PAGE — теперь на всю ширину, без максимальной ширины */
    .page {
      width: 100%;
      padding: 24px 24px 48px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Управление */
    .ctrl {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--surface);
      border-radius: var(--r2);
      padding: 16px 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02), 0 1px 0 var(--border);
    }
    .date-field {
      flex: 1;
      min-width: 200px;
      max-width: 260px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
      border-radius: 12px;
      padding: 0 16px;
      height: 46px;
      border: 0.5px solid var(--border2);
    }
    #dateInput {
      flex: 1;
      border: none;
      background: transparent;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 500;
      color: var(--ink);
      cursor: pointer;
    }
    .btn-book {
      height: 46px;
      padding: 0 28px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 6px rgba(0, 102, 204, 0.3);
    }
    .btn-book:hover { background: var(--blue-h); transform: scale(0.98); }

    /* Легенда */
    .pills {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .pill {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink2);
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: 40px;
      padding: 6px 16px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-navy { background: #2c6e9e; }
    .dot-sage { background: #2e8b57; }
    .dot-rust { background: #c95a2e; }
    .dot-amber { background: var(--amber); }
    .dot-green { background: var(--green); }
    .dot-red { background: var(--red); }

    /* КАРТОЧКА С ТАБЛИЦЕЙ — растягивается на всю ширину */
    .grid-card {
      background: var(--surface);
      border-radius: var(--r2);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
      overflow: hidden;
      width: 100%;
    }
    .grid-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
      width: 100%;
    }

    /* ========= ДЕСКТОПНАЯ ТАБЛИЦА (НА ВЕСЬ ЭКРАН) ========= */
    #tableDesktop {
      display: table;
      border-collapse: collapse;
      table-layout: fixed;
      width: 100%;
      min-width: 1000px;
      font-size: 14px;
    }
    /* Заголовки времени — увеличенные, кликабельные */
    #tableDesktop thead th {
      height: 52px;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink2);
      border-bottom: 1px solid var(--border2);
      border-right: 0.5px solid var(--border);
      text-align: center;
      background: var(--surface2);
      position: sticky;
      top: 0;
      z-index: 3;
    }
    #tableDesktop thead th.corner {
      width: 90px;
      min-width: 90px;
      background: var(--surface2);
      font-size: 13px;
      font-weight: 600;
      color: var(--ink3);
      border-right: 1px solid var(--border2);
      position: sticky;
      left: 0;
      z-index: 5;
    }
    #tableDesktop thead th.th-time {
      cursor: pointer;
      width: 70px;
      min-width: 70px;
      transition: 0.1s;
    }
    #tableDesktop thead th.th-time:hover {
      background: #fff0db;
      color: var(--amber);
    }
    /* Ячейки строк (столы) */
    #tableDesktop tbody tr {
      height: 56px;
    }
    #tableDesktop tbody td.lane-hdr {
      width: 90px;
      min-width: 90px;
      font-size: 16px;
      font-weight: 700;
      border-bottom: 0.5px solid var(--border2);
      border-right: 1px solid var(--border2);
      text-align: center;
      background: var(--surface2);
      position: sticky;
      left: 0;
      z-index: 2;
    }
    .lane-hdr.grp-navy { background: #eef3fc !important; color: #1e5a8a; }
    .lane-hdr.grp-sage { background: #eef7ef !important; color: #2c6e3c; }
    .lane-hdr.grp-rust { background: #fef2ec !important; color: #b44d26; }

    #tableDesktop tbody td.slot {
      cursor: pointer;
      border-bottom: 0.5px solid var(--border);
      border-right: 0.5px solid var(--border);
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      transition: 0.08s linear;
    }
    #tableDesktop tbody td.slot.shade { background: rgba(0, 0, 0, 0.02); }
    #tableDesktop tbody tr.row-navy td.slot { background: #f9fbfe; }
    #tableDesktop tbody tr.row-sage td.slot { background: #f9fdfa; }
    #tableDesktop tbody tr.row-rust td.slot { background: #fefaf7; }
    #tableDesktop tbody td.slot:hover { background: #fff6e8 !important; }
    #tableDesktop tbody td.slot.selected {
      background: #fee8c3 !important;
      border-top: 2px solid var(--amber);
      border-bottom: 2px solid var(--amber);
    }
    #tableDesktop tbody td.slot.sel-left {
      border-left: 2px solid var(--amber);
      border-radius: 6px 0 0 6px;
    }
    #tableDesktop tbody td.slot.sel-right {
      border-right: 2px solid var(--amber);
      border-radius: 0 6px 6px 0;
    }
    #tableDesktop tbody td.slot.anchored {
      background: #ffe5aa !important;
      outline: 2px solid var(--amber);
      outline-offset: -2px;
    }
    #tableDesktop tbody td.slot.vline { background: #fff2e0 !important; }

    /* ========= МОБИЛЬНАЯ ТАБЛИЦА (при ширине < 800px) ========= */
    @media (max-width: 799px) {
      #tableDesktop { display: none; }
      #tableMobile { display: table; }
      .page { padding: 16px 12px 40px; }
      .ctrl { flex-direction: column; align-items: stretch; }
      .date-field { max-width: 100%; }
      .btn-book { width: 100%; }
    }
    @media (min-width: 800px) {
      #tableMobile { display: none; }
    }

    #tableMobile {
      border-collapse: collapse;
      width: 100%;
      font-size: 12px;
    }
    #tableMobile thead th {
      height: 44px;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 1px solid var(--border2);
      border-right: 0.5px solid var(--border);
      background: var(--surface2);
    }
    #tableMobile th.tcol {
      background: var(--surface2);
      color: var(--ink3);
      font-size: 11px;
      cursor: pointer;
      min-width: 52px;
    }
    #tableMobile td.slot {
      cursor: pointer;
      height: 40px;
      border-bottom: 0.5px solid var(--border);
      border-right: 0.5px solid var(--border);
      text-align: center;
    }
    #tableMobile td.slot.selected {
      background: #fee8c3 !important;
      border-left: 2px solid var(--amber);
      border-right: 2px solid var(--amber);
    }
    #tableMobile td.slot.sel-top {
      border-top: 2px solid var(--amber);
      border-radius: 6px 6px 0 0;
    }
    #tableMobile td.slot.sel-bot {
      border-bottom: 2px solid var(--amber);
      border-radius: 0 0 6px 6px;
    }
    #tableMobile td.slot.anchored { background: #ffe5aa !important; outline: 2px solid var(--amber); }

    /* Слайдеры (полосы брони) */
    #slidersLayer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .slider {
      position: absolute;
      border-radius: 10px;
      pointer-events: auto;
      cursor: pointer;
      padding: 4px 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: 0.1s;
      backdrop-filter: blur(1px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .slider:hover { transform: scale(1.01); opacity: 0.9; z-index: 20; }
    .slider.pending   { background: rgba(255, 159, 10, 0.25); border-left: 3px solid #ff9f0a; }
    .slider.confirmed { background: rgba(40, 167, 69, 0.25); border-left: 3px solid #28a745; }
    .slider.rejected  { background: rgba(220, 53, 69, 0.2); border-left: 3px solid #dc3545; }
    .sl-name { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sl-time { font-size: 10px; opacity: 0.85; }

    /* Карточки броней */
    #cardsContainer {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 4px;
    }
    .bcard {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: 16px;
      padding: 10px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .bcard-title { font-size: 14px; font-weight: 600; }
    .bcard-sub { font-size: 12px; color: var(--ink3); }
    .bcard-rm {
      width: 28px;
      height: 28px;
      border-radius: 30px;
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      font-size: 16px;
      cursor: pointer;
      transition: 0.15s;
    }
    .bcard-rm:hover { background: rgba(220,53,69,0.1); color: var(--red); }

    /* Модалки */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .overlay.open { display: flex; }
    .sheet {
      background: var(--surface);
      border-radius: 28px;
      max-width: 480px;
      width: 90%;
      animation: fadeUp 0.2s ease;
      overflow: hidden;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }
    .sheet-head { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: center; }
    .sheet-title { font-size: 24px; font-weight: 700; }
    .sheet-x { width: 32px; height: 32px; border-radius: 30px; background: var(--surface2); border: none; cursor: pointer; font-size: 18px; }
    .sheet-body { padding: 20px 24px 28px; }
    .f-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      border-radius: 14px;
      font-size: 15px;
    }
    .f-btn-ok {
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 40px;
      padding: 12px 20px;
      font-weight: 600;
      cursor: pointer;
    }
    .info-list { border-radius: 16px; background: var(--surface2); padding: 8px 0; margin-bottom: 20px; }
    .info-row { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 0.5px solid var(--border); }
    .del-btn {
      width: 100%;
      padding: 12px;
      border-radius: 40px;
      background: transparent;
      border: 0.5px solid var(--border2);
      margin-top: 12px;
      cursor: pointer;
    }
    .del-btn:hover { background: rgba(220,53,69,0.08); color: var(--red); }
    .cb-yes, .cb-no { padding: 10px 16px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; }
    .cb-yes { background: #d4edda; color: #155724; }
    .cb-no { background: #f8d7da; color: #721c24; }

    #loader {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(3px);
      z-index: 3000;
      justify-content: center;
      align-items: center;
    }
    .loader-box { background: white; padding: 24px 36px; border-radius: 32px; display: flex; gap: 16px; align-items: center; }
    .spin { width: 28px; height: 28px; border: 3px solid #ddd; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="login">
  <div class="login-glyph">🎱</div>
  <div class="login-title">Бильярд Клуб</div>
  <div class="login-sub">Бронирование столов</div>
  <div class="login-sep"></div>
  <div id="g_id_onload"
    data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com"
    data-callback="handleCredentialResponse"
    data-auto_prompt="false"></div>
  <div class="g_id_signin" data-type="standard"></div>
</div>

<div id="content">
  <nav class="nav">
    <span class="nav-title">🎱 Lucky Strike · Бильярд</span>
    <button class="nav-btn" onclick="openImg()">📐 Схема столов</button>
  </nav>
  <div class="page">
    <div class="ctrl">
      <div class="date-field">
        📅 <input type="date" id="dateInput" style="font-weight:500;">
      </div>
      <button class="btn-book" onclick="openBookModal()">+ Новая бронь</button>
    </div>
    <div class="pills">
      <div class="pill"><div class="dot dot-navy"></div>Столы 1–3</div>
      <div class="pill"><div class="dot dot-sage"></div>Столы 4–6</div>
      <div class="pill"><div class="dot dot-rust"></div>Столы 7–12</div>
      <div class="pill"><div class="dot dot-amber"></div>Ожидает</div>
      <div class="pill"><div class="dot dot-green"></div>Подтверждено</div>
      <div class="pill"><div class="dot dot-red"></div>Отменено</div>
    </div>

    <div class="grid-card">
      <div class="grid-scroll" id="gridScroll">
        <table id="tableDesktop">
          <thead id="dtHead"><tr><th class="corner">Стол / Время</th></tr></thead>
          <tbody id="dtBody"></tbody>
        </table>
        <table id="tableMobile">
          <thead id="mtHeadRow"></thead>
          <tbody id="mtBody"></tbody>
        </table>
        <div id="slidersLayer"></div>
      </div>
    </div>
    <div id="cardsContainer"></div>
  </div>
</div>

<div id="bookModal" class="overlay"><div class="sheet"><div class="sheet-head"><div class="sheet-title">Новое бронирование</div><button class="sheet-x" onclick="closeBookModal()">✕</button></div><div class="sheet-body"><div class="f-group"><input class="f-input" id="nameInput" placeholder="Имя клиента *"></div><div class="f-group"><input class="f-input" id="phoneInput" placeholder="Телефон *"></div><div class="f-group"><textarea class="f-input" id="commentInput" rows="2" placeholder="Комментарий"></textarea></div><div class="f-actions" style="display:flex; gap:12px; margin-top:16px;"><button class="f-btn-ok" onclick="submitForm()">Сохранить</button><button class="f-btn-cancel" onclick="closeBookModal()" style="background:#f0f0f0;">Отмена</button></div></div></div></div>
<div id="infoModal" class="overlay"><div class="sheet"><div class="sheet-head"><div class="sheet-title">Детали</div><button class="sheet-x" onclick="closeInfoModal()">✕</button></div><div class="sheet-body"><div class="info-list"><div class="info-row"><span>Стол</span><span id="i-table"></span></div><div class="info-row"><span>Дата</span><span id="i-date"></span></div><div class="info-row"><span>Время</span><span id="i-time"></span></div><div class="info-row"><span>Имя</span><span id="i-name"></span></div><div class="info-row"><span>Телефон</span><span id="i-phone"></span></div><div class="info-row"><span>Комментарий</span><span id="i-comment"></span></div><div class="info-row"><span>Статус</span><span id="i-status"></span></div></div><div style="margin-top:12px;"><div class="confirm-lbl" style="font-weight:600;">Подтверждение визита</div><div style="display:flex; gap:12px; margin:12px 0;"><button class="cb-yes" onclick="confirmBooking(true)">✅ Да, были</button><button class="cb-no" onclick="confirmBooking(false)">❌ Не пришли</button></div><button class="del-btn" onclick="deleteBooking()">🗑 Удалить бронь</button></div></div></div></div>
<div id="imgPopup" class="overlay"><div class="sheet" style="max-width:90vw; background:transparent; box-shadow:none;"><img src="https://i.postimg.cc/52ZDKDDw/55.png" style="width:100%; border-radius:28px;"/><button onclick="closeImg()" style="position:absolute; top:20px; right:20px; background:white; border-radius:40px; width:40px;">✕</button></div></div>
<div id="loader"><div class="loader-box"><div class="spin"></div><div>Загрузка...</div></div></div>

<script>
  const GAS = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
  const ALLOWED = ["vadiksss900@gmail.com","sergey99belov@gmail.com","popadinecvasil3@gmail.com","veronicadiakova04@gmail.com","info.luckystrike.kh@gmail.com","sashavolobuev123890@gmail.com","egorgorbushko@gmail.com","shatrava.o@gmail.com","Craftmax30@gmail.com","bowlingblock.b@gmail.com","lana.arnaut@gmail.com","polosinnikita1224@gmail.com","sofialat1506@gmail.com","ll3991940@gmail.com","ken040888@gmail.com"];
  function parseJwt(t){return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));}
  function handleCredentialResponse(r){const d=parseJwt(r.credential);if(ALLOWED.includes(d.email)){localStorage.setItem("ue",d.email);location.reload();}else alert("Доступ запрещён: "+d.email);}
  window.onload=()=>{if(localStorage.getItem("ue")&&ALLOWED.includes(localStorage.getItem("ue"))){document.getElementById("login").style.display="none";document.getElementById("content").style.display="block";init();}};
  
  const SH=11,EH=22,LANES=12;
  const slots=[];
  for(let h=SH;h<=EH;h++){slots.push({label:`${h}:00`,key:h});if(h<EH)slots.push({label:`${h}:30`,key:h+0.5});}
  const LANE_GROUPS=[0,0,0,1,1,1,2,2,2,2,2,2];
  const GRP_CLASS=["grp-navy","grp-sage","grp-rust"];
  const ROW_CLASS=["row-navy","row-sage","row-rust"];
  
  let ivs={}, selLane=null, selStart=null, curId=null;
  const $=id=>document.getElementById(id);
  function qsa(s){return Array.from(document.querySelectorAll(s));}
  function qs(s){return document.querySelector(s);}
  function fmt(v){return `${Math.floor(v)}:${v%1===0.5?'30':'00'}`;}
  
  function buildDesktopTable(){
    const headRow=$('dtHead').rows[0];
    slots.forEach((sl,si)=>{let th=document.createElement('th');th.className='th-time';th.dataset.si=si;th.dataset.key=sl.key;th.textContent=sl.label;headRow.appendChild(th);});
    const body=$('dtBody');
    for(let lane=0;lane<LANES;lane++){
      let tr=document.createElement('tr');tr.className=ROW_CLASS[LANE_GROUPS[lane]];tr.dataset.lane=lane;
      let lhdr=document.createElement('td');lhdr.className=`lane-hdr ${GRP_CLASS[LANE_GROUPS[lane]]}`;lhdr.textContent=`№ ${lane+1}`;tr.appendChild(lhdr);
      slots.forEach((sl,si)=>{let td=document.createElement('td');td.className='slot'+(si%2===1?' shade':'');td.dataset.lane=lane;td.dataset.time=sl.key;td.dataset.si=si;tr.appendChild(td);});
      body.appendChild(tr);
    }
  }
  function buildMobileTable(){
    const mtBody=$('mtBody'); const mtHead=$('mtHeadRow');
    for(let l=0;l<LANES;l++){let th=document.createElement('th');th.textContent=l+1;th.className=LANE_GROUPS[l]===0?'hdr-navy':LANE_GROUPS[l]===1?'hdr-sage':'hdr-rust';mtHead.appendChild(th);}
    let thTime=document.createElement('th');thTime.className='tcol no-click';thTime.textContent='⏱️';mtHead.appendChild(thTime);
    slots.forEach(sl=>{
      let tr=document.createElement('tr');
      for(let lane=0;lane<LANES;lane++){let td=document.createElement('td');td.className='slot';td.dataset.lane=lane;td.dataset.time=sl.key;tr.appendChild(td);}
      let th=document.createElement('th');th.className='tcol';th.textContent=sl.label;tr.appendChild(th);
      mtBody.appendChild(tr);
    });
  }
  
  function renderCards(){
    qsa('#tableDesktop td.slot.selected, #tableDesktop td.slot.sel-left, #tableDesktop td.slot.sel-right').forEach(c=>c.classList.remove('selected','sel-left','sel-right'));
    qsa('#tableMobile td.slot.selected, #tableMobile td.slot.sel-top, #tableMobile td.slot.sel-bot').forEach(c=>c.classList.remove('selected','sel-top','sel-bot'));
    for(let k in ivs){let lane=+k;(ivs[lane]||[]).forEach(iv=>{let s=Math.min(iv.start,iv.end),e=Math.max(iv.start,iv.end);
      qsa(`#tableDesktop td.slot[data-lane="${lane}"]`).forEach(td=>{let t=+td.dataset.time;if(t>=s&&t<=e)td.classList.add('selected');});
      let left=qs(`#tableDesktop td.slot[data-lane="${lane}"][data-time="${s}"]`),right=qs(`#tableDesktop td.slot[data-lane="${lane}"][data-time="${e}"]`);
      if(left)left.classList.add('sel-left'); if(right)right.classList.add('sel-right');
      qsa(`#tableMobile td.slot[data-lane="${lane}"]`).forEach(td=>{let t=parseFloat(td.dataset.time);if(t>=s&&t<=e)td.classList.add('selected');});
      let top=qs(`#tableMobile td.slot[data-lane="${lane}"][data-time="${s}"]`),bot=qs(`#tableMobile td.slot[data-lane="${lane}"][data-time="${e}"]`);
      if(top)top.classList.add('sel-top'); if(bot&&s!==e)bot.classList.add('sel-bot');
    });}
    const dd=$('dateInput').value.split('-').reverse().join('.');
    $('cardsContainer').innerHTML='';
    for(let k in ivs){let lane=+k;(ivs[lane]||[]).forEach((iv,idx)=>{let s=Math.min(iv.start,iv.end),e=Math.max(iv.start,iv.end);
      let div=document.createElement('div');div.className='bcard';div.innerHTML=`<div><div class="bcard-title">Стол №${lane+1}</div><div class="bcard-sub">${dd} · ${fmt(s)} – ${fmt(e)}</div></div>`;
      let rm=document.createElement('button');rm.className='bcard-rm';rm.textContent='✕';rm.onclick=()=>{ivs[lane].splice(idx,1);renderCards();};
      div.appendChild(rm);$('cardsContainer').appendChild(div);
    });
  }
  
  function onDesktopClick(e){
    let el=e.target;
    if(el.classList.contains('slot')&&selStart===null){selLane=+el.dataset.lane;clearHighlights();qsa(`#tableDesktop td.slot[data-lane="${selLane}"]`).forEach(c=>c.classList.add('vline'));let hdr=$('dtBody').rows[selLane]?.cells[0];if(hdr)hdr.classList.add('hl-row');return;}
    if(el.classList.contains('th-time')&&selLane!==null&&selStart===null){selStart=+el.dataset.key;clearHighlights();let anchor=qs(`#tableDesktop td.slot[data-lane="${selLane}"][data-time="${selStart}"]`);if(anchor)anchor.classList.add('anchored');let hdr=$('dtBody').rows[selLane]?.cells[0];if(hdr)hdr.classList.add('hl-row');return;}
    if(el.classList.contains('th-time')&&selLane!==null&&selStart!==null){let t=+el.dataset.key;if(t<=selStart){alert("Конец должен быть позже");return;}if(!ivs[selLane])ivs[selLane]=[];ivs[selLane].push({start:selStart,end:t});selLane=selStart=null;clearHighlights();renderCards();}
  }
  function onMobileClick(e){
    let el=e.target;
    if(el.classList.contains('slot')&&selStart===null){selLane=+el.dataset.lane;qsa('#tableMobile td.slot.vline').forEach(c=>c.classList.remove('vline'));qsa('#tableMobile thead th.hl').forEach(c=>c.classList.remove('hl'));qsa(`#tableMobile td.slot[data-lane="${selLane}"]`).forEach(c=>c.classList.add('vline'));let th=$('mtHeadRow')?.cells[selLane];if(th)th.classList.add('hl');return;}
    if(el.classList.contains('tcol')&&selLane!==null&&selStart===null){let raw=el.textContent;let t=raw.includes(':30')?parseFloat(raw.replace(':30','.5')):parseFloat(raw.replace(':00','.0'));selStart=t;qs(`#tableMobile td.slot[data-lane="${selLane}"][data-time="${selStart}"]`)?.classList.add('anchored');return;}
    if(el.classList.contains('tcol')&&selLane!==null&&selStart!==null){let raw=el.textContent;let t=raw.includes(':30')?parseFloat(raw.replace(':30','.5')):parseFloat(raw.replace(':00','.0'));if(t<=selStart){alert("Конец больше начала");return;}if(!ivs[selLane])ivs[selLane]=[];ivs[selLane].push({start:selStart,end:t});selLane=selStart=null;qsa('#tableMobile td.slot.vline, #tableMobile thead th.hl, #tableMobile td.slot.anchored').forEach(c=>c.classList.remove('vline','hl','anchored'));renderCards();}
  }
  function clearHighlights(){qsa('#tableDesktop td.slot.vline, #tableDesktop td.lane-hdr.hl-row, #tableDesktop thead th.th-time.hl, #tableDesktop td.slot.anchored').forEach(c=>c.classList.remove('vline','hl-row','hl','anchored'));}
  function resetSel(){selLane=selStart=null;ivs={};clearHighlights();qsa('#tableMobile td.slot.vline, #tableMobile thead th.hl, #tableMobile td.slot.anchored').forEach(c=>c.classList.remove('vline','hl','anchored'));renderCards();}
  function openBookModal(){if(!Object.values(ivs).some(a=>a.length))return alert("Выберите интервал на сетке");$('bookModal').classList.add('open');}
  function closeBookModal(){$('bookModal').classList.remove('open');}
  async function submitForm(){
    let name=$('nameInput').value.trim(),phone=$('phoneInput').value.trim(),comment=$('commentInput').value.trim(),date=$('dateInput').value;
    if(!name||!phone)return alert("Заполните имя и телефон");
    let bookings=[];
    for(let k in ivs)(ivs[k]||[]).forEach(iv=>bookings.push({date,tableNumber:+k+1,start:iv.start,end:iv.end,name,phone,comment}));
    if(!bookings.length)return;
    showLoad();
    try{await Promise.all(bookings.map(b=>fetch(GAS,{method:'POST',mode:'no-cors',body:JSON.stringify({bookings:[b]})})));closeBookModal();$('nameInput').value='';$('phoneInput').value='';$('commentInput').value='';resetSel();await loadSliders();}catch(e){alert("Ошибка")}finally{hideLoad();}
  }
  async function loadSliders(){showLoad();$('slidersLayer').innerHTML='';try{let res=await fetch(GAS+'?action=get&date='+$('dateInput').value);let data=await res.json();if(!data.bookings?.length)return;const isDesktop=window.innerWidth>=800;if(isDesktop)renderSlidersDesktop(data.bookings);else renderSlidersMobile(data.bookings);}catch(e){}finally{hideLoad();}}
  function renderSlidersDesktop(bookings){let rows=Array.from($('dtBody').querySelectorAll('tr'));let colMap={};slots.forEach((sl,i)=>colMap[sl.key]=i+1);bookings.forEach(b=>{if(b.date!==$('dateInput').value)return;let lane=b.table-1,start=+b.start,end=+b.end,si=colMap[start],ei=colMap[end];if(si==null||ei==null)return;let row=rows[lane];if(!row)return;let sc=row.cells[si],ec=row.cells[ei];if(!sc||!ec)return;let left=sc.offsetLeft+1,top=row.offsetTop+1,width=(ec.offsetLeft+ec.offsetWidth)-sc.offsetLeft-2,height=row.offsetHeight-2;let div=makeSliderDiv(b,start,end);div.style.cssText=`left:${left}px;top:${top}px;width:${width}px;height:${height}px;`;$('slidersLayer').appendChild(div);});}
  function renderSlidersMobile(bookings){let rows=Array.from($('mtBody').querySelectorAll('tr'));let rowByKey={};slots.forEach((sl,i)=>rowByKey[sl.key]=rows[i]);bookings.forEach(b=>{if(b.date!==$('dateInput').value)return;let lane=b.table-1,start=+b.start,end=+b.end,startRow=rowByKey[start],endRow=rowByKey[end];if(!startRow||!endRow)return;let cell=startRow.cells[lane];if(!cell)return;let left=cell.offsetLeft+1,top=startRow.offsetTop+1,width=cell.offsetWidth-2,height=(endRow.offsetTop+endRow.offsetHeight)-startRow.offsetTop-2;let div=makeSliderDiv(b,start,end);div.style.cssText=`left:${left}px;top:${top}px;width:${width}px;height:${height}px;`;$('slidersLayer').appendChild(div);});}
  function makeSliderDiv(b,st,et){let el=document.createElement('div');el.className=`slider ${b.confirmed==='Да'?'confirmed':b.confirmed==='Нет'?'rejected':'pending'}`;el.innerHTML=`<div class="sl-name">${b.name||'—'}</div><div class="sl-time">${fmt(st)} – ${fmt(et)}</div>`;el.addEventListener('click',e=>{e.stopPropagation();showInfoModal(b);});return el;}
  function showInfoModal(b){$('i-table').textContent='№ '+b.table;$('i-date').textContent=b.date.split('-').reverse().join('.');$('i-time').textContent=`${fmt(+b.start)} – ${fmt(+b.end)}`;$('i-name').textContent=b.name;$('i-phone').textContent=b.phone;$('i-comment').textContent=b.comment||'—';let st=$('i-status');if(b.confirmed==='Да')st.innerHTML='<span style="background:#d4edda;padding:2px 12px;border-radius:40px;">✓ Подтверждено</span>';else if(b.confirmed==='Нет')st.innerHTML='<span style="background:#f8d7da;padding:2px 12px;border-radius:40px;">✕ Отменено</span>';else st.innerHTML='<span style="background:#fff3cd;padding:2px 12px;border-radius:40px;">⏳ Ожидает</span>';curId=b.id;$('infoModal').classList.add('open');}
  function closeInfoModal(){$('infoModal').classList.remove('open');curId=null;}
  async function confirmBooking(yes){if(!curId)return;showLoad();await fetch(GAS,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'confirm',id:curId,confirmed:yes})});closeInfoModal();await loadSliders();hideLoad();}
  async function deleteBooking(){if(!curId||!confirm("Удалить бронь?"))return;showLoad();await fetch(GAS,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'delete',id:curId})});closeInfoModal();await loadSliders();hideLoad();}
  function showLoad(){$('loader').style.display='flex';} function hideLoad(){$('loader').style.display='none';}
  function openImg(){$('imgPopup').classList.add('open');} function closeImg(){$('imgPopup').classList.remove('open');}
  function init(){let today=new Date().toISOString().split('T')[0];$('dateInput').min=$('dateInput').value=today;buildDesktopTable();buildMobileTable();$('tableDesktop').addEventListener('click',onDesktopClick);$('tableMobile').addEventListener('click',onMobileClick);$('dateInput').addEventListener('change',()=>{resetSel();loadSliders();});renderCards();loadSliders();}
  ['bookModal','infoModal','imgPopup'].forEach(id=>{$(id)?.addEventListener('click',e=>{if(e.target===$(id))$(id).classList.remove('open');});});
  let resizeTimer;window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{if($('content').style.display==='block')loadSliders();},150);});
</script>
</body>
</html>
