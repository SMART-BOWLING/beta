<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>Бильярд · Брони | Drag-слайдеры</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png"/>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    :root {
      --bg: #f5f5f7; --surface: #ffffff; --surface2: #f5f5f7;
      --border: rgba(0,0,0,.08); --border2: rgba(0,0,0,.14);
      --ink: #1d1d1f; --ink2: #3d3d3f; --ink3: #6e6e73; --ink4: #aeaeb2;
      --blue: #0071e3; --blue-h: #0077ed; --blue-dim: rgba(0,113,227,.08);
      --green: #34c759; --red: #ff3b30; --amber: #ff9f0a;
      --r: 12px; --r2: 18px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      --cell-h: 58px; --cell-w: 68px; --lane-w: 100px;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--ink); min-height: 100vh; }
    #login { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 9999; padding: 32px; }
    .login-glyph { font-size: 58px; }
    .login-title { font-size: 32px; font-weight: 700; }
    #content { display: none; min-height: 100vh; }
    .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,.92); backdrop-filter: saturate(180%) blur(20px); border-bottom: .5px solid var(--border2); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; }
    .nav-title { font-size: 20px; font-weight: 600; }
    .nav-btn { background: var(--surface); border: .5px solid var(--border2); border-radius: 980px; padding: 8px 18px; font-family: var(--font); font-size: 14px; font-weight: 500; color: var(--blue); cursor: pointer; transition: background .15s; }
    .nav-btn:hover { background: var(--blue-dim); }
    .page { width: 100%; margin: 0; padding: 24px 28px 80px; display: flex; flex-direction: column; gap: 24px; }
    .ctrl { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; background: var(--surface); border-radius: var(--r2); padding: 18px 24px; box-shadow: 0 2px 12px rgba(0,0,0,.04); }
    .date-field { flex: 1; min-width: 220px; max-width: 280px; display: flex; align-items: center; gap: 12px; background: var(--surface2); border-radius: 14px; padding: 0 18px; height: 52px; border: .5px solid var(--border2); }
    #dateInput { flex: 1; border: none; background: transparent; font-size: 17px; font-weight: 500; cursor: pointer; }
    .btn-book { height: 52px; padding: 0 32px; background: var(--blue); color: white; border: none; border-radius: 980px; font-weight: 600; cursor: pointer; box-shadow: 0 2px 6px rgba(0,113,227,.3); }
    .btn-book:hover { background: var(--blue-h); transform: scale(0.98); }
    .pills { display: flex; gap: 12px; flex-wrap: wrap; }
    .pill { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; color: var(--ink3); background: var(--surface); border: .5px solid var(--border2); border-radius: 980px; padding: 6px 16px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-navy  { background: #3a7bd5; }
    .dot-sage  { background: #30a862; }
    .dot-rust  { background: #e05c2a; }
    .dot-amber { background: var(--amber); }
    .dot-green { background: var(--green); }
    .dot-red   { background: var(--red); }
    .grid-card { background: var(--surface); border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,.06); overflow: hidden; border: .5px solid var(--border); width: 100%; position: relative; }
    .grid-scroll { overflow-x: auto; overflow-y: visible; position: relative; width: 100%; }
    #tableDesktop { display: table; border-collapse: collapse; table-layout: fixed; width: 100%; min-width: 1100px; font-size: 14px; }
    #tableDesktop thead th { height: var(--cell-h); font-size: 13px; font-weight: 600; color: var(--ink4); border-bottom: 1px solid var(--border2); border-right: .5px solid var(--border); text-align: center; background: var(--surface2); position: sticky; top: 0; z-index: 3; }
    #tableDesktop thead th.corner { width: var(--lane-w); min-width: var(--lane-w); background: var(--surface2); border-right: 1px solid var(--border2); position: sticky; left: 0; z-index: 5; }
    #tableDesktop thead th.th-time { cursor: pointer; width: var(--cell-w); min-width: var(--cell-w); transition: .12s; }
    #tableDesktop thead th.th-time:hover { background: #fff4e0; color: var(--amber); }
    #tableDesktop tbody tr { height: var(--cell-h); }
    #tableDesktop tbody td.lane-hdr { width: var(--lane-w); min-width: var(--lane-w); font-size: 17px; font-weight: 700; border-bottom: .5px solid var(--border2); border-right: 1px solid var(--border2); text-align: center; background: var(--surface2); position: sticky; left: 0; z-index: 2; }
    .lane-hdr.grp-navy { color: #1d4f9f; background: #eef3fc !important; }
    .lane-hdr.grp-sage { color: #1a6640; background: #edf7f0 !important; }
    .lane-hdr.grp-rust { color: #a83418; background: #fdf0ea !important; }
    #tableDesktop tbody td.slot { cursor: crosshair; border-bottom: .5px solid var(--border); border-right: .5px solid var(--border); text-align: center; font-size: 12px; transition: background 0.05s; }
    #tableDesktop tbody tr.row-navy td.slot { background: #f8fafd; }
    #tableDesktop tbody tr.row-sage td.slot { background: #f6fcf8; }
    #tableDesktop tbody tr.row-rust td.slot { background: #fef8f4; }
    #tableDesktop tbody td.slot.drag-over { background: #fff0c0 !important; }
    #tableDesktop tbody td.slot.drag-selected { background: #ffe6a3 !important; }
    #tableDesktop tbody td.slot.anchor-highlight { background: #ffda7c !important; outline: 2px solid var(--amber); outline-offset: -2px; border-radius: 8px; }
    #tableMobile { display: none; border-collapse: collapse; width: 100%; }
    @media (max-width: 800px) {
      #tableDesktop { display: none; }
      #tableMobile { display: table; }
      :root { --cell-h: 48px; --cell-w: 52px; --lane-w: 80px; }
      .page { padding: 16px 12px 70px; }
    }
    #tableMobile thead th { height: 44px; font-size: 13px; font-weight: 600; border-bottom: .5px solid var(--border2); border-right: .5px solid var(--border); text-align: center; }
    #tableMobile thead th.hdr-navy { background: #eef3fc; color: #1d4f9f; }
    #tableMobile thead th.hdr-sage { background: #edf7f0; color: #1a6640; }
    #tableMobile thead th.hdr-rust { background: #fdf0ea; color: #a83418; }
    #tableMobile th.tcol { background: var(--surface2); color: var(--ink4); font-size: 11px; font-weight: 600; border-left: .5px solid var(--border2); cursor: pointer; position: sticky; top: 0; z-index: 3; }
    #tableMobile td { height: 42px; border-bottom: .5px solid var(--border); border-right: .5px solid var(--border); text-align: center; font-size: 11px; cursor: crosshair; }
    #tableMobile td.slot.drag-over { background: #fff0c0 !important; }
    #tableMobile td.slot.drag-selected { background: #ffe6a3 !important; }
    #slidersLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    .slider { position: absolute; border-radius: 12px; pointer-events: auto; cursor: grab; padding: 6px 10px; display: flex; flex-direction: column; justify-content: center; gap: 2px; transition: all 0.08s; box-shadow: 0 2px 8px rgba(0,0,0,0.12); backdrop-filter: blur(2px); }
    .slider:active { cursor: grabbing; }
    .slider.pending   { background: rgba(255,159,10,0.25); border: 1px solid rgba(255,159,10,0.8); }
    .slider.confirmed { background: rgba(52,199,89,0.25); border: 1px solid rgba(52,199,89,0.8); }
    .slider.rejected  { background: rgba(255,59,48,0.25); border: 1px solid rgba(255,59,48,0.8); }
    .sl-name { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sl-time { font-size: 9px; opacity: 0.8; white-space: nowrap; }
    .pending .sl-name, .pending .sl-time { color: #7d4a00; }
    .confirmed .sl-name, .confirmed .sl-time { color: #1a5e2a; }
    .rejected .sl-name, .rejected .sl-time { color: #8c1a14; }
    .resize-handle { position: absolute; right: 4px; top: 0; bottom: 0; width: 12px; cursor: ew-resize; background: rgba(0,0,0,0.1); border-radius: 12px; pointer-events: auto; z-index: 12; }
    .resize-handle-left { left: 4px; right: auto; cursor: ew-resize; }
    .slider:hover .resize-handle { background: rgba(0,0,0,0.25); }
    #cardsContainer { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
    .bcard { display: flex; align-items: center; gap: 14px; background: var(--surface); border: .5px solid var(--border2); border-radius: 20px; padding: 12px 18px; cursor: pointer; transition: all 0.1s; }
    .bcard:hover { background: #fffaf0; }
    .bcard-title { font-size: 15px; font-weight: 700; }
    .bcard-sub { font-size: 13px; color: var(--ink3); }
    .bcard-rm { width: 30px; height: 30px; border-radius: 30px; background: var(--surface2); border: .5px solid var(--border2); font-size: 16px; cursor: pointer; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); z-index: 2000; justify-content: center; align-items: flex-end; }
    .overlay.open { display: flex; }
    @media(min-width: 560px) { .overlay { align-items: center; } .sheet { border-radius: 32px !important; max-width: 480px; } }
    .sheet { background: var(--surface); border-radius: 28px 28px 0 0; width: 100%; }
    .sheet-head { padding: 20px 24px 8px; display: flex; justify-content: space-between; align-items: center; }
    .sheet-title { font-size: 24px; font-weight: 700; }
    .sheet-x { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); border: .5px solid var(--border2); font-size: 20px; cursor: pointer; }
    .sheet-body { padding: 12px 24px 28px; }
    .f-group { margin-bottom: 20px; }
    .f-label { font-size: 13px; font-weight: 600; color: var(--ink3); display: block; margin-bottom: 6px; }
    .f-input { width: 100%; background: var(--surface2); border: .5px solid var(--border2); border-radius: 14px; font-size: 16px; padding: 14px 16px; }
    .f-actions { display: flex; gap: 12px; margin-top: 24px; }
    .f-btn-ok { flex:1; height: 52px; background: var(--blue); color: white; border: none; border-radius: 980px; font-weight: 600; cursor: pointer; }
    .f-btn-cancel { height: 52px; padding: 0 24px; background: var(--surface2); border: .5px solid var(--border2); border-radius: 980px; cursor: pointer; }
    .info-list { border-radius: 18px; border: .5px solid var(--border2); margin-bottom: 24px; overflow: hidden; }
    .info-row { display: flex; justify-content: space-between; padding: 14px 18px; border-bottom: .5px solid var(--border); background: var(--surface2); }
    .confirm-btns { display: flex; gap: 12px; margin: 12px 0 16px; }
    .cb-yes, .cb-no { flex:1; height: 48px; border-radius: 980px; font-weight: 600; border: none; cursor: pointer; }
    .cb-yes { background: rgba(52,199,89,.15); color: #1a6630; }
    .cb-no  { background: rgba(255,59,48,.1); color: #a81a10; }
    .del-btn { width:100%; height: 48px; background: transparent; border: .5px solid var(--border2); border-radius: 980px; cursor: pointer; }
    #loader { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index:5000; align-items:center; justify-content:center; }
    .loader-box { background: white; border-radius: 32px; padding: 28px 40px; text-align: center; }
    .spin { width: 38px; height: 38px; border: 3px solid #ddd; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="login"><div class="login-glyph">🎱</div><div class="login-title">Бильярд Клуб</div><div class="login-sub">Бронирование столов</div><div class="login-sep"></div><div id="g_id_onload" data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div><div class="g_id_signin" data-type="standard"></div></div>

<div id="content">
  <nav class="nav"><span class="nav-title">🎱 LUCKY STRIKE · DRAG БРОНЬ</span><button class="nav-btn" onclick="openImg()">📐 Схема зала</button></nav>
  <div class="page">
    <div class="ctrl"><div class="date-field"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><input type="date" id="dateInput"/></div><button class="btn-book" onclick="openBookModal()">➕ Новая бронь</button></div>
    <div class="pills"><div class="pill"><div class="dot dot-navy"></div>Столы 1–3</div><div class="pill"><div class="dot dot-sage"></div>Столы 4–6</div><div class="pill"><div class="dot dot-rust"></div>Столы 7–12</div><div class="pill"><div class="dot dot-amber"></div>Ожидает</div><div class="pill"><div class="dot dot-green"></div>Подтверждено</div><div class="pill"><div class="dot dot-red"></div>Отменено</div></div>

    <div class="grid-card"><div class="grid-scroll" id="gridScroll"><table id="tableDesktop"><thead id="dtHead"><tr><th class="corner">СТОЛ</th></tr></thead><tbody id="dtBody"></tbody></table><table id="tableMobile"><thead id="mtHeadRow"></thead><tbody id="mtBody"></tbody></table><div id="slidersLayer"></div></div></div>
    <div id="cardsContainer"></div>
  </div>
</div>

<div id="bookModal" class="overlay"><div class="sheet"><div class="sheet-head"><div class="sheet-title">Новая бронь</div><button class="sheet-x" onclick="closeBookModal()">×</button></div><div class="sheet-body"><div class="f-group"><label class="f-label">Имя клиента</label><input class="f-input" id="nameInput" placeholder="Иван Петров"/></div><div class="f-group"><label class="f-label">Телефон</label><input class="f-input" id="phoneInput" placeholder="+380 99 123 45 67"/></div><div class="f-group"><label class="f-label">Комментарий</label><textarea class="f-input" id="commentInput" rows="2" placeholder="Пожелания..."></textarea></div><div class="f-actions"><button class="f-btn-ok" onclick="submitForm()">Подтвердить</button><button class="f-btn-cancel" onclick="closeBookModal()">Отмена</button></div></div></div></div>
<div id="infoModal" class="overlay"><div class="sheet"><div class="sheet-head"><div class="sheet-title">Детали</div><button class="sheet-x" onclick="closeInfoModal()">×</button></div><div class="sheet-body"><div class="info-list"><div class="info-row"><span class="info-lbl">Стол</span><span id="i-table"></span></div><div class="info-row"><span class="info-lbl">Дата</span><span id="i-date"></span></div><div class="info-row"><span class="info-lbl">Время</span><span id="i-time"></span></div><div class="info-row"><span class="info-lbl">Имя</span><span id="i-name"></span></div><div class="info-row"><span class="info-lbl">Телефон</span><span id="i-phone"></span></div><div class="info-row"><span class="info-lbl">Комментарий</span><span id="i-comment"></span></div><div class="info-row"><span class="info-lbl">Статус</span><span id="i-status"></span></div></div><div class="confirm-btns"><button class="cb-yes" onclick="confirmBooking(true)">✅ Состоялось</button><button class="cb-no" onclick="confirmBooking(false)">❌ Не пришли</button></div><button class="del-btn" onclick="deleteBooking()">🗑 Удалить бронь</button></div></div></div>
<div id="imgPopup" class="overlay"><div class="img-wrap"><button class="img-x" onclick="closeImg()">×</button><img src="https://i.postimg.cc/52ZDKDDw/55.png" alt="Схема"/></div></div>
<div id="loader"><div class="loader-box"><div class="spin"></div><div class="loader-txt">Загрузка...</div></div></div>

<script>
  const GAS = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
  const ALLOWED = ["vadiksss900@gmail.com","sergey99belov@gmail.com","popadinecvasil3@gmail.com","veronicadiakova04@gmail.com","info.luckystrike.kh@gmail.com","sashavolobuev123890@gmail.com","egorgorbushko@gmail.com","shatrava.o@gmail.com","Craftmax30@gmail.com","bowlingblock.b@gmail.com","lana.arnaut@gmail.com","polosinnikita1224@gmail.com","sofialat1506@gmail.com","ll3991940@gmail.com","ken040888@gmail.com"];
  const LANES = 12, SH = 11, EH = 22;
  const slots = []; for(let h=SH; h<=EH; h++) { slots.push({ label: `${h}:00`, key: h }); if(h<EH) slots.push({ label: `${h}:30`, key: h+0.5 }); }
  const LANE_GROUPS = [0,0,0,1,1,1,2,2,2,2,2,2];
  const GRP_CLASS = ['grp-navy','grp-sage','grp-rust'];
  const ROW_CLASS = ['row-navy','row-sage','row-rust'];

  let dragState = { active: false, lane: null, startTime: null, currentTime: null, isResizeLeft: false, isResizeRight: false, editingBooking: null, originalStart: null, originalEnd: null };
  let existingBookings = []; // загруженные брони для текущей даты
  let $ = id => document.getElementById(id);
  
  function parseJwt(t){ return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
  function handleCredentialResponse(r){ let d=parseJwt(r.credential); if(ALLOWED.includes(d.email)){ localStorage.setItem("ue",d.email); location.reload(); } else alert("Доступ запрещён"); }
  window.onload = ()=>{ if(localStorage.getItem("ue") && ALLOWED.includes(localStorage.getItem("ue"))){ $("login").style.display="none"; $("content").style.display="block"; init(); } };
  
  function init(){ buildTables(); attachDragEvents(); $("dateInput").value = new Date().toISOString().split('T')[0]; $("dateInput").addEventListener("change", ()=> loadBookings()); loadBookings(); }
  function buildTables(){
    let headRow = document.querySelector("#dtHead tr");
    slots.forEach(sl=>{ let th=document.createElement("th"); th.className="th-time"; th.dataset.time=sl.key; th.textContent=sl.label; headRow.appendChild(th); });
    let body=$("dtBody");
    for(let lane=0; lane<LANES; lane++){ let tr=document.createElement("tr"); tr.className=ROW_CLASS[LANE_GROUPS[lane]]; tr.dataset.lane=lane;
      let lhdr=document.createElement("td"); lhdr.className=`lane-hdr ${GRP_CLASS[LANE_GROUPS[lane]]}`; lhdr.textContent=`№ ${lane+1}`; tr.appendChild(lhdr);
      slots.forEach((sl,si)=>{ let td=document.createElement("td"); td.className="slot"; td.dataset.lane=lane; td.dataset.time=sl.key; td.dataset.si=si; tr.appendChild(td); });
      body.appendChild(tr);
    }
    let mtHead=$("mtHeadRow"); for(let i=0;i<LANES;i++){ let th=document.createElement("th"); let grp=LANE_GROUPS[i]; th.className=grp===0?"hdr-navy":grp===1?"hdr-sage":"hdr-rust"; th.textContent=i+1; mtHead.appendChild(th); }
    let thTime=document.createElement("th"); thTime.className="tcol"; thTime.textContent="ВРЕМЯ"; mtHead.appendChild(thTime);
    let mtBody=$("mtBody"); slots.forEach(sl=>{ let tr=document.createElement("tr");
      for(let lane=0; lane<LANES; lane++){ let td=document.createElement("td"); td.className="slot"; td.dataset.lane=lane; td.dataset.time=sl.key; tr.appendChild(td); }
      let th=document.createElement("th"); th.className="tcol"; th.textContent=sl.label; tr.appendChild(th); mtBody.appendChild(tr);
    });
  }
  function attachDragEvents(){
    let container = $("gridScroll");
    container.addEventListener("mousedown", onMouseDown);
    container.addEventListener("mousemove", onMouseMove);
    container.addEventListener("mouseup", onMouseUp);
    container.addEventListener("dragstart", e=>e.preventDefault());
  }
  function getSlotFromTarget(target){ let el=target.closest?.(".slot"); if(!el) return null; let lane=parseInt(el.dataset.lane), time=parseFloat(el.dataset.time); return {lane, time, element:el}; }
  function getTimeIndex(time){ return slots.findIndex(s=>s.key===time); }
  function onMouseDown(e){ let slotInfo=getSlotFromTarget(e.target); if(!slotInfo) return; let handle=e.target.closest?.(".resize-handle"); if(handle){ let sliderDiv=handle.closest(".slider"); if(sliderDiv && sliderDiv.bookingData){ let booking=sliderDiv.bookingData; let idx=existingBookings.findIndex(b=>b.id===booking.id); if(idx!==-1){ dragState.active=true; dragState.editingBooking=booking; dragState.originalStart=booking.start; dragState.originalEnd=booking.end; dragState.isResizeLeft=handle.classList.contains("resize-handle-left"); dragState.isResizeRight=!dragState.isResizeLeft; dragState.lane=booking.table-1; dragState.startTime=null; dragState.currentTime=null; e.preventDefault(); return; } } }
    let {lane, time}=slotInfo; if(lane===undefined) return; dragState.active=true; dragState.lane=lane; dragState.startTime=time; dragState.currentTime=time; dragState.isResizeLeft=false; dragState.isResizeRight=false; dragState.editingBooking=null; clearDragHighlights(); highlightSlotsInRange(lane, time, time); e.preventDefault(); }
  function onMouseMove(e){ if(!dragState.active) return; let targetEl=document.elementsFromPoint(e.clientX, e.clientY)[0]; let slotInfo=getSlotFromTarget(targetEl); if(!slotInfo) return; if(dragState.editingBooking){ let newTime=slotInfo.time; if(dragState.isResizeLeft){ let newStart=Math.min(newTime, dragState.originalEnd-0.5); if(newStart<dragState.originalEnd){ dragState.startTime=newStart; dragState.currentTime=dragState.originalEnd; } } else if(dragState.isResizeRight){ let newEnd=Math.max(newTime, dragState.originalStart+0.5); dragState.currentTime=newEnd; dragState.startTime=dragState.originalStart; } else return; } else { if(slotInfo.lane===dragState.lane){ dragState.currentTime=slotInfo.time; } else { return; } }
    clearDragHighlights(); let start=Math.min(dragState.startTime, dragState.currentTime); let end=Math.max(dragState.startTime, dragState.currentTime); highlightSlotsInRange(dragState.lane, start, end); }
  function onMouseUp(e){ if(!dragState.active) return; let start=Math.min(dragState.startTime, dragState.currentTime); let end=Math.max(dragState.startTime, dragState.currentTime); if(start!==end && dragState.editingBooking && (dragState.isResizeLeft || dragState.isResizeRight)){ let booking=dragState.editingBooking; let newStart=dragState.isResizeLeft?start:booking.start; let newEnd=dragState.isResizeRight?end:booking.end; if(newStart!==booking.start || newEnd!==booking.end){ updateBookingTime(booking.id, newStart, newEnd); } } else if(!dragState.editingBooking && start!==end){ let date=$("dateInput").value; let existingForLane=existingBookings.filter(b=>b.table-1===dragState.lane && !(b.end<=start || b.start>=end)); if(existingForLane.length>0){ alert("Этот интервал пересекается с существующей бронью. Выберите другой промежуток."); } else { let newBookingLocal={date, tableNumber:dragState.lane+1, start:start, end:end, name:"Новая бронь", phone:"", comment:"", confirmed:null}; showQuickModal(newBookingLocal); } }
    dragState.active=false; dragState.editingBooking=null; clearDragHighlights(); }
  function highlightSlotsInRange(lane, startTime, endTime){ let selector=`td.slot[data-lane="${lane}"]`; let slotsList=document.querySelectorAll(selector); slotsList.forEach(slot=>{ let t=parseFloat(slot.dataset.time); if(t>=startTime && t<=endTime) slot.classList.add("drag-selected"); else if(t===startTime || t===endTime) slot.classList.add("drag-over"); }); }
  function clearDragHighlights(){ document.querySelectorAll(".drag-selected, .drag-over").forEach(el=>el.classList.remove("drag-selected","drag-over")); }
  async function updateBookingTime(id, newStart, newEnd){ showLoad(); try{ await fetch(GAS,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"updateTime",id,start:newStart,end:newEnd})}); await loadBookings(); } catch(e){ alert("Ошибка обновления"); } finally{ hideLoad(); } }
  async function showQuickModal(booking){ $("nameInput").value=booking.name; $("phoneInput").value=booking.phone||""; $("commentInput").value=booking.comment||""; window.pendingBooking=booking; openBookModal(); }
  async function submitForm(){ let name=$("nameInput").value.trim(), phone=$("phoneInput").value.trim(), comment=$("commentInput").value.trim(); if(!name||!phone) return alert("Введите имя и телефон"); if(window.pendingBooking){ let b=window.pendingBooking; b.name=name; b.phone=phone; b.comment=comment; showLoad(); try{ await fetch(GAS,{method:"POST",mode:"no-cors",body:JSON.stringify({bookings:[b]})}); closeBookModal(); $("nameInput").value=""; $("phoneInput").value=""; $("commentInput").value=""; window.pendingBooking=null; await loadBookings(); } catch(e){ alert("Ошибка"); } finally{ hideLoad(); } } else { alert("Нет активного выделения"); } }
  async function loadBookings(){ showLoad(); try{ let res=await fetch(GAS+"?action=get&date="+$("dateInput").value); let data=await res.json(); existingBookings=data.bookings||[]; renderSlidersAndCards(); } catch(e){ console.warn(e); existingBookings=[]; renderSlidersAndCards(); } finally{ hideLoad(); } }
  function renderSlidersAndCards(){ $("slidersLayer").innerHTML=""; let container=$("gridScroll"); let tableRect=container.getBoundingClientRect(); let isDesktop=window.innerWidth>800; if(isDesktop) renderDesktopSliders(tableRect); else renderMobileSliders(tableRect); renderCardsList(); }
  function renderDesktopSliders(containerRect){ let rows=Array.from($("dtBody").querySelectorAll("tr")); let colMap={}; slots.forEach((sl,i)=>{ colMap[sl.key]=i+1; }); existingBookings.forEach(b=>{ if(b.date!==$("dateInput").value)return; let laneIdx=b.table-1, start=+b.start, end=+b.end, si=colMap[start], ei=colMap[end]; if(!si||!ei)return; let row=rows[laneIdx]; if(!row)return; let sc=row.cells[si], ec=row.cells[ei]; if(!sc||!ec)return; let left=sc.offsetLeft+1, top=row.offsetTop+1, width=(ec.offsetLeft+ec.offsetWidth)-sc.offsetLeft-2, height=row.offsetHeight-2; let slider=makeSliderElement(b,start,end); slider.style.cssText=`left:${left}px;top:${top}px;width:${width}px;height:${height}px;position:absolute;`; addResizeHandles(slider,b); $("slidersLayer").appendChild(slider); }); }
  function renderMobileSliders(containerRect){ let mtRows=Array.from($("mtBody").querySelectorAll("tr")); let rowByKey={}; slots.forEach((sl,i)=>{ rowByKey[sl.key]=mtRows[i]; }); existingBookings.forEach(b=>{ if(b.date!==$("dateInput").value)return; let laneIdx=b.table-1, start=+b.start, end=+b.end, startRow=rowByKey[start], endRow=rowByKey[end]; if(!startRow||!endRow)return; let cell=startRow.cells[laneIdx]; if(!cell)return; let left=cell.offsetLeft+1, top=startRow.offsetTop+1, width=cell.offsetWidth-2, height=(endRow.offsetTop+endRow.offsetHeight)-startRow.offsetTop-2; let slider=makeSliderElement(b,start,end); slider.style.cssText=`left:${left}px;top:${top}px;width:${width}px;height:${height}px;position:absolute;`; addResizeHandles(slider,b); $("slidersLayer").appendChild(slider); }); }
  function makeSliderElement(b,start,end){ let el=document.createElement("div"); el.className="slider "+(b.confirmed==="Да"?"confirmed":b.confirmed==="Нет"?"rejected":"pending"); let nd=document.createElement("div"); nd.className="sl-name"; nd.textContent=b.name||"—"; let td=document.createElement("div"); td.className="sl-time"; td.textContent=`${fmt(start)} – ${fmt(end)}`; el.append(nd,td); el.bookingData=b; el.addEventListener("click",e=>{ e.stopPropagation(); showInfoModal(b); }); return el; }
  function addResizeHandles(slider,booking){ let leftHandle=document.createElement("div"); leftHandle.className="resize-handle resize-handle-left"; let rightHandle=document.createElement("div"); rightHandle.className="resize-handle"; slider.appendChild(leftHandle); slider.appendChild(rightHandle); }
  function fmt(v){ return `${Math.floor(v)}:${v%1===0.5?'30':'00'}`; }
  function renderCardsList(){ let container=$("cardsContainer"); container.innerHTML=""; let dd=$("dateInput").value.split("-").reverse().join("."); existingBookings.forEach(b=>{ let s=+b.start, e=+b.end; let div=document.createElement("div"); div.className="bcard"; div.innerHTML=`<div class="bcard-info"><div class="bcard-title">Стол №${b.table}</div><div class="bcard-sub">${dd} · ${fmt(s)} – ${fmt(e)}</div><div class="bcard-sub">${b.name}</div></div>`; let rm=document.createElement("button"); rm.className="bcard-rm"; rm.innerHTML="✕"; rm.onclick=async ev=>{ ev.stopPropagation(); if(confirm("Удалить бронь?")){ showLoad(); await fetch(GAS,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"delete",id:b.id})}); await loadBookings(); hideLoad(); } }; div.appendChild(rm); div.addEventListener("click",()=>showInfoModal(b)); container.appendChild(div); }); }
  function showInfoModal(b){ $("i-table").textContent="№ "+b.table; $("i-date").textContent=b.date.split("-").reverse().join("."); $("i-time").textContent=`${fmt(+b.start)} – ${fmt(+b.end)}`; $("i-name").textContent=b.name; $("i-phone").textContent=b.phone; $("i-comment").textContent=b.comment||"—"; let s=$("i-status"); if(b.confirmed==="Да") s.innerHTML='<span style="background:#e0f7e8; padding:4px 12px; border-radius:40px;">✓ Подтверждено</span>'; else if(b.confirmed==="Нет") s.innerHTML='<span style="background:#ffe5e2; padding:4px 12px; border-radius:40px;">✕ Не состоялось</span>'; else s.innerHTML='<span style="background:#fff1df; padding:4px 12px; border-radius:40px;">⏳ Ожидает</span>'; window.currentInfoId=b.id; $("infoModal").classList.add("open"); }
  function closeInfoModal(){ $("infoModal").classList.remove("open"); window.currentInfoId=null; }
  async function confirmBooking(yes){ if(!window.currentInfoId)return; showLoad(); try{ await fetch(GAS,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"confirm",id:window.currentInfoId,confirmed:yes})}); closeInfoModal(); await loadBookings(); } catch(e){} finally{ hideLoad(); } }
  async function deleteBooking(){ if(!window.currentInfoId||!confirm("Удалить бронь?"))return; showLoad(); try{ await fetch(GAS,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"delete",id:window.currentInfoId})}); closeInfoModal(); await loadBookings(); } catch(e){} finally{ hideLoad(); } }
  function openBookModal(){ $("bookModal").classList.add("open"); }
  function closeBookModal(){ $("bookModal").classList.remove("open"); window.pendingBooking=null; }
  function openImg(){ $("imgPopup").classList.add("open"); } function closeImg(){ $("imgPopup").classList.remove("open"); }
  function showLoad(){ $("loader").style.display="flex"; } function hideLoad(){ $("loader").style.display="none"; }
  ["bookModal","infoModal","imgPopup"].forEach(id=>{ $(id)?.addEventListener("click",e=>{ if(e.target=== $(id)) $(id).classList.remove("open"); }); });
  window.addEventListener("resize",()=>{ loadBookings(); });
</script>
