<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LUCKY STRIKE — Бронирование столов</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --text: #f0f0f0;
      --text2: #aaa;
      --accent: #f0b90b;
      --accent2: #f8d33a;
      --green: #00c853;
      --red: #ff1744;
      --blue: #2979ff;
      --r: 16px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --cell-w: 70px;
      --cell-h: 56px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Экран входа */
    .login-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a0a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 24px;
    }
    .login-screen .logo {
      font-size: 64px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .login-screen h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #f0b90b, #f8d33a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-screen p {
      color: var(--text2);
      font-size: 14px;
    }

    /* Основной контент */
    .app {
      display: none;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Навигация */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .navbar .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 20px;
      font-weight: 700;
    }
    .navbar .brand span {
      color: var(--accent);
    }
    .navbar .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 100px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .navbar .btn:hover {
      background: #333;
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Панель управления */
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
      background: var(--surface);
      padding: 16px;
      border-radius: var(--r);
      border: 1px solid var(--border);
    }
    .toolbar input[type="date"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 16px;
      font-family: var(--font);
      cursor: pointer;
      min-width: 200px;
    }
    .toolbar .btn-primary {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 100px;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .toolbar .btn-primary:hover {
      background: var(--accent2);
      transform: scale(1.02);
    }
    .toolbar .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Черновики */
    .drafts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-left: auto;
    }
    .draft-tag {
      background: rgba(41, 121, 255, 0.15);
      border: 1px solid var(--blue);
      color: var(--blue);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .draft-card {
      background: var(--surface2);
      border: 1px solid var(--blue);
      border-radius: 12px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    .draft-card .remove-draft {
      background: none;
      border: none;
      color: #ff5252;
      cursor: pointer;
      font-size: 18px;
      padding: 0 4px;
      font-weight: bold;
    }

    /* Сетка */
    .grid-container {
      background: var(--surface);
      border-radius: var(--r);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .grid-scroll {
      overflow-x: auto;
      position: relative;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 900px;
      table-layout: fixed;
    }
    th {
      background: var(--surface2);
      color: var(--text2);
      font-size: 12px;
      font-weight: 600;
      padding: 12px 4px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    th.corner {
      width: 90px;
      left: 0;
      z-index: 3;
      background: var(--surface2);
    }
    td {
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      height: var(--cell-h);
      text-align: center;
      cursor: pointer;
      transition: background 0.1s;
    }
    td.lane-label {
      width: 90px;
      font-weight: 700;
      font-size: 16px;
      background: var(--surface2);
      position: sticky;
      left: 0;
      z-index: 1;
      cursor: default;
    }
    td.slot {
      background: rgba(255,255,255,0.01);
    }
    td.slot:hover {
      background: rgba(255,255,255,0.03);
    }
    td.slot.dragging {
      background: rgba(240, 185, 11, 0.2) !important;
    }
    td.slot.selected {
      background: rgba(41, 121, 255, 0.25) !important;
      border: 2px solid var(--blue);
    }

    /* Слайдеры броней */
    .slider {
      position: absolute;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4px 8px;
      cursor: grab;
      font-size: 11px;
      overflow: hidden;
      z-index: 10;
      transition: box-shadow 0.2s;
      border: 2px solid transparent;
    }
    .slider:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 20;
    }
    .slider.dragging {
      opacity: 0.7;
      cursor: grabbing;
      z-index: 100;
    }
    .slider.pending {
      background: rgba(240, 185, 11, 0.25);
      border-color: var(--accent);
    }
    .slider.confirmed {
      background: rgba(0, 200, 83, 0.25);
      border-color: var(--green);
    }
    .slider.rejected {
      background: rgba(255, 23, 68, 0.2);
      border-color: var(--red);
      opacity: 0.7;
    }
    .slider.temp {
      background: rgba(41, 121, 255, 0.3);
      border-color: var(--blue);
    }
    .slider .sl-name {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .slider .sl-time {
      opacity: 0.8;
      font-size: 10px;
    }
    .resize-handle {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 12px;
      cursor: ew-resize;
      background: rgba(255,255,255,0.1);
      z-index: 5;
    }
    .resize-handle.left {
      left: 0;
      border-radius: 8px 0 0 8px;
    }
    .resize-handle.right {
      right: 0;
      border-radius: 0 8px 8px 0;
    }
    .resize-handle:hover {
      background: rgba(255,255,255,0.3);
    }

    /* Модальные окна */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-overlay.hidden {
      display: none;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal h2 {
      font-size: 22px;
      margin-bottom: 20px;
    }
    .modal label {
      display: block;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .modal input, .modal textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      border-radius: 12px;
      font-family: var(--font);
      font-size: 15px;
      margin-bottom: 16px;
      resize: vertical;
    }
    .modal .btn-row {
      display: flex;
      gap: 12px;
    }
    .modal .btn {
      flex: 1;
      padding: 14px;
      border-radius: 100px;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
      border: none;
      text-align: center;
    }
    .modal .btn.confirm {
      background: var(--accent);
      color: #000;
    }
    .modal .btn.cancel {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .modal .btn.danger {
      background: rgba(255,23,68,0.15);
      color: var(--red);
      border: 1px solid var(--red);
    }

    /* Легенда */
    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      font-size: 12px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    @media (max-width: 768px) {
      .toolbar {
        flex-direction: column;
      }
      .drafts {
        margin-left: 0;
      }
      .modal {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

<!-- Экран входа -->
<div id="loginScreen" class="login-screen">
  <div class="logo">🎱</div>
  <h1>LUCKY STRIKE</h1>
  <p>Бронирование бильярдных столов</p>
  <div id="g_id_onload"
       data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com"
       data-callback="onGoogleSignIn"
       data-auto_prompt="false">
  </div>
  <div class="g_id_signin" data-type="standard"></div>
</div>

<!-- Основное приложение -->
<div id="app" class="app">
  <nav class="navbar">
    <div class="brand">🎱 <span>LUCKY STRIKE</span></div>
    <button class="btn" onclick="showHallScheme()">📐 Схема зала</button>
  </nav>

  <div class="toolbar">
    <input type="date" id="datePicker">
    <button class="btn-primary" id="bookBtn" onclick="openBookingModal()" disabled>
      ➕ Забронировать
    </button>
    <div class="drafts" id="draftsContainer"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#f0b90b;"></div> Ожидает</div>
    <div class="legend-item"><div class="legend-dot" style="background:#00c853;"></div> Подтверждено</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff1744;"></div> Отменено</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2979ff;"></div> Черновик</div>
  </div>

  <div class="grid-container">
    <div class="grid-scroll" id="gridScroll">
      <table id="gridTable">
        <thead id="gridHead"></thead>
        <tbody id="gridBody"></tbody>
      </table>
      <div id="slidersLayer" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></div>
    </div>
  </div>
</div>

<!-- Модалка бронирования -->
<div id="bookingModal" class="modal-overlay hidden">
  <div class="modal">
    <h2>Новая бронь</h2>
    <label>Имя *</label>
    <input type="text" id="guestName" placeholder="Иван Петров">
    <label>Телефон</label>
    <input type="tel" id="guestPhone" placeholder="+7 123 456-78-90">
    <label>Комментарий</label>
    <textarea id="guestComment" rows="2" placeholder="Пожелания..."></textarea>
    <div class="btn-row">
      <button class="btn cancel" onclick="closeBookingModal()">Отмена</button>
      <button class="btn confirm" onclick="submitBooking()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Модалка деталей -->
<div id="infoModal" class="modal-overlay hidden">
  <div class="modal">
    <h2>Детали брони</h2>
    <div id="infoContent"></div>
    <div class="btn-row" style="margin-top:16px;">
      <button class="btn cancel" onclick="closeInfoModal()">Закрыть</button>
    </div>
    <button class="btn danger" style="width:100%;margin-top:8px;" onclick="deleteCurrentBooking()">
      🗑 Удалить бронь
    </button>
  </div>
</div>

<!-- Модалка схемы -->
<div id="hallModal" class="modal-overlay hidden" onclick="closeHallScheme()">
  <img src="https://i.postimg.cc/52ZDKDDw/55.png" style="max-width:90vw;max-height:90vh;border-radius:20px;cursor:pointer;" onclick="event.stopPropagation()">
</div>

<script>
  (function() {
    // Конфигурация
    const API_URL = "https://script.google.com/macros/s/AKfycbzLxSrpcGOIm34gLlFZS-EYZmG8liMLcUST3MRMoAp56y6XDC2ClapCDB18yiYmdrHZ/exec";
    const ALLOWED_EMAILS = [
      "vadiksss900@gmail.com", "sergey99belov@gmail.com", "popadinecvasil3@gmail.com",
      "veronicadiakova04@gmail.com", "info.luckystrike.kh@gmail.com", "sashavolobuev123890@gmail.com",
      "egorgorbushko@gmail.com", "shatrava.o@gmail.com", "Craftmax30@gmail.com",
      "bowlingblock.b@gmail.com", "lana.arnaut@gmail.com", "polosinnikita1224@gmail.com",
      "sofialat1506@gmail.com", "ll3991940@gmail.com", "ken040888@gmail.com"
    ];
    const TABLE_COUNT = 12;
    const START_HOUR = 11;
    const END_HOUR = 22;

    // Состояние
    let currentUser = null;
    let bookings = [];
    let drafts = [];
    let draftIdCounter = 0;
    let currentInfoBooking = null;

    // Генерация временных слотов
    function generateSlots() {
      const slots = [];
      for (let h = START_HOUR; h <= END_HOUR; h++) {
        slots.push({ label: `${h}:00`, value: h });
        if (h < END_HOUR) slots.push({ label: `${h}:30`, value: h + 0.5 });
      }
      return slots;
    }
    const SLOTS = generateSlots();

    // DOM элементы
    const $ = (id) => document.getElementById(id);
    const loginScreen = $('loginScreen');
    const app = $('app');
    const datePicker = $('datePicker');
    const bookBtn = $('bookBtn');
    const draftsContainer = $('draftsContainer');
    const gridHead = $('gridHead');
    const gridBody = $('gridBody');
    const slidersLayer = $('slidersLayer');
    const gridScroll = $('gridScroll');
    const bookingModal = $('bookingModal');
    const infoModal = $('infoModal');
    const infoContent = $('infoContent');
    const hallModal = $('hallModal');
    const guestName = $('guestName');
    const guestPhone = $('guestPhone');
    const guestComment = $('guestComment');

    // Авторизация Google
    function parseJwt(token) {
      const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
      return JSON.parse(atob(base64));
    }

    window.onGoogleSignIn = function(response) {
      const payload = parseJwt(response.credential);
      if (ALLOWED_EMAILS.includes(payload.email)) {
        currentUser = payload.email;
        localStorage.setItem('pool_user', payload.email);
        loginScreen.style.display = 'none';
        app.style.display = 'block';
        initApp();
      } else {
        alert('Доступ запрещён. Ваш email не в списке разрешённых.');
      }
    };

    // Инициализация
    function initApp() {
      const today = new Date().toISOString().split('T')[0];
      datePicker.value = today;
      datePicker.min = today;
      datePicker.addEventListener('change', loadBookings);

      buildGrid();
      loadBookings();
    }

    // Построение сетки
    function buildGrid() {
      // Заголовок
      const headerRow = document.createElement('tr');
      const cornerTh = document.createElement('th');
      cornerTh.className = 'corner';
      cornerTh.textContent = 'СТОЛ';
      headerRow.appendChild(cornerTh);

      SLOTS.forEach(slot => {
        const th = document.createElement('th');
        th.textContent = slot.label;
        headerRow.appendChild(th);
      });
      gridHead.innerHTML = '';
      gridHead.appendChild(headerRow);

      // Тело
      gridBody.innerHTML = '';
      for (let i = 0; i < TABLE_COUNT; i++) {
        const tr = document.createElement('tr');
        const labelTd = document.createElement('td');
        labelTd.className = 'lane-label';
        labelTd.textContent = `№ ${i + 1}`;
        tr.appendChild(labelTd);

        SLOTS.forEach((slot, idx) => {
          const td = document.createElement('td');
          td.className = 'slot';
          td.dataset.lane = i;
          td.dataset.slotIndex = idx;
          td.dataset.time = slot.value;
          tr.appendChild(td);
        });
        gridBody.appendChild(tr);
      }

      // Обработчики для выделения
      setupDragSelect();
    }

    // Выделение ячеек мышью
    let isSelecting = false;
    let selectStart = null;
    let selectEnd = null;

    function setupDragSelect() {
      const table = $('gridTable');

      table.addEventListener('mousedown', (e) => {
        const td = e.target.closest('td.slot');
        if (!td) return;
        e.preventDefault();
        isSelecting = true;
        selectStart = { lane: +td.dataset.lane, idx: +td.dataset.slotIndex };
        selectEnd = { ...selectStart };
        clearSelection();
        highlightSelection();
      });

      document.addEventListener('mousemove', (e) => {
        if (!isSelecting) return;
        const td = document.elementFromPoint(e.clientX, e.clientY);
        if (!td || !td.classList.contains('slot')) return;
        const lane = +td.dataset.lane;
        const idx = +td.dataset.slotIndex;
        if (lane === selectStart.lane) {
          selectEnd = { lane, idx };
          clearSelection();
          highlightSelection();
        }
      });

      document.addEventListener('mouseup', () => {
        if (!isSelecting) return;
        isSelecting = false;
        if (selectStart && selectEnd && selectStart.idx !== selectEnd.idx) {
          addDraftFromSelection();
        }
      });
    }

    function clearSelection() {
      document.querySelectorAll('td.slot.dragging').forEach(td => td.classList.remove('dragging'));
    }

    function highlightSelection() {
      if (!selectStart || !selectEnd) return;
      const minIdx = Math.min(selectStart.idx, selectEnd.idx);
      const maxIdx = Math.max(selectStart.idx, selectEnd.idx);
      for (let i = minIdx; i <= maxIdx; i++) {
        const cell = getSlotCell(selectStart.lane, i);
        if (cell) cell.classList.add('dragging');
      }
    }

    function getSlotCell(lane, slotIndex) {
      return gridBody?.rows[lane]?.cells[slotIndex + 1];
    }

    function addDraftFromSelection() {
      const minIdx = Math.min(selectStart.idx, selectEnd.idx);
      const maxIdx = Math.max(selectStart.idx, selectEnd.idx);
      const startTime = SLOTS[minIdx].value;
      const endTime = SLOTS[maxIdx].value;

      // Проверка конфликтов с бронями
      const hasConflict = bookings.some(b =>
        b.lane === selectStart.lane &&
        !(b.end <= startTime || b.start >= endTime)
      );
      if (hasConflict) {
        alert('Это время уже занято!');
        return;
      }

      // Проверка пересечения с другими черновиками на том же столе
      const overlapsDraft = drafts.some(d =>
        d.lane === selectStart.lane &&
        !(d.end <= startTime || d.start >= endTime)
      );
      if (overlapsDraft) {
        alert('Пересекается с другим черновиком на этом столе!');
        return;
      }

      drafts.push({
        id: ++draftIdCounter,
        lane: selectStart.lane,
        start: startTime,
        end: endTime
      });

      renderDrafts();
      renderSliders();
      bookBtn.disabled = false;
    }

    // Рендер черновиков
    function renderDrafts() {
      draftsContainer.innerHTML = '';
      if (drafts.length === 0) {
        bookBtn.disabled = true;
        return;
      }
      bookBtn.disabled = false;

      const tag = document.createElement('div');
      tag.className = 'draft-tag';
      tag.textContent = `✏️ Черновики: ${drafts.length}`;
      draftsContainer.appendChild(tag);

      drafts.forEach((draft, index) => {
        const card = document.createElement('div');
        card.className = 'draft-card';
        card.innerHTML = `
          <strong>Стол ${draft.lane + 1}</strong>
          <span>${formatTime(draft.start)}–${formatTime(draft.end)}</span>
          <button class="remove-draft" data-index="${index}">✕</button>
        `;
        card.querySelector('.remove-draft').addEventListener('click', (e) => {
          e.stopPropagation();
          removeDraft(index);
        });
        draftsContainer.appendChild(card);
      });
    }

    function removeDraft(index) {
      drafts.splice(index, 1);
      renderDrafts();
      renderSliders();
    }

    function clearAllDrafts() {
      drafts = [];
      renderDrafts();
      renderSliders();
    }

    // Рендер слайдеров
    function renderSliders() {
      slidersLayer.innerHTML = '';
      const rows = gridBody.querySelectorAll('tr');
      if (rows.length === 0) return;

      const allItems = [
        ...bookings.map(b => ({ ...b, type: b.confirmed === true ? 'confirmed' : b.confirmed === false ? 'rejected' : 'pending' })),
        ...drafts.map(d => ({ ...d, type: 'temp', name: 'Черновик', phone: '', comment: '' }))
      ];

      allItems.forEach(item => {
        const startIdx = SLOTS.findIndex(s => s.value === item.start);
        const endIdx = SLOTS.findIndex(s => s.value === item.end);
        if (startIdx === -1 || endIdx === -1) return;

        const row = rows[item.lane];
        if (!row) return;

        const startCell = row.cells[startIdx + 1];
        const endCell = row.cells[endIdx + 1];
        if (!startCell || !endCell) return;

        const left = startCell.offsetLeft + 2;
        const top = row.offsetTop + 2;
        const width = endCell.offsetLeft + endCell.offsetWidth - startCell.offsetLeft - 4;
        const height = row.offsetHeight - 4;

        const slider = document.createElement('div');
        slider.className = `slider ${item.type}`;
        slider.style.cssText = `left:${left}px;top:${top}px;width:${width}px;height:${height}px;pointer-events:auto;`;
        slider.innerHTML = `
          <div class="sl-name">${item.name || 'Бронь'}</div>
          <div class="sl-time">${formatTime(item.start)} – ${formatTime(item.end)}</div>
          <div class="resize-handle left"></div>
          <div class="resize-handle right"></div>
        `;

        // Обработчики
        slider.addEventListener('click', (e) => {
          if (item.type === 'temp') return;
          if (e.target.classList.contains('resize-handle')) return;
          showInfoModal(item);
        });

        // Перетаскивание
        slider.addEventListener('mousedown', (e) => {
          if (e.target.classList.contains('resize-handle')) return;
          startDragItem(item, e, slider);
        });

        // Ресайз
        slider.querySelector('.resize-handle.left').addEventListener('mousedown', (e) => {
          e.stopPropagation();
          startResizeItem(item, 'left', e);
        });
        slider.querySelector('.resize-handle.right').addEventListener('mousedown', (e) => {
          e.stopPropagation();
          startResizeItem(item, 'right', e);
        });

        slidersLayer.appendChild(slider);
      });
    }

    // Перетаскивание
    function startDragItem(item, e, slider) {
      e.preventDefault();
      const startX = e.clientX;
      const startY = e.clientY;
      const startLeft = parseInt(slider.style.left);
      const startTop = parseInt(slider.style.top);
      const startLane = item.lane;
      const startTime = item.start;

      slider.classList.add('dragging');
      const clone = slider.cloneNode(true);
      clone.style.position = 'fixed';
      clone.style.zIndex = '200';
      clone.style.opacity = '0.8';
      document.body.appendChild(clone);

      function onMove(ev) {
        clone.style.left = (startLeft + ev.clientX - startX) + 'px';
        clone.style.top = (startTop + ev.clientY - startY) + 'px';
      }

      function onUp(ev) {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        clone.remove();
        slider.classList.remove('dragging');

        const target = document.elementFromPoint(ev.clientX, ev.clientY);
        if (!target || !target.classList.contains('slot')) {
          renderSliders();
          return;
        }

        const newLane = +target.dataset.lane;
        const newSlotIdx = +target.dataset.slotIndex;
        const duration = getSlotCount(item.start, item.end);
        const newStartIdx = Math.min(Math.max(0, newSlotIdx), SLOTS.length - duration);
        const newStart = SLOTS[newStartIdx].value;
        const newEnd = SLOTS[newStartIdx + duration - 1].value;

        // Проверка конфликтов
        if (item.type === 'temp') {
          const conflict = drafts.some(d => d.id !== item.id && d.lane === newLane && !(d.end <= newStart || d.start >= newEnd));
          if (!conflict) {
            item.lane = newLane;
            item.start = newStart;
            item.end = newEnd;
          }
        } else {
          const conflict = bookings.some(b => b.id !== item.id && b.lane === newLane && !(b.end <= newStart || b.start >= newEnd));
          if (!conflict) {
            item.lane = newLane;
            item.start = newStart;
            item.end = newEnd;
            updateBooking(item);
          }
        }
        renderSliders();
        if (item.type === 'temp') renderDrafts();
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    // Ресайз
    function startResizeItem(item, side, e) {
      e.stopPropagation();
      e.preventDefault();
      const startX = e.clientX;
      const startStart = item.start;
      const startEnd = item.end;

      function onMove(ev) {
        const deltaX = ev.clientX - startX;
        const cellWidth = 70;
        const idxDelta = Math.round(deltaX / cellWidth);

        if (side === 'left') {
          const startIdx = SLOTS.findIndex(s => s.value === startStart);
          const newIdx = Math.max(0, Math.min(startIdx + idxDelta, SLOTS.findIndex(s => s.value === item.end) - 1));
          item.start = SLOTS[newIdx].value;
        } else {
          const endIdx = SLOTS.findIndex(s => s.value === startEnd);
          const newIdx = Math.min(SLOTS.length - 1, Math.max(endIdx + idxDelta, SLOTS.findIndex(s => s.value === item.start) + 1));
          item.end = SLOTS[newIdx].value;
        }
        renderSliders();
      }

      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        if (item.type !== 'temp') updateBooking(item);
        if (item.type === 'temp') renderDrafts();
        renderSliders();
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    function getSlotCount(start, end) {
      const startIdx = SLOTS.findIndex(s => s.value === start);
      const endIdx = SLOTS.findIndex(s => s.value === end);
      return endIdx - startIdx + 1;
    }

    // API
    async function loadBookings() {
      const date = datePicker.value;
      clearAllDrafts();
      try {
        const res = await fetch(`${API_URL}?action=get&date=${date}`);
        const data = await res.json();
        bookings = (data.bookings || []).map(b => ({
          id: b.id,
          lane: b.table - 1,
          start: parseFloat(b.start),
          end: parseFloat(b.end),
          name: b.name || '',
          phone: b.phone || '',
          comment: b.comment || '',
          confirmed: b.confirmed === 'Да' ? true : b.confirmed === 'Нет' ? false : null
        }));
      } catch (e) {
        console.error('Ошибка загрузки:', e);
        bookings = [];
      }
      renderSliders();
    }

    async function updateBooking(booking) {
      const date = datePicker.value;
      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({
            action: 'update',
            id: booking.id,
            date,
            tableNumber: booking.lane + 1,
            start: booking.start,
            end: booking.end,
            name: booking.name,
            phone: booking.phone,
            comment: booking.comment
          })
        });
      } catch (e) {
        console.error('Ошибка обновления:', e);
      }
    }

    async function submitBooking() {
      const name = guestName.value.trim();
      if (!name) return alert('Введите имя');
      if (drafts.length === 0) return alert('Нет черновиков');

      const date = datePicker.value;
      const phone = guestPhone.value.trim();
      const comment = guestComment.value.trim();

      const payload = {
        bookings: drafts.map(d => ({
          date,
          tableNumber: d.lane + 1,
          start: d.start,
          end: d.end,
          name,
          phone,
          comment
        }))
      };

      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(payload)
        });
        clearAllDrafts();
        closeBookingModal();
        await loadBookings();
      } catch (e) {
        console.error('Ошибка сохранения:', e);
        alert('Ошибка при сохранении');
      }
    }

    async function deleteCurrentBooking() {
      if (!currentInfoBooking) return;
      if (!confirm('Удалить эту бронь?')) return;
      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ action: 'delete', id: currentInfoBooking.id })
        });
        closeInfoModal();
        await loadBookings();
      } catch (e) {
        console.error('Ошибка удаления:', e);
      }
    }

    async function confirmBooking(confirmed) {
      if (!currentInfoBooking) return;
      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ action: 'confirm', id: currentInfoBooking.id, confirmed })
        });
        closeInfoModal();
        await loadBookings();
      } catch (e) {
        console.error('Ошибка:', e);
      }
    }

    // Модальные окна
    function openBookingModal() {
      guestName.value = '';
      guestPhone.value = '';
      guestComment.value = '';
      bookingModal.classList.remove('hidden');
    }

    function closeBookingModal() {
      bookingModal.classList.add('hidden');
    }

    function showInfoModal(booking) {
      currentInfoBooking = booking;
      const status = booking.confirmed === true ? '✅ Подтверждено' : booking.confirmed === false ? '❌ Отменено' : '⏳ Ожидает';
      infoContent.innerHTML = `
        <p><strong>Стол:</strong> № ${booking.lane + 1}</p>
        <p><strong>Время:</strong> ${formatTime(booking.start)} – ${formatTime(booking.end)}</p>
        <p><strong>Имя:</strong> ${booking.name}</p>
        <p><strong>Телефон:</strong> ${booking.phone || '—'}</p>
        <p><strong>Комментарий:</strong> ${booking.comment || '—'}</p>
        <p><strong>Статус:</strong> ${status}</p>
        <div class="btn-row" style="margin-top:12px;">
          <button class="btn confirm" onclick="confirmBooking(true)">✅ Пришли</button>
          <button class="btn cancel" onclick="confirmBooking(false)">❌ Не пришли</button>
        </div>
      `;
      infoModal.classList.remove('hidden');
    }

    function closeInfoModal() {
      infoModal.classList.add('hidden');
      currentInfoBooking = null;
    }

    function showHallScheme() {
      hallModal.classList.remove('hidden');
    }

    function closeHallScheme() {
      hallModal.classList.add('hidden');
    }

    // Закрытие модалок по фону
    [bookingModal, infoModal].forEach(modal => {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.add('hidden');
      });
    });

    // Вспомогательные функции
    function formatTime(value) {
      const h = Math.floor(value);
      const m = value % 1 === 0.5 ? '30' : '00';
      return `${h}:${m}`;
    }

    // Экспорт для глобального доступа
    window.openBookingModal = openBookingModal;
    window.closeBookingModal = closeBookingModal;
    window.submitBooking = submitBooking;
    window.confirmBooking = confirmBooking;
    window.deleteCurrentBooking = deleteCurrentBooking;
    window.closeInfoModal = closeInfoModal;
    window.showHallScheme = showHallScheme;
    window.closeHallScheme = closeHallScheme;

    // Запуск при загрузке
    const savedUser = localStorage.getItem('pool_user');
    if (savedUser && ALLOWED_EMAILS.includes(savedUser)) {
      currentUser = savedUser;
      loginScreen.style.display = 'none';
      app.style.display = 'block';
      initApp();
    }
  })();
</script>
