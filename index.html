<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lucky Strike — Бронирование столов</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --border: #e9ecef;
      --text: #212529;
      --text-secondary: #6c757d;
      --accent: #4263eb;
      --accent-light: #dbe4ff;
      --success: #2b8a3e;
      --warning: #e67700;
      --danger: #c92a2a;
      --table-even: #f1f3f5;
      --table-odd: #ffffff;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      user-select: none;
    }

    /* ЭКРАН АВТОРИЗАЦИИ */
    .auth-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(145deg, #f8f9fa 0%, #e9ecef 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 9999;
    }
    .auth-icon { font-size: 64px; }
    .auth-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .auth-subtitle { color: var(--text-secondary); font-size: 15px; margin-top: -12px; }
    .auth-divider { width: 40px; height: 2px; background: var(--border); border-radius: 1px; }

    /* ОСНОВНОЕ ПРИЛОЖЕНИЕ */
    .app { display: none; flex-direction: column; min-height: 100vh; }

    /* НАВИГАЦИЯ */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .navbar-brand { font-weight: 700; font-size: 20px; letter-spacing: -0.3px; }
    .navbar-actions { display: flex; gap: 10px; align-items: center; }
    .btn-nav {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 18px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s ease;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font);
    }
    .btn-nav:hover {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-logout {
      background: #fff5f5;
      border-color: #ffc9c9;
      color: #c92a2a;
    }
    .btn-logout:hover {
      background: #ffe3e3;
      border-color: #c92a2a;
    }

    /* ОСНОВНОЙ КОНТЕНТ */
    .main-content {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 100%;
      overflow-x: hidden;
    }

    /* ПАНЕЛЬ УПРАВЛЕНИЯ */
    .control-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      padding: 18px 24px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }
    .date-picker-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border-radius: 100px;
      padding: 8px 20px;
      border: 1px solid var(--border);
      flex: 1;
      min-width: 200px;
      max-width: 280px;
    }
    .date-picker-wrapper svg { flex-shrink: 0; }
    .date-picker-wrapper input[type="date"] {
      border: none;
      background: transparent;
      font-size: 16px;
      font-weight: 500;
      outline: none;
      width: 100%;
      color: var(--text);
      font-family: var(--font);
      cursor: pointer;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 100px;
      padding: 12px 28px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(66, 99, 235, 0.25);
      font-family: var(--font);
    }
    .btn-primary:hover { background: #3b5bdb; transform: scale(0.98); }
    .btn-primary:active { transform: scale(0.96); }

    /* ЧЕРНОВИКИ В СТРОКЕ */
    .draft-inline {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }
    .draft-badge {
      background: var(--accent-light);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .draft-badge span {
      background: white;
      padding: 2px 10px;
      border-radius: 100px;
      font-size: 12px;
    }
    .draft-card {
      display: flex;
      align-items: center;
      gap: 8px;
      background: white;
      border: 1.5px solid var(--accent);
      border-radius: 100px;
      padding: 4px 10px 4px 16px;
      font-size: 13px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.1s;
    }
    .draft-card:hover { transform: scale(1.02); }
    .draft-card strong { font-size: 14px; }
    .draft-card-time {
      background: #f1f3f5;
      padding: 4px 10px;
      border-radius: 100px;
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 12px;
      font-weight: 500;
    }
    .draft-card-remove {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #ffe3e3;
      border: none;
      cursor: pointer;
      color: #c92a2a;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .draft-card-remove:hover { background: #ffc9c9; }

    /* ЛЕГЕНДА */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      background: var(--surface);
      padding: 6px 14px;
      border-radius: 100px;
      box-shadow: var(--shadow-sm);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .legend-dot--navy { background: #4c6ef5; }
    .legend-dot--teal { background: #20c997; }
    .legend-dot--orange { background: #f76707; }
    .legend-dot--warning { background: #fcc419; }
    .legend-dot--success { background: #40c057; }
    .legend-dot--danger { background: #fa5252; }
    .legend-dot--draft { background: #4263eb; }

    /* ТАБЛИЦА */
    .grid-container {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      position: relative;
      border: 1px solid var(--border);
    }
    .grid-scroll {
      overflow-x: auto;
      overflow-y: auto;
      max-height: 65vh;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 950px;
      table-layout: fixed;
    }
    thead th {
      background: #f8f9fa;
      font-weight: 600;
      font-size: 12px;
      color: var(--text-secondary);
      padding: 10px 2px;
      text-align: center;
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 5;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    thead th:hover { background: #e9ecef; }
    thead th:first-child {
      width: 90px;
      z-index: 6;
      background: #f8f9fa;
    }
    tbody td {
      height: 50px;
      border-bottom: 1px solid #f1f3f5;
      border-right: 1px solid #f1f3f5;
      text-align: center;
      cursor: crosshair;
      transition: background 0.1s;
      position: relative;
    }
    tbody td:first-child {
      font-weight: 700;
      font-size: 15px;
      background: #f8f9fa;
      border-right: 2px solid var(--border);
      position: sticky;
      left: 0;
      z-index: 4;
      cursor: default;
    }
    tbody td.drag-hover { background: #fff3bf !important; }
    tbody td.draft-selected {
      background: #dbe4ff !important;
      box-shadow: inset 0 0 0 2px var(--accent);
    }

    /* СЛАЙДЕРЫ БРОНЕЙ */
    .slider-layer {
      position: absolute;
      top: 0;
      left: 90px;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 10;
    }
    .booking-card {
      position: absolute;
      border-radius: 8px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      pointer-events: auto;
      cursor: grab;
      transition: box-shadow 0.15s;
      overflow: hidden;
      font-size: 13px;
      z-index: 15;
      border: 1px solid rgba(0,0,0,0.05);
    }
    .booking-card:hover { 
      box-shadow: 0 4px 16px rgba(0,0,0,0.18); 
      z-index: 20; 
    }
    .booking-card.dragging { 
      opacity: 0.7; 
      cursor: grabbing; 
      z-index: 50; 
    }
    .booking-card--pending { 
      border-left: 4px solid #fcc419; 
      background: #fff9db; 
    }
    .booking-card--confirmed { 
      border-left: 4px solid #40c057; 
      background: #ebfbee; 
    }
    .booking-card--cancelled { 
      border-left: 4px solid #fa5252; 
      background: #fff5f5; 
      opacity: 0.75; 
    }
    .booking-card--draft {
      border: 2px dashed #4263eb;
      background: #edf2ff;
      border-radius: 8px;
    }
    .booking-card-name {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
    }
    .booking-card-time {
      font-size: 10px;
      opacity: 0.8;
      margin-top: 2px;
      font-family: 'SF Mono', 'Courier New', monospace;
    }
    .resize-handle {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 10px;
      background: transparent;
      cursor: ew-resize;
      z-index: 6;
    }
    .resize-handle--left { left: -5px; }
    .resize-handle--right { right: -5px; }
    .resize-handle:hover { background: rgba(0,0,0,0.1); }
    .ghost-preview {
      position: absolute;
      background: rgba(250, 176, 5, 0.3);
      border: 2px dashed #fab005;
      border-radius: 8px;
      pointer-events: none;
      z-index: 25;
      transition: none;
    }
    .ghost-drag {
      position: absolute;
      background: rgba(66, 99, 235, 0.25);
      border: 2px solid #4263eb;
      border-radius: 8px;
      pointer-events: none;
      z-index: 999;
      opacity: 0.6;
      transition: none;
    }

    /* МОДАЛЬНЫЕ ОКНА */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      background: white;
      border-radius: 24px;
      padding: 24px;
      width: 90%;
      max-width: 460px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    .modal-overlay.active .modal { transform: scale(1); }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .modal-title { font-size: 22px; font-weight: 700; }
    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #f1f3f5;
      border: none;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .modal-close:hover { background: #e9ecef; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .form-input, .form-textarea {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 16px;
      font-family: var(--font);
      background: #f8f9fa;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      user-select: text;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--accent); background: white; }
    .form-textarea { resize: vertical; min-height: 60px; }
    .btn-group { display: flex; gap: 12px; margin-top: 24px; }
    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font);
    }
    .btn--primary { background: var(--accent); color: white; }
    .btn--primary:hover { background: #3b5bdb; }
    .btn--secondary { background: #f1f3f5; color: var(--text); }
    .btn--secondary:hover { background: #e9ecef; }
    .btn--success { background: #d3f9d8; color: #2b8a3e; }
    .btn--success:hover { background: #b2f2bb; }
    .btn--danger { background: #ffe3e3; color: #c92a2a; }
    .btn--danger:hover { background: #ffc9c9; }
    .btn--full { width: 100%; margin-top: 8px; }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--text-secondary); font-size: 14px; }
    .info-value { font-weight: 600; text-align: right; max-width: 60%; word-break: break-word; }

    /* ЗАГРУЗЧИК */
    .loader {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 5000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s;
    }
    .loader.active { opacity: 1; visibility: visible; }
    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #e9ecef;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .loader-text { font-size: 15px; color: var(--text-secondary); font-weight: 500; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* СХЕМА ЗАЛА */
    .schema-image {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 16px;
      cursor: pointer;
    }

    /* АДАПТИВНОСТЬ */
    @media (max-width: 768px) {
      .main-content { padding: 16px 12px; gap: 16px; }
      .control-bar { flex-direction: column; align-items: stretch; }
      .draft-inline { margin-left: 0; justify-content: flex-start; }
      .btn-primary { width: 100%; justify-content: center; }
      .navbar { padding: 0 16px; }
      .modal { padding: 20px; }
    }
  </style>
</head>
<body>

<!-- ЭКРАН АВТОРИЗАЦИИ -->
<div id="authScreen" class="auth-screen">
  <div class="auth-icon">🎱</div>
  <div class="auth-title">Lucky Strike</div>
  <div class="auth-subtitle">Система бронирования бильярдных столов</div>
  <div class="auth-divider"></div>
  <div id="g_id_onload"
       data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com"
       data-callback="handleAuth"
       data-auto_prompt="false">
  </div>
  <div class="g_id_signin" data-type="standard"></div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div id="app" class="app">
  <!-- Навигация -->
  <nav class="navbar">
    <span class="navbar-brand">🎱 Lucky Strike</span>
    <div class="navbar-actions">
      <button class="btn-nav" onclick="showSchema()">📐 Схема зала</button>
      <button class="btn-nav btn-logout" onclick="logout()">🚪 Выйти</button>
    </div>
  </nav>

  <!-- Основной контент -->
  <div class="main-content">
    <!-- Панель управления -->
    <div class="control-bar">
      <div class="date-picker-wrapper">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        <input type="date" id="datePicker">
      </div>
      <button class="btn-primary" onclick="openBookingForm()">➕ Новая бронь</button>
      <div id="draftContainer" class="draft-inline"></div>
    </div>

    <!-- Легенда -->
    <div class="legend">
      <div class="legend-item"><div class="legend-dot legend-dot--navy"></div>Столы 1–3</div>
      <div class="legend-item"><div class="legend-dot legend-dot--teal"></div>Столы 4–6</div>
      <div class="legend-item"><div class="legend-dot legend-dot--orange"></div>Столы 7–12</div>
      <div class="legend-item"><div class="legend-dot legend-dot--warning"></div>Ожидает</div>
      <div class="legend-item"><div class="legend-dot legend-dot--success"></div>Подтверждено</div>
      <div class="legend-item"><div class="legend-dot legend-dot--danger"></div>Отменено</div>
      <div class="legend-item"><div class="legend-dot legend-dot--draft"></div>Черновик</div>
    </div>

    <!-- Таблица бронирования -->
    <div class="grid-container" id="gridContainer">
      <div class="grid-scroll" id="gridScroll">
        <table id="bookingTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="slider-layer" id="sliderLayer"></div>
    </div>
  </div>
</div>

<!-- Модальное окно: Новая бронь -->
<div id="bookingModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">📝 Новая бронь</div>
      <button class="modal-close" onclick="closeBookingForm()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Имя *</label>
      <input class="form-input" id="nameInput" placeholder="Иван Петров" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Телефон</label>
      <input class="form-input" id="phoneInput" placeholder="+7 123 456-78-90" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Комментарий</label>
      <textarea class="form-textarea" id="commentInput" rows="2" placeholder="Пожелания, особые условия..."></textarea>
    </div>
    <div class="btn-group">
      <button class="btn btn--primary" onclick="submitBooking()">💾 Сохранить</button>
      <button class="btn btn--secondary" onclick="closeBookingForm()">Отмена</button>
    </div>
  </div>
</div>

<!-- Модальное окно: Детали брони -->
<div id="infoModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">📋 Детали брони</div>
      <button class="modal-close" onclick="closeInfoModal()">✕</button>
    </div>
    <div id="infoContent"></div>
    <div class="btn-group" style="margin-top:16px;">
      <button class="btn btn--success" onclick="updateBookingStatus(true)">✅ Пришли</button>
      <button class="btn btn--danger" onclick="updateBookingStatus(false)">❌ Не пришли</button>
    </div>
    <button class="btn btn--secondary btn--full" onclick="removeBooking()">🗑 Удалить бронь</button>
  </div>
</div>

<!-- Модальное окно: Схема зала -->
<div id="schemaModal" class="modal-overlay">
  <div class="modal" style="max-width:90vw; background:transparent; box-shadow:none; padding:0;">
    <button class="modal-close" style="position:absolute; top:10px; right:10px; z-index:10;" onclick="closeSchema()">✕</button>
    <img src="https://i.postimg.cc/52ZDKDDw/55.png" class="schema-image" alt="Схема зала" onclick="closeSchema()">
  </div>
</div>

<!-- Загрузчик -->
<div id="loader" class="loader">
  <div class="spinner"></div>
  <div class="loader-text">Загрузка данных...</div>
</div>

<script>
  (function() {
    // ==================== КОНФИГУРАЦИЯ ====================
    const API_URL = "https://script.google.com/macros/s/AKfycbzLxSrpcGOIm34gLlFZS-EYZmG8liMLcUST3MRMoAp56y6XDC2ClapCDB18yiYmdrHZ/exec";

    const TABLE_COUNT = 12;
    const START_HOUR = 11;
    const END_HOUR = 22;
    const GROUP_MAP = [0, 0, 0, 1, 1, 1, 2, 2, 2, 2, 2, 2];
    const GROUP_COLORS = ['#4c6ef5', '#20c997', '#f76707'];
    
    // Генерация временных слотов (11:00, 11:30, 12:00, ..., 22:00)
    const timeSlots = [];
    for (let h = START_HOUR; h <= END_HOUR; h++) {
      timeSlots.push({ label: `${h}:00`, value: h });
      if (h < END_HOUR) timeSlots.push({ label: `${h}:30`, value: h + 0.5 });
    }

    // ==================== СОСТОЯНИЕ ====================
    const state = {
      currentDate: new Date().toISOString().split('T')[0],
      bookings: [],
      drafts: [],
      activeBooking: null,
      draftIdCounter: 1,
      dragState: null,
      resizeState: null
    };

    // ==================== УТИЛИТЫ ====================
    const $ = (id) => document.getElementById(id);
    
    const formatTime = (val) => {
      const h = Math.floor(val);
      const m = val % 1 === 0.5 ? '30' : '00';
      return `${h}:${m}`;
    };
    
    const formatTimeRange = (start, end) => `${formatTime(start)} – ${formatTime(end)}`;

    // ==================== DOM ЭЛЕМЕНТЫ ====================
    const authScreen = $('authScreen');
    const appEl = $('app');
    const datePicker = $('datePicker');
    const draftContainer = $('draftContainer');
    const tableHead = $('tableHead');
    const tableBody = $('tableBody');
    const gridScroll = $('gridScroll');
    const sliderLayer = $('sliderLayer');
    const bookingModal = $('bookingModal');
    const infoModal = $('infoModal');
    const schemaModal = $('schemaModal');
    const loader = $('loader');

    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    function init() {
      datePicker.value = state.currentDate;
      datePicker.min = state.currentDate;
      buildTable();
      attachEvents();
      loadBookings();
    }

    function buildTable() {
      // Заголовок таблицы
      let headHtml = '<tr><th>СТОЛ</th>';
      timeSlots.forEach(slot => {
        headHtml += `<th data-time="${slot.value}" title="${slot.label}">${slot.label}</th>`;
      });
      headHtml += '</tr>';
      tableHead.innerHTML = headHtml;

      // Тело таблицы
      let bodyHtml = '';
      for (let i = 0; i < TABLE_COUNT; i++) {
        const groupColor = GROUP_COLORS[GROUP_MAP[i]];
        bodyHtml += `<tr data-table="${i}">`;
        bodyHtml += `<td style="color:${groupColor}; font-weight:700; background:#f8f9fa;">№ ${i + 1}</td>`;
        timeSlots.forEach(slot => {
          bodyHtml += `<td data-table="${i}" data-time="${slot.value}"></td>`;
        });
        bodyHtml += '</tr>';
      }
      tableBody.innerHTML = bodyHtml;
    }

    // ==================== ОБРАБОТЧИКИ СОБЫТИЙ ====================
    function attachEvents() {
      // Изменение даты
      datePicker.addEventListener('change', () => {
        state.currentDate = datePicker.value;
        state.drafts = [];
        renderDrafts();
        loadBookings();
      });

      // Drag-to-select для создания черновиков
      tableBody.addEventListener('mousedown', (e) => {
        const cell = e.target.closest('td');
        if (!cell || cell.cellIndex === 0) return;
        
        const tableIndex = parseInt(cell.dataset.table);
        const timeValue = parseFloat(cell.dataset.time);
        const startIdx = timeSlots.findIndex(s => s.value === timeValue);
        
        state.dragState = {
          table: tableIndex,
          startIdx: startIdx,
          currentEndIdx: startIdx,
          isDragging: true
        };
        
        highlightDragRange(tableIndex, startIdx, startIdx);
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!state.dragState?.isDragging) return;
        
        const cell = document.elementFromPoint(e.clientX, e.clientY);
        if (!cell || cell.tagName !== 'TD' || cell.cellIndex === 0) return;
        
        const tableIndex = parseInt(cell.dataset.table);
        if (tableIndex !== state.dragState.table) return;
        
        const timeValue = parseFloat(cell.dataset.time);
        const currentIdx = timeSlots.findIndex(s => s.value === timeValue);
        const newEndIdx = Math.max(state.dragState.startIdx, currentIdx);
        
        if (newEndIdx !== state.dragState.currentEndIdx) {
          state.dragState.currentEndIdx = newEndIdx;
          highlightDragRange(state.dragState.table, state.dragState.startIdx, newEndIdx);
        }
      });

      document.addEventListener('mouseup', () => {
        if (!state.dragState?.isDragging) return;
        
        const { table, startIdx, currentEndIdx } = state.dragState;
        
        if (currentEndIdx > startIdx) {
          const startTime = timeSlots[startIdx].value;
          const endTime = timeSlots[currentEndIdx].value;
          
          // Проверка конфликтов с существующими бронями
          const conflict = state.bookings.some(b => 
            b.table === table && 
            b.status !== 'cancelled' &&
            !(b.end <= startTime || b.start >= endTime)
          );
          
          if (conflict) {
            alert('⚠️ Это время уже занято подтверждённой бронью.');
          } else {
            // Проверка на пересечение с другими черновиками
            const draftConflict = state.drafts.some(d =>
              d.table === table &&
              !(d.end <= startTime || d.start >= endTime)
            );
            
            if (draftConflict) {
              alert('⚠️ Это время пересекается с другим черновиком.');
            } else {
              state.drafts.push({
                id: state.draftIdCounter++,
                table: table,
                start: startTime,
                end: endTime
              });
              renderDrafts();
            }
          }
        }
        
        clearDragHighlights();
        state.dragState = null;
        renderSliders();
        highlightDraftCells();
      });

      // Закрытие модальных окон по клику на оверлей
      [bookingModal, infoModal, schemaModal].forEach(modal => {
        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            modal.classList.remove('active');
            if (modal === infoModal) state.activeBooking = null;
          }
        });
      });

      // Закрытие по Escape
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeBookingForm();
          closeInfoModal();
          closeSchema();
        }
      });
    }

    function highlightDragRange(table, startIdx, endIdx) {
      clearDragHighlights();
      const rows = tableBody.querySelectorAll('tr');
      const row = rows[table];
      if (!row) return;
      
      for (let i = startIdx; i <= endIdx; i++) {
        const cell = row.cells[i + 1];
        if (cell) cell.classList.add('drag-hover');
      }
    }

    function clearDragHighlights() {
      document.querySelectorAll('.drag-hover').forEach(el => el.classList.remove('drag-hover'));
    }

    function highlightDraftCells() {
      document.querySelectorAll('.draft-selected').forEach(el => el.classList.remove('draft-selected'));
      
      state.drafts.forEach(draft => {
        const startIdx = timeSlots.findIndex(s => s.value === draft.start);
        const endIdx = timeSlots.findIndex(s => s.value === draft.end);
        const row = tableBody.rows[draft.table];
        if (!row) return;
        
        for (let i = startIdx; i <= endIdx; i++) {
          const cell = row.cells[i + 1];
          if (cell) cell.classList.add('draft-selected');
        }
      });
    }

    // ==================== ЧЕРНОВИКИ ====================
    function renderDrafts() {
      if (state.drafts.length === 0) {
        draftContainer.innerHTML = '';
        return;
      }
      
      let html = `<div class="draft-badge">✏️ Черновики <span>${state.drafts.length}</span></div>`;
      
      state.drafts.forEach((draft, index) => {
        html += `
          <div class="draft-card">
            <strong>Стол ${draft.table + 1}</strong>
            <span class="draft-card-time">${formatTimeRange(draft.start, draft.end)}</span>
            <button class="draft-card-remove" data-draft-index="${index}" title="Удалить черновик">✕</button>
          </div>
        `;
      });
      
      draftContainer.innerHTML = html;
      
      // Обработчики удаления
      draftContainer.querySelectorAll('.draft-card-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const index = parseInt(btn.dataset.draftIndex);
          state.drafts.splice(index, 1);
          renderDrafts();
          highlightDraftCells();
          renderSliders();
        });
      });
    }

    // ==================== СЛАЙДЕРЫ ====================
    function renderSliders() {
      sliderLayer.innerHTML = '';
      
      const rows = tableBody.querySelectorAll('tr');
      if (!rows.length) return;
      
      const firstDataCell = rows[0]?.cells[1];
      if (!firstDataCell) return;
      
      const cellWidth = firstDataCell.offsetWidth;
      const startOffset = firstDataCell.offsetLeft;
      
      // Функция создания карточки
      function createCard(item, isDraft = false) {
        const row = rows[item.table];
        if (!row) return null;
        
        const startIdx = timeSlots.findIndex(s => s.value === item.start);
        const endIdx = timeSlots.findIndex(s => s.value === item.end);
        if (startIdx === -1 || endIdx === -1) return null;
        
        const left = startOffset + startIdx * cellWidth;
        const top = row.offsetTop;
        const width = (endIdx - startIdx + 1) * cellWidth;
        const height = row.offsetHeight;
        
        const card = document.createElement('div');
        
        if (isDraft) {
          card.className = 'booking-card booking-card--draft';
        } else {
          card.className = `booking-card booking-card--${item.status || 'pending'}`;
        }
        
        card.style.cssText = `
          left: ${left}px;
          top: ${top}px;
          width: ${width}px;
          height: ${height}px;
        `;
        
        card.innerHTML = `
          <div class="booking-card-name">${isDraft ? '📝 Черновик' : (item.name || 'Бронь')}</div>
          <div class="booking-card-time">${formatTimeRange(item.start, item.end)}</div>
          <div class="resize-handle resize-handle--left"></div>
          <div class="resize-handle resize-handle--right"></div>
        `;
        
        // Клик для просмотра деталей
        card.addEventListener('click', (e) => {
          if (e.target.classList.contains('resize-handle')) return;
          if (!isDraft) showInfoModal(item);
        });
        
        // Drag & Drop карточки
        card.addEventListener('mousedown', (e) => {
          if (e.target.classList.contains('resize-handle')) return;
          startDragItem(item, e, card, isDraft);
        });
        
        // Resize за левый край
        card.querySelector('.resize-handle--left').addEventListener('mousedown', (e) => {
          e.stopPropagation();
          startResizeItem(item, 'left', e, isDraft);
        });
        
        // Resize за правый край
        card.querySelector('.resize-handle--right').addEventListener('mousedown', (e) => {
          e.stopPropagation();
          startResizeItem(item, 'right', e, isDraft);
        });
        
        return card;
      }
      
      // Рендерим подтверждённые брони (сначала)
      state.bookings.forEach(booking => {
        const card = createCard(booking, false);
        if (card) sliderLayer.appendChild(card);
      });
      
      // Рендерим черновики (поверх)
      state.drafts.forEach(draft => {
        const card = createCard(draft, true);
        if (card) sliderLayer.appendChild(card);
      });
    }

    // ==================== DRAG & DROP КАРТОЧЕК ====================
    function startDragItem(item, event, element, isDraft) {
      event.preventDefault();
      event.stopPropagation();
      
      // Создаём призрак
      const ghost = document.createElement('div');
      ghost.className = 'ghost-drag';
      ghost.style.cssText = element.style.cssText;
      ghost.style.opacity = '0.6';
      ghost.style.pointerEvents = 'none';
      ghost.style.zIndex = '999';
      sliderLayer.appendChild(ghost);
      
      element.classList.add('dragging');
      document.body.style.cursor = 'grabbing';
      
      const startIdxOriginal = timeSlots.findIndex(s => s.value === item.start);
      const endIdxOriginal = timeSlots.findIndex(s => s.value === item.end);
      const duration = endIdxOriginal - startIdxOriginal;
      
      let currentTable = item.table;
      let currentStartIdx = startIdxOriginal;
      
      function getTargetFromPoint(x, y) {
        const el = document.elementFromPoint(x, y);
        const cell = el?.closest?.('td[data-table]');
        if (!cell || cell.cellIndex === 0) return null;
        return {
          table: parseInt(cell.dataset.table),
          idx: timeSlots.findIndex(s => s.value === parseFloat(cell.dataset.time))
        };
      }
      
      function updateGhost(table, startIdx) {
        const rows = tableBody.querySelectorAll('tr');
        const row = rows[table];
        if (!row) return;
        
        const startCell = row.cells[startIdx + 1];
        const endCell = row.cells[startIdx + duration + 1];
        
        if (startCell && endCell) {
          ghost.style.left = (startCell.offsetLeft) + 'px';
          ghost.style.top = (row.offsetTop) + 'px';
          ghost.style.width = (endCell.offsetLeft + endCell.offsetWidth - startCell.offsetLeft) + 'px';
          ghost.style.height = (row.offsetHeight) + 'px';
        }
      }
      
      function onMove(e) {
        const target = getTargetFromPoint(e.clientX, e.clientY);
        if (target) {
          const newStartIdx = Math.max(0, Math.min(target.idx, timeSlots.length - duration - 1));
          
          if (target.table !== currentTable || newStartIdx !== currentStartIdx) {
            currentTable = target.table;
            currentStartIdx = newStartIdx;
            updateGhost(currentTable, currentStartIdx);
          }
        }
      }
      
      function onEnd(e) {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onEnd);
        ghost.remove();
        element.classList.remove('dragging');
        document.body.style.cursor = '';
        
        const target = getTargetFromPoint(e.clientX, e.clientY);
        if (target) {
          const newStartIdx = Math.max(0, Math.min(target.idx, timeSlots.length - duration - 1));
          const newStart = timeSlots[newStartIdx].value;
          const newEnd = timeSlots[newStartIdx + duration].value;
          
          // Проверка конфликтов
          let conflict = false;
          
          if (!isDraft) {
            conflict = state.bookings.some(b => 
              b.id !== item.id && 
              b.table === target.table &&
              b.status !== 'cancelled' &&
              !(b.end <= newStart || b.start >= newEnd)
            );
          } else {
            conflict = state.bookings.some(b => 
              b.table === target.table &&
              b.status !== 'cancelled' &&
              !(b.end <= newStart || b.start >= newEnd)
            );
            if (!conflict) {
              conflict = state.drafts.some(d =>
                d.id !== item.id &&
                d.table === target.table &&
                !(d.end <= newStart || d.start >= newEnd)
              );
            }
          }
          
          if (conflict) {
            alert('⚠️ Невозможно переместить: конфликт с другой бронью.');
            renderSliders();
            highlightDraftCells();
            return;
          }
          
          // Применяем изменения
          item.table = target.table;
          item.start = newStart;
          item.end = newEnd;
          
          if (!isDraft) {
            updateBookingOnServer(item);
          }
          
          renderSliders();
          renderDrafts();
          highlightDraftCells();
        }
      }
      
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onEnd);
      updateGhost(currentTable, currentStartIdx);
    }

    // ==================== RESIZE КАРТОЧЕК ====================
    function startResizeItem(item, side, event, isDraft) {
      event.stopPropagation();
      event.preventDefault();
      
      const preview = document.createElement('div');
      preview.className = 'ghost-preview';
      sliderLayer.appendChild(preview);
      
      const startIdx = timeSlots.findIndex(s => s.value === item.start);
      const endIdx = timeSlots.findIndex(s => s.value === item.end);
      const cellWidth = tableBody.rows[0]?.cells[1]?.offsetWidth || 70;
      
      const startX = event.clientX;
      const initialStart = item.start;
      const initialEnd = item.end;
      const initialStartIdx = startIdx;
      const initialEndIdx = endIdx;
      
      function onMove(e) {
        const deltaX = e.clientX - startX;
        const idxDelta = Math.round(deltaX / cellWidth);
        
        if (side === 'left') {
          const newIdx = Math.max(0, Math.min(initialEndIdx - 1, initialStartIdx + idxDelta));
          const newKey = timeSlots[newIdx]?.value;
          if (newKey !== undefined) item.start = newKey;
        } else {
          const newIdx = Math.max(initialStartIdx + 1, Math.min(timeSlots.length - 1, initialEndIdx + idxDelta));
          const newKey = timeSlots[newIdx]?.value;
          if (newKey !== undefined) item.end = newKey;
        }
        
        // Обновляем превью
        const curStartIdx = timeSlots.findIndex(s => s.value === item.start);
        const curEndIdx = timeSlots.findIndex(s => s.value === item.end);
        const row = tableBody.rows[item.table];
        
        if (row) {
          const startCell = row.cells[curStartIdx + 1];
          const endCell = row.cells[curEndIdx + 1];
          if (startCell && endCell) {
            preview.style.left = (startCell.offsetLeft) + 'px';
            preview.style.top = (row.offsetTop) + 'px';
            preview.style.width = (endCell.offsetLeft + endCell.offsetWidth - startCell.offsetLeft) + 'px';
            preview.style.height = (row.offsetHeight) + 'px';
          }
        }
        
        renderSliders();
        highlightDraftCells();
      }
      
      function onEnd() {
        preview.remove();
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onEnd);
        document.body.style.cursor = '';
        
        // Проверка на минимальную длительность
        const finalStartIdx = timeSlots.findIndex(s => s.value === item.start);
        const finalEndIdx = timeSlots.findIndex(s => s.value === item.end);
        if (finalEndIdx <= finalStartIdx) {
          item.start = initialStart;
          item.end = initialEnd;
        }
        
        // Проверка конфликтов
        let conflict = false;
        if (!isDraft) {
          conflict = state.bookings.some(b => 
            b.id !== item.id && 
            b.table === item.table &&
            b.status !== 'cancelled' &&
            !(b.end <= item.start || b.start >= item.end)
          );
        }
        
        if (conflict) {
          alert('⚠️ Конфликт с другой бронью. Изменения отменены.');
          item.start = initialStart;
          item.end = initialEnd;
        }
        
        if (!isDraft && !conflict) {
          updateBookingOnServer(item);
        }
        
        renderSliders();
        renderDrafts();
        highlightDraftCells();
      }
      
      document.body.style.cursor = 'ew-resize';
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onEnd);
      onMove(event);
    }

    // ==================== API ВЗАИМОДЕЙСТВИЕ ====================
    async function loadBookings() {
      showLoader();
      try {
        const response = await fetch(`${API_URL}?action=get&date=${state.currentDate}`);
        if (!response.ok) throw new Error('Network error');
        const data = await response.json();
        
        state.bookings = (data.bookings || []).map(b => ({
          id: b.id,
          table: (b.table || b.tableNumber || 1) - 1,
          start: parseFloat(b.start),
          end: parseFloat(b.end),
          name: b.name || '',
          phone: b.phone || '',
          comment: b.comment || '',
          status: b.confirmed === 'Да' ? 'confirmed' : 
                  b.confirmed === 'Нет' ? 'cancelled' : 'pending'
        }));
        
        renderSliders();
        renderDrafts();
        highlightDraftCells();
      } catch (error) {
        console.error('Ошибка загрузки:', error);
        alert('Не удалось загрузить данные. Проверьте соединение.');
      }
      hideLoader();
    }

    async function updateBookingOnServer(booking) {
      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({
            action: 'update',
            id: booking.id,
            date: state.currentDate,
            tableNumber: booking.table + 1,
            start: booking.start,
            end: booking.end,
            name: booking.name,
            phone: booking.phone,
            comment: booking.comment
          })
        });
      } catch (error) {
        console.error('Ошибка обновления:', error);
      }
    }

    async function submitBooking() {
      const name = $('nameInput').value.trim();
      const phone = $('phoneInput').value.trim();
      const comment = $('commentInput').value.trim();
      
      if (!name) {
        alert('⚠️ Пожалуйста, введите имя клиента.');
        return;
      }
      
      if (state.drafts.length === 0) {
        alert('⚠️ Нет черновиков для сохранения. Выделите время на столе.');
        return;
      }
      
      showLoader();
      
      try {
        const payload = {
          bookings: state.drafts.map(d => ({
            date: state.currentDate,
            tableNumber: d.table + 1,
            start: d.start,
            end: d.end,
            name: name,
            phone: phone,
            comment: comment
          }))
        };
        
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(payload)
        });
        
        state.drafts = [];
        renderDrafts();
        highlightDraftCells();
        closeBookingForm();
        await loadBookings();
        
      } catch (error) {
        console.error('Ошибка сохранения:', error);
        alert('Не удалось сохранить бронь. Попробуйте ещё раз.');
      }
      
      hideLoader();
    }

    async function updateBookingStatus(confirmed) {
      if (!state.activeBooking) return;
      
      showLoader();
      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({
            action: 'confirm',
            id: state.activeBooking.id,
            confirmed: confirmed
          })
        });
        
        closeInfoModal();
        await loadBookings();
      } catch (error) {
        console.error('Ошибка:', error);
      }
      hideLoader();
    }

    async function removeBooking() {
      if (!state.activeBooking) return;
      
      if (!confirm('Вы уверены, что хотите удалить эту бронь?')) return;
      
      showLoader();
      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({
            action: 'delete',
            id: state.activeBooking.id
          })
        });
        
        closeInfoModal();
        await loadBookings();
      } catch (error) {
        console.error('Ошибка удаления:', error);
      }
      hideLoader();
    }

    // ==================== МОДАЛЬНЫЕ ОКНА ====================
    function openBookingForm() {
      if (state.drafts.length === 0) {
        alert('💡 Сначала выделите время на столе:\nЗажмите левую кнопку мыши и протяните по ячейкам нужного стола.');
        return;
      }
      
      $('nameInput').value = '';
      $('phoneInput').value = '';
      $('commentInput').value = '';
      bookingModal.classList.add('active');
      $('nameInput').focus();
    }

    function closeBookingForm() {
      bookingModal.classList.remove('active');
    }

    function showInfoModal(booking) {
      state.activeBooking = booking;
      
      const statusLabels = {
        'pending': '⏳ Ожидает',
        'confirmed': '✅ Подтверждено',
        'cancelled': '❌ Отменено'
      };
      
      const content = $('infoContent');
      content.innerHTML = `
        <div class="info-row">
          <span class="info-label">Стол</span>
          <span class="info-value">№ ${booking.table + 1}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Время</span>
          <span class="info-value">${formatTimeRange(booking.start, booking.end)}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Статус</span>
          <span class="info-value">${statusLabels[booking.status] || '⏳ Ожидает'}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Имя</span>
          <span class="info-value">${booking.name || '—'}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Телефон</span>
          <span class="info-value">${booking.phone || '—'}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Комментарий</span>
          <span class="info-value" style="font-weight:normal;">${booking.comment || '—'}</span>
        </div>
      `;
      
      infoModal.classList.add('active');
    }

    function closeInfoModal() {
      infoModal.classList.remove('active');
      state.activeBooking = null;
    }

    function showSchema() {
      schemaModal.classList.add('active');
    }

    function closeSchema() {
      schemaModal.classList.remove('active');
    }

    // ==================== ЗАГРУЗЧИК ====================
    function showLoader() {
      loader.classList.add('active');
    }

    function hideLoader() {
      loader.classList.remove('active');
    }

    // ==================== АВТОРИЗАЦИЯ ====================
    function parseJwt(token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      return JSON.parse(atob(base64));
    }

    window.handleAuth = function(response) {
      try {
        const payload = parseJwt(response.credential);
        
        if (ALLOWED_EMAILS.includes(payload.email)) {
          localStorage.setItem('userEmail', payload.email);
          localStorage.setItem('userName', payload.name || '');
          localStorage.setItem('userPicture', payload.picture || '');
          
          authScreen.style.display = 'none';
          appEl.style.display = 'flex';
          init();
        } else {
          alert('⛔ Доступ запрещён. Ваш email не в списке разрешённых.');
        }
      } catch (error) {
        console.error('Ошибка авторизации:', error);
        alert('Ошибка авторизации. Попробуйте ещё раз.');
      }
    };

    function logout() {
      if (confirm('Выйти из системы?')) {
        localStorage.removeItem('userEmail');
        localStorage.removeItem('userName');
        localStorage.removeItem('userPicture');
        location.reload();
      }
    }

    // ==================== ЗАПУСК ====================
    const savedEmail = localStorage.getItem('userEmail');
    if (savedEmail && ALLOWED_EMAILS.includes(savedEmail)) {
      authScreen.style.display = 'none';
      appEl.style.display = 'flex';
      init();
    }
  })();
</script>
</body>
</html>
