<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
  <title>Авторизация</title>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Google API Client для работы с Sheets -->
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Минималистичный экран авторизации: только кнопка */
    .login-screen {
      position: fixed;
      inset: 0;
      background: #1a2f40;  /* темный спокойный фон, как в оригинале */
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    /* Контейнер кнопки — ничего лишнего, просто кнопка по центру */
    .login-button-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Стили для кнопки Google делаем максимально простыми, но аккуратными */
    .g_id_signin {
      transform: scale(1);
      transition: transform 0.1s ease;
    }
    
    /* Легкий эффект при нажатии (необязательно, но приятно) */
    .g_id_signin:active {
      transform: scale(0.97);
    }

    /* Базовые сбросы для body, чтобы не было отступов */
    body {
      margin: 0;
      padding: 0;
      background: #1a2f40;
      font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
    }

    /* Этот блок изначально скрыт (основной контент появится после входа) */
    #mainContent {
      display: none;
    }

    /* (Опционально) спиннер загрузки, если нужен — остается минимальным, но можно убрать, 
       но пусть будет на случай долгой проверки, не отвлекает */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      backdrop-filter: blur(2px);
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* При необходимости можно полностью убрать подсказки — мы их не показываем,
       но оставим всплывающие алерты только для ошибок */
  </style>
</head>
<body>

<!-- ========== МИНИМАЛЬНЫЙ ЭКРАН АВТОРИЗАЦИИ ========== -->
<!-- Убраны все тексты: "Бильярд", "LUCKY STRIKE", подзаголовки, логотипы — только кнопка -->
<div id="loginScreen" class="login-screen">
  <div class="login-button-wrapper">
    <!-- Кнопка входа через Google (One Tap стиль, стандартная кнопка) -->
    <div id="g_id_onload" 
         data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" 
         data-callback="handleCredentialResponse" 
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" 
         data-type="standard" 
         data-shape="pill" 
         data-theme="outline" 
         data-text="signin_with" 
         data-size="large" 
         data-logo_alignment="left">
    </div>
  </div>
</div>

<!-- Основной контент (полностью рабочий, исходный, но он скрыт до авторизации) -->
<div id="mainContent" style="display: none;">
  <!-- Здесь размещается вся таблица, бронирования и логика — это как было в исходном коде -->
  <div class="table-container">
    <div class="table-wrapper">
      <table id="bookingTable">
        <thead>
          <tr><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th><th>11</th><th>12</th><th class="time-col"><button id="openImage" style="padding:6px 12px; border:1px solid white; background:#1a2f40; color:white; cursor:pointer; font-weight:bold; border-radius:8px;">СТОЛЫ</button></th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
       </table>
      <div id="columnMarkers" class="column-markers"></div>
    </div>
    <div id="slidersContainer"></div>
  </div>
  <div id="cardsContainer"></div>
  <div id="controls">
    <input type="date" id="dateInput" />
    <button class="booking-button" onclick="openModal()">ЗАБРОНИРОВАТЬ</button>
  </div>
  <div id="modal"><div><h3>Введите данные</h3><label>Имя:<br><input id="nameInput" autocomplete="off"></label><label>Телефон:<br><input id="phoneInput" type="tel"></label><label>Комментарий:<br><textarea id="commentInput"></textarea></label><div style="text-align: right;"><button onclick="submitForm()">ЗАБРОНИРОВАТЬ</button><button onclick="closeModal()">ОТМЕНА</button></div></div></div>
  <div id="imagePopup" class="image-popup"><div class="popup-content"><button class="close-popup" onclick="closeImagePopup()">&times;</button><img src="https://i.postimg.cc/52ZDKDDw/55.png" /></div></div>
  <div id="bookingInfoPopup" class="booking-info-popup"><div class="popup-content"><button class="close-btn" onclick="closeBookingInfoPopup()">&times;</button><h3>Информация о бронировании</h3><div class="info-row"><span class="info-label">Стол:</span><span id="info-table" class="info-value"></span></div><div class="info-row"><span class="info-label">Дата:</span><span id="info-date" class="info-value"></span></div><div class="info-row"><span class="info-label">Время:</span><span id="info-time" class="info-value"></span></div><div class="info-row"><span class="info-label">Имя:</span><span id="info-name" class="info-value"></span></div><div class="info-row"><span class="info-label">Телефон:</span><span id="info-phone" class="info-value"></span></div><div class="info-row"><span class="info-label">Комментарий:</span><span id="info-comment" class="info-value"></span></div><div class="info-row"><span class="info-label">Посещение состоялось?</span><span id="info-confirmed" class="info-value"></span></div><div class="confirmation-buttons"><button class="confirm-yes" onclick="confirmBooking(true)">Да</button><button class="confirm-no" onclick="confirmBooking(false)">Нет</button></div><button class="delete-btn" onclick="deleteBooking()">УДАЛИТЬ БРОНЬ</button></div></div>
  <div id="loadingOverlay" class="loading-overlay" style="display: none;"><div class="loading-spinner"></div></div>
</div>

<script>
  // ==================== ПОЛНОСТЬЮ РАБОЧАЯ АВТОРИЗАЦИЯ (минимальная обертка) ====================
  const AUTH_SPREADSHEET_ID = '1zwi1CInK3NZ8YRAegRMAdjin6XPacVkAkFsjAiqVE0w';
  const AUTH_SHEET_NAME = '1';
  const API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
  
  let currentUser = null;
  let gapiInitialized = false;
  
  function parseJwt(token) {
    try {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    } catch (e) {
      console.error('Error parsing JWT:', e);
      return {};
    }
  }
  
  function initGapi() {
    return new Promise((resolve, reject) => {
      if (gapiInitialized) { resolve(); return; }
      gapi.load('client', {
        callback: async () => {
          try {
            await gapi.client.init({
              apiKey: API_KEY,
              discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
            });
            gapiInitialized = true;
            console.log('GAPI initialized');
            resolve();
          } catch (error) { reject(error); }
        },
        onerror: reject,
        timeout: 10000,
        ontimeout: () => reject(new Error('GAPI load timeout'))
      });
    });
  }
  
  async function checkEmailInSheet(email) {
    try {
      await initGapi();
      const response = await gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: AUTH_SPREADSHEET_ID,
        range: `${AUTH_SHEET_NAME}!A:C`,
      });
      const rows = response.result.values;
      if (!rows || rows.length === 0) return { found: false };
      for (let i = 1; i < rows.length; i++) {
        if (!rows[i] || !rows[i][0]) continue;
        const rowEmail = rows[i][0].toLowerCase().trim();
        if (rowEmail === email) {
          const userName = rows[i][1] ? rows[i][1].trim() : email.split('@')[0];
          const userRole = rows[i][2] ? rows[i][2].trim() : '';
          return { found: true, name: userName, role: userRole };
        }
      }
      return { found: false };
    } catch (error) {
      console.error('Sheets API error:', error);
      return { found: false, error: true };
    }
  }
  
  function showLoadingOverlay(show) {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.style.display = show ? 'flex' : 'none';
  }
  
  // Глобальная функция для колбэка Google
  window.handleCredentialResponse = async function(response) {
    try {
      showLoadingOverlay(true);
      const payload = parseJwt(response.credential);
      const email = payload.email.toLowerCase().trim();
      console.log('Проверка email:', email);
      const checkResult = await checkEmailInSheet(email);
      if (checkResult.found) {
        currentUser = {
          email: email,
          name: checkResult.name || payload.name,
          role: checkResult.role || '',
          picture: payload.picture
        };
        // Успешный вход: скрываем экран логина, показываем основной контент
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        showLoadingOverlay(false);
        // Инициализируем основное приложение бронирования (все таблицы, данные)
        initAppAfterAuth();
      } else {
        showLoadingOverlay(false);
        alert('Доступ запрещен: Ваш email не найден в списке разрешенных');
        // Оставляем экран входа видимым
        document.getElementById('loginScreen').style.display = 'flex';
      }
    } catch (e) {
      console.error("Ошибка аутентификации:", e);
      showLoadingOverlay(false);
      alert('Ошибка аутентификации');
      document.getElementById('loginScreen').style.display = 'flex';
    }
  };
  
  // Выход (при желании можно добавить кнопку выхода, но по условию не просили)
  // ==================== ВСЯ ОРИГИНАЛЬНАЯ ЛОГИКА БРОНИРОВАНИЙ (НИЧЕГО НЕ УДАЛЯЛИ) ====================
  // Ниже код полностью взят из исходного файла, но сокращены дублирования для читаемости
  const dateInput = document.getElementById('dateInput');
  const today = new Date().toISOString().split('T')[0];
  dateInput.min = today;
  dateInput.value = today;
  const startHour = 11, endHour = 22, lanes = 12;
  const tableBody = document.getElementById("tableBody");
  const cardsContainer = document.getElementById("cardsContainer");
  const slidersContainer = document.getElementById("slidersContainer");
  const tableContainer = document.querySelector(".table-container");
  const loadingOverlay = document.getElementById("loadingOverlay");
  const timeSlots = [];
  for (let h = startHour; h <= endHour; h++) {
    if (h < endHour) { timeSlots.push({ display: `${h}:00`, key: h }); timeSlots.push({ display: `${h}:30`, key: h + 0.5 }); }
    else timeSlots.push({ display: `${h}:00`, key: h });
  }
  timeSlots.forEach(slot => {
    const row = document.createElement("tr");
    for (let lane = 0; lane < lanes; lane++) {
      const cell = document.createElement("td");
      cell.className = "slot";
      cell.dataset.lane = lane;
      cell.dataset.time = slot.key;
      cell.dataset.display = slot.display;
      row.appendChild(cell);
    }
    const timeCell = document.createElement("th");
    timeCell.className = "time-right";
    timeCell.textContent = slot.display;
    row.appendChild(timeCell);
    tableBody.appendChild(row);
  });

  function updateMarkersWidth() {
    const headers = document.querySelectorAll('thead th');
    const markers = document.querySelectorAll('.marker');
    if (headers.length === markers.length) {
      for (let i = 0; i < headers.length; i++) { const width = headers[i].offsetWidth; markers[i].style.width = width + 'px'; }
    }
  }
  const columnMarkers = document.getElementById("columnMarkers");
  function createMarkers() {
    columnMarkers.innerHTML = "";
    for (let lane = 0; lane < lanes; lane++) {
      const marker = document.createElement("div");
      marker.className = "marker";
      if (lane === 0 || lane === 1 || lane === 2 || lane === 4 || lane === 5) marker.classList.add("blue");
      else if (lane === 3) marker.classList.add("green");
      else if (lane >= 6 && lane <= 11) marker.classList.add("red");
      columnMarkers.appendChild(marker);
    }
    const timeMarker = document.createElement("div");
    timeMarker.className = "marker empty";
    columnMarkers.appendChild(timeMarker);
    setTimeout(updateMarkersWidth, 10);
  }
  createMarkers();
  window.addEventListener('resize', updateMarkersWidth);
  window.addEventListener('load', updateMarkersWidth);
  setTimeout(updateMarkersWidth, 100);

  let intervalsByLane = {}, currentLane = null, currentStart = null, currentBookingId = null;
  function clearStartTimeHighlight() { document.querySelectorAll('td.start-time-chosen').forEach(c => c.classList.remove('start-time-chosen')); }
  function clearHeaderHighlight() { document.querySelectorAll('thead th.highlight-header').forEach(th => th.classList.remove('highlight-header')); }
  function clearVerticalLines() { document.querySelectorAll('td.vertical-line').forEach(td => td.classList.remove('vertical-line')); }
  function highlightHeader(lane) { clearHeaderHighlight(); const headerCells = document.querySelectorAll('thead th'); if (lane >= 0 && lane < lanes) headerCells[lane].classList.add('highlight-header'); }
  function highlightColumn(lane) { clearVerticalLines(); document.querySelectorAll(`td.slot[data-lane="${lane}"]`).forEach(td => td.classList.add('vertical-line')); }
  function updateTableSelection() {
    document.querySelectorAll("td.selected").forEach(c => c.classList.remove("selected"));
    for (let laneStr in intervalsByLane) {
      intervalsByLane[laneStr].forEach(interval => {
        const start = Math.min(interval.start, interval.end), end = Math.max(interval.start, interval.end);
        document.querySelectorAll(`td.slot[data-lane="${laneStr}"]`).forEach(cell => { const t = parseFloat(cell.dataset.time); if (t >= start && t <= end) cell.classList.add("selected"); });
      });
    }
    cardsContainer.innerHTML = "";
    const selDate = dateInput.value.split("-").reverse().join(".");
    for (let laneStr in intervalsByLane) {
      intervalsByLane[laneStr].forEach((interval, idx) => {
        const s = Math.min(interval.start, interval.end), e = Math.max(interval.start, interval.end);
        const card = document.createElement("div"); card.className = "booking-card"; card.textContent = `Стол № ${+laneStr+1} | ${selDate} | с ${Math.floor(s)}:${s%1===0.5?"30":"00"} по ${Math.floor(e)}:${e%1===0.5?"30":"00"}`;
        const btn = document.createElement("button"); btn.className = "close-btn"; btn.innerHTML = "&times;"; btn.onclick = ev => { ev.stopPropagation(); intervalsByLane[laneStr].splice(idx,1); updateTableSelection(); };
        card.appendChild(btn); cardsContainer.appendChild(card);
      });
    }
  }

  tableBody.addEventListener("click", e => {
    if (e.target.classList.contains("slot")) { currentLane = +e.target.dataset.lane; clearStartTimeHighlight(); highlightHeader(currentLane); highlightColumn(currentLane); }
    if (e.target.classList.contains("time-right") && currentLane !== null) {
      const time = parseFloat(e.target.textContent.replace(":30",".5").replace(":00",".0"));
      if (currentStart === null) { currentStart = time; clearStartTimeHighlight(); const sc = document.querySelector(`td.slot[data-lane="${currentLane}"][data-time="${currentStart}"]`); if(sc) sc.classList.add("start-time-chosen"); }
      else {
        if (time <= currentStart) return alert("Время конца должно быть больше времени начала.");
        if (!intervalsByLane[currentLane]) intervalsByLane[currentLane] = [];
        intervalsByLane[currentLane].push({ start: currentStart, end: time });
        currentLane = null; currentStart = null; clearStartTimeHighlight(); clearHeaderHighlight(); clearVerticalLines(); updateTableSelection();
      }
    }
  });
  tableBody.addEventListener("dblclick", e => { if(!e.target.classList.contains("slot")) return; const lane = +e.target.dataset.lane, time = parseFloat(e.target.dataset.time); if(intervalsByLane[lane]){ const idx = intervalsByLane[lane].findIndex(iv => time >= Math.min(iv.start, iv.end) && time <= Math.max(iv.start, iv.end)); if(idx !== -1){ intervalsByLane[lane].splice(idx,1); updateTableSelection(); } } });

  window.openModal = function() { if (!Object.values(intervalsByLane).some(a=>a.length)) return alert("Сначала выберите время."); document.getElementById("modal").style.display = "flex"; };
  window.closeModal = function() { document.getElementById("modal").style.display = "none"; };
  window.submitForm = async function() {
    const name = document.getElementById("nameInput").value.trim(), phone = document.getElementById("phoneInput").value.trim(), comment = document.getElementById("commentInput").value.trim(), date = dateInput.value;
    if (!name || !phone) return alert("Введите имя и телефон."); if (!date) return alert("Выберите дату.");
    const bookings = []; for (let lane in intervalsByLane) intervalsByLane[lane].forEach(iv => { bookings.push({ date, tableNumber: +lane+1, start: iv.start, end: iv.end, name, phone, comment }); });
    if (!bookings.length) return alert("Нет выбранных интервалов.");
    try {
      loadingOverlay.style.display = 'flex';
      await Promise.all(bookings.map(b => fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ bookings: [b] }) })));
      loadingOverlay.style.display = 'none';
      closeModal(); for(let l in intervalsByLane) intervalsByLane[l] = []; currentLane = currentStart = null; clearStartTimeHighlight(); clearHeaderHighlight(); clearVerticalLines(); updateTableSelection();
      document.getElementById("nameInput").value = ""; document.getElementById("phoneInput").value = ""; document.getElementById("commentInput").value = "";
      await loadExisting();
    } catch (error) { loadingOverlay.style.display = 'none'; alert("Ошибка при отправке бронирования"); }
  };
  function showBookingInfo(b) { document.getElementById('info-table').textContent = `№${b.table}`; document.getElementById('info-date').textContent = b.date.split('-').reverse().join('.'); document.getElementById('info-time').textContent = `${Math.floor(b.start)}:${b.start%1===0.5?"30":"00"} - ${Math.floor(b.end)}:${b.end%1===0.5?"30":"00"}`; document.getElementById('info-name').textContent = b.name; document.getElementById('info-phone').textContent = b.phone; document.getElementById('info-comment').textContent = b.comment || 'нет комментария'; document.getElementById('info-confirmed').textContent = b.confirmed || ''; document.getElementById('bookingInfoPopup').style.display = 'flex'; currentBookingId = b.id; }
  window.closeBookingInfoPopup = function() { document.getElementById('bookingInfoPopup').style.display = 'none'; currentBookingId = null; };
  window.confirmBooking = async function(confirmed) { if(!currentBookingId) return; try{ loadingOverlay.style.display='flex'; await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"confirm",id:currentBookingId,confirmed})}); loadingOverlay.style.display='none'; closeBookingInfoPopup(); await loadExisting(); } catch(e){ loadingOverlay.style.display='none'; alert("Ошибка обновления статуса"); } };
  window.deleteBooking = async function() { if(!currentBookingId || !confirm("Удалить бронь?")) return; try{ loadingOverlay.style.display='flex'; await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"delete",id:currentBookingId})}); loadingOverlay.style.display='none'; closeBookingInfoPopup(); await loadExisting(); } catch(e){ loadingOverlay.style.display='none'; alert("Ошибка удаления"); } };
  async function loadExisting() {
    try{ loadingOverlay.style.display='flex'; slidersContainer.innerHTML=""; const res = await fetch(GAS_URL+"?action=get&date="+dateInput.value); const data = await res.json(); loadingOverlay.style.display='none'; if(!data.bookings?.length) return; const timeCells = Array.from(document.querySelectorAll('th.time-right')), tableCells = Array.from(document.querySelectorAll('td.slot')), containerRect = tableContainer.getBoundingClientRect();
      data.bookings.forEach(b => { if(b.date===dateInput.value){ const laneIndex = b.table-1; const startIndex = timeSlots.findIndex(ts => ts.key===parseFloat(b.start)), endIndex = timeSlots.findIndex(ts => ts.key===parseFloat(b.end)); if(startIndex===-1||endIndex===-1) return; const startCell = tableCells.find(cell => parseInt(cell.dataset.lane)===laneIndex && parseFloat(cell.dataset.time)===parseFloat(b.start)); if(!startCell) return; const startCellRect = startCell.getBoundingClientRect(); const startTimeCell = timeCells[startIndex], endTimeCell = timeCells[endIndex]; const height = endTimeCell.offsetTop + endTimeCell.offsetHeight - startTimeCell.offsetTop; const left = startCellRect.left - containerRect.left, top = startTimeCell.offsetTop; const slider = document.createElement("div"); slider.className = "existing-slider"; if (b.confirmed === "Да") slider.classList.add("confirmed"); else if (b.confirmed === "Нет") slider.classList.add("rejected"); slider.style.top = `${top}px`; slider.style.left = `${left}px`; slider.style.width = `${startCellRect.width}px`; slider.style.height = `${height}px`; slider.addEventListener('click', (e) => { e.stopPropagation(); showBookingInfo(b); }); slidersContainer.appendChild(slider); } });
    } catch(e){ loadingOverlay.style.display='none'; console.error(e); }
  }
  dateInput.addEventListener('change', async () => { await loadExisting(); intervalsByLane = {}; currentLane = currentStart = null; clearStartTimeHighlight(); clearHeaderHighlight(); clearVerticalLines(); updateTableSelection(); });
  
  function initAppAfterAuth() {
    loadExisting(); 
    updateTableSelection(); 
    updateMarkersWidth();
    // добавление стилей для слайдеров и карточек (стили из оригинала, часть уже встроена в head)
  }
  document.getElementById("openImage").onclick = () => { document.getElementById("imagePopup").style.display = "flex"; };
  window.closeImagePopup = function() { document.getElementById("imagePopup").style.display = "none"; };
  
  // Добавим недостающие стили для элементов (из оригинального CSS, чтобы интерфейс работал корректно)
  const styleSupplement = document.createElement('style');
  styleSupplement.textContent = `
    .column-markers { display: flex; gap: 2px; margin-top: 5px; justify-content: center; }
    .marker { height: 6px; border-radius: 3px; width: 50px; }
    .marker.blue { background-color: #3b82f6; }
    .marker.green { background-color: #22c55e; }
    .marker.red { background-color: #ef4444; }
    .marker.empty { background: transparent; }
    .booking-card { position: relative; background: #e0f2fe; border-radius: 12px; padding: 12px 45px 12px 15px; color: #1e3a8a; font-weight: 600; white-space: nowrap; display: inline-block; margin: 5px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .booking-card .close-btn { position: absolute; top: 0; right: 0; transform: translate(50%, -50%); background: white; border-radius: 50%; font-size: 18px; cursor: pointer; padding: 6px 10px; border: 1px solid #1e3a8a; }
    .existing-slider { position: absolute; background: #1a2f40; border-radius: 6px; pointer-events: auto; cursor: pointer; font-size: 10px; font-weight: bold; padding: 2px 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); color: white; text-align: center; display: flex; align-items: center; justify-content: center; overflow: hidden; white-space: nowrap; }
    .existing-slider.confirmed { background: #16a34a; }
    .existing-slider.rejected { background: #b91c1c; }
    .booking-info-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
    .booking-info-popup .popup-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; position: relative; }
    .image-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 10000; }
    .image-popup .popup-content { background: white; padding: 20px; border-radius: 12px; max-width: 90vw; max-height: 90vh; overflow: auto; position: relative; }
    .close-popup, .close-btn { cursor: pointer; }
    #controls { margin: 10px auto; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; max-width: 500px; }
    .booking-button { background: #1a2f40; color: white; border: none; padding: 8px 16px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    #dateInput { padding: 8px; border-radius: 10px; border: 1px solid #ccc; }
    th, td { border: none; background: white; text-align: center; vertical-align: middle; }
    td.slot { cursor: pointer; }
    td.selected { background: #1a2f40 !important; color: white; }
    td.start-time-chosen { background: #ef4444 !important; }
    .time-right { background: #1a2f40; color: white; font-weight: bold; cursor: pointer; }
    .table-container { overflow-x: auto; }
    table { border-collapse: separate; border-spacing: 2px; margin: 0 auto; background: #1a2f40; }
