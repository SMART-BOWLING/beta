<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Бронирование бильярда</title>

<style>
body {font-family: Arial; margin:20px;}
table {border-collapse: collapse;}
td,th {
  border:1px solid #ccc;
  width:70px;
  height:50px;
  text-align:center;
}

#gridWrap {
  position: relative;
  overflow-x:auto;
}

#slidersLayer {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

.slider {
  position:absolute;
  background:rgba(0,113,227,.2);
  border:1px solid #0071e3;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  justify-content:center;
  font-size:12px;
}

.slider-handle {
  position:absolute;
  top:0;
  width:10px;
  height:100%;
}

.slider-handle.left {left:0; cursor:ew-resize;}
.slider-handle.right {right:0; cursor:ew-resize;}
</style>

</head>

<body>

<h2>Бронирование</h2>

<div id="gridWrap">
<table id="tbl">
<thead>
<tr id="head"><th>Стол</th></tr>
</thead>
<tbody id="body"></tbody>
</table>
<div id="slidersLayer"></div>
</div>

<script>

const GAS="https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";

const LANES=6;
const slots=[];
for(let h=10;h<=22;h++){
  slots.push({key:h,label:h+":00"});
  if(h<22) slots.push({key:h+0.5,label:h+":30"});
}

function fmt(v){return Math.floor(v)+":"+(v%1?".30":".00");}

init();

function init(){
  build();
  load();
}

function build(){
  let head=document.getElementById("head");

  slots.forEach((s,i)=>{
    let th=document.createElement("th");
    th.innerText=s.label;
    head.appendChild(th);
  });

  let body=document.getElementById("body");

  for(let i=0;i<LANES;i++){
    let tr=document.createElement("tr");

    let td=document.createElement("td");
    td.innerText=i+1;
    tr.appendChild(td);

    slots.forEach(()=>{
      let c=document.createElement("td");
      tr.appendChild(c);
    });

    body.appendChild(tr);
  }
}

async function load(){
  let res=await fetch(GAS+"?action=get");
  let data=await res.json();
  render(data.bookings||[]);
}

function render(bookings){
  let rows=[...document.querySelectorAll("#body tr")];

  bookings.forEach(b=>{
    let r=rows[b.table-1];

    let si=slots.findIndex(s=>s.key==b.start);
    let ei=slots.findIndex(s=>s.key==b.end);

    if(si<0||ei<0)return;

    let c1=r.children[si+1];
    let c2=r.children[ei+1];

    let sl=makeSlider(b);

    sl.style.left=c1.offsetLeft+"px";
    sl.style.top=r.offsetTop+"px";
    sl.style.width=(c2.offsetLeft-c1.offsetLeft+c2.offsetWidth)+"px";
    sl.style.height=r.offsetHeight+"px";

    slidersLayer.appendChild(sl);
  });
}

function makeSlider(b){
  let el=document.createElement("div");
  el.className="slider";

  el.dataset.id=b.id;
  el.dataset.start=b.start;
  el.dataset.end=b.end;

  let name=document.createElement("div");
  name.innerText=b.name;

  let time=document.createElement("div");
  time.innerText=fmt(b.start)+"-"+fmt(b.end);

  let l=document.createElement("div");
  l.className="slider-handle left";

  let r=document.createElement("div");
  r.className="slider-handle right";

  el.append(name,time,l,r);

  drag(el,time);

  return el;
}

function drag(sl,label){

  let drag=false,left=false,right=false;
  let sx,slf,sw;

  let cell= document.querySelector("td").offsetWidth;

  sl.onmousedown=e=>{
    if(e.target.classList.contains("left")) left=true;
    else if(e.target.classList.contains("right")) right=true;
    else drag=true;

    sx=e.clientX;
    slf=sl.offsetLeft;
    sw=sl.offsetWidth;

    document.onmousemove=move;
    document.onmouseup=up;
  }

  function move(e){
    let dx=e.clientX-sx;

    if(drag) sl.style.left=slf+dx+"px";

    if(left){
      sl.style.left=slf+dx+"px";
      sl.style.width=sw-dx+"px";
    }

    if(right){
      sl.style.width=sw+dx+"px";
    }
  }

  function up(){
    document.onmousemove=null;
    document.onmouseup=null;

    let leftPx=sl.offsetLeft;
    let width=sl.offsetWidth;

    let si=Math.round(leftPx/cell);
    let ei=Math.round((leftPx+width)/cell);

    let ns=slots[si]?.key;
    let ne=slots[ei]?.key;

    if(ns==null||ne==null)return;

    sl.dataset.start=ns;
    sl.dataset.end=ne;

    label.innerText=fmt(ns)+"-"+fmt(ne);

    update(sl.dataset.id,ns,ne);

    drag=left=right=false;
  }
}

async function update(id,s,e){
  await fetch(GAS,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      action:"updateTime",
      id:id,
      start:s,
      end:e
    })
  });
}

</script>

</body>
</html>
