<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
  <title>Бильярд Бронь — Умный ползунок времени</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    * {
      box-sizing: border-box;
      user-select: none; /* избегаем случайного выделения */
    }
    :root {
      --cell-size: 50px;
      --main-color: #1e3a8a;
      --highlight-color: #ef4444;
      --highlight-bg: #1a2f40;
      --confirmed-color: #16a34a;
      --rejected-color: #b91c1c;
      --background-color: #1a2f40;
      --card-color: #e0f2fe;
      --blue-color: #2563eb;
      --red-color: #ef4444;
      --green-color: #22c55e;
      --custom-dark: #1a2f40;
      --border-spacing: 2px;
    }

    @media (max-width: 768px) {
      :root { 
        --cell-size: calc((100vw - 24px) / 13);
        --border-spacing: 2px;
      }
      table { width: auto !important; margin: 0 auto; }
      td, th {
        aspect-ratio: 1;
        width: var(--cell-size) !important;
        height: var(--cell-size) !important;
        font-size: 11px;
      }
      .booking-card { font-size: 12px; padding: 8px 35px 8px 12px; white-space: normal; word-break: keep-all; }
      .existing-slider { font-size: 8px; white-space: normal; line-height: 1.2; }
      #controls { gap: 8px; }
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #1a2f40;
      padding: 5px;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .table-container {
      position: relative;
      width: 100%;
      max-width: 100vw;
      overflow-x: auto;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: transparent;
    }

    table {
      border-collapse: separate;
      border-spacing: var(--border-spacing);
      table-layout: fixed;
      touch-action: manipulation;
      margin: 0 auto;
      background: #1a2f40;
      padding: var(--border-spacing);
    }

    .table-wrapper {
      display: inline-block;
      position: relative;
      margin: 0 auto;
    }

    thead th {
      position: sticky;
      top: 0;
      color: white;
      z-index: 2;
      font-weight: 600;
      background: #1a2f40 !important;
    }

    th, td {
      width: var(--cell-size);
      height: var(--cell-size);
      border: none;
      text-align: center;
      vertical-align: middle;
      background: white !important;
      font-size: 12px;
      transition: all 0.1s ease;
    }

    td.slot { 
      cursor: pointer; 
      transition: background 0.15s, transform 0.05s;
    }
    td.slot:active { transform: scale(0.96); }

    td.selected {
      background: #1a2f40 !important;
      color: white;
      font-weight: 500;
    }

    td.start-time-chosen {
      background: #ef4444 !important;
      color: white;
      box-shadow: inset 0 0 0 2px white;
    }

    /* маркеры столбцов – клик на них показывает схему столов */
    .column-markers {
      display: flex;
      gap: var(--border-spacing);
      margin-top: 5px;
      justify-content: center;
    }
    .marker {
      height: 6px;
      border-radius: 3px;
      cursor: pointer;
      transition: 0.1s;
    }
    .marker:active { transform: scale(0.96); }
    .marker.blue { background-color: #3b82f6; }
    .marker.green { background-color: #22c55e; }
    .marker.red { background-color: #ef4444; }
    .marker.empty { background: transparent; cursor: default; }

    #cardsContainer {
      margin: 8px auto 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .booking-card {
      position: relative;
      background: var(--card-color);
      border-radius: 12px;
      padding: 12px 45px 12px 15px;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      transition: 0.2s;
    }
    .booking-card .close-btn {
      position: absolute;
      top: 0;
      right: 0;
      transform: translate(50%, -50%);
      background: white;
      border: 1px solid var(--main-color);
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      padding: 5px 9px;
    }
    .booking-card .close-btn:hover { background: var(--main-color); color: white; }

    #controls {
      margin-top: 6px;
      display: flex;
      justify-content: center;
      gap: 15px;
      width: 100%;
      max-width: 500px;
    }
    #dateInput, .booking-button {
      flex: 1;
      padding: 8px 12px;
      font-weight: 600;
      border-radius: 10px;
      border: 1px solid white;
      background: white;
      cursor: pointer;
    }
    .booking-button {
      background: #1a2f40;
      color: white;
      border: 1px solid white;
    }
    .booking-button:active { transform: scale(0.97); }

    /* модалки */
    #modal, #bookingInfoPopup, .image-popup {
      display: none;
      position: fixed;
      inset: 0;
      background: #00000099;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .popup-content, #modal > div {
      background: white;
      padding: 20px;
      border-radius: 20px;
      max-width: 400px;
      width: 90%;
    }
    .close-btn, .close-popup {
      background: #1a2f40;
      color: white;
      border: none;
      border-radius: 30px;
      width: 32px;
      height: 32px;
      font-size: 20px;
      cursor: pointer;
    }
    .confirmation-buttons { display: flex; gap: 12px; margin: 15px 0; }
    .confirm-yes { background: #16a34a; color: white; }
    .confirm-no { background: #b91c1c; color: white; }
    .delete-btn { background: #475569; color: white; width: 100%; padding: 8px; border-radius: 30px; margin-top: 12px; }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .loading-spinner {
      width: 45px;
      height: 45px;
      border: 5px solid #ccc;
      border-top-color: #1a2f40;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ползунки существующих броней */
    #slidersContainer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .existing-slider {
      position: absolute;
      background: #1a2f40;
      border-radius: 6px;
      pointer-events: auto;
      cursor: pointer;
      font-size: 9px;
      font-weight: bold;
      padding: 2px 4px;
      color: white;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: 0.05s linear;
    }
    .existing-slider.confirmed { background: #16a34a; }
    .existing-slider.rejected { background: #b91c1c; }
    .existing-slider::before, .existing-slider::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: #ef4444;
    }
    .existing-slider::before { top: 0; border-radius: 4px 4px 0 0; }
    .existing-slider::after { bottom: 0; border-radius: 0 0 4px 4px; }

    /* экран входа (только кнопка) */
    .login-screen {
      position: fixed;
      inset: 0;
      background: #1a2f40;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .logout-like-tables-btn {
      background: #1a2f40;
      border: 1px solid white;
      color: white;
      padding: 6px 10px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- ЭКРАН ЛОГИНА -->
<div id="loginScreen" class="login-screen">
  <div class="login-button-wrapper">
    <div id="g_id_onload" data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
    <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large"></div>
  </div>
</div>

<!-- ОСНОВНОЙ КОНТЕНТ -->
<div id="mainContent" style="display: none;">
  <div class="table-container">
    <div class="table-wrapper">
      <table id="bookingTable">
        <thead>
          <tr id="headerRow">
            <!-- 12 столов -->
            <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th>
            <th>7</th><th>8</th><th>9</th><th>10</th><th>11</th><th>12</th>
            <th class="time-col" style="padding:0;"><button id="logoutButtonHeader" class="logout-like-tables-btn">Выйти</button></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="columnMarkers" class="column-markers"></div>
    </div>
    <div id="slidersContainer"></div>
  </div>

  <div id="cardsContainer"></div>
  <div id="controls">
    <input type="date" id="dateInput" />
    <button class="booking-button" onclick="openModal()">ЗАБРОНИРОВАТЬ</button>
  </div>

  <!-- Модалка ввода -->
  <div id="modal">
    <div>
      <h3>Введите данные</h3>
      <label>Имя:<br><input id="nameInput" autocomplete="off"></label>
      <label>Телефон:<br><input id="phoneInput" type="tel"></label>
      <label>Комментарий:<br><textarea id="commentInput" rows="2"></textarea></label>
      <div style="text-align: right; margin-top: 15px;">
        <button onclick="submitForm()">ЗАБРОНИРОВАТЬ</button>
        <button onclick="closeModal()">ОТМЕНА</button>
      </div>
    </div>
  </div>

  <!-- Схема столов (popup) -->
  <div id="imagePopup" class="image-popup">
    <div class="popup-content">
      <button class="close-popup" onclick="closeImagePopup()">&times;</button>
      <img src="https://i.postimg.cc/52ZDKDDw/55.png" style="width:100%; border-radius:12px;" />
    </div>
  </div>

  <!-- Инфо о брони -->
  <div id="bookingInfoPopup" class="booking-info-popup">
    <div class="popup-content">
      <button class="close-btn" onclick="closeBookingInfoPopup()">&times;</button>
      <h3>Информация</h3>
      <div class="info-row"><strong>Стол:</strong> <span id="info-table"></span></div>
      <div class="info-row"><strong>Дата:</strong> <span id="info-date"></span></div>
      <div class="info-row"><strong>Время:</strong> <span id="info-time"></span></div>
      <div class="info-row"><strong>Имя:</strong> <span id="info-name"></span></div>
      <div class="info-row"><strong>Телефон:</strong> <span id="info-phone"></span></div>
      <div class="info-row"><strong>Коммент:</strong> <span id="info-comment"></span></div>
      <div class="info-row"><strong>Посещение:</strong> <span id="info-confirmed"></span></div>
      <div class="confirmation-buttons"><button class="confirm-yes" onclick="confirmBooking(true)">Да, пришли</button><button class="confirm-no" onclick="confirmBooking(false)">Нет, не пришли</button></div>
      <button class="delete-btn" onclick="deleteBooking()">🗑 УДАЛИТЬ БРОНЬ</button>
    </div>
  </div>
  <div id="loadingOverlay" class="loading-overlay" style="display: none;"><div class="loading-spinner"></div></div>
</div>

<script>
  // ------------------- АВТОРИЗАЦИЯ -------------------
  const AUTH_SPREADSHEET_ID = '1zwi1CInK3NZ8YRAegRMAdjin6XPacVkAkFsjAiqVE0w';
  const API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
  let currentUser = null;
  let gapiInitialized = false;
  const STORAGE_USER_KEY = 'billiard_user_v2';
  const STORAGE_EXPIRY_KEY = 'billiard_expiry';

  function parseJwt(token) {
    try {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
      return JSON.parse(jsonPayload);
    } catch(e) { return {}; }
  }

  async function initGapi() {
    if (gapiInitialized) return;
    return new Promise((resolve, reject) => {
      gapi.load('client', {
        callback: async () => {
          try {
            await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] });
            gapiInitialized = true;
            resolve();
          } catch(e) { reject(e); }
        },
        onerror: reject
      });
    });
  }

  async function checkEmailInSheet(email) {
    try {
      await initGapi();
      const res = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: AUTH_SPREADSHEET_ID, range: '1!A:C' });
      const rows = res.result.values || [];
      for (let i = 1; i < rows.length; i++) {
        if (rows[i][0] && rows[i][0].toLowerCase().trim() === email) {
          return { found: true, name: rows[i][1] || email.split('@')[0], role: rows[i][2] || '' };
        }
      }
      return { found: false };
    } catch(e) { return { found: false, error: true }; }
  }

  function saveUserToStorage(u) {
    const exp = new Date(); exp.setDate(exp.getDate() + 7);
    localStorage.setItem(STORAGE_USER_KEY, JSON.stringify(u));
    localStorage.setItem(STORAGE_EXPIRY_KEY, exp.toISOString());
  }
  function getUserFromStorage() {
    const raw = localStorage.getItem(STORAGE_USER_KEY), expRaw = localStorage.getItem(STORAGE_EXPIRY_KEY);
    if (!raw || !expRaw) return null;
    if (new Date(expRaw) < new Date()) { localStorage.removeItem(STORAGE_USER_KEY); localStorage.removeItem(STORAGE_EXPIRY_KEY); return null; }
    try { return JSON.parse(raw); } catch(e) { return null; }
  }
  function clearSession() { localStorage.removeItem(STORAGE_USER_KEY); localStorage.removeItem(STORAGE_EXPIRY_KEY); }

  window.handleCredentialResponse = async (resp) => {
    const overlay = document.getElementById('loadingOverlay');
    if(overlay) overlay.style.display = 'flex';
    try {
      const payload = parseJwt(resp.credential);
      const email = payload.email.toLowerCase().trim();
      const check = await checkEmailInSheet(email);
      if (check.found) {
        currentUser = { email, name: check.name, role: check.role, picture: payload.picture };
        saveUserToStorage(currentUser);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        if(overlay) overlay.style.display = 'none';
        document.getElementById('logoutButtonHeader').onclick = () => { clearSession(); location.reload(); };
        initAfterAuth();
      } else {
        if(overlay) overlay.style.display = 'none';
        alert('Доступ запрещён: email не найден.');
      }
    } catch(e) { if(overlay) overlay.style.display = 'none'; alert('Ошибка входа'); }
  };

  function tryRestoreSession() {
    const saved = getUserFromStorage();
    if (saved && saved.email) {
      currentUser = saved;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('logoutButtonHeader').onclick = () => { clearSession(); location.reload(); };
      initAfterAuth();
      return true;
    }
    return false;
  }

  // ---------- ОСНОВНАЯ БИЗНЕС-ЛОГИКА С УМНЫМ ПОЛЗУНКОМ ----------
  const dateInput = document.getElementById('dateInput');
  const today = new Date().toISOString().split('T')[0];
  dateInput.min = today;
  dateInput.value = today;
  const startHour = 11, endHour = 22, lanes = 12;
  const tableBody = document.getElementById("tableBody");
  const cardsContainer = document.getElementById("cardsContainer");
  const slidersContainer = document.getElementById("slidersContainer");
  const tableContainer = document.querySelector(".table-container");
  const loadingOverlay = document.getElementById("loadingOverlay");

  // генерация временных слотов (с 11:00 до 22:00 с шагом 30 мин)
  const timeSlots = [];
  for (let h = startHour; h <= endHour; h++) {
    timeSlots.push({ display: `${h}:00`, key: h });
    if (h < endHour) timeSlots.push({ display: `${h}:30`, key: h + 0.5 });
  }
  // построить таблицу
  function buildTable() {
    tableBody.innerHTML = "";
    timeSlots.forEach(slot => {
      const tr = document.createElement('tr');
      for (let lane = 0; lane < lanes; lane++) {
        const td = document.createElement('td');
        td.className = "slot";
        td.dataset.lane = lane;
        td.dataset.time = slot.key;
        td.dataset.display = slot.display;
        tr.appendChild(td);
      }
      const th = document.createElement('th');
      th.className = "time-right";
      th.textContent = slot.display;
      tr.appendChild(th);
      tableBody.appendChild(tr);
    });
  }
  buildTable();

  // маркеры столбцов
  const columnMarkersDiv = document.getElementById("columnMarkers");
  function createMarkers() {
    columnMarkersDiv.innerHTML = "";
    for (let i = 0; i < lanes; i++) {
      const marker = document.createElement("div");
      marker.className = "marker";
      if (i <= 2 || i === 4 || i === 5) marker.classList.add("blue");
      else if (i === 3) marker.classList.add("green");
      else if (i >= 6 && i <= 11) marker.classList.add("red");
      marker.onclick = () => document.getElementById("imagePopup").style.display = "flex";
      columnMarkersDiv.appendChild(marker);
    }
    const emptyMarker = document.createElement("div");
    emptyMarker.className = "marker empty";
    columnMarkersDiv.appendChild(emptyMarker);
  }
  createMarkers();

  // состояние выбранных интервалов: intervalsByLane[lane] = [{start, end}]
  let intervalsByLane = {};
  let currentLane = null;
  let currentStart = null;

  function clearHighlight() {
    document.querySelectorAll('td.start-time-chosen').forEach(c => c.classList.remove('start-time-chosen'));
    document.querySelectorAll('thead th.highlight-header').forEach(th => th.classList.remove('highlight-header'));
  }

  function highlightColumnAndHeader(lane) {
    clearHighlight();
    const headers = document.querySelectorAll('thead th');
    if (headers[lane]) headers[lane].classList.add('highlight-header');
    // визуально показываем вертикальные линии — можно через класс, но для простоты подсветка ячеек
    document.querySelectorAll(`td.slot`).forEach(td => td.style.outline = 'none');
    document.querySelectorAll(`td.slot[data-lane="${lane}"]`).forEach(td => td.style.outline = '1px solid #ef4444');
  }
  function resetColumnOutline() {
    document.querySelectorAll(`td.slot`).forEach(td => td.style.outline = '');
  }

  function updateTableSelection() {
    document.querySelectorAll("td.selected").forEach(c => c.classList.remove("selected"));
    for (let lane in intervalsByLane) {
      intervalsByLane[lane].forEach(interval => {
        const start = Math.min(interval.start, interval.end);
        const end = Math.max(interval.start, interval.end);
        document.querySelectorAll(`td.slot[data-lane="${lane}"]`).forEach(cell => {
          const t = parseFloat(cell.dataset.time);
          if (t >= start && t <= end) cell.classList.add("selected");
        });
      });
    }
    // отрисовать карточки
    cardsContainer.innerHTML = "";
    const selDate = dateInput.value.split("-").reverse().join(".");
    for (let lane in intervalsByLane) {
      intervalsByLane[lane].forEach((interval, idx) => {
        const s = Math.min(interval.start, interval.end);
        const e = Math.max(interval.start, interval.end);
        const startStr = `${Math.floor(s)}:${s % 1 === 0.5 ? "30" : "00"}`;
        const endStr = `${Math.floor(e)}:${e % 1 === 0.5 ? "30" : "00"}`;
        const card = document.createElement("div");
        card.className = "booking-card";
        card.textContent = `Стол ${+lane+1} | ${selDate} | ${startStr} – ${endStr}`;
        const closeBtn = document.createElement("button");
        closeBtn.className = "close-btn";
        closeBtn.innerHTML = "&times;";
        closeBtn.onclick = (ev) => { ev.stopPropagation(); intervalsByLane[lane].splice(idx,1); updateTableSelection(); };
        card.appendChild(closeBtn);
        cardsContainer.appendChild(card);
      });
    }
  }

  // --- ГЛАВНОЕ: ползунок останавливается на средней точке (12:30 при интервале 12:00-13:00) ---
  // Логика: пользователь кликает на ячейку (стол) -> выбирает стол. 
  // Потом кликает на время (правый столбец) – это либо старт, либо конец.
  // Для реализации "ползунок останавливается на середине" — при выборе конечной точки, если разница между start и end равна 1 часу (т.е. 60 минут или 1.0),
  // то мы автоматически меняем конечную точку на start + 0.5 (30 минут), имитируя "ползунок" на 12:30.
  // По заданию: пользователь ставит 12:00 - 13:00, а ползунок останавливается на 12:30. То есть интервал брони будет с 12:00 до 12:30! 
  // Сделаем, чтобы при попытке выбрать интервал ровно в 1 час (разница 1.0) — автоматически схлопывалось до получаса (центральный слот).
  // Это и есть "ползунок сам встает на 12:30"
  
  function applySmartSliderCorrection(lane, startTime, endTime) {
    // если разница ровно 1 час (60 мин), то считаем, что пользователь хотел "ползунок по центру" — ставим бронь ровно 30 минут от старта
    if (Math.abs(endTime - startTime) === 1.0) {
      const middle = startTime + 0.5;
      return { start: startTime, end: middle };
    }
    // иначе стандартный интервал
    return { start: startTime, end: endTime };
  }

  // обработка кликов по времени (правый столбец)
  tableBody.addEventListener("click", (e) => {
    // клик по ячейке стола
    if (e.target.classList.contains("slot")) {
      const lane = parseInt(e.target.dataset.lane);
      currentLane = lane;
      currentStart = null;
      clearHighlight();
      highlightColumnAndHeader(lane);
      resetColumnOutline();
      return;
    }
    // клик по времени
    if (e.target.classList.contains("time-right") && currentLane !== null) {
      const timeValue = parseFloat(e.target.textContent.replace(":30", ".5").replace(":00", ".0"));
      if (currentStart === null) {
        // первый клик — установка начала
        currentStart = timeValue;
        clearHighlight();
        const startCell = document.querySelector(`td.slot[data-lane="${currentLane}"][data-time="${currentStart}"]`);
        if (startCell) startCell.classList.add("start-time-chosen");
      } else {
        // второй клик — конец интервала
        let start = currentStart;
        let end = timeValue;
        if (end <= start) {
          alert("Конец брони должен быть позже начала.");
          currentStart = null;
          clearHighlight();
          resetColumnOutline();
          return;
        }
        // ✨ УМНЫЙ ПОЛЗУНОК: если интервал ровно 1 час -> подрезаем до получаса (центр)
        const corrected = applySmartSliderCorrection(currentLane, start, end);
        const finalStart = corrected.start;
        const finalEnd = corrected.end;
        
        if (!intervalsByLane[currentLane]) intervalsByLane[currentLane] = [];
        intervalsByLane[currentLane].push({ start: finalStart, end: finalEnd });
        
        // очистка состояния
        currentLane = null;
        currentStart = null;
        clearHighlight();
        resetColumnOutline();
        updateTableSelection();
      }
    }
  });

  // двойной клик для удаления
  tableBody.addEventListener("dblclick", (e) => {
    if (!e.target.classList.contains("slot")) return;
    const lane = parseInt(e.target.dataset.lane);
    const time = parseFloat(e.target.dataset.time);
    if (intervalsByLane[lane]) {
      const idx = intervalsByLane[lane].findIndex(iv => time >= Math.min(iv.start, iv.end) && time <= Math.max(iv.start, iv.end));
      if (idx !== -1) { intervalsByLane[lane].splice(idx,1); updateTableSelection(); }
    }
  });

  // модалки и бронь
  window.openModal = function() {
    if (!Object.values(intervalsByLane).some(arr => arr.length)) return alert("Сначала выберите временной интервал (клик на стол, потом на время начала и конца)");
    document.getElementById("modal").style.display = "flex";
  };
  window.closeModal = () => document.getElementById("modal").style.display = "none";
  window.submitForm = async function() {
    const name = document.getElementById("nameInput").value.trim();
    const phone = document.getElementById("phoneInput").value.trim();
    const comment = document.getElementById("commentInput").value.trim();
    const date = dateInput.value;
    if (!name || !phone) return alert("Имя и телефон обязательны");
    const bookings = [];
    for (let lane in intervalsByLane) {
      intervalsByLane[lane].forEach(iv => {
        bookings.push({ date, tableNumber: parseInt(lane)+1, start: iv.start, end: iv.end, name, phone, comment });
      });
    }
    if (!bookings.length) return alert("Нет интервалов");
    loadingOverlay.style.display = "flex";
    try {
      await Promise.all(bookings.map(b => fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ bookings: [b] }) })));
      intervalsByLane = {};
      updateTableSelection();
      closeModal();
      document.getElementById("nameInput").value = "";
      document.getElementById("phoneInput").value = "";
      document.getElementById("commentInput").value = "";
      await loadExisting();
    } catch(e) { alert("Ошибка бронирования"); }
    finally { loadingOverlay.style.display = "none"; }
  };

  // загрузка существующих броней
  async function loadExisting() {
    try {
      loadingOverlay.style.display = "flex";
      slidersContainer.innerHTML = "";
      const resp = await fetch(GAS_URL + "?action=get&date=" + dateInput.value);
      const data = await resp.json();
      if (!data.bookings) return;
      const timeCells = Array.from(document.querySelectorAll('th.time-right'));
      const allCells = Array.from(document.querySelectorAll('td.slot'));
      const containerRect = tableContainer.getBoundingClientRect();
      data.bookings.forEach(b => {
        if (b.date === dateInput.value) {
          const laneIdx = b.table - 1;
          const startIdx = timeSlots.findIndex(ts => ts.key === parseFloat(b.start));
          const endIdx = timeSlots.findIndex(ts => ts.key === parseFloat(b.end));
          if (startIdx === -1 || endIdx === -1) return;
          const startCell = allCells.find(cell => parseInt(cell.dataset.lane) === laneIdx && parseFloat(cell.dataset.time) === parseFloat(b.start));
          if (!startCell) return;
          const startRect = startCell.getBoundingClientRect();
          const startTimeCell = timeCells[startIdx];
          const endTimeCell = timeCells[endIdx];
          const height = endTimeCell.offsetTop + endTimeCell.offsetHeight - startTimeCell.offsetTop;
          const left = startRect.left - containerRect.left;
          const top = startTimeCell.offsetTop;
          const slider = document.createElement("div");
          slider.className = "existing-slider";
          if (b.confirmed === "Да") slider.classList.add("confirmed");
          else if (b.confirmed === "Нет") slider.classList.add("rejected");
          slider.style.top = `${top}px`;
          slider.style.left = `${left}px`;
          slider.style.width = `${startRect.width}px`;
          slider.style.height = `${height}px`;
          slider.textContent = `${b.name || ''}`;
          slider.addEventListener('click', (e) => { e.stopPropagation(); showBookingInfo(b); });
          slidersContainer.appendChild(slider);
        }
      });
    } catch(e) { console.warn(e); }
    finally { loadingOverlay.style.display = "none"; }
  }

  let currentBookingId = null;
  function showBookingInfo(b) {
    document.getElementById('info-table').innerText = `№${b.table}`;
    document.getElementById('info-date').innerText = b.date.split('-').reverse().join('.');
    document.getElementById('info-time').innerText = `${Math.floor(b.start)}:${b.start%1===0.5?"30":"00"} - ${Math.floor(b.end)}:${b.end%1===0.5?"30":"00"}`;
    document.getElementById('info-name').innerText = b.name;
    document.getElementById('info-phone').innerText = b.phone;
    document.getElementById('info-comment').innerText = b.comment || '—';
    document.getElementById('info-confirmed').innerText = b.confirmed || 'не указано';
    document.getElementById('bookingInfoPopup').style.display = 'flex';
    currentBookingId = b.id;
  }
  window.closeBookingInfoPopup = () => { document.getElementById('bookingInfoPopup').style.display = 'none'; currentBookingId = null; };
  window.confirmBooking = async (confirmed) => {
    if(!currentBookingId) return;
    try{ loadingOverlay.style.display='flex'; await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"confirm",id:currentBookingId,confirmed})}); closeBookingInfoPopup(); await loadExisting(); } catch(e){ alert("Ошибка"); } finally{ loadingOverlay.style.display='none'; }
  };
  window.deleteBooking = async () => {
    if(!currentBookingId || !confirm("Удалить бронь?")) return;
    try{ loadingOverlay.style.display='flex'; await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"delete",id:currentBookingId})}); closeBookingInfoPopup(); await loadExisting(); } catch(e){ alert("Ошибка"); } finally{ loadingOverlay.style.display='none'; }
  };
  window.closeImagePopup = () => document.getElementById("imagePopup").style.display = "none";
  dateInput.addEventListener('change', () => { intervalsByLane = {}; updateTableSelection(); loadExisting(); });

  function initAfterAuth() {
    loadExisting();
    updateTableSelection();
  }

  if (!tryRestoreSession()) document.getElementById('loginScreen').style.display = 'flex';
  // подключение FontAwesome (для иконок)
  const fontAwesome = document.createElement('link'); fontAwesome.rel='stylesheet'; fontAwesome.href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css'; document.head.appendChild(fontAwesome);
</script>
</body>
</html>
