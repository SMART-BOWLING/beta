<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Lucky Strike · Бильярд Клуб</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-secondary: #fbfbfd;
      --glass: rgba(255, 255, 255, 0.72);
      --border-light: rgba(60, 60, 67, 0.08);
      --border-medium: rgba(60, 60, 67, 0.12);
      --ink: #1d1d1f;
      --ink-secondary: #6e6e73;
      --accent-blue: #007aff;
      --accent-blue-hover: #0063ce;
      --accent-green: #34c759;
      --accent-red: #ff3b30;
      --accent-amber: #ff9f0a;
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.08);
      --radius-card: 24px;
      --radius-pill: 980px;
      --radius-tablet: 20px;
      --font: -apple-system, "SF Pro Text", "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      font-weight: 450;
      letter-spacing: -0.01em;
    }

    /* login — glassmorphic apple style */
    #login {
      position: fixed;
      inset: 0;
      background: rgba(245, 245, 247, 0.92);
      backdrop-filter: blur(40px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10000;
      padding: 24px;
      transition: all 0.2s ease;
    }
    .login-glyph {
      font-size: 64px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
    }
    .login-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #1d1d1f, #3a3a3e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .login-sub {
      font-size: 17px;
      color: var(--ink-secondary);
      margin-top: -6px;
    }
    .login-sep {
      width: 32px;
      height: 1px;
      background: var(--border-medium);
      margin: 8px 0;
    }

    #content {
      display: none;
      min-height: 100vh;
    }

    /* Navbar — чистый Apple */
    .nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 0.5px solid var(--border-light);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
    }
    .nav-title {
      font-size: 21px;
      font-weight: 630;
      letter-spacing: -0.3px;
      background: linear-gradient(145deg, #1d1d1f, #3a3a3e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-btn {
      background: rgba(0, 122, 255, 0.08);
      border: none;
      border-radius: var(--radius-pill);
      padding: 8px 20px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 510;
      color: var(--accent-blue);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
      backdrop-filter: blur(4px);
    }
    .nav-btn:hover {
      background: rgba(0, 122, 255, 0.18);
      transform: scale(0.97);
    }

    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 32px 80px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .ctrl {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--surface);
      border-radius: var(--radius-card);
      padding: 12px 24px;
      box-shadow: var(--shadow-sm);
      border: 0.5px solid var(--border-light);
    }
    .date-field {
      flex: 1;
      min-width: 220px;
      max-width: 300px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface-secondary);
      border-radius: 14px;
      padding: 0 18px;
      height: 52px;
      border: 0.5px solid var(--border-light);
      transition: all 0.1s ease;
    }
    .date-field:focus-within {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(0,122,255,0.2);
    }
    #dateInput {
      flex: 1;
      border: none;
      background: transparent;
      font-family: var(--font);
      font-size: 17px;
      font-weight: 500;
      color: var(--ink);
    }
    .btn-book {
      height: 52px;
      padding: 0 32px;
      background: var(--accent-blue);
      color: white;
      border: none;
      border-radius: var(--radius-pill);
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .btn-book:hover {
      background: var(--accent-blue-hover);
      transform: scale(0.98);
    }
    .btn-drag-toggle {
      height: 52px;
      padding: 0 28px;
      background: var(--surface-secondary);
      color: var(--ink);
      border: 0.5px solid var(--border-medium);
      border-radius: var(--radius-pill);
      font-size: 15px;
      font-weight: 510;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-drag-toggle.active {
      background: var(--accent-blue);
      color: white;
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(0,122,255,0.4);
    }
    .inline-temp-cards {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-left: auto;
    }
    .temp-badge {
      background: rgba(0,122,255,0.12);
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 510;
      color: var(--accent-blue);
      backdrop-filter: blur(4px);
    }
    .temp-card-inline {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 0.5px solid var(--accent-blue);
      border-radius: 32px;
      padding: 5px 14px 5px 18px;
      box-shadow: var(--shadow-sm);
      font-size: 13px;
      transition: all 0.1s;
    }
    .temp-card-inline strong {
      font-weight: 600;
    }
    .temp-rm {
      width: 26px;
      height: 26px;
      border-radius: 30px;
      background: rgba(255,59,48,0.1);
      border: none;
      cursor: pointer;
      font-weight: 700;
      color: var(--accent-red);
      transition: 0.1s;
    }
    .temp-rm:hover {
      background: rgba(255,59,48,0.25);
    }

    .grid-card {
      background: var(--surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      border: 0.5px solid var(--border-light);
      position: relative;
    }
    .grid-scroll {
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
    }

    #tableDesktop {
      display: table;
      border-collapse: collapse;
      table-layout: fixed;
      width: 100%;
      min-width: 1120px;
      font-size: 14px;
    }
    #tableDesktop thead th {
      height: 56px;
      font-size: 13px;
      font-weight: 590;
      color: var(--ink-secondary);
      border-bottom: 0.5px solid var(--border-medium);
      border-right: 0.5px solid var(--border-light);
      text-align: center;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 3;
    }
    #tableDesktop thead th.corner {
      width: 100px;
      min-width: 100px;
      background: #eef1f5;
      position: sticky;
      left: 0;
      z-index: 5;
      font-weight: 640;
      color: #1d1d1f;
    }
    #tableDesktop tbody td.lane-hdr {
      width: 100px;
      min-width: 100px;
      font-size: 18px;
      font-weight: 700;
      border-bottom: 0.5px solid var(--border-medium);
      border-right: 1px solid var(--border-light);
      text-align: center;
      position: sticky;
      left: 0;
      z-index: 2;
    }
    .lane-hdr.grp-navy { background: #1f4973; color: white; text-shadow: 0 1px 1px rgba(0,0,0,0.1); }
    .lane-hdr.grp-sage { background: #2c6e3c; color: white; }
    .lane-hdr.grp-rust { background: #b4442a; color: white; }

    #tableDesktop tbody td.slot {
      cursor: crosshair;
      border-bottom: 0.5px solid var(--border-light);
      border-right: 0.5px solid var(--border-light);
      transition: background 0.1s;
    }
    /* status backgrounds */
    #tableDesktop tbody td.slot.booking-pending { background: rgba(255,159,10,0.22); }
    #tableDesktop tbody td.slot.booking-confirmed { background: rgba(52,199,89,0.22); }
    #tableDesktop tbody td.slot.booking-rejected { background: rgba(255,59,48,0.18); }
    #tableDesktop tbody td.slot.temp-highlight { background: rgba(0,122,255,0.3) !important; }
    #tableDesktop tbody td.slot.drag-over { background: #ffd966 !important; }

    /* sliders — чистые таблетки Apple */
    #slidersLayer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 15;
    }
    .slider {
      position: absolute;
      border-radius: 32px;
      pointer-events: auto;
      cursor: default;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      backdrop-filter: blur(8px);
      transition: all 0.12s cubic-bezier(0.2,0.9,0.4,1.1);
      font-weight: 510;
      border: none;
      will-change: left, top;
      overflow: hidden;
      white-space: nowrap;
    }
    .slider[data-lane-type="navy"] { background: rgba(31, 73, 115, 0.92); color: white; }
    .slider[data-lane-type="sage"] { background: rgba(44, 110, 60, 0.92); color: white; }
    .slider[data-lane-type="rust"] { background: rgba(180, 68, 42, 0.92); color: white; }
    .slider.pending { filter: brightness(1.02); }
    .slider.confirmed { box-shadow: 0 4px 14px rgba(52,199,89,0.4); }
    .slider.rejected { opacity: 0.75; filter: grayscale(0.08); }
    .slider.temp { background: rgba(0,122,255,0.85); border: 1px solid rgba(255,214,10,0.8); box-shadow: 0 4px 14px rgba(0,0,0,0.2); color: white; }
    
    .slider:hover {
      transform: scale(1.01);
      filter: brightness(1.04);
      z-index: 30;
      box-shadow: 0 8px 22px rgba(0,0,0,0.25);
    }
    .sl-name { font-size: 13px; font-weight: 600; letter-spacing: -0.2px; }
    .sl-time { font-size: 10px; opacity: 0.85; font-weight: 500; }

    .drag-handle {
      position: absolute;
      top: 0;
      left: 18px;
      right: 18px;
      height: 100%;
      background: transparent;
      z-index: 2;
      cursor: grab;
    }
    .resize-handle {
      position: absolute;
      width: 14px;
      height: 55%;
      top: 22%;
      background: rgba(255,255,220,0.7);
      border-radius: 20px;
      cursor: ew-resize;
      opacity: 0.8;
    }
    .slider.drag-mode-enabled .drag-handle { display: block; }
    .slider:not(.drag-mode-enabled) .drag-handle { display: none; }
    .slider.dragging {
      opacity: 0.65;
      z-index: 100;
      pointer-events: none;
      transition: none;
    }
    .ghost-slider {
      position: absolute;
      border-radius: 32px;
      background: rgba(0,122,255,0.45);
      border: 2px solid #007aff;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
      pointer-events: none;
      z-index: 25;
    }
    .drag-mode-indicator {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--accent-blue);
      color: white;
      padding: 8px 20px;
      border-radius: 60px;
      font-size: 14px;
      font-weight: 600;
      z-index: 1000;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      backdrop-filter: blur(12px);
      pointer-events: none;
    }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(20px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .overlay.open { display: flex; }
    .sheet {
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(30px);
      border-radius: 44px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
      border: 0.5px solid rgba(255,255,255,0.5);
    }
    .sheet-head {
      padding: 22px 28px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sheet-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .sheet-x {
      width: 40px;
      height: 40px;
      border-radius: 40px;
      background: rgba(0,0,0,0.05);
      border: none;
      font-size: 24px;
      cursor: pointer;
      transition: 0.1s;
    }
    .f-input, .f-input textarea {
      width: 100%;
      background: rgba(0,0,0,0.04);
      border: 0.5px solid var(--border-medium);
      border-radius: 18px;
      padding: 14px 18px;
      font-size: 16px;
      font-family: var(--font);
      transition: 0.1s;
    }
    .f-input:focus {
      border-color: var(--accent-blue);
      outline: none;
      background: white;
    }
    .f-btn-ok, .cb-yes {
      background: var(--accent-blue);
      color: white;
      border: none;
      border-radius: 980px;
      padding: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .f-btn-cancel, .cb-no {
      background: rgba(0,0,0,0.05);
      border: 0.5px solid var(--border-medium);
      border-radius: 980px;
      font-weight: 500;
      cursor: pointer;
    }
    .del-btn {
      background: rgba(255,59,48,0.12);
      color: #b81c00;
      border: none;
      border-radius: 980px;
      padding: 12px;
      font-weight: 600;
    }
    #loader {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(14px);
      z-index: 5000;
      align-items: center;
      justify-content: center;
    }
    .loader-box {
      background: rgba(255,255,255,0.95);
      border-radius: 56px;
      padding: 32px 44px;
      text-align: center;
    }
    .spin {
      width: 36px;
      height: 36px;
      border: 3px solid #e9e9ef;
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 700px) {
      .page { padding: 16px; }
      .ctrl { flex-direction: column; align-items: stretch; }
      .inline-temp-cards { margin-left: 0; justify-content: flex-start; }
    }
  </style>
</head>
<body>

<div id="login">

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzLxSrpcGOIm34gLlFZS-EYZmG8liMLcUST3MRMoAp56y6XDC2ClapCDB18yiYmdrHZ/exec";
  const ALLOWED = ["vadiksss900@gmail.com","sergey99belov@gmail.com","popadinecvasil3@gmail.com","veronicadiakova04@gmail.com","info.luckystrike.kh@gmail.com","sashavolobuev123890@gmail.com","egorgorbushko@gmail.com","shatrava.o@gmail.com","Craftmax30@gmail.com","bowlingblock.b@gmail.com","lana.arnaut@gmail.com","polosinnikita1224@gmail.com","sofialat1506@gmail.com","ll3991940@gmail.com","ken040888@gmail.com"];
  const LANES = 12, SH = 11, EH = 22;
  const slots = []; for(let h=SH; h<=EH; h++) { slots.push({ label: `${h}:00`, key: h }); if(h<EH) slots.push({ label: `${h}:30`, key: h+0.5 }); }
  const LANE_GROUPS = [0,0,0,1,1,1,2,2,2,2,2,2];
  const GRP_CLASS = ['grp-navy','grp-sage','grp-rust'];
  const ROW_CLASS = ['row-navy','row-sage','row-rust'];
  const LANE_TYPE_MAP = ['navy','sage','rust'];
  
  let bookings = [], tempBookings = [], nextTempId = 1;
  let isDragging = false, dragStartCell = null, dragInterval = null, dragModeEnabled = false;
  const $ = id => document.getElementById(id);
  
  function parseJwt(t){ return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
  function handleCredentialResponse(r){ let d=parseJwt(r.credential); if(ALLOWED.includes(d.email)){ localStorage.setItem("ue",d.email); location.reload(); } else alert("Доступ только для членов клуба"); }
  
  window.onload = ()=>{
    if(localStorage.getItem("ue") && ALLOWED.includes(localStorage.getItem("ue"))){
      $("login").style.display="none";
      $("content").style.display="block";
      init();
    }
  };
  
  function init(){
    let today = new Date().toISOString().split('T')[0];
    $("dateInput").min = today;
    $("dateInput").value = today;
    buildDesktopTable();
    $("dateInput").addEventListener("change", ()=>{ loadFromServer(); clearTempSelections(); });
    loadFromServer();
    const toggleBtn = $("dragToggleBtn");
    toggleBtn.addEventListener("click", () => {
      dragModeEnabled = !dragModeEnabled;
      if(dragModeEnabled) { toggleBtn.textContent = "🎯 Режим перетяжки: ВКЛ"; toggleBtn.classList.add("active"); $("dragModeIndicator").style.display = "block"; } 
      else { toggleBtn.textContent = "🎯 Режим перетяжки"; toggleBtn.classList.remove("active"); $("dragModeIndicator").style.display = "none"; }
      renderAllSliders();
    });
  }
  
  function buildDesktopTable(){
    let headRow = document.querySelector("#dtHead tr");
    slots.forEach((sl,i)=>{ let th=document.createElement("th"); th.className="th-time"; th.dataset.si=i; th.textContent=sl.label; headRow.appendChild(th); });
    let body=$("dtBody");
    for(let lane=0; lane<LANES; lane++){
      let tr=document.createElement("tr"); tr.className=ROW_CLASS[LANE_GROUPS[lane]]; tr.dataset.lane=lane;
      let lhdr=document.createElement("td"); lhdr.className=`lane-hdr ${GRP_CLASS[LANE_GROUPS[lane]]}`; lhdr.textContent=`№ ${lane+1}`; tr.appendChild(lhdr);
      slots.forEach((sl,si)=>{ let td=document.createElement("td"); td.className="slot"; td.dataset.lane=lane; td.dataset.time=sl.key; td.dataset.si=si; tr.appendChild(td); });
      body.appendChild(tr);
    }
  }
  function getSlotCell(lane, slotIdx){ return $("dtBody")?.rows[lane]?.cells[slotIdx+1]; }
  function fmt(v){ return `${Math.floor(v)}:${v%1===0.5?'30':'00'}`; }
  function updateCellsHighlight(){
    for(let row of $("dtBody").rows) for(let i=1;i<row.cells.length;i++) row.cells[i].classList.remove("booking-pending","booking-confirmed","booking-rejected","temp-highlight");
    for(let b of bookings){ let startIdx=slots.findIndex(s=>s.key===b.start), endIdx=slots.findIndex(s=>s.key===b.end); if(startIdx!==-1 && endIdx!==-1) for(let i=startIdx;i<=endIdx;i++){ let cell=getSlotCell(b.lane,i); if(cell) cell.classList.add(b.confirmed===true?"booking-confirmed":(b.confirmed===false?"booking-rejected":"booking-pending")); } }
    for(let t of tempBookings){ let startIdx=slots.findIndex(s=>s.key===t.start), endIdx=slots.findIndex(s=>s.key===t.end); if(startIdx!==-1 && endIdx!==-1) for(let i=startIdx;i<=endIdx;i++){ let cell=getSlotCell(t.lane,i); if(cell) cell.classList.add("temp-highlight"); } }
  }
  function clearTempSelections(){ tempBookings = []; renderInlineTempCards(); renderAllSliders(); updateCellsHighlight(); }
  function renderInlineTempCards(){ const container=$("inlineTempContainer"); if(!container) return; if(tempBookings.length===0){ container.innerHTML=""; return; } container.innerHTML=`<div class="temp-badge">✏️ Черновики ${tempBookings.length}</div>`; tempBookings.forEach((tb,idx)=>{ let card=document.createElement("div"); card.className="temp-card-inline"; card.innerHTML=`<strong>Стол ${tb.lane+1}</strong><span>${fmt(tb.start)}–${fmt(tb.end)}</span><button class="temp-rm" data-idx="${idx}">✕</button>`; card.querySelector(".temp-rm").onclick=(e)=>{ e.stopPropagation(); tempBookings.splice(idx,1); renderInlineTempCards(); renderAllSliders(); updateCellsHighlight(); }; container.appendChild(card); }); }
  
  function onMouseDown(e){ if(dragModeEnabled) return; let target=e.target; if(target.classList?.contains("slot")){ e.preventDefault(); let lane=parseInt(target.dataset.lane), startIdx=parseInt(target.dataset.si); isDragging=true; dragStartCell={lane,startIdx}; dragInterval={lane,startIdx,endIdx:startIdx}; highlightDragInterval(lane,startIdx,startIdx); } }
  function onMouseMove(e){ if(!dragModeEnabled && isDragging && dragStartCell){ let hoverEl=document.elementsFromPoint(e.clientX,e.clientY).find(el=>el.classList?.contains("slot")); if(hoverEl){ let lane=parseInt(hoverEl.dataset.lane), idx=parseInt(hoverEl.dataset.si); if(lane===dragStartCell.lane){ let newStart=Math.min(dragStartCell.startIdx,idx), newEnd=Math.max(dragStartCell.startIdx,idx); if(dragInterval.startIdx!==newStart||dragInterval.endIdx!==newEnd) dragInterval={lane,startIdx:newStart,endIdx:newEnd}; highlightDragInterval(lane,newStart,newEnd); } } } }
  function highlightDragInterval(lane,startIdx,endIdx){ document.querySelectorAll("#tableDesktop td.slot.drag-over").forEach(td=>td.classList.remove("drag-over")); for(let i=startIdx;i<=endIdx;i++){ let cell=getSlotCell(lane,i); if(cell) cell.classList.add("drag-over"); } }
  function onMouseUp(){ if(!dragModeEnabled && isDragging && dragInterval && dragInterval.startIdx!==dragInterval.endIdx){ let {lane,startIdx,endIdx}=dragInterval; let start=slots[startIdx].key, end=slots[endIdx].key; let hasConflict=bookings.some(b=>b.lane===lane && !(b.end<=start || b.start>=end)); if(hasConflict) alert("Это время занято."); else tempBookings.push({id:nextTempId++,lane,start:Math.min(start,end),end:Math.max(start,end)}); renderInlineTempCards(); renderAllSliders(); updateCellsHighlight(); } isDragging=false; dragInterval=null; dragStartCell=null; document.querySelectorAll("#tableDesktop td.slot.drag-over").forEach(td=>td.classList.remove("drag-over")); }
  function openBookModal(){ if(tempBookings.length===0){ alert("Сначала выделите интервал брони → зажмите и протяните по ячейкам"); return; } $("nameInput").value="";$("phoneInput").value="";$("commentInput").value=""; $("bookModal").classList.add("open"); }
  function closeBookModal(){ $("bookModal").classList.remove("open"); }
  async function submitTempBookings(){ let name=$("nameInput").value.trim(); if(!name){alert("Имя обязательно");return;} if(tempBookings.length===0){closeBookModal();return;} showLoad(); const date=$("dateInput").value; try{ const payload={bookings:tempBookings.map(tb=>({date,tableNumber:tb.lane+1,start:tb.start,end:tb.end,name,phone:$("phoneInput").value.trim(),comment:$("commentInput").value.trim()}))}; await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify(payload)}); clearTempSelections(); await loadFromServer(); closeBookModal(); } catch(e){console.error(e);alert("Ошибка");} hideLoad(); }
  async function loadFromServer(){ showLoad(); try{ let res=await fetch(GAS_URL+"?action=get&date="+$("dateInput").value); let data=await res.json(); bookings=data.bookings?data.bookings.map(b=>({id:b.id,lane:b.table-1,start:parseFloat(b.start),end:parseFloat(b.end),name:b.name,phone:b.phone,comment:b.comment,confirmed:b.confirmed==="Да"?true:(b.confirmed==="Нет"?false:null)})):[]; renderAllSliders(); updateCellsHighlight(); } catch(e){console.error(e);} hideLoad(); }
  async function saveToServer(booking){ if(!booking.id) return; await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"update",id:booking.id,date:$("dateInput").value,tableNumber:booking.lane+1,start:booking.start,end:booking.end,name:booking.name,phone:booking.phone,comment:booking.comment})}); }
  
  function startMove(booking, e){ if(!dragModeEnabled) return; e.stopPropagation(); const slider=e.currentTarget.closest('.slider'); if(!slider) return; let rows=$("dtBody").rows; let durationCells=slots.findIndex(s=>s.key===booking.end)-slots.findIndex(s=>s.key===booking.start); let startIdxOrig=slots.findIndex(s=>s.key===booking.start); let ghost=document.createElement('div'); ghost.className='ghost-slider'; ghost.style.cssText=slider.style.cssText; $('slidersLayer').appendChild(ghost); slider.classList.add('dragging'); let currentLane=booking.lane, currentStartIdx=startIdxOrig; function getTargetFromCoords(clientX,clientY){ const el=document.elementsFromPoint(clientX,clientY).find(el=>el.classList?.contains('slot')); if(!el) return null; return {lane:parseInt(el.dataset.lane),idx:parseInt(el.dataset.si)}; } function updateGhost(lane,startIdx){ const row=rows[lane]; if(!row) return; const startCell=row.cells[startIdx+1], endCell=row.cells[startIdx+durationCells+1]; if(startCell&&endCell){ ghost.style.left=(startCell.offsetLeft+1)+'px'; ghost.style.top=(row.offsetTop+1)+'px'; ghost.style.width=(endCell.offsetLeft+endCell.offsetWidth-startCell.offsetLeft-2)+'px'; ghost.style.height=(row.offsetHeight-2)+'px'; } } function onDragMove(ev){ const target=getTargetFromCoords(ev.clientX,ev.clientY); if(target){ let newLane=target.lane, newStartIdx=Math.min(Math.max(0,target.idx),slots.length-durationCells-1); if(newLane!==currentLane||newStartIdx!==currentStartIdx){ currentLane=newLane; currentStartIdx=newStartIdx; updateGhost(currentLane,currentStartIdx); } } } function onDragEnd(ev){ const target=getTargetFromCoords(ev.clientX,ev.clientY); if(target){ let finalLane=target.lane, finalStartIdx=Math.min(Math.max(0,target.idx),slots.length-durationCells-1); const newStart=slots[finalStartIdx].key, newEnd=slots[finalStartIdx+durationCells].key; let conflict=bookings.some(b=>b.id!==booking.id&&b.lane===finalLane&&!(b.end<=newStart||b.start>=newEnd)); if(!conflict){ booking.lane=finalLane; booking.start=newStart; booking.end=newEnd; saveToServer(booking); renderAllSliders(); updateCellsHighlight(); } else alert("Конфликт с существующей бронью"); } ghost.remove(); slider.classList.remove('dragging'); document.body.style.cursor=''; document.removeEventListener('mousemove',onDragMove); document.removeEventListener('mouseup',onDragEnd); renderAllSliders(); updateCellsHighlight(); } document.body.style.cursor='grabbing'; document.addEventListener('mousemove',onDragMove); document.addEventListener('mouseup',onDragEnd); updateGhost(currentLane,currentStartIdx); }
  function startMoveForTemp(temp,e){ if(!dragModeEnabled) return; e.stopPropagation(); const slider=e.currentTarget.closest('.slider'); if(!slider) return; let rows=$("dtBody").rows; let durationCells=slots.findIndex(s=>s.key===temp.end)-slots.findIndex(s=>s.key===temp.start); let startIdxOrig=slots.findIndex(s=>s.key===temp.start); let ghost=document.createElement('div'); ghost.className='ghost-slider'; ghost.style.cssText=slider.style.cssText; $('slidersLayer').appendChild(ghost); slider.classList.add('dragging'); let currentLane=temp.lane, currentStartIdx=startIdxOrig; function getTargetFromCoords(clientX,clientY){ const el=document.elementsFromPoint(clientX,clientY).find(el=>el.classList?.contains('slot')); if(!el) return null; return {lane:parseInt(el.dataset.lane),idx:parseInt(el.dataset.si)}; } function updateGhost(lane,startIdx){ const row=rows[lane]; if(!row) return; const startCell=row.cells[startIdx+1], endCell=row.cells[startIdx+durationCells+1]; if(startCell&&endCell){ ghost.style.left=(startCell.offsetLeft+1)+'px'; ghost.style.top=(row.offsetTop+1)+'px'; ghost.style.width=(endCell.offsetLeft+endCell.offsetWidth-startCell.offsetLeft-2)+'px'; ghost.style.height=(row.offsetHeight-2)+'px'; } } function onDragMove(ev){ const target=getTargetFromCoords(ev.clientX,ev.clientY); if(target){ let newLane=target.lane, newStartIdx=Math.min(Math.max(0,target.idx),slots.length-durationCells-1); if(newLane!==currentLane||newStartIdx!==currentStartIdx){ currentLane=newLane; currentStartIdx=newStartIdx; updateGhost(currentLane,currentStartIdx); } } } function onDragEnd(ev){ const target=getTargetFromCoords(ev.clientX,ev.clientY); if(target){ let finalLane=target.lane, finalStartIdx=Math.min(Math.max(0,target.idx),slots.length-durationCells-1); const newStart=slots[finalStartIdx].key, newEnd=slots[finalStartIdx+durationCells].key; let conflict=bookings.some(b=>b.lane===finalLane&&!(b.end<=newStart||b.start>=newEnd)); if(!conflict){ temp.lane=finalLane; temp.start=newStart; temp.end=newEnd; renderInlineTempCards(); renderAllSliders(); updateCellsHighlight(); } else alert("Конфликт"); } ghost.remove(); slider.classList.remove('dragging'); document.body.style.cursor=''; document.removeEventListener('mousemove',onDragMove); document.removeEventListener('mouseup',onDragEnd); renderAllSliders(); updateCellsHighlight(); } document.body.style.cursor='grabbing'; document.addEventListener('mousemove',onDragMove); document.addEventListener('mouseup',onDragEnd); updateGhost(currentLane,currentStartIdx); }
  
  function renderAllSliders(){
    let container = $("slidersLayer"); if(!container) return; container.innerHTML = "";
    let rows = Array.from($("dtBody").querySelectorAll("tr")); if(rows.length === 0) return;
    bookings.forEach(booking => {
      let startIdx = slots.findIndex(s => s.key === booking.start), endIdx = slots.findIndex(s => s.key === booking.end);
      if(startIdx===-1 || endIdx===-1) return;
      let row = rows[booking.lane]; if(!row) return;
      let sc = row.cells[startIdx+1], ec = row.cells[endIdx+1]; if(!sc||!ec) return;
      let left = sc.offsetLeft+1, top = row.offsetTop+1, width = (ec.offsetLeft+ec.offsetWidth)-sc.offsetLeft-2, height = row.offsetHeight-2;
      let status = booking.confirmed === true ? "confirmed" : (booking.confirmed === false ? "rejected" : "pending");
      let laneType = LANE_TYPE_MAP[LANE_GROUPS[booking.lane]];
      let slider = document.createElement("div"); slider.className = `slider ${status}`; if(dragModeEnabled) slider.classList.add("drag-mode-enabled");
      slider.setAttribute("data-lane-type", laneType); slider.style.cssText = `left:${left}px;top:${top}px;width:${width}px;height:${height}px;`;
      slider.innerHTML = `<div class="sl-name">${booking.name || "Бронь"}</div><div class="sl-time">${fmt(booking.start)}–${fmt(booking.end)}</div>`;
      let dragHandle = document.createElement("div"); dragHandle.className = "drag-handle";
      if(dragModeEnabled) dragHandle.addEventListener("mousedown", (e) => startMove(booking, e));
      slider.appendChild(dragHandle); slider.addEventListener("click", (e) => { if(e.target !== dragHandle) showInfoModal(booking); });
      container.appendChild(slider);
    });
    tempBookings.forEach(temp => {
      let startIdx = slots.findIndex(s => s.key === temp.start), endIdx = slots.findIndex(s => s.key === temp.end);
      if(startIdx===-1||endIdx===-1) return;
      let row = rows[temp.lane]; if(!row) return;
      let sc = row.cells[startIdx+1], ec = row.cells[endIdx+1]; if(!sc||!ec) return;
      let left = sc.offsetLeft+1, top = row.offsetTop+1, width = (ec.offsetLeft+ec.offsetWidth)-sc.offsetLeft-2, height = row.offsetHeight-2;
      let slider = document.createElement("div"); slider.className = "slider temp"; if(dragModeEnabled) slider.classList.add("drag-mode-enabled");
      slider.setAttribute("data-lane-type", LANE_TYPE_MAP[LANE_GROUPS[temp.lane]]); slider.style.cssText = `left:${left}px;top:${top}px;width:${width}px;height:${height}px;`;
      slider.innerHTML = `<div class="sl-name">Черновик</div><div class="sl-time">${fmt(temp.start)}–${fmt(temp.end)}</div>`;
      let dragHandle = document.createElement("div"); dragHandle.className = "drag-handle";
      if(dragModeEnabled) dragHandle.addEventListener("mousedown", (e) => startMoveForTemp(temp, e));
      slider.appendChild(dragHandle);
      container.appendChild(slider);
    });
  }
  let currentBooking = null;
  function showInfoModal(b){ currentBooking = b; $("i-table").textContent = "№ "+(b.lane+1); $("i-time").textContent = `${fmt(b.start)} – ${fmt(b.end)}`; $("i-name").textContent = b.name; $("i-phone").textContent = b.phone || "—"; $("i-comment").textContent = b.comment || "—"; $("infoModal").classList.add("open"); }
  function closeInfoModal(){ $("infoModal").classList.remove("open"); currentBooking=null; }
  async function confirmBooking(yes){ if(!currentBooking) return; showLoad(); await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"confirm",id:currentBooking.id,confirmed:yes})}); closeInfoModal(); await loadFromServer(); hideLoad(); }
  async function deleteBooking(){ if(!currentBooking||!confirm("Удалить бронь?")) return; showLoad(); await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"delete",id:currentBooking.id})}); closeInfoModal(); await loadFromServer(); hideLoad(); }
  function showLoad(){ $("loader").style.display="flex"; } function hideLoad(){ $("loader").style.display="none"; }
  function openImg(){ $("imgPopup").classList.add("open"); } function closeImg(){ $("imgPopup").classList.remove("open"); }
  $("tableDesktop").addEventListener("mousedown", onMouseDown);
  document.body.addEventListener("mousemove", onMouseMove);
  document.body.addEventListener("mouseup", onMouseUp);
  ["bookModal","infoModal","imgPopup"].forEach(id=>{ $(id)?.addEventListener("click",e=>{ if(e.target=== $(id)) $(id).classList.remove("open"); }); });
</script>
