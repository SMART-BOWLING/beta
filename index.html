<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
    <title>Бильярд · Бронирование столов</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png"/>
    
    <!-- DayPilot CSS -->
    <link rel="stylesheet" href="https://cdn.daypilot.org/daypilot-scheduler-2025.1.1426.css" />
    
    <!-- Google Sign In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- DayPilot JS -->
    <script src="https://cdn.daypilot.org/daypilot-all-2025.1.1426.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --border: rgba(0,0,0,.08);
            --border2: rgba(0,0,0,.14);
            --ink: #1d1d1f;
            --ink2: #3d3d3f;
            --ink3: #6e6e73;
            --blue: #0071e3;
            --blue-h: #0077ed;
            --green: #34c759;
            --amber: #ff9f0a;
            --red: #ff3b30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
        }

        #login {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 9999;
            padding: 32px;
        }

        .login-glyph { font-size: 58px; }
        .login-title { font-size: 32px; font-weight: 700; letter-spacing: -.5px; }
        .login-sub { font-size: 16px; color: var(--ink3); margin-top: -8px; }
        .login-sep { width: 1px; height: 28px; background: var(--border2); }

        #content {
            display: none;
            min-height: 100vh;
        }

        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,.92);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: .5px solid var(--border2);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
        }

        .nav-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -.3px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: .5px solid var(--border2);
            border-radius: 980px;
            padding: 8px 18px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            color: var(--blue);
            cursor: pointer;
            transition: background .15s;
        }

        .nav-btn:hover {
            background: rgba(0,113,227,.08);
        }

        .page {
            padding: 24px 28px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .ctrl {
            display: flex;
            gap: 18px;
            align-items: center;
            flex-wrap: wrap;
            background: var(--surface);
            border-radius: 18px;
            padding: 18px 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,.04);
        }

        .date-field {
            flex: 1;
            min-width: 220px;
            max-width: 280px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg);
            border-radius: 14px;
            padding: 0 18px;
            height: 52px;
            border: .5px solid var(--border2);
        }

        .date-field svg {
            flex-shrink: 0;
            color: var(--ink3);
        }

        #dateInput {
            flex: 1;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 17px;
            font-weight: 500;
            color: var(--ink);
            cursor: pointer;
        }

        #dateInput:focus { outline: none; }

        .btn-book {
            height: 52px;
            padding: 0 32px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 980px;
            font-family: inherit;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            box-shadow: 0 2px 6px rgba(0,113,227,.3);
        }

        .btn-book:hover {
            background: var(--blue-h);
            transform: scale(0.98);
        }

        .pills {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .pill {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--ink3);
            background: var(--surface);
            border: .5px solid var(--border2);
            border-radius: 980px;
            padding: 6px 16px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-1 { background: #3a7bd5; }
        .dot-2 { background: #30a862; }
        .dot-3 { background: #e05c2a; }
        .dot-4 { background: var(--amber); }
        .dot-5 { background: var(--green); }
        .dot-6 { background: var(--red); }

        #scheduler {
            background: var(--surface);
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,.06);
            border: .5px solid var(--border);
            overflow: hidden;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: flex-end;
        }

        .overlay.open { display: flex; }

        @media(min-width: 560px) {
            .overlay { align-items: center; padding: 24px; }
            .sheet { border-radius: 32px !important; max-width: 480px; }
        }

        .sheet {
            background: var(--surface);
            border-radius: 28px 28px 0 0;
            width: 100%;
            box-shadow: 0 -4px 30px rgba(0,0,0,.2);
        }

        .sheet-head {
            padding: 20px 24px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sheet-title {
            font-size: 24px;
            font-weight: 700;
        }

        .sheet-x {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg);
            border: .5px solid var(--border2);
            font-size: 20px;
            cursor: pointer;
        }

        .sheet-body {
            padding: 12px 24px 28px;
        }

        .f-group {
            margin-bottom: 20px;
        }

        .f-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--ink3);
            margin-bottom: 6px;
            display: block;
        }

        .f-input {
            width: 100%;
            background: var(--bg);
            border: .5px solid var(--border2);
            border-radius: 14px;
            font-size: 16px;
            padding: 14px 16px;
            font-family: inherit;
        }

        .f-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .f-btn-ok {
            flex: 1;
            height: 52px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 980px;
            font-weight: 600;
            cursor: pointer;
        }

        .f-btn-cancel {
            height: 52px;
            padding: 0 24px;
            background: var(--bg);
            border: .5px solid var(--border2);
            border-radius: 980px;
            cursor: pointer;
        }

        .info-list {
            border-radius: 18px;
            border: .5px solid var(--border2);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: .5px solid var(--border);
            background: var(--bg);
        }

        .confirm-btns {
            display: flex;
            gap: 12px;
            margin: 12px 0 16px;
        }

        .cb-yes, .cb-no {
            flex: 1;
            height: 48px;
            border-radius: 980px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .cb-yes {
            background: rgba(52,199,89,.15);
            color: #1a6630;
        }

        .cb-no {
            background: rgba(255,59,48,.1);
            color: #a81a10;
        }

        .del-btn {
            width: 100%;
            height: 48px;
            background: transparent;
            border: .5px solid var(--border2);
            border-radius: 980px;
            margin-top: 12px;
            cursor: pointer;
        }

        #loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            z-index: 5000;
            align-items: center;
            justify-content: center;
        }

        .loader-box {
            background: white;
            border-radius: 32px;
            padding: 28px 40px;
        }

        .spin {
            width: 38px;
            height: 38px;
            border: 3px solid #ddd;
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 14px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="login">
    <div class="login-glyph">🎱</div>
    <div class="login-title">Бильярд Клуб</div>
    <div class="login-sub">Бронирование столов</div>
    <div class="login-sep"></div>
    <div id="g_id_onload"
         data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false"></div>
    <div class="g_id_signin" data-type="standard"></div>
</div>

<div id="content">
    <nav class="nav">
        <span class="nav-title">🎱 LUCKY STRIKE · БРОНЬ</span>
        <button class="nav-btn" onclick="openBookingModal()">➕ Новая бронь</button>
    </nav>
    <div class="page">
        <div class="ctrl">
            <div class="date-field">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                    <path d="M16 2v4M8 2v4M3 10h18"/>
                </svg>
                <input type="date" id="dateInput"/>
            </div>
        </div>

        <div class="pills">
            <div class="pill"><div class="dot dot-1"></div>Столы 1–4</div>
            <div class="pill"><div class="dot dot-2"></div>Столы 5–8</div>
            <div class="pill"><div class="dot dot-3"></div>Столы 9–12</div>
            <div class="pill"><div class="dot dot-4"></div>Ожидает</div>
            <div class="pill"><div class="dot dot-5"></div>Подтверждено</div>
            <div class="pill"><div class="dot dot-6"></div>Отменено</div>
        </div>

        <div id="scheduler"></div>
    </div>
</div>

<div id="bookingModal" class="overlay">
    <div class="sheet">
        <div class="sheet-head">
            <div class="sheet-title">Новая бронь</div>
            <button class="sheet-x" onclick="closeBookingModal()">×</button>
        </div>
        <div class="sheet-body">
            <div class="f-group">
                <label class="f-label">Имя</label>
                <input class="f-input" id="nameInput"/>
            </div>
            <div class="f-group">
                <label class="f-label">Телефон</label>
                <input class="f-input" id="phoneInput"/>
            </div>
            <div class="f-group">
                <label class="f-label">Комментарий</label>
                <textarea class="f-input" id="commentInput" rows="2"></textarea>
            </div>
            <div class="f-actions">
                <button class="f-btn-ok" onclick="submitBooking()">Подтвердить</button>
                <button class="f-btn-cancel" onclick="closeBookingModal()">Отмена</button>
            </div>
        </div>
    </div>
</div>

<div id="infoModal" class="overlay">
    <div class="sheet">
        <div class="sheet-head">
            <div class="sheet-title">Детали брони</div>
            <button class="sheet-x" onclick="closeInfoModal()">×</button>
        </div>
        <div class="sheet-body">
            <div class="info-list">
                <div class="info-row"><span>Стол</span><span id="i-table"></span></div>
                <div class="info-row"><span>Время</span><span id="i-time"></span></div>
                <div class="info-row"><span>Имя</span><span id="i-name"></span></div>
                <div class="info-row"><span>Телефон</span><span id="i-phone"></span></div>
                <div class="info-row"><span>Комментарий</span><span id="i-comment"></span></div>
                <div class="info-row"><span>Статус</span><span id="i-status"></span></div>
            </div>
            <div class="confirm-btns">
                <button class="cb-yes" onclick="confirmBooking(true)">✅ Состоялось</button>
                <button class="cb-no" onclick="confirmBooking(false)">❌ Не пришли</button>
            </div>
            <button class="del-btn" onclick="deleteBooking()">🗑 Удалить бронь</button>
        </div>
    </div>
</div>

<div id="loader">
    <div class="loader-box">
        <div class="spin"></div>
        <div>Загрузка...</div>
    </div>
</div>

<script>
    const GAS = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
    const ALLOWED = ["vadiksss900@gmail.com", "sergey99belov@gmail.com", "popadinecvasil3@gmail.com", "veronicadiakova04@gmail.com", "info.luckystrike.kh@gmail.com", "sashavolobuev123890@gmail.com", "egorgorbushko@gmail.com", "shatrava.o@gmail.com", "Craftmax30@gmail.com", "bowlingblock.b@gmail.com", "lana.arnaut@gmail.com", "polosinnikita1224@gmail.com", "sofialat1506@gmail.com", "ll3991940@gmail.com", "ken040888@gmail.com"];

    let dp = null;
    let currentBooking = null;
    let pendingBooking = null;

    const $ = id => document.getElementById(id);

    function parseJwt(t) {
        return JSON.parse(atob(t.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    }

    function handleCredentialResponse(r) {
        let d = parseJwt(r.credential);
        if (ALLOWED.includes(d.email)) {
            localStorage.setItem("ue", d.email);
            location.reload();
        } else {
            alert("Доступ запрещён");
        }
    }

    window.onload = () => {
        if (localStorage.getItem("ue") && ALLOWED.includes(localStorage.getItem("ue"))) {
            $("login").style.display = "none";
            $("content").style.display = "block";
            init();
        }
    };

    function init() {
        let today = new DayPilot.Date().toString("yyyy-MM-dd");
        $("dateInput").min = today;
        $("dateInput").value = today;
        
        // Создаем ресурсы (столы)
        const resources = [];
        const groups = [
            { name: "Столы 1–4", id: "group1", color: "#3a7bd5", children: [] },
            { name: "Столы 5–8", id: "group2", color: "#30a862", children: [] },
            { name: "Столы 9–12", id: "group3", color: "#e05c2a", children: [] }
        ];
        
        for (let i = 1; i <= 12; i++) {
            let groupId = "group1";
            let groupName = "Столы 1–4";
            if (i >= 5 && i <= 8) {
                groupId = "group2";
                groupName = "Столы 5–8";
            } else if (i >= 9) {
                groupId = "group3";
                groupName = "Столы 9–12";
            }
            
            resources.push({
                name: `Стол №${i}`,
                id: `table_${i}`,
                expanded: true,
                groupId: groupId,
                groupName: groupName
            });
        }
        
        // Инициализация DayPilot Scheduler
        dp = new DayPilot.Scheduler("scheduler", {
            viewType: "Resources",
            startDate: $("dateInput").value,
            days: 1,
            scale: "Hour",
            timeHeaders: [
                { groupBy: "Hour", format: "H:mm" },
                { groupBy: "Cell", format: "mm" }
            ],
            cellWidth: 60,
            cellHeight: 50,
            rowHeaderWidth: 120,
            treeEnabled: true,
            treeGroupId: "groupId",
            treeGroupTitle: "groupId",
            treePreventParentUsage: true,
            heightSpec: "Auto",
            height: 600,
            eventMovingStartEndEnabled: true,
            eventResizingStartEndEnabled: true,
            timeRangeSelectingStartEndEnabled: true,
            businessBeginsHour: 11,
            businessEndsHour: 23,
            showNonBusiness: false,
            crosshairType: "full",
            eventMoveHandling: "Update",
            eventResizeHandling: "Update",
            eventDeleteHandling: "Update",
            eventClickHandling: "Enabled",
            eventHoverHandling: "Bubble",
            eventBubble: new DayPilot.Bubble({
                onLoad: (args) => {
                    const e = args.source;
                    const start = e.start().toString("HH:mm");
                    const end = e.end().toString("HH:mm");
                    const name = e.data.name || "—";
                    const status = e.data.confirmed === "Да" ? "✅ Подтверждено" : (e.data.confirmed === "Нет" ? "❌ Отменено" : "⏳ Ожидает");
                    args.html = `
                        <div style="padding: 8px;">
                            <div><strong>${name}</strong></div>
                            <div>${start} – ${end}</div>
                            <div style="font-size: 12px; margin-top: 4px;">${status}</div>
                        </div>
                    `;
                }
            }),
            contextMenu: new DayPilot.Menu({
                items: [
                    {
                        text: "✏️ Редактировать",
                        icon: "icon icon-edit",
                        onClick: (args) => {
                            showInfoModal(args.source.data);
                        }
                    },
                    {
                        text: "🗑 Удалить",
                        icon: "icon icon-delete",
                        onClick: (args) => {
                            if (confirm("Удалить бронь?")) {
                                deleteBookingById(args.source.data.id);
                            }
                        }
                    },
                    { text: "-" },
                    {
                        text: "✅ Подтвердить",
                        onClick: (args) => {
                            confirmBookingById(args.source.data.id, true);
                        }
                    },
                    {
                        text: "❌ Отменить",
                        onClick: (args) => {
                            confirmBookingById(args.source.data.id, false);
                        }
                    }
                ]
            }),
            onTimeRangeSelected: async (args) => {
                // Создание новой брони
                const start = args.start;
                const end = args.end;
                const resourceId = args.resource;
                const tableNum = parseInt(resourceId.split('_')[1]);
                
                pendingBooking = {
                    start: start,
                    end: end,
                    resource: resourceId,
                    table: tableNum
                };
                
                $("nameInput").value = "";
                $("phoneInput").value = "";
                $("commentInput").value = "";
                openBookingModal();
            },
            onEventMoved: async (args) => {
                // Обновление брони при перемещении
                const e = args.e;
                const newStart = args.newStart;
                const newEnd = args.newEnd;
                const newResource = args.newResource;
                const tableNum = parseInt(newResource.split('_')[1]);
                
                showLoad();
                try {
                    await fetch(GAS, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({
                            action: "update",
                            id: e.data.id,
                            start: newStart.toString("HH:mm"),
                            end: newEnd.toString("HH:mm"),
                            table: tableNum,
                            date: $("dateInput").value
                        })
                    });
                    await loadEvents();
                } catch (err) {
                    console.warn(err);
                } finally {
                    hideLoad();
                }
            },
            onEventResized: async (args) => {
                // Обновление брони при изменении размера
                const e = args.e;
                const newStart = args.newStart;
                const newEnd = args.newEnd;
                
                showLoad();
                try {
                    await fetch(GAS, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({
                            action: "update",
                            id: e.data.id,
                            start: newStart.toString("HH:mm"),
                            end: newEnd.toString("HH:mm"),
                            date: $("dateInput").value
                        })
                    });
                    await loadEvents();
                } catch (err) {
                    console.warn(err);
                } finally {
                    hideLoad();
                }
            },
            onBeforeEventRender: (args) => {
                // Стилизация событий в зависимости от статуса
                const data = args.data;
                let backColor = "";
                let barColor = "";
                let fontColor = "#1d1d1f";
                
                if (data.confirmed === "Да") {
                    backColor = "rgba(52,199,89,0.15)";
                    barColor = "#34c759";
                } else if (data.confirmed === "Нет") {
                    backColor = "rgba(255,59,48,0.15)";
                    barColor = "#ff3b30";
                } else {
                    backColor = "rgba(255,159,10,0.15)";
                    barColor = "#ff9f0a";
                }
                
                args.data.backColor = backColor;
                args.data.barColor = barColor;
                args.data.barHidden = false;
                args.data.fontColor = fontColor;
                
                // Добавляем иконку меню
                args.data.areas = [
                    {
                        right: 4,
                        top: "calc(50% - 10px)",
                        width: 20,
                        height: 20,
                        style: "cursor:pointer; opacity:0.7;",
                        backColor: "#ffffffcc",
                        borderRadius: "50%",
                        fontColor: "#333",
                        symbol: "icons/daypilot.svg#menu-dots-vertical",
                        action: "ContextMenu",
                        toolTip: "Меню"
                    }
                ];
                
                // Форматируем текст
                const startTime = data.start.toString("HH:mm");
                const endTime = data.end.toString("HH:mm");
                args.data.html = `
                    <div style="padding: 4px 8px;">
                        <div style="font-weight: 600; font-size: 12px;">${data.name || "—"}</div>
                        <div style="font-size: 10px; opacity: 0.8;">${startTime} – ${endTime}</div>
                    </div>
                `;
            },
            onEventClick: (args) => {
                showInfoModal(args.e.data);
            }
        });
        
        dp.init();
        loadResources(resources);
        
        $("dateInput").addEventListener("change", () => {
            loadEvents();
        });
    }
    
    function loadResources(resources) {
        dp.update({ resources: resources });
        loadEvents();
    }
    
    async function loadEvents() {
        showLoad();
        try {
            const date = $("dateInput").value;
            const response = await fetch(GAS + "?action=get&date=" + date);
            const data = await response.json();
            const bookings = data.bookings || [];
            
            const events = bookings.map(b => ({
                id: b.id,
                resource: `table_${b.table}`,
                start: new DayPilot.Date(date + "T" + b.start + ":00"),
                end: new DayPilot.Date(date + "T" + b.end + ":00"),
                text: b.name,
                name: b.name,
                phone: b.phone,
                comment: b.comment,
                confirmed: b.confirmed
            }));
            
            dp.update({ events: events });
        } catch (err) {
            console.warn(err);
        } finally {
            hideLoad();
        }
    }
    
    async function submitBooking() {
        const name = $("nameInput").value.trim();
        const phone = $("phoneInput").value.trim();
        const comment = $("commentInput").value.trim();
        const date = $("dateInput").value;
        
        if (!name || !phone) {
            alert("Введите имя и телефон");
            return;
        }
        
        if (!pendingBooking) {
            alert("Ошибка: не выбран интервал времени");
            return;
        }
        
        showLoad();
        try {
            await fetch(GAS, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    bookings: [{
                        date: date,
                        tableNumber: pendingBooking.table,
                        start: pendingBooking.start.toString("HH:mm"),
                        end: pendingBooking.end.toString("HH:mm"),
                        name: name,
                        phone: phone,
                        comment: comment
                    }]
                })
            });
            
            closeBookingModal();
            pendingBooking = null;
            await loadEvents();
        } catch (err) {
            alert("Ошибка при сохранении");
            console.warn(err);
        } finally {
            hideLoad();
        }
    }
    
    function openBookingModal() {
        $("bookingModal").classList.add("open");
    }
    
    function closeBookingModal() {
        $("bookingModal").classList.remove("open");
        pendingBooking = null;
    }
    
    function showInfoModal(booking) {
        currentBooking = booking;
        $("i-table").textContent = `№ ${booking.resource.split('_')[1]}`;
        $("i-time").textContent = `${booking.start.toString("HH:mm")} – ${booking.end.toString("HH:mm")}`;
        $("i-name").textContent = booking.name || "—";
        $("i-phone").textContent = booking.phone || "—";
        $("i-comment").textContent = booking.comment || "—";
        
        let statusHtml = "";
        if (booking.confirmed === "Да") {
            statusHtml = '<span style="background:#e0f7e8; padding:4px 12px; border-radius:40px;">✓ Подтверждено</span>';
        } else if (booking.confirmed === "Нет") {
            statusHtml = '<span style="background:#ffe5e2; padding:4px 12px; border-radius:40px;">✕ Не состоялось</span>';
        } else {
            statusHtml = '<span style="background:#fff1df; padding:4px 12px; border-radius:40px;">⏳ Ожидает</span>';
        }
        $("i-status").innerHTML = statusHtml;
        
        $("infoModal").classList.add("open");
    }
    
    function closeInfoModal() {
        $("infoModal").classList.remove("open");
        currentBooking = null;
    }
    
    async function confirmBooking(yes) {
        if (!currentBooking) return;
        await confirmBookingById(currentBooking.id, yes);
    }
    
    async function confirmBookingById(id, yes) {
        showLoad();
        try {
            await fetch(GAS, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    action: "confirm",
                    id: id,
                    confirmed: yes
                })
            });
            closeInfoModal();
            await loadEvents();
        } catch (err) {
            console.warn(err);
        } finally {
            hideLoad();
        }
    }
    
    async function deleteBooking() {
        if (!currentBooking) return;
        if (!confirm("Удалить бронь?")) return;
        await deleteBookingById(currentBooking.id);
    }
    
    async function deleteBookingById(id) {
        showLoad();
        try {
            await fetch(GAS, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    action: "delete",
                    id: id
                })
            });
            closeInfoModal();
            await loadEvents();
        } catch (err) {
            console.warn(err);
        } finally {
            hideLoad();
        }
    }
    
    function showLoad() {
        $("loader").style.display = "flex";
    }
    
    function hideLoad() {
        $("loader").style.display = "none";
    }
    
    // Закрытие модальных окон по клику на оверлей
    ["bookingModal", "infoModal"].forEach(id => {
        $(id).addEventListener("click", e => {
            if (e.target === $(id)) {
                $(id).classList.remove("open");
            }
        });
    });
</script>
</body>
</html>
