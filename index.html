/* LOGIN */
#login {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:24px; z-index:9999; padding:24px;
}
.login-icon { width:64px; height:64px; background:var(--navy); border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:28px; box-shadow:var(--shadow-md); }
.login-title { font-family:var(--f-display); font-size:36px; color:var(--ink); text-align:center; }
.login-sub { font-size:12px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--ink3); }
.login-rule { width:40px; height:2px; background:var(--border2); border-radius:2px; }
.login-note { font-size:12px; color:var(--ink4); }

/* APP */
#content { display:none; min-height:100vh; position:relative; z-index:1; }

/* HEADER */
.header {
  background:var(--surface); border-bottom:1px solid var(--border);
  height:64px; display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; position:sticky; top:0; z-index:200; box-shadow:var(--shadow-sm);
}
.brand { display:flex; align-items:center; gap:12px; }
.brand-icon { width:36px; height:36px; background:var(--navy); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.brand-name { font-family:var(--f-display); font-size:22px; color:var(--ink); letter-spacing:-.3px; }
.brand-name span { color:var(--ink3); font-style:italic; }
.header-btn {
  display:flex; align-items:center; gap:7px;
  font-family:var(--f-body); font-size:13px; font-weight:600;
  color:var(--navy); background:var(--navy-dim); border:1px solid var(--navy-mid);
  border-radius:var(--r); padding:8px 16px; cursor:pointer; transition:background .18s;
}
.header-btn:hover { background:#d8e3f2; }

/* PAGE */
.page { max-width:1000px; margin:0 auto; padding:24px 20px 60px; display:flex; flex-direction:column; gap:20px; }

/* CONTROLS */
.controls-bar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
.date-wrap {
  display:flex; align-items:center;
  background:var(--surface); border:1.5px solid var(--border2);
  border-radius:var(--r); overflow:hidden; box-shadow:var(--shadow-sm);
  flex:1; min-width:180px; max-width:260px; transition:border-color .15s,box-shadow .15s;
}
.date-wrap:focus-within { border-color:var(--navy); box-shadow:0 0 0 3px rgba(30,58,110,.1); }
.date-wrap label {
  padding:0 14px; font-size:11px; font-weight:700; letter-spacing:1.2px;
  text-transform:uppercase; color:var(--ink3); white-space:nowrap;
  border-right:1px solid var(--border); display:flex; align-items:center; height:100%;
}
#dateInput {
  flex:1; border:none; background:transparent; color:var(--ink);
  font-family:var(--f-body); font-size:15px; font-weight:500; padding:11px 14px; cursor:pointer; min-width:0;
}
#dateInput:focus { outline:none; }
#dateInput::-webkit-calendar-picker-indicator { cursor:pointer; opacity:.5; }
.btn-book {
  display:flex; align-items:center; gap:8px;
  font-family:var(--f-body); font-size:15px; font-weight:700;
  background:var(--navy); color:#fff; border:none; border-radius:var(--r);
  padding:11px 24px; cursor:pointer;
  box-shadow:0 2px 8px rgba(30,58,110,.25); transition:background .18s,transform .12s,box-shadow .18s;
}
.btn-book:hover { background:#162d55; transform:translateY(-1px); box-shadow:0 4px 16px rgba(30,58,110,.3); }
.btn-book:active { transform:translateY(0); }

/* LEGEND */
.legend { display:flex; gap:6px; flex-wrap:wrap; }
.lpill { display:flex; align-items:center; gap:6px; font-size:11px; font-weight:600; color:var(--ink3); background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:4px 12px 4px 8px; }
.lpip { width:8px; height:8px; border-radius:3px; flex-shrink:0; }
.lp-navy  { background:var(--navy);  opacity:.8; }
.lp-sage  { background:var(--sage);  opacity:.8; }
.lp-rust  { background:var(--rust);  opacity:.8; }
.lp-amber { background:var(--amber); }
.lp-green { background:var(--green); }
.lp-red   { background:var(--red);   }

/* GRID */
.grid-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r2); overflow:hidden; box-shadow:var(--shadow-md); position:relative; }
.grid-scroll { overflow-x:auto; overflow-y:visible; -webkit-overflow-scrolling:touch; }
table { border-collapse:collapse; table-layout:fixed; width:100%; min-width:680px; user-select:none; }
thead tr { background:var(--surface2); }
thead th {
  height:46px; font-family:var(--f-body); font-size:13px; font-weight:700;
  border-bottom:2px solid var(--border); border-right:1px solid var(--border);
  text-align:center; vertical-align:middle; transition:background .15s,color .15s;
}
thead th:last-child { border-right:none; }
.hdr-navy { color:var(--navy); background:#e8edf5; }
.hdr-sage { color:var(--sage); background:#e8f3ed; }
.hdr-rust { color:var(--rust); background:#faeee8; }
thead th.highlight-header { background:#fff3cd !important; color:var(--amber) !important; }
th.time-right {
  background:var(--surface2); color:var(--ink3); font-size:11px; font-weight:700;
  letter-spacing:.8px; border-right:none; border-left:2px solid var(--border);
  cursor:pointer; min-width:54px; padding:0 8px; transition:background .15s,color .15s;
}
th.time-right:hover { background:#fff3cd; color:var(--amber); }
td {
  height:var(--cell); border-bottom:1px solid var(--border); border-right:1px solid var(--border);
  text-align:center; vertical-align:middle; font-size:11px; position:relative; transition:background .1s;
}
td:last-child { border-right:none; }
td.slot { cursor:pointer; }
tr:nth-child(even) td { border-bottom-style:dashed; }
td.slot[data-lane="0"],td.slot[data-lane="1"],td.slot[data-lane="2"] { background:#f0f4fa; }
td.slot[data-lane="3"],td.slot[data-lane="4"],td.slot[data-lane="5"] { background:#f0f8f4; }
td.slot[data-lane="6"],td.slot[data-lane="7"],td.slot[data-lane="8"],
td.slot[data-lane="9"],td.slot[data-lane="10"],td.slot[data-lane="11"] { background:#fdf4f0; }
td.slot:hover { background:#fffbeb !important; }
td.slot.selected {
  background:#fff8e1 !important;
  border-left:2px solid #f59e0b; border-right:2px solid #f59e0b;
}
td.slot.selected.rounded-top { border-top:2px solid #f59e0b; border-top-left-radius:4px; border-top-right-radius:4px; }
td.slot.selected.rounded-bottom { border-bottom:2px solid #f59e0b; border-bottom-left-radius:4px; border-bottom-right-radius:4px; }
td.slot.start-time-chosen { background:#fef9c3 !important; outline:2px solid #f59e0b; outline-offset:-2px; }
td.slot.vertical-line { background:#fffdf0 !important; }

/* SLIDERS */
#slidersContainer { position:absolute; inset:0; pointer-events:none; z-index:5; }
.existing-slider {
  position:absolute; border-radius:5px; pointer-events:auto; cursor:pointer;
  overflow:hidden; padding:4px 6px; display:flex; flex-direction:column;
  justify-content:flex-start; gap:1px;
  transition:filter .15s,transform .15s; box-shadow:0 1px 4px rgba(0,0,0,.12);
}
.existing-slider:hover { filter:brightness(.93); transform:scale(1.02); z-index:10; }
.existing-slider.pending  { background:#fef3c7; border:1.5px solid #f59e0b; }
.existing-slider.confirmed{ background:#dcfce7; border:1.5px solid #16a34a; }
.existing-slider.rejected { background:#fee2e2; border:1.5px solid #ef4444; }
.sl-name { font-size:9px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sl-time { font-size:8px; white-space:nowrap; }
.pending .sl-name  { color:#92400e; } .pending .sl-time  { color:#b45309; }
.confirmed .sl-name{ color:#14532d; } .confirmed .sl-time{ color:#15803d; }
.rejected .sl-name { color:#7f1d1d; } .rejected .sl-time { color:#b91c1c; }

/* CARDS */
#cardsContainer { display:flex; flex-wrap:wrap; gap:8px; }
.booking-card {
  display:flex; align-items:center; gap:10px;
  background:var(--surface); border:1.5px solid #f59e0b;
  border-radius:var(--r); padding:10px 14px; box-shadow:var(--shadow-sm);
  animation:slideUp .2s ease;
}
@keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.card-icon { width:30px; height:30px; background:var(--amber-dim); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.card-text { font-size:13px; font-weight:600; color:var(--ink); }
.card-text span { font-weight:400; color:var(--ink3); }
.card-close {
  width:24px; height:24px; border-radius:6px; background:transparent;
  border:1px solid var(--border2); color:var(--ink3); font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; flex-shrink:0; margin-left:auto;
}
.card-close:hover { background:var(--red-dim); color:var(--red); border-color:var(--red); }

/* OVERLAYS */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(26,23,20,.45); backdrop-filter:blur(4px);
  z-index:1000; justify-content:center; align-items:center; padding:20px;
}
.overlay.active { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r3);
  width:100%; max-width:440px; box-shadow:var(--shadow-lg); overflow:hidden;
  animation:popIn .22s ease;
}
@keyframes popIn { from{opacity:0;transform:scale(.96) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
.modal-head { padding:24px 24px 0; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.modal-title { font-family:var(--f-display); font-size:24px; color:var(--ink); letter-spacing:-.3px; }
.modal-close {
  width:32px; height:32px; border-radius:8px; border:1px solid var(--border);
  background:var(--surface2); color:var(--ink3); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; margin-top:2px;
}
.modal-close:hover { background:var(--red-dim); color:var(--red); border-color:var(--red); }
.modal-body { padding:20px 24px 24px; }

/* FORM */
.field { margin-bottom:16px; }
.field:last-of-type { margin-bottom:0; }
.field-label { display:block; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--ink3); margin-bottom:7px; }
.field-input {
  width:100%; background:var(--surface2); border:1.5px solid var(--border);
  border-radius:var(--r); color:var(--ink); font-family:var(--f-body);
  font-size:15px; padding:11px 14px; transition:border-color .15s,box-shadow .15s;
}
.field-input::placeholder { color:var(--ink4); }
.field-input:focus { outline:none; border-color:var(--navy); box-shadow:0 0 0 3px rgba(30,58,110,.1); background:#fff; }
textarea.field-input { resize:vertical; min-height:80px; line-height:1.5; }
.modal-actions { display:flex; gap:10px; margin-top:20px; }
.btn-primary {
  flex:1; background:var(--navy); color:#fff; border:none; border-radius:var(--r);
  font-family:var(--f-body); font-size:14px; font-weight:700; padding:12px 20px; cursor:pointer;
  box-shadow:0 2px 6px rgba(30,58,110,.25); transition:background .15s,transform .1s;
}
.btn-primary:hover { background:#162d55; transform:translateY(-1px); }
.btn-ghost {
  background:transparent; color:var(--ink3); border:1.5px solid var(--border2);
  border-radius:var(--r); font-family:var(--f-body); font-size:14px; font-weight:600;
  padding:12px 20px; cursor:pointer; transition:all .15s;
}
.btn-ghost:hover { background:var(--bg2); color:var(--ink); }

/* INFO */
.info-section { background:var(--surface2); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; margin-bottom:16px; }
.info-row { display:flex; align-items:center; justify-content:space-between; padding:11px 16px; border-bottom:1px solid var(--border); gap:12px; }
.info-row:last-child { border-bottom:none; }
.info-label { font-size:11px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--ink3); flex-shrink:0; }
.info-value { font-size:14px; font-weight:500; color:var(--ink); text-align:right; word-break:break-word; max-width:55%; }
.status-badge { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:700; border-radius:100px; padding:3px 10px; }
.badge-amber { background:var(--amber-dim); color:var(--amber); }
.badge-green { background:var(--green-dim); color:var(--green); }
.badge-red   { background:var(--red-dim);   color:var(--red);   }
.confirm-section { margin-bottom:12px; }
.confirm-label { font-size:11px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--ink3); margin-bottom:10px; }
.confirm-btns { display:flex; gap:8px; }
.btn-yes { flex:1; background:var(--green-dim); color:var(--green); border:1.5px solid #86efac; border-radius:var(--r); font-family:var(--f-body); font-size:13px; font-weight:700; padding:10px; cursor:pointer; transition:all .15s; }
.btn-yes:hover { background:var(--green); color:#fff; border-color:var(--green); }
.btn-no  { flex:1; background:var(--red-dim);  color:var(--red);  border:1.5px solid #fca5a5; border-radius:var(--r); font-family:var(--f-body); font-size:13px; font-weight:700; padding:10px; cursor:pointer; transition:all .15s; }
.btn-no:hover { background:var(--red); color:#fff; border-color:var(--red); }
.btn-delete { width:100%; background:transparent; color:var(--ink4); border:1px solid var(--border); border-radius:var(--r); font-family:var(--f-body); font-size:12px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; padding:9px; cursor:pointer; transition:all .15s; margin-top:8px; }
.btn-delete:hover { background:var(--red-dim); color:var(--red); border-color:#fca5a5; }

/* IMAGE POPUP */
#imagePopup { display:none; position:fixed; inset:0; background:rgba(26,23,20,.7); backdrop-filter:blur(8px); z-index:9000; justify-content:center; align-items:center; padding:20px; }
#imagePopup.active { display:flex; }
.img-inner { position:relative; background:var(--surface); border-radius:var(--r2); overflow:hidden; border:1px solid var(--border); box-shadow:var(--shadow-lg); max-width:90vw; max-height:90vh; }
.img-inner img { display:block; max-width:100%; max-height:85vh; }
.img-close { position:absolute; top:12px; right:12px; width:34px; height:34px; background:rgba(255,255,255,.9); border:1px solid var(--border); border-radius:8px; color:var(--ink2); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.img-close:hover { background:var(--red-dim); color:var(--red); border-color:var(--red); }

/* LOADING */
#loadingOverlay { display:none; position:fixed; inset:0; background:rgba(244,241,236,.6); backdrop-filter:blur(2px); z-index:5000; justify-content:center; align-items:center; }
.spinner-wrap { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px 32px; display:flex; flex-direction:column; align-items:center; gap:14px; box-shadow:var(--shadow-lg); }
.spinner { width:36px; height:36px; border:3px solid var(--border2); border-top-color:var(--navy); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.spinner-label { font-size:12px; font-weight:600; color:var(--ink3); letter-spacing:.5px; }

/* MOBILE */
@media(max-width:600px) {
  :root { --cell:36px; }
  .header { padding:0 14px; height:56px; }
  .brand-name { font-size:19px; }
  .brand-icon { width:30px; height:30px; font-size:13px; border-radius:8px; }
  .header-btn { font-size:12px; padding:7px 12px; }
  .btn-label { display:none; }
  .page { padding:14px 12px 50px; gap:14px; }
  .controls-bar { flex-direction:column; align-items:stretch; }
  .date-wrap { max-width:100%; }
  .btn-book { justify-content:center; }
  .legend { gap:5px; }
  .lpill { font-size:10px; }
  table { min-width:0; }
  thead th { font-size:12px; height:38px; }
  th.time-right { min-width:40px; font-size:10px; padding:0 4px; }
  .modal-head { padding:18px 18px 0; }
  .modal-title { font-size:21px; }
  .modal-body { padding:16px 18px 20px; }
  .sl-time { display:none; }
}

<script>
/* ── AUTH ── */
const allowedEmails = [
  "vadiksss900@gmail.com","sergey99belov@gmail.com","popadinecvasil3@gmail.com",
  "veronicadiakova04@gmail.com","info.luckystrike.kh@gmail.com","sashavolobuev123890@gmail.com",
  "egorgorbushko@gmail.com","shatrava.o@gmail.com","Craftmax30@gmail.com",

];
function handleCredentialResponse(r) {
  const d = parseJwt(r.credential);
  if (allowedEmails.includes(d.email)) { localStorage.setItem("userEmail", d.email); location.reload(); }
  else alert("Доступ запрещён для: " + d.email);
}
function parseJwt(token) {
  const b = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(atob(b).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
}
window.onload = () => {
  const email = localStorage.getItem("userEmail");
  if (email && allowedEmails.includes(email)) {
    document.getElementById("login").style.display = "none";
    document.getElementById("content").style.display = "block";
    initApp();
  }
};

/* ── CONFIG ── */
const GAS_URL   = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
const START_H=11, END_H=22, LANES=12;
const $ = id => document.getElementById(id);

const dateInput        = $('dateInput');
const tableBody        = $('tableBody');
const cardsContainer   = $('cardsContainer');
const slidersContainer = $('slidersContainer');
const gridScroll       = document.querySelector('.grid-scroll');
const loadingOverlay   = $('loadingOverlay');

const timeSlots = [];
for (let h=START_H; h<=END_H; h++) {
  timeSlots.push({display:`${h}:00`, key:h});
  if (h<END_H) timeSlots.push({display:`${h}:30`, key:h+0.5});
}

/* ── INIT ── */
function initApp() {
  const today = new Date().toISOString().split('T')[0];
  dateInput.min = dateInput.value = today;

  timeSlots.forEach(slot => {
    const row = document.createElement('tr');
    for (let lane=0; lane<LANES; lane++) {
      const td = document.createElement('td');
      td.className='slot'; td.dataset.lane=lane; td.dataset.time=slot.key;
      row.appendChild(td);
    }
    const th = document.createElement('th');
    th.className='time-right'; th.textContent=slot.display;
    row.appendChild(th);
    tableBody.appendChild(row);
  });

  tableBody.addEventListener('click', handleClick);
  tableBody.addEventListener('dblclick', handleDblClick);
  dateInput.addEventListener('change', async () => { resetSelection(); await loadExisting(); });

  updateCards();
  loadExisting();
}

/* ── STATE ── */
const intervals = {};
let curLane=null, curStart=null, curBookingId=null;

function fmt(v) { return `${Math.floor(v)}:${v%1===0.5?'30':'00'}`; }
function parseTime(txt) { return parseFloat(txt.includes(':30')?txt.replace(':30','.5'):txt.replace(':00','.0')); }

function resetSelection() {
  curLane=curStart=null;
  Object.keys(intervals).forEach(k => { intervals[k]=[]; });
  document.querySelectorAll('td.start-time-chosen').forEach(c=>c.classList.remove('start-time-chosen'));
  document.querySelectorAll('thead th.highlight-header').forEach(t=>t.classList.remove('highlight-header'));
  document.querySelectorAll('td.slot.vertical-line').forEach(t=>t.classList.remove('vertical-line'));
  updateCards();
}

/* ── CLICK HANDLER ── */
function handleClick(e) {
  const cell = e.target;
  if (cell.classList.contains('slot')) {
    const lane = +cell.dataset.lane;
    if (curStart===null) {
      curLane = lane;
      document.querySelectorAll('td.start-time-chosen').forEach(c=>c.classList.remove('start-time-chosen'));
      document.querySelectorAll('thead th.highlight-header').forEach(t=>t.classList.remove('highlight-header'));
      document.querySelectorAll('td.slot.vertical-line').forEach(t=>t.classList.remove('vertical-line'));
      document.querySelectorAll('thead th')[lane]?.classList.add('highlight-header');
      document.querySelectorAll(`td.slot[data-lane="${lane}"]`).forEach(td=>td.classList.add('vertical-line'));
    }
    return;
  }
  if (cell.classList.contains('time-right')) {
    if (curLane===null) { alert('Сначала кликните на ячейку нужного стола.'); return; }
    const t = parseTime(cell.textContent);
    if (curStart===null) {
      curStart = t;
      document.querySelectorAll('td.start-time-chosen').forEach(c=>c.classList.remove('start-time-chosen'));
      document.querySelector(`td.slot[data-lane="${curLane}"][data-time="${curStart}"]`)?.classList.add('start-time-chosen');
    } else {
      if (t<=curStart) { alert('Время конца должно быть больше времени начала.'); return; }
      if (!intervals[curLane]) intervals[curLane]=[];
      intervals[curLane].push({start:curStart, end:t});
      curLane=curStart=null;
      document.querySelectorAll('td.start-time-chosen').forEach(c=>c.classList.remove('start-time-chosen'));
      document.querySelectorAll('thead th.highlight-header').forEach(t=>t.classList.remove('highlight-header'));
      document.querySelectorAll('td.slot.vertical-line').forEach(t=>t.classList.remove('vertical-line'));
      updateCards();
    }
  }
}

function handleDblClick(e) {
  if (!e.target.classList.contains('slot')) return;
  const lane=+e.target.dataset.lane, time=parseFloat(e.target.dataset.time);
  if (!intervals[lane]) return;
  const idx=intervals[lane].findIndex(iv=>{
    const s=Math.min(iv.start,iv.end), en=Math.max(iv.start,iv.end);
    return time>=s && time<=en;
  });
  if (idx!==-1) { intervals[lane].splice(idx,1); updateCards(); }
}

/* ── UPDATE SELECTION & CARDS ── */
function updateCards() {
  document.querySelectorAll('td.slot.selected').forEach(c=>c.classList.remove('selected','rounded-top','rounded-bottom'));
  for (const laneStr in intervals) {
    const lane=+laneStr;
    (intervals[lane]||[]).forEach(iv=>{
      const s=Math.min(iv.start,iv.end), e=Math.max(iv.start,iv.end);
      document.querySelectorAll(`td.slot[data-lane="${lane}"]`).forEach(cell=>{
        const t=parseFloat(cell.dataset.time);
        if (t>=s && t<=e) cell.classList.add('selected');
      });
      document.querySelector(`td.slot[data-lane="${lane}"][data-time="${s}"]`)?.classList.add('rounded-top');
      if (s!==e) document.querySelector(`td.slot[data-lane="${lane}"][data-time="${e}"]`)?.classList.add('rounded-bottom');
    });
  }
  cardsContainer.innerHTML='';
  const selDate=dateInput.value.split('-').reverse().join('.');
  for (const laneStr in intervals) {
    const lane=+laneStr;
    (intervals[lane]||[]).forEach((iv,idx)=>{
      const s=Math.min(iv.start,iv.end), e=Math.max(iv.start,iv.end);
      const card=document.createElement('div'); card.className='booking-card';
      const icon=document.createElement('div'); icon.className='card-icon'; icon.textContent='🎱';
      const txt=document.createElement('div'); txt.className='card-text';
      txt.innerHTML=`Стол&nbsp;№&nbsp;${lane+1} <span>·&nbsp;${selDate}&nbsp;·&nbsp;${fmt(s)}&nbsp;–&nbsp;${fmt(e)}</span>`;
      const btn=document.createElement('button'); btn.className='card-close'; btn.innerHTML='×';
      btn.onclick=ev=>{ ev.stopPropagation(); intervals[lane].splice(idx,1); updateCards(); };
      card.append(icon,txt,btn); cardsContainer.appendChild(card);
    });
  }
}

/* ── BOOKING MODAL ── */
function openModal() {
  if (!Object.values(intervals).some(a=>a.length)) return alert('Сначала выберите время на сетке.');
  $('modal').classList.add('active');
}
function closeModal() { $('modal').classList.remove('active'); }

async function submitForm() {
  const name=$('nameInput').value.trim(), phone=$('phoneInput').value.trim();
  const comment=$('commentInput').value.trim(), date=dateInput.value;
  if (!name||!phone) return alert('Введите имя и телефон.');
  if (!date) return alert('Выберите дату.');
  const bookings=[];
  for (const lane in intervals)
    (intervals[lane]||[]).forEach(iv=>bookings.push({date,tableNumber:+lane+1,start:iv.start,end:iv.end,name,phone,comment}));
  if (!bookings.length) return alert('Нет выбранных интервалов.');
  showLoading();
  try {
    await Promise.all(bookings.map(b=>fetch(GAS_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({bookings:[b]})})));
    closeModal();
    ['nameInput','phoneInput','commentInput'].forEach(id=>$(id).value='');
    resetSelection(); await loadExisting();
  } catch(err) { alert('Ошибка: '+err.message); }
  finally { hideLoading(); }
}

/* ── INFO MODAL ── */
function showBookingInfo(b) {
  $('info-table').textContent=`№ ${b.table}`;
  $('info-date').textContent=b.date.split('-').reverse().join('.');
  $('info-time').textContent=`${fmt(b.start)} – ${fmt(b.end)}`;
  $('info-name').textContent=b.name;
  $('info-phone').textContent=b.phone;
  $('info-comment').textContent=b.comment||'—';
  const el=$('info-confirmed');
  if (b.confirmed==='Да')  el.innerHTML='<span class="status-badge badge-green">✓ Подтверждено</span>';
  else if (b.confirmed==='Нет') el.innerHTML='<span class="status-badge badge-red">✕ Не состоялось</span>';
  else el.innerHTML='<span class="status-badge badge-amber">⏳ Ожидает</span>';
  curBookingId=b.id;
  $('bookingInfoPopup').classList.add('active');
}
function closeInfoModal() { $('bookingInfoPopup').classList.remove('active'); curBookingId=null; }

async function confirmBooking(yes) {
  if (!curBookingId) return;
  showLoading();
  try {
    await fetch(GAS_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'confirm',id:curBookingId,confirmed:yes})});
    closeInfoModal(); await loadExisting();
  } catch(e) { alert('Ошибка: '+e.message); }
  finally { hideLoading(); }
}
async function deleteBooking() {
  if (!curBookingId) return;
  if (!confirm('Удалить это бронирование?')) return;
  showLoading();
  try {
    await fetch(GAS_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'delete',id:curBookingId})});
    closeInfoModal(); await loadExisting();
  } catch(e) { alert('Ошибка: '+e.message); }
  finally { hideLoading(); }
}

/* ── LOAD EXISTING ── */
async function loadExisting() {
  showLoading();
  slidersContainer.innerHTML='';
  try {
    const res=await fetch(GAS_URL+'?action=get&date='+dateInput.value);
    const data=await res.json();
    if (!data.bookings?.length) return;
    const timeCells=Array.from(document.querySelectorAll('th.time-right'));
    const tableCells=Array.from(document.querySelectorAll('td.slot'));
    const scrollRect=gridScroll.getBoundingClientRect();
    data.bookings.forEach(b=>{
      if (b.date!==dateInput.value) return;
      const laneIdx=b.table-1, start=parseFloat(b.start), end=parseFloat(b.end);
      const si=timeSlots.findIndex(ts=>ts.key===start);
      const ei=timeSlots.findIndex(ts=>ts.key===end);
      if (si===-1||ei===-1) return;
      const startCell=tableCells.find(c=>parseInt(c.dataset.lane)===laneIdx&&parseFloat(c.dataset.time)===start);
      if (!startCell) return;
      const cellRect=startCell.getBoundingClientRect();
      const startTH=timeCells[si], endTH=timeCells[ei];
      const top=startTH.offsetTop;
      const height=endTH.offsetTop+endTH.offsetHeight-startTH.offsetTop;
      const left=cellRect.left-scrollRect.left+gridScroll.scrollLeft;
      const el=document.createElement('div');
      el.className='existing-slider';
      el.classList.add(b.confirmed==='Да'?'confirmed':b.confirmed==='Нет'?'rejected':'pending');
      el.style.cssText=`top:${top}px;left:${left}px;width:${cellRect.width-2}px;height:${height}px;`;
      const nd=document.createElement('div'); nd.className='sl-name'; nd.textContent=b.name||'—';
      const td=document.createElement('div'); td.className='sl-time'; td.textContent=`${fmt(start)} – ${fmt(end)}`;
      el.append(nd,td);
      el.addEventListener('click',e=>{e.stopPropagation();showBookingInfo(b);});
      slidersContainer.appendChild(el);
    });
  } catch(e) { console.error('Ошибка загрузки:',e); }
  finally { hideLoading(); }
}

/* ── HELPERS ── */
function showLoading() { loadingOverlay.style.display='flex'; }
function hideLoading()  { loadingOverlay.style.display='none'; }
function openImagePopup()  { $('imagePopup').classList.add('active'); }
function closeImagePopup() { $('imagePopup').classList.remove('active'); }

['modal','bookingInfoPopup'].forEach(id=>{
  $(id).addEventListener('click',e=>{ if(e.target===$(id)){ $(id).classList.remove('active'); if(id==='bookingInfoPopup') curBookingId=null; }});
});
$('imagePopup').addEventListener('click',e=>{ if(e.target===$('imagePopup')) closeImagePopup(); });
</script>
