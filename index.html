<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Бильярд Клуб · Бронирование столов</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    :root {
      /* Основная палитра — Премиальный темный клубный стиль */
      --bg: #0f1115;
      --surface: #161920;
      --surface-glass: rgba(22, 25, 32, 0.75);
      --surface2: #1e222b;
      --border: rgba(255, 255, 255, 0.06);
      --border2: rgba(255, 255, 255, 0.12);
      
      /* Текст */
      --ink: #f5f5f7;
      --ink2: #9a9ab0;
      --ink3: #6e6e80;
      --ink4: #868692;
      
      /* Акценты и Статусы */
      --blue: #2f80ed;
      --blue-h: #1b6fd1;
      --blue-dim: rgba(47, 128, 237, 0.15);
      
      --green: #27ae60;
      --green-dim: rgba(39, 174, 96, 0.15);
      
      --red: #eb5757;
      --red-dim: rgba(235, 87, 87, 0.15);
      
      --amber: #f2a93b;
      --amber-dim: rgba(242, 169, 59, 0.15);
      
      /* Зоны столов (Приглушенные благородные оттенки) */
      --zone-navy: #222b45;
      --zone-sage: #1e3d2f;
      --zone-rust: #4a2825;

      --r: 16px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
      --cell-h: 54px;
      --cell-w: 76px;
      --lane-w: 96px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      font-weight: 400;
    }

    /* Элементы Логина */
    #login {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 24px; z-index: 9999; padding: 32px;
    }
    .login-glyph { font-size: 64px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); }
    .login-title { font-size: 36px; font-weight: 700; letter-spacing: -0.5px; color: var(--ink); }
    .login-sub { font-size: 16px; color: var(--ink2); margin-top: -8px; font-weight: 400; }
    .login-sep { width: 40px; height: 2px; background: var(--border2); border-radius: 2px; }

    #content { display: none; min-height: 100vh; }

    /* Шапка сайта */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface-glass);
      backdrop-filter: blur(20px) saturate(120%);
      border-bottom: 1px solid var(--border);
      height: 68px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 24px;
    }
    .nav-title { font-size: 18px; font-weight: 600; letter-spacing: -0.2px; color: var(--ink); }
    .nav-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 18px;
      font-family: var(--font); font-size: 14px; font-weight: 500; color: var(--ink);
      cursor: pointer; transition: all 0.2s ease;
    }
    .nav-btn:hover { background: var(--surface); border-color: var(--ink3); }

    /* Контентная область */
    .page {
      width: 100%; max-width: 1600px; margin: 0 auto;
      padding: 24px 24px 80px; display: flex; flex-direction: column; gap: 24px;
    }

    /* Панель управления */
    .ctrl {
      display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
      background: var(--surface); border-radius: 20px; padding: 16px 20px;
      border: 1px solid var(--border);
    }
    .date-field {
      flex: 1; min-width: 200px; max-width: 260px;
      display: flex; align-items: center; gap: 12px;
      background: var(--surface2); border-radius: 12px;
      padding: 0 16px; height: 48px; border: 1px solid var(--border);
      color: var(--ink2); transition: all 0.2s;
    }
    .date-field:focus-within { border-color: var(--blue); background: var(--surface); color: var(--blue); }
    #dateInput {
      flex: 1; border: none; background: transparent;
      font-family: var(--font); font-size: 15px; font-weight: 500; color: var(--ink);
      cursor: pointer; outline: none; color-scheme: dark;
    }
    .btn-book {
      height: 48px; padding: 0 28px;
      background: var(--blue); color: white; border: none; border-radius: 12px;
      font-family: var(--font); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease;
      white-space: nowrap;
    }
    .btn-book:hover { background: var(--blue-h); transform: translateY(-1px); }
    
    .btn-drag-toggle {
      height: 48px; padding: 0 20px;
      background: var(--surface2); color: var(--ink2); border: 1px solid var(--border);
      border-radius: 12px; font-family: var(--font); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-drag-toggle.active {
      background: var(--amber-dim); color: var(--amber); border-color: var(--amber);
    }
    .btn-drag-toggle:hover:not(.active) { background: var(--surface2); border-color: var(--ink3); color: var(--ink); }

    /* Временные карточки выделения */
    .inline-temp-cards { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-left: auto; }
    .temp-badge {
      display: flex; align-items: center; gap: 8px;
      background: var(--blue-dim); border-radius: 30px;
      padding: 6px 14px; font-size: 13px; font-weight: 500; color: var(--blue);
      border: 1px solid rgba(47, 128, 237, 0.3); white-space: nowrap;
    }
    .temp-card-inline {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 30px; padding: 4px 8px 4px 14px; font-size: 13px;
    }
    .temp-card-inline strong { font-weight: 600; color: var(--ink); }
    .temp-card-inline .temp-time {
      font-size: 12px; background: rgba(255,255,255,0.05);
      padding: 2px 8px; border-radius: 10px; color: var(--ink2);
    }
    .temp-card-inline .temp-rm {
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: none; cursor: pointer;
      font-size: 11px; color: var(--ink2); display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .temp-card-inline .temp-rm:hover { background: var(--red-dim); color: var(--red); }

    /* Таблица / Сетка */
    .grid-card {
      background: var(--surface); border-radius: 20px;
      overflow: hidden; border: 1px solid var(--border);
    }
    .grid-scroll { overflow-x: auto; position: relative; width: 100%; scrollbar-width: thin; }

    #tableDesktop { display: table; border-collapse: collapse; table-layout: fixed; width: 100%; min-width: 1120px; font-size: 13px; }
    #tableDesktop thead th {
      height: var(--cell-h); font-size: 12px; font-weight: 600;
      color: var(--ink4); border-bottom: 1px solid var(--border2);
      border-right: 1px solid var(--border); text-align: center;
      vertical-align: middle; background: var(--surface2);
      position: sticky; top: 0; z-index: 3;
    }
    #tableDesktop thead th.corner {
      width: var(--lane-w); min-width: var(--lane-w);
      background: var(--surface2); position: sticky; left: 0; z-index: 5;
      font-size: 13px; font-weight: 700; color: var(--ink);
      border-right: 1px solid var(--border2);
    }
    #tableDesktop thead th.th-time { transition: all 0.15s; }
    #tableDesktop thead th.th-time:hover { background: var(--surface); color: var(--blue); }

    #tableDesktop tbody tr { height: var(--cell-h); }
    #tableDesktop tbody td.lane-hdr {
      width: var(--lane-w); min-width: var(--lane-w);
      font-size: 15px; font-weight: 700;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border2);
      text-align: center; position: sticky; left: 0; z-index: 2;
    }
    
    /* Специфичные цвета для зон заголовков */
    .lane-hdr.grp-navy { background: var(--zone-navy) !important; color: #a1b5f8; }
    .lane-hdr.grp-sage { background: var(--zone-sage) !important; color: #87dba8; }
    .lane-hdr.grp-rust { background: var(--zone-rust) !important; color: #f2a299; }

    /* Подложки строк */
    #tableDesktop tbody tr.row-navy td.slot { background: #181d2a; }
    #tableDesktop tbody tr.row-sage td.slot { background: #16221c; }
    #tableDesktop tbody tr.row-rust td.slot { background: #241918; }
    
    #tableDesktop tbody tr.row-navy:hover td.slot { background: #1d2537; }
    #tableDesktop tbody tr.row-sage:hover td.slot { background: #1f3127; }
    #tableDesktop tbody tr.row-rust:hover td.slot { background: #322321; }

    #tableDesktop tbody td.slot {
      cursor: crosshair; border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border); transition: background 0.1s ease;
    }
    
    /* Состояния ячеек сетки */
    #tableDesktop tbody td.slot.booking-pending { background: rgba(242, 169, 59, 0.25) !important; }
    #tableDesktop tbody td.slot.booking-confirmed { background: rgba(39, 174, 96, 0.25) !important; }
    #tableDesktop tbody td.slot.booking-rejected { background: rgba(235, 87, 87, 0.2) !important; }
    #tableDesktop tbody td.slot.temp-highlight { background: rgba(47, 128, 237, 0.35) !important; }
    #tableDesktop tbody td.slot.drag-over { background: rgba(255, 255, 255, 0.15) !important; }

    /* Слайдеры бронирования над сеткой */
    #slidersLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
    .slider {
      position: absolute; border-radius: 8px; pointer-events: auto;
      padding: 6px 10px; display: flex; flex-direction: column; justify-content: center;
      gap: 2px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1); will-change: left, top;
      transition: all 0.15s ease; font-weight: 500; font-family: var(--font);
      overflow: hidden; white-space: nowrap; color: #ffffff;
    }
    
    .slider[data-lane-type="navy"] { background: #324475; }
    .slider[data-lane-type="sage"] { background: #27543f; }
    .slider[data-lane-type="rust"] { background: #6e3530; }
    
    /* Цветовые статусы слайдеров */
    .slider.confirmed { border-left: 4px solid var(--green); }
    .slider.pending { border-left: 4px solid var(--amber); }
    .slider.rejected { border-left: 4px solid var(--red); opacity: 0.6; }
    .slider.temp { border: 2px dashed var(--blue); background: rgba(47, 128, 237, 0.5); }
    
    .slider:hover { filter: brightness(1.15); z-index: 30; transform: translateY(-1px); }
    .sl-name { font-size: 12px; font-weight: 600; text-overflow: ellipsis; overflow: hidden; }
    .sl-time { font-size: 11px; opacity: 0.75; }

    /* Окна Модальные / Шторки */
    .overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px); z-index: 2000; justify-content: center; align-items: center;
      padding: 16px;
    }
    .overlay.open { display: flex; }
    .sheet {
      background: var(--surface); border-radius: 24px; width: 100%;
      max-width: 480px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid var(--border2); overflow: hidden;
      animation: fadeInModal 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes fadeInModal { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    
    .sheet-head { padding: 24px 24px 12px; display: flex; justify-content: space-between; align-items: center; }
    .sheet-title { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
    .sheet-x {
      width: 32px; height: 32px; border-radius: 50%; background: var(--surface2);
      border: none; font-size: 18px; cursor: pointer; color: var(--ink2);
      display: flex; align-items: center; justify-content: center; transition: 0.2s;
    }
    .sheet-x:hover { background: rgba(255,255,255,0.1); color: var(--ink); }
    .sheet-body { padding: 12px 24px 28px; }
    
    /* Формы */
    .f-group { margin-bottom: 18px; }
    .f-label { font-size: 13px; font-weight: 500; color: var(--ink4); margin-bottom: 6px; display: block; }
    .f-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; font-size: 15px; padding: 12px 16px; color: var(--ink);
      font-family: var(--font); outline: none; transition: all 0.2s;
    }
    .f-input:focus { border-color: var(--blue); background: rgba(255,255,255,0.02); }
    textarea.f-input { resize: none; }
    
    .f-actions { display: flex; gap: 12px; margin-top: 24px; }
    .f-btn-ok { flex: 1; height: 46px; background: var(--blue); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; transition: background 0.2s; }
    .f-btn-ok:hover { background: var(--blue-h); }
    .f-btn-cancel { flex: 1; height: 46px; background: var(--surface2); border: 1px solid var(--border); color: var(--ink2); border-radius: 12px; font-weight: 500; font-size: 15px; cursor: pointer; transition: all 0.2s; }
    .f-btn-cancel:hover { background: rgba(255,255,255,0.05); color: var(--ink); }
    
    .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
    .info-row span { color: var(--ink4); }
    .info-row strong { color: var(--ink); font-weight: 500; }
    
    .del-btn { width: 100%; height: 46px; background: var(--red-dim); border: 1px solid rgba(235, 87, 87, 0.2); border-radius: 12px; margin-top: 20px; cursor: pointer; font-weight: 600; color: var(--red); transition: all 0.2s; }
    .del-btn:hover { background: var(--red); color: white; }
    
    .confirm-btns { display: flex; gap: 12px; margin: 20px 0 4px; }
    .cb-yes, .cb-no { flex: 1; height: 44px; border-radius: 12px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: opacity 0.2s; }
    .cb-yes { background: var(--green-dim); color: #6fcf97; border: 1px solid rgba(39, 174, 96, 0.2); }
    .cb-no { background: var(--red-dim); color: #f2994a; border: 1px solid rgba(235, 87, 87, 0.2); }
    .cb-yes:hover, .cb-no:hover { filter: brightness(1.2); }
    
    /* Индикатор режима перетяжки */
    .drag-mode-indicator {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--amber); color: #000; padding: 12px 24px;
      border-radius: 30px; font-size: 14px; font-weight: 700; z-index: 1000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4); pointer-events: none;
    }

    /* Лоадер */
    #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 5000; align-items: center; justify-content: center; }
    .loader-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; padding: 24px 40px; text-align: center; }
    .spin { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 780px) {
      .page { padding: 16px 12px 70px; gap: 16px; }
      .ctrl { flex-direction: column; align-items: stretch; }
      .inline-temp-cards { margin-left: 0; justify-content: flex-start; }
      .btn-book, .btn-drag-toggle, .date-field { max-width: 100%; width: 100%; }
    }
  </style>
</head>
<body>

<div id="login">
  <div class="login-glyph">🎱</div>
  <div class="login-title">Бильярд Клуб</div>
  <div class="login-sub">Элегантное бронирование</div>
  <div class="login-sep"></div>
  <div id="g_id_onload"
    data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com"
    data-callback="handleCredentialResponse"
    data-auto_prompt="false"></div>
  <div class="g_id_signin" data-type="standard"></div>
</div>

<div id="content">
  <nav class="nav">
    <span class="nav-title">🎱 LUCKY STRIKE · Бильярд</span>
    <button class="nav-btn" onclick="openImg()">📐 Схема зала</button>
  </nav>
  <div class="page">
    <div class="ctrl">
      <div class="date-field">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <input type="date" id="dateInput"/>
      </div>
      <button class="btn-book" onclick="openBookModal()">➕ Новая бронь</button>
      <button id="dragToggleBtn" class="btn-drag-toggle">🎯 Режим перетяжки: ВЫКЛ</button>
      <div id="inlineTempContainer" class="inline-temp-cards"></div>
    </div>
    <div class="grid-card">
      <div class="grid-scroll" id="gridScroll">
        <table id="tableDesktop">
          <thead id="dtHead">
            <tr><th class="corner">СТОЛ</th></tr>
          </thead>
          <tbody id="dtBody"></tbody>

</div>
<div id="dragModeIndicator" class="drag-mode-indicator" style="display: none;">🎯 Режим перетяжки АКТИВЕН</div>

<!-- МОДАЛЬНОЕ ОКНО ПОДТВЕРЖДЕНИЯ -->
<div id="bookModal" class="overlay">
  <div class="sheet">
    <div class="sheet-head">
      <div class="sheet-title">Подтверждение брони</div>
      <button class="sheet-x" onclick="closeBookModal()">×</button>
    </div>
    <div class="sheet-body">
      <div id="bookingTimePreview" style="background:var(--surface2); border: 1px solid var(--border); border-radius:12px; padding:12px 16px; margin-bottom:20px; font-size:14px; font-weight:500; color:var(--ink);">
        <span>🕒 Выбранное время: </span><span id="previewTimes" style="color: var(--blue); font-weight:600;">—</span>
      </div>
      <div class="f-group"><label class="f-label">Имя *</label><input class="f-input" id="nameInput" placeholder="Иван Петров"/></div>
      <div class="f-group"><label class="f-label">Телефон</label><input class="f-input" id="phoneInput" placeholder="+7 123 456-78-90"/></div>
      <div class="f-group"><label class="f-label">Комментарий</label><textarea class="f-input" id="commentInput" rows="2" placeholder="Пожелания / особые условия"></textarea></div>

<div id="infoModal" class="overlay">

        <div class="info-row"><span>Телефон</span><strong id="i-phone"></strong></div>
        <div class="info-row"><span>Комментарий</span><strong id="i-comment" style="font-weight:normal; color: var(--ink2);"></strong></div>

      <div class="confirm-btns">

      <button class="del-btn" onclick="deleteBooking()">🗑 Удалить бронь</button>

  </div>
</div>

<div id="imgPopup" class="overlay">
  <div class="sheet" style="max-width:90vw; background:transparent; box-shadow:none; border:none;">
    <img src="https://i.postimg.cc/52ZDKDDw/55.png" style="width:100%; border-radius:16px; border: 1px solid var(--border2);" onclick="closeImg()"/>
  </div>
</div>

<div id="loader">
  <div class="loader-box">
    <div class="spin"></div>
    <div style="font-size:14px; color: var(--ink2);">Загрузка...</div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzLxSrpcGOIm34gLlFZS-EYZmG8liMLcUST3MRMoAp56y6XDC2ClapCDB18yiYmdrHZ/exec";
  const ALLOWED = ["vadiksss900@gmail.com","sergey99belov@gmail.com","popadinecvasil3@gmail.com","veronicadiakova04@gmail.com","info.luckystrike.kh@gmail.com","sashavolobuev123890@gmail.com","egorgorbushko@gmail.com","shatrava.o@gmail.com","Craftmax30@gmail.com","bowlingblock.b@gmail.com","lana.arnaut@gmail.com","polosinnikita1224@gmail.com","sofialat1506@gmail.com","ll3991940@gmail.com","ken040888@gmail.com"];
  const LANES = 12, SH = 11, EH = 22;
  const slots = []; for(let h=SH; h<=EH; h++) { slots.push({ label: `${h}:00`, key: h }); if(h<EH) slots.push({ label: `${h}:30`, key: h+0.5 }); }
  const LANE_GROUPS = [0,0,0,1,1,1,2,2,2,2,2,2];
  const GRP_CLASS = ['grp-navy','grp-sage','grp-rust'];
  const ROW_CLASS = ['row-navy','row-sage','row-rust'];
  const LANE_TYPE_MAP = ['navy','sage','rust'];
  
  let bookings = [], tempBookings = [], nextTempId = 1;
  let isDragging = false, dragStartCell = null, dragInterval = null;
  let dragModeEnabled = false;
  const $ = id => document.getElementById(id);
  
  function parseJwt(t){ return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
  function handleCredentialResponse(r){ let d=parseJwt(r.credential); if(ALLOWED.includes(d.email)){ localStorage.setItem("ue",d.email); location.reload(); } else alert("Доступ запрещён"); }
  
  window.onload = ()=>{
    if(localStorage.getItem("ue") && ALLOWED.includes(localStorage.getItem("ue"))){
      $("login").style.display="none";
      $("content").style.display="block";
      init();
    }
  };
  
  function init(){
    let today = new Date().toISOString().split('T')[0];
    $("dateInput").min = today;
    $("dateInput").value = today;
    buildDesktopTable();
    $("dateInput").addEventListener("change", ()=>{ loadFromServer(); clearTempSelections(); });
    loadFromServer();
    const toggleBtn = $("dragToggleBtn");
    toggleBtn.addEventListener("click", () => {
      dragModeEnabled = !dragModeEnabled;
      if(dragModeEnabled) { toggleBtn.textContent = "🎯 Режим перетяжки: ВКЛ"; toggleBtn.classList.add("active"); $("dragModeIndicator").style.display = "block"; } 
      else { toggleBtn.textContent = "🎯 Режим перетяжки: ВЫКЛ"; toggleBtn.classList.remove("active"); $("dragModeIndicator").style.display = "none"; }
      renderAllSliders();
    });
  }
  
  function buildDesktopTable(){
    let headRow = document.querySelector("#dtHead tr");
    slots.forEach((sl,i)=>{ let th=document.createElement("th"); th.className="th-time"; th.dataset.si=i; th.dataset.key=sl.key; th.textContent=sl.label; headRow.appendChild(th); });
    let body=$("dtBody");
    for(let lane=0; lane<LANES; lane++){
      let tr=document.createElement("tr"); tr.className=ROW_CLASS[LANE_GROUPS[lane]]; tr.dataset.lane=lane;
      let lhdr=document.createElement("td"); lhdr.className=`lane-hdr ${GRP_CLASS[LANE_GROUPS[lane]]}`; lhdr.textContent=`№ ${lane+1}`; tr.appendChild(lhdr);
      slots.forEach((sl,si)=>{ let td=document.createElement("td"); td.className="slot"; td.dataset.lane=lane; td.dataset.time=sl.key; td.dataset.si=si; tr.appendChild(td); });
      body.appendChild(tr);
    }
  }
  function getSlotCell(lane, slotIdx){ return $("dtBody")?.rows[lane]?.cells[slotIdx+1]; }
  function fmt(v){ return `${Math.floor(v)}:${v%1===0.5?'30':'00'}`; }
  function updateCellsHighlight(){
    for(let row of $("dtBody").rows) for(let i=1;i<row.cells.length;i++) row.cells[i].classList.remove("booking-pending","booking-confirmed","booking-rejected","temp-highlight");
    for(let b of bookings){ let startIdx=slots.findIndex(s=>s.key===b.start), endIdx=slots.findIndex(s=>s.key===b.end); if(startIdx!==-1 && endIdx!==-1) for(let i=startIdx;i<=endIdx;i++){ let cell=getSlotCell(b.lane,i); if(cell) cell.classList.add(b.confirmed===true?"booking-confirmed":(b.confirmed===false?"booking-rejected":"booking-pending")); } }
    for(let t of tempBookings){ let startIdx=slots.findIndex(s=>s.key===t.start), endIdx=slots.findIndex(s=>s.key===t.end); if(startIdx!==-1 && endIdx!==-1) for(let i=startIdx;i<=endIdx;i++){ let cell=getSlotCell(t.lane,i); if(cell) cell.classList.add("temp-highlight"); } }
  }
  function clearTempSelections(){ tempBookings = []; renderInlineTempCards(); renderAllSliders(); updateCellsHighlight(); }
  function renderInlineTempCards(){ const container=$("inlineTempContainer"); if(!container) return; if(tempBookings.length===0){ container.innerHTML=""; return; } container.innerHTML=`<div class="temp-badge">📋 Выделено броней <span>${tempBookings.length}</span></div>`; tempBookings.forEach((tb,idx)=>{ let card=document.createElement("div"); card.className="temp-card-inline"; card.innerHTML=`<strong>Стол ${tb.lane+1}</strong><span class="temp-time">${fmt(tb.start)}–${fmt(tb.end)}</span><button class="temp-rm" data-idx="${idx}">✕</button>`; card.querySelector(".temp-rm").onclick=(e)=>{ e.stopPropagation(); tempBookings.splice(idx,1); renderInlineTempCards(); renderAllSliders(); updateCellsHighlight(); updatePreviewTimes(); }; container.appendChild(card); }); updatePreviewTimes(); }
  
  function updatePreviewTimes() {
    const previewSpan = document.getElementById("previewTimes");
    if(previewSpan) {
      if(tempBookings.length === 0) previewSpan.innerText = "—";
      else {
        const timesStr = tempBookings.map(tb => `Стол ${tb.lane+1} (${fmt(tb.start)}–${fmt(tb.end)})`).join("; ");
        previewSpan.innerText = timesStr;
      }
    }
  }
  
  function onMouseDown(e){ if(dragModeEnabled) return; let target=e.target; if(target.classList?.contains("slot")){ e.preventDefault(); let lane=parseInt(target.dataset.lane), startIdx=parseInt(target.dataset.si); isDragging=true; dragStartCell={lane,startIdx}; dragInterval={lane,startIdx,endIdx:startIdx}; highlightDragInterval(lane,startIdx,startIdx); } }
  function onMouseMove(e){ if(!dragModeEnabled && isDragging && dragStartCell){ let hoverEl=document.elementsFromPoint(e.clientX,e.clientY).find(el=>el.classList?.contains("slot")); if(hoverEl){ let lane=parseInt(hoverEl.dataset.lane), idx=parseInt(hoverEl.dataset.si); if(lane===dragStartCell.lane){ let newStart=Math.min(dragStartCell.startIdx,idx), newEnd=Math.max(dragStartCell.startIdx,idx); if(dragInterval.startIdx!==newStart||dragInterval.endIdx!==newEnd) dragInterval={lane,startIdx:newStart,endIdx:newEnd}; highlightDragInterval(lane,newStart,newEnd); } } } }
  function highlightDragInterval(lane,startIdx,endIdx){ document.querySelectorAll("#tableDesktop td.slot.drag-over").forEach(td=>td.classList.remove("drag-over")); for(let i=startIdx;i<=endIdx;i++){ let cell=getSlotCell(lane,i); if(cell) cell.classList.add("drag-over"); } }
  function onMouseUp(){ if(!dragModeEnabled && isDragging && dragInterval && dragInterval.startIdx!==dragInterval.endIdx){ let {lane,startIdx,endIdx}=dragInterval; let start=slots[startIdx].key, end=slots[endIdx].key; let hasConflict=bookings.some(b=>b.lane===lane && !(b.end<=start || b.start>=end)); if(hasConflict) alert("Это время уже занято существующей бронью."); else tempBookings.push({id:nextTempId++,lane,start:Math.min(start,end),end:Math.max(start,end)}); renderInlineTempCards(); renderAllSliders(); updateCellsHighlight(); } isDragging=false; dragInterval=null; dragStartCell=null; document.querySelectorAll("#tableDesktop td.slot.drag-over").forEach(td=>td.classList.remove("drag-over")); }
  
  function openBookModal(){ if(tempBookings.length===0){ alert("Сначала выделите брони: зажмите левую кнопку и протяните по ячейкам стола."); return; } $("nameInput").value="";$("phoneInput").value="";$("commentInput").value=""; updatePreviewTimes(); $("bookModal").classList.add("open"); }
  function closeBookModal(){ $("bookModal").classList.remove("open"); }
  async function submitTempBookings(){ let name=$("nameInput").value.trim(); if(!name){alert("Введите имя");return;} if(tempBookings.length===0){closeBookModal();return;} showLoad(); const date=$("dateInput").value; try{ const payload={bookings:tempBookings.map(tb=>({date,tableNumber:tb.lane+1,start:tb.start,end:tb.end,name,phone:$("phoneInput").value.trim(),comment:$("commentInput").value.trim()}))}; await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify(payload)}); clearTempSelections(); await loadFromServer(); closeBookModal(); } catch(e){console.error(e);alert("Ошибка сохранения");} hideLoad(); }
  async function loadFromServer(){ showLoad(); try{ let res=await fetch(GAS_URL+"?action=get&date="+$("dateInput").value); let data=await res.json(); bookings=data.bookings?data.bookings.map(b=>({id:b.id,lane:b.table-1,start:parseFloat(b.start),end:parseFloat(b.end),name:b.name,phone:b.phone,comment:b.comment,confirmed:b.confirmed==="Да"?true:(b.confirmed==="Нет"?false:null)})):[]; renderAllSliders(); updateCellsHighlight(); } catch(e){console.error(e);} hideLoad(); }
  async function saveToServer(booking){ if(!booking.id) return; await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"update",id:booking.id,date:$("dateInput").value,tableNumber:booking.lane+1,start:booking.start,end:booking.end,name:booking.name,phone:booking.phone,comment:booking.comment})}); }
  
  function startMove(booking, e){ if(!dragModeEnabled) return; e.stopPropagation(); const slider=e.currentTarget.closest('.slider'); if(!slider) return; let rows=$("dtBody").rows; let durationCells=slots.findIndex(s=>s.key===booking.end)-slots.findIndex(s=>s.key===booking.start); let startIdxOrig=slots.findIndex(s=>s.key===booking.start); let ghost=document.createElement('div'); ghost.className='ghost-slider'; ghost.style.cssText=slider.style.cssText; $('slidersLayer').appendChild(ghost); slider.classList.add('dragging'); let currentLane=booking.lane, currentStartIdx=startIdxOrig; 
    function getTargetFromCoords(clientX,clientY){ const el=document.elementsFromPoint(clientX,clientY).find(el=>el.classList?.contains('slot')); if(!el) return null; return {lane:parseInt(el.dataset.lane),idx:parseInt(el.dataset.si)}; } 
  }
  
  /* Вспомогательные функции-заглушки для предотвращения ошибок инициализации */
  function showLoad() { $("loader").style.display = "flex"; }
  function hideLoad() { $("loader").style.display = "none"; }
  function openInfoModal() { $("infoModal").classList.add("open"); }
  function closeInfoModal() { $("infoModal").classList.remove("open"); }
  function openImg() { $("imgPopup").classList.add("open"); }
  function closeImg() { $("imgPopup").classList.remove("open"); }
  function renderAllSliders() {}
</script>
</body>
</html>
