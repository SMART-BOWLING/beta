<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>Бильярд · Брони | DayPilot Style</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png"/>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.daypilot.org/daypilot-lite-2025.1.1786.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: rgba(0,0,0,.08);
      --border2: rgba(0,0,0,.14);
      --ink: #1d1d1f;
      --ink3: #6e6e73;
      --blue: #0071e3;
      --green: #34c759;
      --red: #ff3b30;
      --amber: #ff9f0a;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    #login { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 9999; padding: 32px; }
    .login-glyph { font-size: 58px; }
    .login-title { font-size: 32px; font-weight: 700; }
    #content { display: none; min-height: 100vh; }
    .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,.92); backdrop-filter: saturate(180%) blur(20px); border-bottom: .5px solid var(--border2); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; }
    .nav-title { font-size: 20px; font-weight: 600; }
    .nav-btn { display: flex; align-items: center; gap: 8px; background: var(--surface); border: .5px solid var(--border2); border-radius: 980px; padding: 8px 18px; font-family: var(--font); font-size: 14px; font-weight: 500; color: var(--blue); cursor: pointer; }
    .page { width: 100%; margin: 0; padding: 24px 28px 80px; display: flex; flex-direction: column; gap: 24px; }
    .ctrl { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; background: var(--surface); border-radius: 18px; padding: 18px 24px; box-shadow: 0 2px 12px rgba(0,0,0,.04); }
    .date-field { flex: 1; min-width: 220px; max-width: 280px; display: flex; align-items: center; gap: 12px; background: var(--surface); border-radius: 14px; padding: 0 18px; height: 52px; border: .5px solid var(--border2); }
    #dateInput { flex: 1; border: none; background: transparent; font-family: var(--font); font-size: 17px; font-weight: 500; cursor: pointer; }
    .btn-book { height: 52px; padding: 0 32px; background: var(--blue); color: white; border: none; border-radius: 980px; font-family: var(--font); font-size: 17px; font-weight: 600; cursor: pointer; transition: all .15s; box-shadow: 0 2px 6px rgba(0,113,227,.3); }
    .btn-book:hover { background: #0077ed; transform: scale(0.98); }
    .pills { display: flex; gap: 12px; flex-wrap: wrap; }
    .pill { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; color: var(--ink3); background: var(--surface); border: .5px solid var(--border2); border-radius: 980px; padding: 6px 16px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-amber { background: var(--amber); }
    .dot-green { background: var(--green); }
    .dot-red   { background: var(--red); }
    #dp { height: 600px; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); z-index: 2000; justify-content: center; align-items: flex-end; }
    .overlay.open { display: flex; }
    @media(min-width: 560px) { .overlay { align-items: center; padding: 24px; } .sheet { border-radius: 32px !important; max-width: 480px; } }
    .sheet { background: var(--surface); border-radius: 28px 28px 0 0; width: 100%; animation: sheetUp .28s ease; }
    @keyframes sheetUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
    .sheet-handle { width: 40px; height: 5px; background: var(--border2); border-radius: 4px; margin: 14px auto 0; }
    .sheet-head { padding: 20px 24px 8px; display: flex; justify-content: space-between; }
    .sheet-title { font-size: 24px; font-weight: 700; }
    .sheet-x { width: 36px; height: 36px; border-radius: 50%; background: var(--surface); border: .5px solid var(--border2); font-size: 20px; cursor: pointer; }
    .sheet-body { padding: 12px 24px 28px; }
    .f-group { margin-bottom: 20px; }
    .f-label { font-size: 13px; font-weight: 600; color: var(--ink3); margin-bottom: 6px; display: block; }
    .f-input { width: 100%; background: var(--surface); border: .5px solid var(--border2); border-radius: 14px; font-size: 16px; padding: 14px 16px; }
    .f-actions { display: flex; gap: 12px; margin-top: 24px; }
    .f-btn-ok { flex:1; height: 52px; background: var(--blue); color: white; border: none; border-radius: 980px; font-weight: 600; cursor: pointer; }
    .f-btn-cancel { height: 52px; padding: 0 24px; background: var(--surface); border: .5px solid var(--border2); border-radius: 980px; cursor: pointer; }
    .info-list { border-radius: 18px; border: .5px solid var(--border2); margin-bottom: 24px; overflow: hidden; }
    .info-row { display: flex; justify-content: space-between; padding: 14px 18px; border-bottom: .5px solid var(--border2); background: var(--surface); }
    .confirm-btns { display: flex; gap: 12px; margin: 12px 0 16px; }
    .cb-yes, .cb-no { flex:1; height: 48px; border-radius: 980px; font-weight: 600; border: none; cursor: pointer; }
    .cb-yes { background: rgba(52,199,89,.15); color: #1a6630; }
    .cb-no { background: rgba(255,59,48,.1); color: #a81a10; }
    .del-btn { width:100%; height: 48px; background: transparent; border: .5px solid var(--border2); border-radius: 980px; margin-top: 12px; cursor: pointer; }
    #imgPopup { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(14px); z-index:3000; justify-content:center; align-items:center; }
    #imgPopup.open { display:flex; }
    .img-wrap { background:white; border-radius: 32px; padding: 8px; max-width: 92vw; max-height: 88vh; position: relative; }
    .img-wrap img { max-width: 100%; max-height: 84vh; border-radius: 24px; }
    #loader { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index:5000; align-items:center; justify-content:center; }
    .loader-box { background: white; border-radius: 32px; padding: 28px 40px; text-align: center; }
    .spin { width: 38px; height: 38px; border: 3px solid #ddd; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="login">
  <div class="login-glyph">🎱</div>
  <div class="login-title">Бильярд Клуб</div>
  <div class="login-sub">Бронирование столов · перетаскивайте мышкой</div>
  <div id="g_id_onload" data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
  <div class="g_id_signin" data-type="standard"></div>
</div>
<div id="content">
  <nav class="nav"><span class="nav-title">🎱 LUCKY STRIKE · DRAG TO BOOK</span><button class="nav-btn" onclick="openImg()">📐 Схема зала</button></nav>
  <div class="page">
    <div class="ctrl">
      <div class="date-field"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><input type="date" id="dateInput"/></div>
      <button class="btn-book" onclick="openBookModal()">➕ Новая бронь</button>
    </div>
    <div class="pills">
      <div class="pill"><div class="dot dot-amber"></div>Ожидает</div>
      <div class="pill"><div class="dot dot-green"></div>Подтверждено</div>
      <div class="pill"><div class="dot dot-red"></div>Отменено</div>
    </div>
    <div class="grid-card">
      <div id="dp"></div>
    </div>
  </div>
</div>

<div id="bookModal" class="overlay"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-head"><div class="sheet-title">Новая бронь</div><button class="sheet-x" onclick="closeBookModal()">×</button></div><div class="sheet-body"><div class="f-group"><label class="f-label">Имя клиента</label><input class="f-input" id="nameInput" placeholder="Иван Петров"/></div><div class="f-group"><label class="f-label">Телефон</label><input class="f-input" id="phoneInput" placeholder="+380 99 123 45 67"/></div><div class="f-group"><label class="f-label">Комментарий</label><textarea class="f-input" id="commentInput" rows="2" placeholder="Пожелания..."></textarea></div><div class="f-actions"><button class="f-btn-ok" onclick="submitForm()">Подтвердить</button><button class="f-btn-cancel" onclick="closeBookModal()">Отмена</button></div></div></div></div>

<div id="infoModal" class="overlay"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-head"><div class="sheet-title">Детали брони</div><button class="sheet-x" onclick="closeInfoModal()">×</button></div><div class="sheet-body"><div class="info-list"><div class="info-row"><span class="info-lbl">Стол</span><span id="i-table"></span></div><div class="info-row"><span class="info-lbl">Время</span><span id="i-time"></span></div><div class="info-row"><span class="info-lbl">Имя</span><span id="i-name"></span></div><div class="info-row"><span class="info-lbl">Телефон</span><span id="i-phone"></span></div><div class="info-row"><span class="info-lbl">Комментарий</span><span id="i-comment"></span></div><div class="info-row"><span class="info-lbl">Статус</span><span id="i-status"></span></div></div><div class="confirm-btns"><button class="cb-yes" onclick="confirmBooking(true)">✅ Состоялось</button><button class="cb-no" onclick="confirmBooking(false)">❌ Не пришли</button></div><button class="del-btn" onclick="deleteBooking()">🗑 Удалить бронь</button></div></div></div>

<div id="imgPopup"><div class="img-wrap"><img src="https://i.postimg.cc/52ZDKDDw/55.png" alt="Схема столов"/><button style="position:absolute; top:8px; right:8px; background:white; border:none; border-radius:50%; width:32px; height:32px; font-size:20px; cursor:pointer;" onclick="closeImg()">×</button></div></div>
<div id="loader"><div class="loader-box"><div class="spin"></div><div class="loader-txt">Загрузка...</div></div></div>

<script>
  const GAS = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
  const ALLOWED = ["vadiksss900@gmail.com","sergey99belov@gmail.com","popadinecvasil3@gmail.com","veronicadiakova04@gmail.com","info.luckystrike.kh@gmail.com","sashavolobuev123890@gmail.com","egorgorbushko@gmail.com","shatrava.o@gmail.com","Craftmax30@gmail.com","bowlingblock.b@gmail.com","lana.arnaut@gmail.com","polosinnikita1224@gmail.com","sofialat1506@gmail.com","ll3991940@gmail.com","ken040888@gmail.com"];
  
  let dp = null;
  let currentEventId = null;
  let tempSelection = null;

  function parseJwt(t){ return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
  function handleCredentialResponse(r){ let d=parseJwt(r.credential); if(ALLOWED.includes(d.email)){ localStorage.setItem("ue",d.email); location.reload(); } else alert("Доступ запрещён"); }
  
  window.onload = ()=>{ 
    if(localStorage.getItem("ue") && ALLOWED.includes(localStorage.getItem("ue"))){ 
      $("login").style.display="none"; 
      $("content").style.display="block"; 
      initDayPilot(); 
    } 
  };
  
  function $(id) { return document.getElementById(id); }
  
  function fmtTime(date) {
    return date.toString("HH:mm");
  }
  
  function getStatusColor(status) {
    if (status === "Да") return "#34c759";
    if (status === "Нет") return "#ff3b30";
    return "#ff9f0a";
  }
  
  function initDayPilot() {
    dp = new DayPilot.Scheduler("dp", {
      startDate: new DayPilot.Date().firstDayOfMonth(),
      days: 31,
      scale: "Hour",
      timeHeaders: [
        { groupBy: "Day", format: "dddd, MMMM d" },
        { groupBy: "Hour", format: "HH" }
      ],
      treeEnabled: false,
      heightSpec: "Parent100",
      height: 600,
      eventMovingStartEndEnabled: true,
      eventResizingStartEndEnabled: true,
      timeRangeSelectingStartEndEnabled: true,
      rowHeaderColumns: [
        { name: "Table", display: "name" }
      ],
      contextMenu: new DayPilot.Menu({
        items: [
          {
            text: "Редактировать",
            onClick: (args) => {
              editEvent(args.source);
            }
          },
          {
            text: "Удалить",
            onClick: (args) => {
              if (confirm("Удалить бронь?")) {
                deleteEvent(args.source);
              }
            }
          },
          { text: "-" },
          {
            text: "Подтвердить",
            onClick: (args) => {
              confirmEventStatus(args.source, true);
            }
          },
          {
            text: "Отменить",
            onClick: (args) => {
              confirmEventStatus(args.source, false);
            }
          }
        ]
      }),
      bubble: new DayPilot.Bubble({
        onLoad: (args) => {
          const e = args.source;
          const name = e.data.name || "—";
          const phone = e.data.phone || "—";
          const comment = e.data.comment || "—";
          const start = e.start().toString("HH:mm");
          const end = e.end().toString("HH:mm");
          const status = e.data.confirmed === "Да" ? "✅ Подтверждено" : (e.data.confirmed === "Нет" ? "❌ Отменено" : "⏳ Ожидает");
          args.html = `
            <div style="padding: 8px;">
              <div style="font-weight: 700; margin-bottom: 8px;">🎱 Стол ${e.resource()} | ${start}–${end}</div>
              <div>👤 ${escapeHtml(name)}</div>
              <div>📞 ${escapeHtml(phone)}</div>
              <div>📝 ${escapeHtml(comment)}</div>
              <div style="margin-top: 6px;">${status}</div>
            </div>
          `;
        }
      }),
      onEventMoved: async (args) => {
        const event = args.e;
        const newStart = args.newStart;
        const newEnd = args.newEnd;
        const newResource = args.newResource;
        
        showLoad();
        try {
          await fetch(GAS, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
              action: "update",
              id: event.id(),
              start: newStart.toString("HH:mm"),
              end: newEnd.toString("HH:mm"),
              table: newResource
            })
          });
          dp.message({ text: `Бронь перемещена на стол ${newResource}, ${newStart.toString("HH:mm")}–${newEnd.toString("HH:mm")}`, style: "success" });
          await loadEvents();
        } catch(e) {
          dp.message({ text: "Ошибка при перемещении", style: "error" });
        } finally {
          hideLoad();
        }
      },
      onEventResized: async (args) => {
        const event = args.e;
        const newStart = args.newStart;
        const newEnd = args.newEnd;
        
        showLoad();
        try {
          await fetch(GAS, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
              action: "update",
              id: event.id(),
              start: newStart.toString("HH:mm"),
              end: newEnd.toString("HH:mm")
            })
          });
          dp.message({ text: `Время изменено: ${newStart.toString("HH:mm")}–${newEnd.toString("HH:mm")}`, style: "success" });
          await loadEvents();
        } catch(e) {
          dp.message({ text: "Ошибка при изменении времени", style: "error" });
        } finally {
          hideLoad();
        }
      },
      onTimeRangeSelected: async (args) => {
        const start = args.start;
        const end = args.end;
        const resource = args.resource;
        
        tempSelection = { start, end, resource };
        
        $("nameInput").value = "";
        $("phoneInput").value = "";
        $("commentInput").value = "";
        openBookModal();
        
        dp.clearSelection();
      },
      onEventClick: (args) => {
        showEventDetails(args.e);
      },
      onBeforeEventRender: (args) => {
        const status = args.data.confirmed;
        let color = getStatusColor(status);
        args.data.backColor = color + "20";
        args.data.barColor = color;
        args.data.borderColor = color;
        args.data.fontColor = "#1d1d1f";
        
        args.data.areas = [
          {
            right: 4,
            top: "calc(50% - 10px)",
            width: 20,
            height: 20,
            style: "cursor:pointer;",
            backColor: "#ffffffcc",
            borderRadius: "50%",
            fontColor: "#333333",
            text: "⋯",
            action: "ContextMenu",
            toolTip: "Меню"
          }
        ];
      }
    });
    
    dp.init();
    loadResources();
    loadEvents();
    
    $("dateInput").value = new Date().toISOString().split('T')[0];
    $("dateInput").addEventListener("change", () => {
      const newDate = new DayPilot.Date($("dateInput").value);
      dp.update({ startDate: newDate });
      loadEvents();
    });
  }
  
  async function loadResources() {
    const resources = [];
    for (let i = 1; i <= 12; i++) {
      let group = "";
      if (i <= 3) group = "Столы 1–3";
      else if (i <= 6) group = "Столы 4–6";
      else group = "Столы 7–12";
      
      resources.push({
        name: `Стол №${i}`,
        id: i.toString(),
        group: group
      });
    }
    dp.update({ resources: resources });
  }
  
  async function loadEvents() {
    showLoad();
    try {
      const response = await fetch(GAS + "?action=get&date=" + $("dateInput").value);
      const data = await response.json();
      
      const events = [];
      if (data.bookings && data.bookings.length) {
        data.bookings.forEach(booking => {
          const startDate = new DayPilot.Date($("dateInput").value + "T" + booking.start + ":00");
          const endDate = new DayPilot.Date($("dateInput").value + "T" + booking.end + ":00");
          
          events.push({
            id: booking.id,
            resource: booking.table.toString(),
            start: startDate,
            end: endDate,
            text: booking.name,
            name: booking.name,
            phone: booking.phone,
            comment: booking.comment,
            confirmed: booking.confirmed
          });
        });
      }
      
      dp.update({ events: events });
    } catch(e) {
      console.error(e);
      dp.message({ text: "Ошибка загрузки данных", style: "error" });
    } finally {
      hideLoad();
    }
  }
  
  async function submitForm() {
    const name = $("nameInput").value.trim();
    const phone = $("phoneInput").value.trim();
    const comment = $("commentInput").value.trim();
    
    if (!name || !phone) {
      alert("Введите имя и телефон");
      return;
    }
    
    if (!tempSelection) {
      alert("Сначала выделите время в расписании");
      return;
    }
    
    showLoad();
    try {
      await fetch(GAS, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
          bookings: [{
            date: $("dateInput").value,
            tableNumber: parseInt(tempSelection.resource),
            start: tempSelection.start.toString("HH:mm"),
            end: tempSelection.end.toString("HH:mm"),
            name: name,
            phone: phone,
            comment: comment
          }]
        })
      });
      
      dp.message({ text: "✅ Бронь создана!", style: "success" });
      closeBookModal();
      await loadEvents();
      tempSelection = null;
    } catch(e) {
      alert("Ошибка при создании брони");
    } finally {
      hideLoad();
    }
  }
  
  function editEvent(event) {
    showEventDetails(event, true);
  }
  
  async function deleteEvent(event) {
    showLoad();
    try {
      await fetch(GAS, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
          action: "delete",
          id: event.id()
        })
      });
      dp.message({ text: "🗑 Бронь удалена", style: "success" });
      await loadEvents();
    } catch(e) {
      dp.message({ text: "Ошибка при удалении", style: "error" });
    } finally {
      hideLoad();
    }
  }
  
  async function confirmEventStatus(event, confirmed) {
    showLoad();
    try {
      await fetch(GAS, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
          action: "confirm",
          id: event.id(),
          confirmed: confirmed
        })
      });
      dp.message({ text: confirmed ? "✅ Статус: состоялось" : "❌ Статус: не пришли", style: "success" });
      await loadEvents();
    } catch(e) {
      dp.message({ text: "Ошибка при изменении статуса", style: "error" });
    } finally {
      hideLoad();
    }
  }
  
  function showEventDetails(event, isEdit = false) {
    $("i-table").textContent = "№ " + event.resource();
    $("i-time").textContent = `${event.start().toString("HH:mm")} – ${event.end().toString("HH:mm")}`;
    $("i-name").textContent = event.data.name || "—";
    $("i-phone").textContent = event.data.phone || "—";
    $("i-comment").textContent = event.data.comment || "—";
    
    const status = event.data.confirmed;
    let statusHtml = "";
    if (status === "Да") statusHtml = '<span style="background:#e0f7e8; padding:4px 12px; border-radius:40px;">✓ Подтверждено</span>';
    else if (status === "Нет") statusHtml = '<span style="background:#ffe5e2; padding:4px 12px; border-radius:40px;">✕ Не состоялось</span>';
    else statusHtml = '<span style="background:#fff1df; padding:4px 12px; border-radius:40px;">⏳ Ожидает</span>';
    $("i-status").innerHTML = statusHtml;
    
    currentEventId = event.id();
    $("infoModal").classList.add("open");
  }
  
  async function confirmBooking(confirmed) {
    if (!currentEventId) return;
    showLoad();
    try {
      await fetch(GAS, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
          action: "confirm",
          id: currentEventId,
          confirmed: confirmed
        })
      });
      closeInfoModal();
      await loadEvents();
      dp.message({ text: confirmed ? "✅ Статус обновлен: состоялось" : "❌ Статус обновлен: не пришли", style: "success" });
    } catch(e) {
      dp.message({ text: "Ошибка", style: "error" });
    } finally {
      hideLoad();
    }
  }
  
  async function deleteBooking() {
    if (!currentEventId || !confirm("Удалить бронь?")) return;
    showLoad();
    try {
      await fetch(GAS, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
          action: "delete",
          id: currentEventId
        })
      });
      closeInfoModal();
      await loadEvents();
      dp.message({ text: "🗑 Бронь удалена", style: "success" });
    } catch(e) {
      dp.message({ text: "Ошибка", style: "error" });
    } finally {
      hideLoad();
    }
  }
  
  function openBookModal() { $("bookModal").classList.add("open"); }
  function closeBookModal() { $("bookModal").classList.remove("open"); tempSelection = null; }
  function closeInfoModal() { $("infoModal").classList.remove("open"); currentEventId = null; }
  function showLoad(){ $("loader").style.display="flex"; }
  function hideLoad(){ $("loader").style.display="none"; }
  function openImg(){ $("imgPopup").classList.add("open"); }
  function closeImg(){ $("imgPopup").classList.remove("open"); }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  ["bookModal","infoModal"].forEach(id => { 
    $(id).addEventListener("click", e => { 
      if (e.target === $(id)) { 
        $(id).classList.remove("open"); 
        if (id === "infoModal") currentEventId = null;
        if (id === "bookModal") tempSelection = null;
      } 
    }); 
  });
  $("imgPopup").addEventListener("click", e => { if (e.target === $("imgPopup")) closeImg(); });
</script>
</body>
</html>
