<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Бильярд — Бронирование с умными интервалами</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    * {
      box-sizing: border-box;
      user-select: none; /* для более плавного выделения на мобильных, но текст можно выделять */
    }

    :root {
      --cell-size: 52px;
      --main-color: #1e3a8a;
      --highlight-color: #ef4444;
      --highlight-bg: #1a2f40;
      --confirmed-color: #16a34a;
      --rejected-color: #b91c1c;
      --background-color: #1a2f40;
      --card-color: #e0f2fe;
      --border-spacing: 2px;
    }

    @media (max-width: 700px) {
      :root { --cell-size: clamp(40px, 9vw, 58px); }
      body { padding: 4px; }
      .booking-card { font-size: 11px; padding: 8px 36px 8px 10px; white-space: normal; word-break: keep-all; }
      .booking-card .close-btn { transform: translate(40%, -40%); font-size: 16px; padding: 4px 8px; }
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #0f212e;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* таблица */
    .table-container {
      width: 100%;
      max-width: 100vw;
      overflow-x: auto;
      display: flex;
      justify-content: center;
      background: transparent;
      padding: 6px 0;
    }

    .table-wrapper {
      position: relative;
      display: inline-block;
    }

    table {
      border-collapse: separate;
      border-spacing: var(--border-spacing);
      table-layout: fixed;
      background: #1a2f40;
      margin: 0 auto;
    }

    th, td {
      width: var(--cell-size);
      height: var(--cell-size);
      text-align: center;
      vertical-align: middle;
      background: white;
      transition: 0.1s linear;
    }

    td.slot {
      cursor: pointer;
      font-weight: 500;
    }
    td.slot.selected {
      background: #1a2f40 !important;
      color: white;
      font-weight: bold;
      position: relative;
    }
    td.start-time-chosen {
      background: #ef4444 !important;
      color: white;
      box-shadow: inset 0 0 0 2px #ffc107;
    }
    .time-right {
      background: #1a2f40 !important;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.9rem;
    }
    thead th {
      background: #1a2f40 !important;
      color: white;
      font-weight: 600;
    }
    .vertical-line {
      position: relative;
    }
    .vertical-line::before {
      content: "";
      position: absolute;
      left: -1px;
      top: 2px;
      bottom: 2px;
      width: 3px;
      background: #ef4444;
      border-radius: 4px;
    }

    /* маркеры (столы) */
    .column-markers {
      display: flex;
      gap: var(--border-spacing);
      margin-top: 6px;
      justify-content: center;
    }
    .marker {
      height: 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: 0.1s;
      width: var(--cell-size);
    }
    .marker.blue { background: #3b82f6; }
    .marker.green { background: #22c55e; }
    .marker.red { background: #ef4444; }
    .marker.empty { background: transparent; cursor: default; }

    /* карточки выбранных интервалов */
    #cardsContainer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 10px auto 5px;
      padding: 0 8px;
    }
    .booking-card {
      background: #e0f2fe;
      border-radius: 30px;
      padding: 6px 40px 6px 16px;
      font-weight: 600;
      font-size: 13px;
      color: #0c4a6e;
      position: relative;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      backdrop-filter: blur(2px);
      white-space: nowrap;
    }
    .booking-card .close-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: white;
      border: none;
      border-radius: 40px;
      width: 22px;
      height: 22px;
      font-weight: bold;
      cursor: pointer;
      color: #b91c1c;
      line-height: 1;
      font-size: 18px;
      padding: 0;
      transition: 0.2s;
    }

    #controls {
      margin: 8px auto 16px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      max-width: 500px;
    }
    #dateInput, .booking-button {
      padding: 10px 14px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 40px;
      border: none;
      background: white;
      cursor: pointer;
      font-family: inherit;
    }
    .booking-button {
      background: #1a2f40;
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .booking-button:active { transform: scale(0.97); }

    /* модалки */
    #modal, #bookingInfoPopup, .image-popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 1200;
    }
    .modal-card, .popup-content {
      background: white;
      border-radius: 28px;
      padding: 22px;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.3);
    }
    .popup-content h3 { margin-top: 0; text-align: center; }
    .info-row { display: flex; justify-content: space-between; margin: 10px 0; }
    .confirmation-buttons { display: flex; gap: 12px; margin: 20px 0 12px; }
    button { border-radius: 40px; padding: 8px 16px; font-weight: bold; border: none; cursor: pointer; }
    .confirm-yes { background: #16a34a; color: white; }
    .confirm-no { background: #b91c1c; color: white; }
    .delete-btn { width: 100%; background: #334155; color: white; margin-top: 16px; }

    .login-screen {
      position: fixed;
      inset: 0;
      background: #0f212e;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,240,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2100;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #ccc;
      border-top-color: #1a2f40;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .logout-like-tables-btn {
      background: #1a2f40;
      border: 1px solid white;
      color: white;
      border-radius: 40px;
      padding: 4px 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div>
    <div id="g_id_onload" data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
    <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large"></div>
  </div>
</div>

<div id="mainContent" style="display: none;">
  <div class="table-container">
    <div class="table-wrapper">
      <table id="bookingTable">
        <thead>
          <tr><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th><th>11</th><th>12</th>
            <th><button id="logoutBtnHeader" class="logout-like-tables-btn">Выйти</button></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
       </table>
      <div id="columnMarkers" class="column-markers"></div>
    </div>
    <div id="slidersContainer" style="position: relative; pointer-events: none;"></div>
  </div>

  <div id="cardsContainer"></div>
  <div id="controls">
    <input type="date" id="dateInput" />
    <button class="booking-button" onclick="openModal()">ЗАБРОНИРОВАТЬ</button>
  </div>

  <div id="modal"><div class="modal-card"><h3>📋 Данные брони</h3>
    <label>Имя:<br><input id="nameInput" autocomplete="off"></label><br>
    <label>Телефон:<br><input id="phoneInput" type="tel"></label><br>
    <label>Комментарий:<br><textarea id="commentInput" rows="2"></textarea></label>
    <div style="display:flex; justify-content: flex-end; gap:12px; margin-top:18px"><button onclick="submitForm()">✅ Подтвердить</button><button onclick="closeModal()">Отмена</button></div>
  </div></div>

  <div id="bookingInfoPopup"><div class="popup-content"><button class="close-btn" style="float:right; background:transparent; font-size:24px;" onclick="closeBookingInfoPopup()">&times;</button>
    <h3>📌 Бронь</h3><div id="info-details"></div>
    <div class="confirmation-buttons"><button class="confirm-yes" onclick="confirmBooking(true)">✅ Были</button><button class="confirm-no" onclick="confirmBooking(false)">❌ Не были</button></div>
    <button class="delete-btn" onclick="deleteBooking()">🗑 Удалить бронь</button>
  </div></div>

  <div id="imagePopup" class="image-popup"><div class="popup-content"><button onclick="closeImagePopup()" style="float:right;">✖</button><img src="https://i.postimg.cc/52ZDKDDw/55.png" style="max-width:100%; border-radius: 20px;"></div></div>
  <div id="loadingOverlay" class="loading-overlay" style="display: none;"><div class="spinner"></div></div>
</div>

<script>
  // ---------- GOOGLE AUTH + SHEETS ----------
  const AUTH_SPREADSHEET_ID = '1zwi1CInK3NZ8YRAegRMAdjin6XPacVkAkFsjAiqVE0w';
  const API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
  let currentUser = null;
  let gapiReady = false;

  function parseJwt(token) {
    try {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g,'+').replace(/_/g,'/');
      return JSON.parse(atob(base64));
    } catch(e) { return {}; }
  }

  async function initGapi() {
    if(gapiReady) return;
    return new Promise((resolve, reject) => {
      gapi.load('client', {
        callback: async () => {
          try {
            await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] });
            gapiReady = true;
            resolve();
          } catch(e) { reject(e); }
        }, onerror: reject, timeout: 8000
      });
    });
  }

  async function checkEmailInSheet(email) {
    try {
      await initGapi();
      const res = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: AUTH_SPREADSHEET_ID, range: '1!A:C' });
      const rows = res.result.values || [];
      for(let i=1; i<rows.length; i++) {
        if(rows[i][0] && rows[i][0].toLowerCase().trim() === email) return { found: true, name: rows[i][1]?.trim() || email.split('@')[0], role: rows[i][2] || '' };
      }
      return { found: false };
    } catch(e) { return { found: false, error: true }; }
  }

  function saveSession(user) {
    const exp = new Date(); exp.setDate(exp.getDate()+7);
    localStorage.setItem('billiard_user', JSON.stringify(user));
    localStorage.setItem('billiard_exp', exp.toISOString());
  }
  function getStoredUser() {
    const raw = localStorage.getItem('billiard_user');
    const exp = localStorage.getItem('billiard_exp');
    if(!raw || !exp) return null;
    if(new Date(exp) < new Date()) { localStorage.removeItem('billiard_user'); localStorage.removeItem('billiard_exp'); return null; }
    try { return JSON.parse(raw); } catch(e) { return null; }
  }
  function clearSession() { localStorage.removeItem('billiard_user'); localStorage.removeItem('billiard_exp'); }

  window.handleCredentialResponse = async (resp) => {
    const payload = parseJwt(resp.credential);
    const email = payload.email.toLowerCase();
    document.getElementById('loadingOverlay').style.display = 'flex';
    const check = await checkEmailInSheet(email);
    if(check.found) {
      currentUser = { email, name: check.name, picture: payload.picture };
      saveSession(currentUser);
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('loadingOverlay').style.display = 'none';
      initAppAfterLogin();
    } else {
      document.getElementById('loadingOverlay').style.display = 'none';
      alert('❌ Доступ запрещён. Ваш email не найден в списке.');
    }
  };

  function tryAutoLogin() {
    const user = getStoredUser();
    if(user) {
      currentUser = user;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      initAppAfterLogin();
      return true;
    }
    return false;
  }

  function logout() {
    if(confirm('Выйти из учётной записи?')) {
      clearSession();
      currentUser = null;
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
    }
  }

  // ---------- ОСНОВНАЯ ЛОГИКА ВЫБОРА ИНТЕРВАЛОВ (УМНЫЙ ЧАС 12:00-13:00) ----------
  // Важное требование: ползунок визуально останавливается в 12:30, но бронь считается до 13:00 (занимает часовой блок)
  // Реализация: мы работаем с ячейками по 30 минут (11:00, 11:30, 12:00, 12:30 ... 22:00)
  // При выборе интервала: если пользователь выбрал начало "12:00" и конец "12:30" — мы автоматически расширяем до "13:00" (т.е. реальный конец ставим 13:00, визуально выделяем с 12:00 до 13:00)
  // Правило: любой интервал, который завершается в 12:30 (или любой получас) и начат в целый час, мы трактуем как полный час? 
  // Но по описанию: ползунок стоит с 12:00 до 13:00, а клетку 13:00 не занимает. Но у нас в таблице каждая клетка — получас.
  // Чтобы сделать именно так: при выборе начала 12:00 и конца 12:30, мы создаём бронь start=12:00, end=13:00. 
  // При этом визуально в интервалахByLane запоминаем start=12:00, end=13:00. Подсветка на сетке покроет ячейки 12:00 и 12:30, но не затронет 13:00 (т.к. 13:00 это отдельная ячейка).
  // Такое поведение идеально: ползунок «остановился на 12:30», но бронь считается до 13:00.
  
  const startHour = 11, endHour = 22;
  const lanes = 12;
  const timeSlots = [];
  for(let h = startHour; h <= endHour; h++) {
    if(h < endHour) {
      timeSlots.push({ display: `${h}:00`, key: h });
      timeSlots.push({ display: `${h}:30`, key: h + 0.5 });
    } else {
      timeSlots.push({ display: `${h}:00`, key: h });
    }
  }

  // строим таблицу
  const tableBody = document.getElementById("tableBody");
  timeSlots.forEach(slot => {
    const tr = document.createElement("tr");
    for(let l=0; l<lanes; l++) {
      const td = document.createElement("td");
      td.className = "slot";
      td.dataset.lane = l;
      td.dataset.time = slot.key;
      td.dataset.display = slot.display;
      tr.appendChild(td);
    }
    const thTime = document.createElement("th");
    thTime.className = "time-right";
    thTime.textContent = slot.display;
    tr.appendChild(thTime);
    tableBody.appendChild(tr);
  });

  // структура хранения выбранных интервалов (реальные start/end в часах, всегда часы или половинки)
  let intervalsByLane = {}; // { lane: [ {start, end} ] }  start и end в формате float 11.0, 11.5 и тд
  let currentLane = null;
  let pendingStart = null; // начало не подтверждённое

  function clearSelectionDecorations() {
    document.querySelectorAll('td.start-time-chosen').forEach(c => c.classList.remove('start-time-chosen'));
    document.querySelectorAll('thead th.highlight-header').forEach(th => th.classList.remove('highlight-header'));
    document.querySelectorAll('td.vertical-line').forEach(td => td.classList.remove('vertical-line'));
  }

  function highlightLane(lane) {
    const headers = document.querySelectorAll('thead th');
    if(headers[lane]) headers[lane].classList.add('highlight-header');
    document.querySelectorAll(`td.slot[data-lane="${lane}"]`).forEach(td => td.classList.add('vertical-line'));
  }

  // Обновить отображение выбранных интервалов на таблице + карточки
  function refreshSelectionUI() {
    // очищаем класс selected
    document.querySelectorAll('td.selected').forEach(td => td.classList.remove('selected'));
    for(let laneStr in intervalsByLane) {
      intervalsByLane[laneStr].forEach(int => {
        const start = Math.min(int.start, int.end);
        const end = Math.max(int.start, int.end);
        // проходим все ячейки данного столбца и подсвечиваем если время внутри [start, end] ВКЛЮЧИТЕЛЬНО, но не включаем end если end целый час? 
        // Визуально выделяем все ячейки от начала до ячейки перед конечным временем (т.к end=13:00, ячейка 13:00 не подсвечивается, это нужно)
        // Решение: подсветка ячеек где time >= start && time < end (строго меньше end)
        document.querySelectorAll(`td.slot[data-lane="${laneStr}"]`).forEach(cell => {
          const t = parseFloat(cell.dataset.time);
          if(t >= start && t < end) cell.classList.add('selected');
        });
      });
    }
    // карточки
    const cardsDiv = document.getElementById("cardsContainer");
    cardsDiv.innerHTML = "";
    const selDate = document.getElementById("dateInput").value.split('-').reverse().join('.');
    for(let laneStr in intervalsByLane) {
      intervalsByLane[laneStr].forEach((int, idx) => {
        const s = int.start, e = int.end;
        const startStr = `${Math.floor(s)}:${s%1===0.5?'30':'00'}`;
        const endStr = `${Math.floor(e)}:${e%1===0.5?'30':'00'}`;
        const card = document.createElement("div");
        card.className = "booking-card";
        card.textContent = `Стол ${+laneStr+1} | ${selDate} | ${startStr} — ${endStr}`;
        const delBtn = document.createElement("button");
        delBtn.className = "close-btn";
        delBtn.innerHTML = "✕";
        delBtn.onclick = (ev) => { ev.stopPropagation(); intervalsByLane[laneStr].splice(idx,1); refreshSelectionUI(); };
        card.appendChild(delBtn);
        cardsDiv.appendChild(card);
      });
    }
  }

  // Функция добавления интервала с УМНЫМ ПРАВИЛОМ: если конечная ячейка 12:30, а начальная 12:00, то заменяем end на 13:00 (полный час)
  // Правило общее: если пользователь выбрал начало в целый час, а конец через 30 минут (т.е. start целый, end = start+0.5), то продлеваем до start+1
  // иначе стандартное добавление. Но чтобы соответствовать примеру: 12:00-12:30 превращается в 12:00-13:00
  function addIntervalWithSmartRule(lane, startVal, endVal) {
    if(!intervalsByLane[lane]) intervalsByLane[lane] = [];
    let finalStart = startVal;
    let finalEnd = endVal;
    // если start целый час (нет .5) и end = start + 0.5 (ровно через полчаса) -> расширяем до конечного часа
    if(Number.isInteger(finalStart) && (finalEnd === finalStart + 0.5)) {
      finalEnd = finalStart + 1.0;
    }
    // дополнительная проверка, чтобы не выходить за 22:00
    if(finalEnd > 22.0) finalEnd = 22.0;
    if(finalStart >= finalEnd) return false;
    // проверка пересечений с существующими интервалами
    const exists = intervalsByLane[lane].some(iv => (finalStart < iv.end && finalEnd > iv.start));
    if(exists) { alert("Это время уже выбрано или пересекается с другим интервалом на этом столе"); return false; }
    intervalsByLane[lane].push({ start: finalStart, end: finalEnd });
    refreshSelectionUI();
    return true;
  }

  // Обработка кликов
  const tableEl = document.getElementById("bookingTable");
  tableEl.addEventListener("click", (e) => {
    const slot = e.target.closest('.slot');
    if(slot) {
      // клик по ячейке — установка текущего стола, подсветка
      const lane = parseInt(slot.dataset.lane);
      currentLane = lane;
      clearSelectionDecorations();
      highlightLane(currentLane);
      pendingStart = null; // сбрасываем ожидание старта, т.к начинаем новый выбор с ячейки? Но логика выбора времени через time-right
    }
    const timeRight = e.target.closest('.time-right');
    if(timeRight && currentLane !== null) {
      const timeVal = parseFloat(timeRight.textContent.replace(":30",".5").replace(":00",".0"));
      if(pendingStart === null) {
        // выбираем начало
        pendingStart = timeVal;
        clearSelectionDecorations();
        highlightLane(currentLane);
        const startCell = document.querySelector(`td.slot[data-lane="${currentLane}"][data-time="${pendingStart}"]`);
        if(startCell) startCell.classList.add('start-time-chosen');
      } else {
        // завершаем интервал
        let start = pendingStart;
        let end = timeVal;
        if(end <= start) {
          alert("Конец должен быть позже начала");
          pendingStart = null;
          clearSelectionDecorations();
          highlightLane(currentLane);
          return;
        }
        const success = addIntervalWithSmartRule(currentLane, start, end);
        if(success) {
          pendingStart = null;
          currentLane = null;
          clearSelectionDecorations();
        } else {
          pendingStart = null;
          clearSelectionDecorations();
        }
      }
    }
  });
  // двойной клик для удаления интервала
  tableEl.addEventListener("dblclick", (e) => {
    const slot = e.target.closest('.slot');
    if(!slot) return;
    const lane = parseInt(slot.dataset.lane);
    const time = parseFloat(slot.dataset.time);
    if(intervalsByLane[lane]) {
      const idx = intervalsByLane[lane].findIndex(iv => time >= iv.start && time < iv.end);
      if(idx !== -1) {
        intervalsByLane[lane].splice(idx,1);
        refreshSelectionUI();
      }
    }
  });

  function openModal() {
    let hasAny = false;
    for(let l in intervalsByLane) if(intervalsByLane[l].length) { hasAny = true; break; }
    if(!hasAny) { alert("Сначала выберите интервалы на сетке: нажмите на время (справа) для начала, затем ещё раз для конца."); return; }
    document.getElementById("modal").style.display = "flex";
  }
  function closeModal() { document.getElementById("modal").style.display = "none"; }
  window.openModal = openModal;
  window.closeModal = closeModal;

  async function submitForm() {
    const name = document.getElementById("nameInput").value.trim();
    const phone = document.getElementById("phoneInput").value.trim();
    const comment = document.getElementById("commentInput").value.trim();
    const date = document.getElementById("dateInput").value;
    if(!name || !phone) { alert("Имя и телефон обязательны"); return; }
    const bookingsToSend = [];
    for(let lane in intervalsByLane) {
      intervalsByLane[lane].forEach(iv => {
        bookingsToSend.push({
          date, tableNumber: parseInt(lane)+1,
          start: iv.start, end: iv.end,
          name, phone, comment
        });
      });
    }
    if(bookingsToSend.length === 0) return;
    document.getElementById("loadingOverlay").style.display = "flex";
    try {
      await Promise.all(bookingsToSend.map(b => fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ bookings: [b] }) })));
      document.getElementById("loadingOverlay").style.display = "none";
      closeModal();
      intervalsByLane = {};
      pendingStart = null;
      refreshSelectionUI();
      document.getElementById("nameInput").value = "";
      document.getElementById("phoneInput").value = "";
      document.getElementById("commentInput").value = "";
      await loadExistingBookings();
    } catch(err) {
      document.getElementById("loadingOverlay").style.display = "none";
      alert("Ошибка отправки");
    }
  }
  window.submitForm = submitForm;

  let currentBookingObj = null;
  async function showBookingInfo(b) {
    currentBookingObj = b;
    const infoDiv = document.getElementById("info-details");
    infoDiv.innerHTML = `
      <div class="info-row"><strong>Стол:</strong> №${b.table}</div>
      <div class="info-row"><strong>Дата:</strong> ${b.date.split('-').reverse().join('.')}</div>
      <div class="info-row"><strong>Время:</strong> ${Math.floor(b.start)}:${b.start%1===0.5?"30":"00"} — ${Math.floor(b.end)}:${b.end%1===0.5?"30":"00"}</div>
      <div class="info-row"><strong>Имя:</strong> ${b.name}</div>
      <div class="info-row"><strong>Телефон:</strong> ${b.phone}</div>
      <div class="info-row"><strong>Комментарий:</strong> ${b.comment || '—'}</div>
      <div class="info-row"><strong>Посещение:</strong> ${b.confirmed === "Да" ? "✅ состоялось" : (b.confirmed === "Нет" ? "❌ не было" : "не отмечено")}</div>
    `;
    document.getElementById("bookingInfoPopup").style.display = "flex";
  }
  window.closeBookingInfoPopup = () => document.getElementById("bookingInfoPopup").style.display = "none";
  window.confirmBooking = async (confirmed) => {
    if(!currentBookingObj) return;
    document.getElementById("loadingOverlay").style.display = "flex";
    await fetch(GAS_URL, { method:"POST", mode:"no-cors", body: JSON.stringify({ action:"confirm", id: currentBookingObj.id, confirmed }) });
    document.getElementById("loadingOverlay").style.display = "none";
    closeBookingInfoPopup();
    await loadExistingBookings();
  };
  window.deleteBooking = async () => {
    if(!currentBookingObj || !confirm("Удалить бронь?")) return;
    document.getElementById("loadingOverlay").style.display = "flex";
    await fetch(GAS_URL, { method:"POST", mode:"no-cors", body: JSON.stringify({ action:"delete", id: currentBookingObj.id }) });
    document.getElementById("loadingOverlay").style.display = "none";
    closeBookingInfoPopup();
    await loadExistingBookings();
  };

  // загрузка существующих броней (визуальные слайдеры)
  async function loadExistingBookings() {
    const date = document.getElementById("dateInput").value;
    if(!date) return;
    const slidersContainer = document.getElementById("slidersContainer");
    slidersContainer.innerHTML = "";
    try {
      document.getElementById("loadingOverlay").style.display = "flex";
      const res = await fetch(GAS_URL + "?action=get&date=" + date);
      const data = await res.json();
      document.getElementById("loadingOverlay").style.display = "none";
      if(!data.bookings) return;
      const containerRect = document.querySelector(".table-wrapper").getBoundingClientRect();
      const timeCells = Array.from(document.querySelectorAll('th.time-right'));
      const tableCells = Array.from(document.querySelectorAll('td.slot'));
      for(let b of data.bookings) {
        if(b.date !== date) continue;
        const laneIdx = b.table-1;
        const startKey = parseFloat(b.start);
        const endKey = parseFloat(b.end);
        const startIdx = timeSlots.findIndex(ts => ts.key === startKey);
        let endIdx = timeSlots.findIndex(ts => ts.key === endKey);
        if(endIdx === -1) endIdx = timeSlots.length-1;
        const startCell = tableCells.find(cell => parseInt(cell.dataset.lane) === laneIdx && parseFloat(cell.dataset.time) === startKey);
        if(!startCell) continue;
        const startRect = startCell.getBoundingClientRect();
        const topOffset = timeCells[startIdx]?.offsetTop || 0;
        const bottomCell = timeCells[endIdx];
        const height = (bottomCell ? (bottomCell.offsetTop + bottomCell.offsetHeight) : timeCells[timeCells.length-1].offsetTop + 40) - topOffset;
        const left = startRect.left - containerRect.left;
        const slider = document.createElement("div");
        slider.className = "existing-slider";
        slider.style.position = "absolute";
        slider.style.background = b.confirmed === "Да" ? "#16a34a" : (b.confirmed === "Нет" ? "#b91c1c" : "#1a2f40");
        slider.style.left = `${left}px`;
        slider.style.top = `${topOffset}px`;
        slider.style.width = `${startRect.width}px`;
        slider.style.height = `${height}px`;
        slider.style.borderRadius = "8px";
        slider.style.opacity = "0.8";
        slider.style.pointerEvents = "auto";
        slider.style.cursor = "pointer";
        slider.style.border = "1px solid white";
        slider.addEventListener('click', (e) => { e.stopPropagation(); showBookingInfo(b); });
        slidersContainer.appendChild(slider);
      }
    } catch(e) { document.getElementById("loadingOverlay").style.display = "none"; }
  }

  function updateMarkersAndButtons() {
    const headers = document.querySelectorAll('thead th');
    const markers = document.querySelectorAll('.marker');
    for(let i=0;i<markers.length-1 && i<headers.length;i++) markers[i].style.width = headers[i].offsetWidth + 'px';
    const logoutBtn = document.getElementById("logoutBtnHeader");
    if(logoutBtn) logoutBtn.onclick = logout;
  }

  function initAppAfterLogin() {
    refreshSelectionUI();
    loadExistingBookings();
    updateMarkersAndButtons();
    window.addEventListener('resize', () => { updateMarkersAndButtons(); loadExistingBookings(); });
    document.getElementById("dateInput").addEventListener('change', () => { loadExistingBookings(); intervalsByLane = {}; pendingStart = null; refreshSelectionUI(); });
    const today = new Date().toISOString().split('T')[0];
    const datePicker = document.getElementById("dateInput");
    datePicker.min = today;
    if(!datePicker.value) datePicker.value = today;
  }

  // column markers + клик для картинки
  const markerContainer = document.getElementById("columnMarkers");
  for(let i=0;i<lanes;i++) {
    const marker = document.createElement("div");
    marker.className = "marker";
    if(i<3 || (i>=4 && i<6)) marker.classList.add("blue");
    else if(i===3) marker.classList.add("green");
    else marker.classList.add("red");
    marker.onclick = () => document.getElementById("imagePopup").style.display = "flex";
    markerContainer.appendChild(marker);
  }
  const dummy = document.createElement("div"); dummy.className = "marker empty"; markerContainer.appendChild(dummy);
  window.closeImagePopup = () => document.getElementById("imagePopup").style.display = "none";

  if(!tryAutoLogin()) document.getElementById("loginScreen").style.display = "flex";
</script>
</body>
</html>
