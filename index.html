<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Lucky Strike · Бильярд Бронирование</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #f2f2f2;
      --surface-primary: #ffffff;
      --surface-glass: rgba(255, 255, 255, 0.85);
      --surface-secondary: #f8f8f8;
      --border-subtle: #e5e5e5;
      --border-strong: #cccccc;
      --label-dark: #1e1e1e;
      --label-secondary: #4a4a4a;
      --label-tertiary: #7c7c7c;
      --label-quaternary: #9a9a9a;
      --accent-blue: #3b6e8f;
      --accent-blue-hover: #2c5a77;
      --accent-blue-dim: rgba(59, 110, 143, 0.12);
      --accent-green: #4f6b4e;
      --accent-green-dim: rgba(79, 107, 78, 0.12);
      --accent-red: #b33f3f;
      --accent-amber: #b87c2e;
      --radius-lg: 28px;
      --radius-md: 20px;
      --radius-sm: 6px;       /* минимальное закругление для ползунков */
      --radius-pill: 980px;
      --font-system: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
      --cell-height: 58px;
      --cell-width: 74px;
      --lane-width: 104px;
    }

    body {
      font-family: var(--font-system);
      background: var(--bg);
      color: var(--label-dark);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      font-weight: 450;
      letter-spacing: -0.01em;
    }

    /* Login Panel */
    #login {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 9999;
      padding: 32px;
      backdrop-filter: blur(8px);
    }
    .login-glyph {
      font-size: 52px;
      font-weight: 500;
      letter-spacing: -0.5px;
      color: var(--label-secondary);
    }
    .login-title {
      font-size: 34px;
      font-weight: 600;
      letter-spacing: -0.7px;
      color: var(--label-dark);
    }
    .login-sub {
      font-size: 16px;
      color: var(--label-tertiary);
      font-weight: 480;
    }
    .login-sep {
      width: 32px;
      height: 2px;
      background: var(--border-strong);
      border-radius: 2px;
    }

    #content {
      display: none;
      min-height: 100vh;
    }

    /* Навигация */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(28px) saturate(180%);
      border-bottom: 0.5px solid var(--border-subtle);
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px;
    }
    .nav-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.4px;
      color: var(--label-dark);
    }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.92);
      border: 0.5px solid var(--border-strong);
      border-radius: 980px;
      padding: 7px 24px;
      font-family: var(--font-system);
      font-size: 14px;
      font-weight: 510;
      color: var(--accent-blue);
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(6px);
    }
    .nav-btn:hover {
      background: var(--accent-blue-dim);
      transform: scale(0.97);
    }

    .page {
      width: 100%;
      margin: 0;
      padding: 28px 36px 80px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .ctrl {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--surface-primary);
      border-radius: var(--radius-lg);
      padding: 16px 28px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.02);
      border: 0.5px solid var(--border-subtle);
    }
    .date-field {
      flex: 1;
      min-width: 240px;
      max-width: 320px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface-secondary);
      border-radius: var(--radius-md);
      padding: 0 20px;
      height: 54px;
      border: 0.5px solid var(--border-strong);
      transition: all 0.18s;
    }
    .date-field:focus-within {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px var(--accent-blue-dim);
    }
    #dateInput {
      flex: 1;
      border: none;
      background: transparent;
      font-family: var(--font-system);
      font-size: 17px;
      font-weight: 500;
      color: var(--label-dark);
      cursor: pointer;
    }
    .btn-book {
      height: 54px;
      padding: 0 38px;
      background: var(--accent-blue);
      color: white;
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font-system);
      font-size: 17px;
      font-weight: 590;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .btn-book:hover {
      background: var(--accent-blue-hover);
      transform: scale(0.98);
    }
    
    .btn-drag-toggle {
      height: 54px;
      padding: 0 32px;
      background: var(--surface-secondary);
      color: var(--label-secondary);
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-pill);
      font-family: var(--font-system);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-drag-toggle.active {
      background: var(--accent-blue);
      color: white;
      border-color: var(--accent-blue);
    }
    .btn-drag-toggle.active:hover {
      background: var(--accent-blue-hover);
      transform: scale(0.98);
    }
    .btn-drag-toggle:hover:not(.active) {
      background: var(--accent-blue-dim);
      color: var(--accent-blue);
      border-color: var(--accent-blue);
    }

    .inline-temp-cards {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-left: auto;
    }
    .temp-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(59, 110, 143, 0.08);
      border-radius: 40px;
      padding: 4px 14px 4px 20px;
      font-size: 13px;
      font-weight: 510;
      color: var(--accent-blue);
      border: 0.5px solid rgba(59, 110, 143, 0.2);
      white-space: nowrap;
    }
    .temp-card-inline {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.9);
      border: 0.5px solid var(--border-subtle);
      border-radius: 44px;
      padding: 6px 16px 6px 22px;
      font-size: 13px;
    }
    .temp-card-inline strong {
      font-size: 14px;
      font-weight: 590;
      margin-right: 4px;
      color: var(--label-dark);
    }
    .temp-card-inline .temp-time {
      font-family: monospace;
      font-size: 12px;
      font-weight: 500;
      background: #efefef;
      padding: 4px 12px;
      border-radius: 34px;
      color: var(--label-secondary);
    }
    .temp-card-inline .temp-rm {
      width: 28px;
      height: 28px;
      border-radius: 30px;
      background: #f2eaea;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #b33f3f;
      transition: all 0.1s;
    }
    .temp-card-inline .temp-rm:hover {
      background: #e6d4d4;
      transform: scale(0.94);
    }

    .grid-card {
      background: var(--surface-primary);
      border-radius: 36px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.03);
      overflow: hidden;
      border: 0.5px solid var(--border-subtle);
    }
    .grid-scroll {
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      position: relative;
    }

    #tableDesktop {
      display: table;
      border-collapse: collapse;
      table-layout: fixed;
      width: 100%;
      min-width: 1150px;
      font-size: 14px;
    }
    #tableDesktop thead th {
      height: var(--cell-height);
      font-size: 13px;
      font-weight: 590;
      color: var(--label-tertiary);
      border-bottom: 0.5px solid var(--border-strong);
      border-right: 0.5px solid var(--border-subtle);
      text-align: center;
      vertical-align: middle;
      background: #fafafa;
    }
    #tableDesktop thead th.corner {
      width: var(--lane-width);
      min-width: var(--lane-width);
      background: #efefef;
      position: sticky;
      left: 0;
      z-index: 5;
      font-size: 15px;
      font-weight: 620;
      color: var(--label-dark);
      border-right: 0.5px solid var(--border-strong);
    }
    #tableDesktop thead th.th-time {
      cursor: pointer;
      width: var(--cell-width);
      min-width: var(--cell-width);
      transition: all 0.12s;
    }
    #tableDesktop thead th.th-time:hover {
      background: #eae6e0;
      color: var(--accent-amber);
    }

    #tableDesktop tbody tr { height: var(--cell-height); }
    #tableDesktop tbody td.lane-hdr {
      width: var(--lane-width);
      min-width: var(--lane-width);
      font-size: 18px;
      font-weight: 620;
      border-bottom: 0.5px solid var(--border-strong);
      border-right: 0.5px solid var(--border-strong);
      text-align: center;
      position: sticky;
      left: 0;
      z-index: 2;
      letter-spacing: -0.3px;
    }
    
    .lane-hdr.group-blue { background: #2c5f7a; color: white; }
    .lane-hdr.group-green { background: #4f6b4e; color: white; }
    .lane-hdr.group-red { background: #9b4b4b; color: white; }
    
    #tableDesktop tbody td.slot {
      background: #ffffff;
      border-bottom: 0.5px solid var(--border-subtle);
      border-right: 0.5px solid var(--border-subtle);
      transition: background 0.1s ease;
    }
    #tableDesktop tbody tr:hover td.slot {
      background: #f6f6f6;
    }

    #tableDesktop tbody td.slot.booking-pending { background: #faf2e0 !important; }
    #tableDesktop tbody td.slot.booking-confirmed { background: #e3efe2 !important; }
    #tableDesktop tbody td.slot.booking-rejected { background: #f2e0e0 !important; }
    #tableDesktop tbody td.slot.temp-highlight { background: #dde9f0 !important; border: 1px solid #3b6e8f !important; }
    #tableDesktop tbody td.slot.drag-over { background: #e2dfcf !important; }

    @media (max-width: 780px) {
      .page { padding: 18px 16px 70px; gap: 20px; }
      .ctrl { flex-direction: column; align-items: stretch; }
      .inline-temp-cards { margin-left: 0; justify-content: flex-start; }
      .btn-book, .btn-drag-toggle { width: 100%; }
    }

    #slidersLayer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 20;
    }
    
    /* ПОЛЗУНКИ: прямоугольные с минимальным закруглением (6px) + цветная точка статуса */
    .slider {
      position: absolute;
      border-radius: var(--radius-sm);   /* минимальное закругление */
      pointer-events: auto;
      cursor: default;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(12px);
      border: 0.5px solid rgba(255,255,255,0.2);
      will-change: left, top;
      transition: all 0.12s ease;
      font-weight: 510;
      letter-spacing: -0.2px;
      font-family: var(--font-system);
      overflow: hidden;
      white-space: nowrap;
      position: relative;
    }
    
    /* Цвета фона по группам */
    .slider[data-lane-type="blue"] { background: rgba(44, 95, 122, 0.92); color: white; }
    .slider[data-lane-type="green"] { background: rgba(79, 107, 78, 0.92); color: white; }
    .slider[data-lane-type="red"] { background: rgba(155, 75, 75, 0.92); color: white; }
    
    .slider.pending[data-lane-type="blue"] { background: rgba(44, 95, 122, 0.92); }
    .slider.pending[data-lane-type="green"] { background: rgba(79, 107, 78, 0.92); }
    .slider.pending[data-lane-type="red"] { background: rgba(155, 75, 75, 0.92); }
    
    .slider.confirmed[data-lane-type="blue"] { background: #2c5f7a; }
    .slider.confirmed[data-lane-type="green"] { background: #4f6b4e; }
    .slider.confirmed[data-lane-type="red"] { background: #9b4b4b; }
    
    .slider.rejected[data-lane-type="blue"] { background: rgba(44, 95, 122, 0.55); opacity: 0.85; }
    .slider.rejected[data-lane-type="green"] { background: rgba(79, 107, 78, 0.55); }
    .slider.rejected[data-lane-type="red"] { background: rgba(155, 75, 75, 0.55); }
    
    .slider.temp[data-lane-type="blue"] { background: rgba(44, 95, 122, 0.75); border: 1px solid #c9b16b; }
    .slider.temp[data-lane-type="green"] { background: rgba(79, 107, 78, 0.75); border: 1px solid #c9b16b; }
    .slider.temp[data-lane-type="red"] { background: rgba(155, 75, 75, 0.75); border: 1px solid #c9b16b; }
    
    /* ЦВЕТНАЯ ТОЧКА СТАТУСА ПОСЕТИТЕЛЯ (круг в левом верхнем углу ползунка) */
    .status-dot {
      position: absolute;
      top: 6px;
      left: 8px;
      width: 10px;
      height: 10px;
      border-radius: 10px;
      background-color: #ccc;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
      transition: background 0.1s;
    }
    .slider.confirmed .status-dot { background-color: #78b83e; box-shadow: 0 0 0 1px #fff6; }  /* зеленый — пришел */
    .slider.rejected .status-dot { background-color: #d9534f; }  /* красный — не пришел */
    .slider.pending .status-dot { background-color: #f0ad4e; }   /* янтарный — ожидание */
    .slider.temp .status-dot { background-color: #aaa; opacity: 0.6; }
    
    /* КНОПКИ ПО КРАЯМ: левая и правая, видимые, для открытия информации */
    .info-edge-left, .info-edge-right {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 28px;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 14px;
      font-weight: 700;
      color: white;
      border-radius: 0;
      opacity: 0.75;
      z-index: 15;
      pointer-events: auto;
    }
    .info-edge-left:hover, .info-edge-right:hover {
      background: rgba(0,0,0,0.45);
      opacity: 1;
      width: 32px;
    }
    .info-edge-left {
      left: 0;
      border-top-left-radius: var(--radius-sm);
      border-bottom-left-radius: var(--radius-sm);
      border-right: 0.5px solid rgba(255,255,255,0.2);
    }
    .info-edge-right {
      right: 0;
      border-top-right-radius: var(--radius-sm);
      border-bottom-right-radius: var(--radius-sm);
      border-left: 0.5px solid rgba(255,255,255,0.2);
    }
    /* для временных броней тоже кнопки */
    .slider.temp .info-edge-left, .slider.temp .info-edge-right {
      background: rgba(0,0,0,0.25);
    }
    
    .slider:not(.drag-mode-enabled) .info-edge-left,
    .slider:not(.drag-mode-enabled) .info-edge-right {
      pointer-events: auto;
    }
    /* В режиме перетяжки слайдеров — кнопки скрываем или делаем прозрачнее (чтобы не мешали) */
    .drag-mode-enabled .info-edge-left,
    .drag-mode-enabled .info-edge-right {
      pointer-events: none;
      opacity: 0.3;
    }
    
    .sl-name {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-left: 18px; /* отступ от точки статуса */
    }
    .sl-time { 
      font-size: 10px; 
      opacity: 0.85; 
      white-space: nowrap; 
      font-weight: 500;
      padding-left: 18px;
    }
    
    .drag-handle {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      cursor: default;
      background: transparent;
      z-index: 2;
      pointer-events: auto;
    }
    .drag-mode-enabled .drag-handle { cursor: grab; }
    .drag-mode-enabled .drag-handle:active { cursor: grabbing; }
    
    .slider.dragging { opacity: 0.75 !important; z-index: 100 !important; pointer-events: none !important; transition: none !important; }
    .ghost-slider { position: absolute; border-radius: var(--radius-sm); pointer-events: none; z-index: 25; opacity: 0.5; background: #9eb6c2; border: 1.8px solid #3b6e8f; }
    .drag-mode-indicator {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #2c2c2ecc;
      backdrop-filter: blur(20px);
      color: white;
      padding: 10px 26px;
      border-radius: 60px;
      font-size: 14px;
      font-weight: 590;
      z-index: 1000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      border: 0.5px solid rgba(255,255,255,0.2);
      pointer-events: none;
    }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); z-index: 2000; justify-content: center; align-items: center; }
    .overlay.open { display: flex; }
    .sheet { background: rgba(255,255,255,0.98); border-radius: 52px; width: 100%; max-width: 540px; box-shadow: 0 32px 56px rgba(0,0,0,0.2); backdrop-filter: blur(2px); border: 0.5px solid rgba(255,255,255,0.6); }
    .sheet-head { padding: 24px 28px 12px; display: flex; justify-content: space-between; align-items: center; }
    .sheet-title { font-size: 28px; font-weight: 640; letter-spacing: -0.6px; color: var(--label-dark); }
    .sheet-x { width: 42px; height: 42px; border-radius: 50%; background: #f2f2f5; border: none; font-size: 24px; cursor: pointer; transition: 0.1s; }
    .sheet-x:hover { background: #e5e5ea; transform: scale(0.96); }
    .sheet-body { padding: 16px 28px 34px; }
    .f-group { margin-bottom: 24px; }
    .f-label { font-size: 13px; font-weight: 590; color: var(--label-tertiary); margin-bottom: 8px; display: block; }
    .f-input { width: 100%; background: var(--surface-secondary); border: 0.5px solid var(--border-strong); border-radius: 20px; font-size: 16px; padding: 14px 20px; transition: 0.1s; font-family: var(--font-system); }
    .f-input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px var(--accent-blue-dim); }
    .f-actions { display: flex; gap: 16px; margin-top: 28px; }
    .f-btn-ok { flex:1; height: 56px; background: var(--accent-blue); color: white; border: none; border-radius: 980px; font-weight: 600; font-size: 17px; cursor: pointer; }
    .f-btn-cancel { flex:1; height: 56px; background: #f2f2f5; border: none; border-radius: 980px; font-weight: 500; cursor: pointer; }
    .info-row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 0.5px solid var(--border-subtle); font-size: 16px; }
    .del-btn { width:100%; height: 54px; background: #f2eaea; border: none; border-radius: 980px; margin-top: 28px; cursor: pointer; font-weight: 600; color: #b33f3f; transition: 0.1s; }
    .confirm-btns { display: flex; gap: 16px; margin: 20px 0 8px; }
    .cb-yes, .cb-no { flex:1; height: 54px; border-radius: 980px; font-weight: 600; border: none; cursor: pointer; }
    .cb-yes { background: rgba(79, 107, 78, 0.12); color: #3c5a3b; }
    .cb-no { background: rgba(179, 63, 63, 0.1); color: #a33a3a; }
    #loader { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); backdrop-filter: blur(20px); z-index:5000; align-items:center; justify-content:center; }
    .loader-box { background: rgba(255,255,255,0.96); border-radius: 56px; padding: 32px 48px; text-align: center; }
    .spin { width: 44px; height: 44px; border: 3px solid #e9e9ef; border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 18px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="login">
  <div class="login-glyph">LUCKY STRIKE</div>
  <div class="login-title">Бильярдное ателье</div>
  <div class="login-sub">Бронирование столов</div>
  <div class="login-sep"></div>
  <div id="g_id_onload"
    data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com"
    data-callback="handleCredentialResponse"
    data-auto_prompt="false"></div>
  <div class="g_id_signin" data-type="standard"></div>
</div>

<div id="content">
  <nav class="nav">
    <span class="nav-title">LUCKY STRIKE · Бильярд</span>
    <button class="nav-btn" onclick="openImg()">План зала</button>
  </nav>
  <div class="page">
    <div class="ctrl">
      <div class="date-field"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><input type="date" id="dateInput"/></div>
      <button class="btn-book" onclick="openBookModal()">Новая бронь</button>
      <button id="dragToggleBtn" class="btn-drag-toggle">Режим перетяжки: ВЫКЛ</button>
      <div id="inlineTempContainer" class="inline-temp-cards"></div>
    </div>
    <div class="grid-card"><div class="grid-scroll" id="gridScroll"><table id="tableDesktop"><thead id="dtHead"><tr><th class="corner">СТОЛ</th></tr></thead><tbody id="dtBody"></tbody></table><div id="slidersLayer"></div></div></div>
  </div>
</div>
<div id="dragModeIndicator" class="drag-mode-indicator" style="display: none;">Режим перетяжки АКТИВЕН</div>

<div id="bookModal" class="overlay"><div class="sheet"><div class="sheet-head"><div class="sheet-title">Подтверждение брони</div><button class="sheet-x" onclick="closeBookModal()">×</button></div><div class="sheet-body"><div id="bookingTimePreview" style="background:#f0f2f5; border-radius:24px; padding:14px 18px; margin-bottom:24px; font-size:15px; font-weight:500;"><span>Выбранное время: </span><span id="previewTimes">—</span></div><div class="f-group"><label class="f-label">Имя *</label><input class="f-input" id="nameInput" placeholder="Иван Петров"/></div><div class="f-group"><label class="f-label">Телефон</label><input class="f-input" id="phoneInput" placeholder="+7 123 456-78-90"/></div><div class="f-group"><label class="f-label">Комментарий</label><textarea class="f-input" id="commentInput" rows="2" placeholder="Пожелания / особые условия"></textarea></div><div class="f-actions"><button class="f-btn-ok" onclick="submitTempBookings()">Сохранить</button><button class="f-btn-cancel" onclick="closeBookModal()">Отмена</button></div></div></div></div>

<div id="infoModal" class="overlay"><div class="sheet"><div class="sheet-head"><div class="sheet-title">Детали брони</div><button class="sheet-x" onclick="closeInfoModal()">×</button></div><div class="sheet-body"><div class="info-list"><div class="info-row"><span>Стол</span><strong id="i-table"></strong></div><div class="info-row"><span>Время</span><strong id="i-time"></strong></div><div class="info-row"><span>Имя</span><strong id="i-name"></strong></div><div class="info-row"><span>Телефон</span><strong id="i-phone"></strong></div><div class="info-row"><span>Комментарий</span><strong id="i-comment" style="font-weight:normal;"></strong></div></div><div class="confirm-btns"><button class="cb-yes" onclick="confirmBooking(true)">Пришла бронь</button><button class="cb-no" onclick="confirmBooking(false)">Не пришли</button></div><button class="del-btn" onclick="deleteBooking()">Удалить бронь</button></div></div></div>
<div id="imgPopup" class="overlay"><div class="sheet" style="max-width:90vw; background:transparent; box-shadow:none;"><img src="https://i.postimg.cc/52ZDKDDw/55.png" style="width:100%; border-radius:48px;" onclick="closeImg()"/></div></div>
<div id="loader"><div class="loader-box"><div class="spin"></div><div>Загрузка...</div></div></div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzLxSrpcGOIm34gLlFZS-EYZmG8liMLcUST3MRMoAp56y6XDC2ClapCDB18yiYmdrHZ/exec";
  const ALLOWED = ["vadiksss900@gmail.com","sergey99belov@gmail.com","popadinecvasil3@gmail.com","veronicadiakova04@gmail.com","info.luckystrike.kh@gmail.com","sashavolobuev123890@gmail.com","egorgorbushko@gmail.com","shatrava.o@gmail.com","Craftmax30@gmail.com","bowlingblock.b@gmail.com","lana.arnaut@gmail.com","polosinnikita1224@gmail.com","sofialat1506@gmail.com","ll3991940@gmail.com","ken040888@gmail.com"];
  const LANES = 12, SH = 11, EH = 22;
  const slots = []; for(let h=SH; h<=EH; h++) { slots.push({ label: `${h}:00`, key: h }); if(h<EH) slots.push({ label: `${h}:30`, key: h+0.5 }); }
  
  function getGroupIndex(lane) { const num = lane + 1; if (num >= 1 && num <= 3) return 0; if (num === 4) return 1; if (num >= 5 && num <= 6) return 0; return 2; }
  const GRP_CLASS = ['group-blue', 'group-green', 'group-red'];
  const LANE_TYPE_MAP = ['blue', 'green', 'red'];
  
  let bookings = [], tempBookings = [], nextTempId = 1;
  let isDragging = false, dragStartCell = null, dragInterval = null;
  let dragModeEnabled = false;
  const $ = id => document.getElementById(id);
  
  function parseJwt(t){ return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
  function handleCredentialResponse(r){ let d=parseJwt(r.credential); if(ALLOWED.includes(d.email)){ localStorage.setItem("ue",d.email); location.reload(); } else alert("Доступ запрещён"); }
  
  window.onload = ()=>{
    if(localStorage.getItem("ue") && ALLOWED.includes(localStorage.getItem("ue"))){ $("login").style.display="none"; $("content").style.display="block"; init(); }
  };
  
  function init(){
    let today = new Date().toISOString().split('T')[0];
    $("dateInput").min = today; $("dateInput").value = today;
    buildDesktopTable();
    $("dateInput").addEventListener("change", ()=>{ loadFromServer(); clearTempSelections(); });
    loadFromServer();
    const toggleBtn = $("dragToggleBtn");
    toggleBtn.addEventListener("click", () => {
      dragModeEnabled = !dragModeEnabled;
      if(dragModeEnabled) { toggleBtn.textContent = "Режим перетяжки: ВКЛ"; toggleBtn.classList.add("active"); $("dragModeIndicator").style.display = "block"; } 
      else { toggleBtn.textContent = "Режим перетяжки: ВЫКЛ"; toggleBtn.classList.remove("active"); $("dragModeIndicator").style.display = "none"; }
      renderAllSliders();
    });
  }
  
  function buildDesktopTable(){
    let headRow = document.querySelector("#dtHead tr");
    slots.forEach((sl,i)=>{ let th=document.createElement("th"); th.className="th-time"; th.dataset.si=i; th.dataset.key=sl.key; th.textContent=sl.label; headRow.appendChild(th); });
    let body=$("dtBody");
    for(let lane=0; lane<LANES; lane++){
      let tr=document.createElement("tr"); tr.dataset.lane=lane;
      let group = getGroupIndex(lane);
      let lhdr=document.createElement("td"); lhdr.className=`lane-hdr ${GRP_CLASS[group]}`; lhdr.textContent=`№ ${lane+1}`; tr.appendChild(lhdr);
      slots.forEach((sl,si)=>{ let td=document.createElement("td"); td.className="slot"; td.dataset.lane=lane; td.dataset.time=sl.key; td.dataset.si=si; tr.appendChild(td); });
      body.appendChild(tr);
    }
  }
  function getSlotCell(lane, slotIdx){ return $("dtBody")?.rows[lane]?.cells[slotIdx+1]; }
  function fmt(v){ return `${Math.floor(v)}:${v%1===0.5?'30':'00'}`; }
  function updateCellsHighlight(){
    for(let row of $("dtBody").rows) for(let i=1;i<row.cells.length;i++) row.cells[i].classList.remove("booking-pending","booking-confirmed","booking-rejected","temp-highlight");
    for(let b of bookings){ let startIdx=slots.findIndex(s=>s.key===b.start), endIdx=slots.findIndex(s=>s.key===b.end); if(startIdx!==-1 && endIdx!==-1) for(let i=startIdx;i<=endIdx;i++){ let cell=getSlotCell(b.lane,i); if(cell) cell.classList.add(b.confirmed===true?"booking-confirmed":(b.confirmed===false?"booking-rejected":"booking-pending")); } }
    for(let t of tempBookings){ let startIdx=slots.findIndex(s=>s.key===t.start), endIdx=slots.findIndex(s=>s.key===t.end); if(startIdx!==-1 && endIdx!==-1) for(let i=startIdx;i<=endIdx;i++){ let cell=getSlotCell(t.lane,i); if(cell) cell.classList.add("temp-highlight"); } }
  }
  function clearTempSelections(){ tempBookings = []; renderInlineTempCards(); renderAllSliders(); updateCellsHighlight(); }
  function renderInlineTempCards(){ const container=$("inlineTempContainer"); if(!container) return; if(tempBookings.length===0){ container.innerHTML=""; return; } container.innerHTML=""; tempBookings.forEach((tb,idx)=>{ let card=document.createElement("div"); card.className="temp-card-inline"; card.innerHTML=`<strong>Стол ${tb.lane+1}</strong><span class="temp-time">${fmt(tb.start)}–${fmt(tb.end)}</span><button class="temp-rm" data-idx="${idx}">✕</button>`; card.querySelector(".temp-rm").onclick=(e)=>{ e.stopPropagation(); tempBookings.splice(idx,1); renderInlineTempCards(); renderAllSliders(); updateCellsHighlight(); updatePreviewTimes(); }; container.appendChild(card); }); updatePreviewTimes(); }
  function updatePreviewTimes() { const span=document.getElementById("previewTimes"); if(span) { if(tempBookings.length===0) span.innerText = "—"; else { const timesStr = tempBookings.map(tb => `Стол ${tb.lane+1} (${fmt(tb.start)}–${fmt(tb.end)})`).join("; "); span.innerText = timesStr; } } }
  function onMouseDown(e){ if(dragModeEnabled) return; let target=e.target; if(target.classList?.contains("slot")){ e.preventDefault(); let lane=parseInt(target.dataset.lane), startIdx=parseInt(target.dataset.si); isDragging=true; dragStartCell={lane,startIdx}; dragInterval={lane,startIdx,endIdx:startIdx}; highlightDragInterval(lane,startIdx,startIdx); } }
  function onMouseMove(e){ if(!dragModeEnabled && isDragging && dragStartCell){ let hoverEl=document.elementsFromPoint(e.clientX,e.clientY).find(el=>el.classList?.contains("slot")); if(hoverEl){ let lane=parseInt(hoverEl.dataset.lane), idx=parseInt(hoverEl.dataset.si); if(lane===dragStartCell.lane){ let newStart=Math.min(dragStartCell.startIdx,idx), newEnd=Math.max(dragStartCell.startIdx,idx); if(dragInterval.startIdx!==newStart||dragInterval.endIdx!==newEnd) dragInterval={lane,startIdx:newStart,endIdx:newEnd}; highlightDragInterval(lane,newStart,newEnd); } } } }
  function highlightDragInterval(lane,startIdx,endIdx){ document.querySelectorAll("#tableDesktop td.slot.drag-over").forEach(td=>td.classList.remove("drag-over")); for(let i=startIdx;i<=endIdx;i++){ let cell=getSlotCell(lane,i); if(cell) cell.classList.add("drag-over"); } }
  function onMouseUp(){ if(!dragModeEnabled && isDragging && dragInterval && dragInterval.startIdx!==dragInterval.endIdx){ let {lane,startIdx,endIdx}=dragInterval; let start=slots[startIdx].key, end=slots[endIdx].key; let hasConflict=bookings.some(b=>b.lane===lane && !(b.end<=start || b.start>=end)); if(hasConflict) alert("Это время уже занято существующей бронью."); else tempBookings.push({id:nextTempId++,lane,start:Math.min(start,end),end:Math.max(start,end)}); renderInlineTempCards(); renderAllSliders(); updateCellsHighlight(); } isDragging=false; dragInterval=null; dragStartCell=null; document.querySelectorAll("#tableDesktop td.slot.drag-over").forEach(td=>td.classList.remove("drag-over")); }
  function openBookModal(){ if(tempBookings.length===0){ alert("Сначала выделите брони: зажмите левую кнопку и протяните по ячейкам стола."); return; } $("nameInput").value="";$("phoneInput").value="";$("commentInput").value=""; updatePreviewTimes(); $("bookModal").classList.add("open"); }
  function closeBookModal(){ $("bookModal").classList.remove("open"); }
  async function submitTempBookings(){ let name=$("nameInput").value.trim(); if(!name){alert("Введите имя");return;} if(tempBookings.length===0){closeBookModal();return;} showLoad(); const date=$("dateInput").value; try{ const payload={bookings:tempBookings.map(tb=>({date,tableNumber:tb.lane+1,start:tb.start,end:tb.end,name,phone:$("phoneInput").value.trim(),comment:$("commentInput").value.trim()}))}; await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify(payload)}); clearTempSelections(); await loadFromServer(); closeBookModal(); } catch(e){console.error(e);alert("Ошибка сохранения");} hideLoad(); }
  async function loadFromServer(){ showLoad(); try{ let res=await fetch(GAS_URL+"?action=get&date="+$("dateInput").value); let data=await res.json(); bookings=data.bookings?data.bookings.map(b=>({id:b.id,lane:b.table-1,start:parseFloat(b.start),end:parseFloat(b.end),name:b.name,phone:b.phone,comment:b.comment,confirmed:b.confirmed==="Да"?true:(b.confirmed==="Нет"?false:null)})):[]; renderAllSliders(); updateCellsHighlight(); } catch(e){console.error(e);} hideLoad(); }
  async function saveToServer(booking){ if(!booking.id) return; await fetch(GAS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"update",id:booking.id,date:$("dateInput").value,tableNumber:booking.lane+1,start:booking.start,end:booking.end,name:booking.name,phone:booking.phone,comment:booking.comment})}); }
  function startMove(booking, e){ if(!dragModeEnabled) return; e.stopPropagation(); /* drag logic remains but with updated slider style */  const slider=e.currentTarget.closest('.slider'); if(!slider) return; let rows=$("dtBody").rows; let durationCells=slots.findIndex(s=>s.key===booking.end)-slots.findIndex(s=>s.key===booking.start); let ghost=document.createElement('div'); ghost.className='ghost-slider'; ghost.style.cssText=slider.style.cssText; $('slidersLayer').appendChild(ghost); slider.classList.add('dragging'); let currentLane=booking.lane, currentStartIdx=slots.findIndex(s=>s.key===booking.start); function getTargetFromCoords(clientX,clientY){ const el=document.elementsFromPoint(clientX,clientY).find(el=>el.classList?.contains('slot')); if(!el) return null; return {lane:parseInt(el.dataset.lane),idx:parseInt(el.dataset.si)}; } function updateGhost(lane,startIdx){ const row=rows[lane]; if(!row) return; const startCell=row.cells[startIdx+1], endCell=row.cells[startIdx+durationCells+1]; if(startCell&&endCell){ ghost.style.left=(startCell.offsetLeft+1)+'px'; ghost.style.top=(row.offsetTop+1)+'px'; ghost.style.width=(endCell.offsetLeft+endCell.offsetWidth-startCell.offsetLeft-2)+'px'; ghost.style.height=(row.offsetHeight-2)+'px'; } } function onDragMove(ev){ const target=getTargetFromCoords(ev.clientX,ev.clientY); if(target){ let newLane=target.lane, newStartIdx=Math.min(Math.max(0,target.idx),slots.length-durationCells-1); if(newLane!==currentLane||newStartIdx!==currentStartIdx){ currentLane=newLane; currentStartIdx=newStartIdx; updateGhost(currentLane,currentStartIdx); } } } function onDragEnd(ev){ const target=getTargetFromCoords(ev.clientX,ev.clientY); if(target){ let finalLane=target.lane, finalStartIdx=Math.min(Math.max(0,target.idx),slots.length-durationCells-1); const newStart=slots[finalStartIdx].key, newEnd=slots[finalStartIdx+durationCells].key; let conflict=bookings.some(b=>b.id!==booking.id&&b.lane===finalLane&&!(b.end<=newStart||b.start>=newEnd)); if(!conflict){ booking.lane=finalLane; booking.start=newStart; booking.end=newEnd; saveToServer(booking); renderAllSliders(); updateCellsHighlight(); } else alert("Конфликт"); } ghost.remove(); slider.classList.remove('dragging'); document.body.style.cursor=''; document.removeEventListener('mousemove',onDragMove); document.removeEventListener('mouseup',onDragEnd); renderAllSliders(); } document.body.style.cursor='grabbing'; document.addEventListener('mousemove',onDragMove); document.addEventListener('mouseup',onDragEnd); updateGhost(currentLane,currentStartIdx); }
  function startMoveForTemp(temp,e){ if(!dragModeEnabled) return; e.stopPropagation(); const slider=e.currentTarget.closest('.slider'); if(!slider) return; let rows=$("dtBody").rows; let durationCells=slots.findIndex(s=>s.key===temp.end)-slots.findIndex(s=>s.key===temp.start); let ghost=document.createElement('div'); ghost.className='ghost-slider'; ghost.style.cssText=slider.style.cssText; $('slidersLayer').appendChild(ghost); slider.classList.add('dragging'); let currentLane=temp.lane, currentStartIdx=slots.findIndex(s=>s.key===temp.start); function getTargetFromCoords(clientX,clientY){ const el=document.elementsFromPoint(clientX,clientY).find(el=>el.classList?.contains('slot')); if(!el) return null; return {lane:parseInt(el.dataset.lane),idx:parseInt(el.dataset.si)}; } function updateGhost(lane,startIdx){ const row=rows[lane]; if(!row) return; const startCell=row.cells[startIdx+1], endCell=row.cells[startIdx+durationCells+1]; if(startCell&&endCell){ ghost.style.left=(startCell.offsetLeft+1)+'px'; ghost.style.top=(row.offsetTop+1)+'px'; ghost.style.width=(endCell.offsetLeft+endCell.offsetWidth-startCell.offsetLeft-2)+'px'; ghost.style.height=(row.offsetHeight-2)+'px'; } } function onDragMove(ev){ const target=getTargetFromCoords(ev.clientX,ev.clientY); if(target){ let newLane=target.lane, newStartIdx=Math.min(Math.max(0,target.idx),slots.length-durationCells-1); if(newLane!==currentLane||newStartIdx!==currentStartIdx){ currentLane=newLane; currentStartIdx=newStartIdx; updateGhost(currentLane,currentStartIdx); } } } function onDragEnd(ev){ const target=getTargetFromCoords(ev.clientX,ev.clientY); if(target){ let finalLane=target.lane, finalStartIdx=Math.min(Math.max(0,target.idx),slots.length-durationCells-1); const newStart=slots[finalStartIdx].key, newEnd=slots[finalStartIdx+durationCells].key; let conflict=bookings.some(b=>b.lane===finalLane&&!(b.end<=newStart||b.start>=newEnd)); if(!conflict){ temp.lane=finalLane; temp.start=newStart; temp.end=newEnd; renderInlineTempCards(); renderAllSliders(); updateCellsHighlight(); } else alert("Конфликт"); } ghost.remove(); slider.classList.remove('dragging'); document.body.style.cursor=''; document.removeEventListener('mousemove',onDragMove); document.removeEventListener('mouseup',onDragEnd); renderAllSliders(); } document.body.style.cursor='grabbing'; document.addEventListener('mousemove',onDragMove); document.addEventListener('mouseup',onDragEnd); updateGhost(currentLane,currentStartIdx); }
  
  function renderAllSliders(){ 
    let container = $("slidersLayer"); if(!container) return; container.innerHTML = ""; 
    let rows = Array.from($("dtBody")?.querySelectorAll("tr") || []); if(rows.length === 0) return;
    const renderGeneric = (item, isTemp, onClickCb) => {
      let startIdx = slots.findIndex(s => s.key === item.start), endIdx = slots.findIndex(s => s.key === item.end); if(startIdx === -1 || endIdx === -1) return;
      let row = rows[item.lane]; if(!row) return;
      let sc = row.cells[startIdx+1], ec = row.cells[endIdx+1]; if(!sc || !ec) return;
      let left = sc.offsetLeft + 1, top = row.offsetTop + 1, width = (ec.offsetLeft + ec.offsetWidth) - sc.offsetLeft - 2, height = row.offsetHeight - 2;
      let status = isTemp ? "temp" : (item.confirmed === true ? "confirmed" : (item.confirmed === false ? "rejected" : "pending"));
      let laneType = LANE_TYPE_MAP[getGroupIndex(item.lane)];
      let slider = document.createElement("div"); slider.className = `slider ${status}`; if(dragModeEnabled) slider.classList.add("drag-mode-enabled"); slider.setAttribute("data-lane-type", laneType);
      slider.style.cssText = `left:${left}px;top:${top}px;width:${width}px;height:${height}px;`;
      slider.innerHTML = `<div class="status-dot"></div><div class="sl-name">${isTemp ? "Ожидание брони" : (item.name || "Бронь")}</div><div class="sl-time">${fmt(item.start)} – ${fmt(item.end)}</div>`;
      let leftBtn = document.createElement("div"); leftBtn.className = "info-edge-left"; leftBtn.innerHTML = "ⓘ"; leftBtn.title = "Информация";
      let rightBtn = document.createElement("div"); rightBtn.className = "info-edge-right"; rightBtn.innerHTML = "ℹ️"; rightBtn.title = "Подробнее";
      leftBtn.addEventListener("click", (e) => { e.stopPropagation(); if(!isTemp) showInfoModal(item); else alert("Временная бронь еще не сохранена"); });
      rightBtn.addEventListener("click", (e) => { e.stopPropagation(); if(!isTemp) showInfoModal(item); else alert("Временная бронь еще не сохранена"); });
      slider.appendChild(leftBtn); slider.appendChild(rightBtn);
      let dragHandle = document.createElement("div"); dragHandle.className = "drag-handle";
      if(dragModeEnabled) dragHandle.addEventListener("mousedown", (e) => { if(isTemp) startMoveForTemp(item, e); else startMove(item, e); });
      slider.appendChild(dragHandle);
      slider.addEventListener("click", (e) => { if(!dragModeEnabled && !isTemp && e.target !== leftBtn && e.target !== rightBtn) showInfoModal(item); });
      container.appendChild(slider);
    };
    bookings.forEach(b => renderGeneric(b, false));
    tempBookings.forEach(t => renderGeneric(t, true));
  }
  let currentBooking = null;
  function showInfoModal(b){ currentBooking = b; $("i-table").textContent = "№ "+(b.lane+1); $("i-time").textContent = `${fmt(b.start)} – ${fmt(b.end)}`; $("i-name").textContent = b.name; $("i-phone").textContent = b.phone || "—"; $("i-comment").textContent = b.comment || "—"; $("infoModal").classList.add("open"); }
  function closeInfoModal(){ $("infoModal").classList.remove("open"); currentBooking=null; }
  async function confirmBooking(yes){ if(!currentBooking) return; showLoad(); await fetch(GAS_URL,{ method:"POST", mode:"no-cors", body:JSON.stringify({ action:"confirm", id:currentBooking.id, confirmed:yes }) }); closeInfoModal(); await loadFromServer(); hideLoad(); }
  async function deleteBooking(){ if(!currentBooking||!confirm("Удалить бронь?")) return; showLoad(); await fetch(GAS_URL,{ method:"POST", mode:"no-cors", body:JSON.stringify({ action:"delete", id:currentBooking.id }) }); closeInfoModal(); await loadFromServer(); hideLoad(); }
  function showLoad(){ $("loader").style.display="flex"; }
  function hideLoad(){ $("loader").style.display="none"; }
  function openImg(){ $("imgPopup").classList.add("open"); }
  function closeImg(){ $("imgPopup").classList.remove("open"); }
  
  $("tableDesktop").addEventListener("mousedown", onMouseDown);
  document.body.addEventListener("mousemove", onMouseMove);
  document.body.addEventListener("mouseup", onMouseUp);
  ["bookModal","infoModal","imgPopup"].forEach(id=>{ $(id)?.addEventListener("click",e=>{ if(e.target=== $(id)) $(id).classList.remove("open"); }); });
</script>
</body>
