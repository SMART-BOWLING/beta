<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Lucky Strike · Бильярд</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    input,textarea{user-select:text;-webkit-user-select:text;}

    :root{
      --bg:#f0f2f5;
      --surface:#ffffff;
      --surface2:#f8f9fa;
      --border:#e2e8f0;
      --border2:#cbd5e1;
      --label:#1e293b;
      --label2:#475569;
      --label3:#94a3b8;
      --blue:#1e3a8a;
      --blue-mid:#2563eb;
      --blue-light:rgba(37,99,235,0.08);
      --green:#15803d;
      --green-light:rgba(21,128,61,0.12);
      --red:#b91c1c;
      --red-light:rgba(185,28,28,0.12);
      --amber:#b45309;
      --accent:#2563eb;
      --col-blue:rgba(147,197,253,0.35);
      --col-green:rgba(134,239,172,0.35);
      --col-red:rgba(252,165,165,0.35);
      --cell-h:52px;
      --time-w:52px;
      --col-w:62px;
      --safe-b:env(safe-area-inset-bottom,0px);
      --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",system-ui,sans-serif;
    }

    body{font-family:var(--font);background:var(--bg);color:var(--label);min-height:100vh;-webkit-font-smoothing:antialiased;}

    /* ─── LOGIN ─── */
    #login{position:fixed;inset:0;background:linear-gradient(160deg,#0f172a 0%,#1e3a8a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999;padding:32px;}
    .login-logo{font-size:48px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));}
    .login-title{font-size:30px;font-weight:700;letter-spacing:-0.5px;color:#fff;}
    .login-sub{font-size:15px;color:rgba(255,255,255,0.55);font-weight:400;}
    .login-divider{width:40px;height:2px;background:rgba(255,255,255,0.2);border-radius:2px;}
    #content{display:none;}

    /* ─── DESKTOP NAV ─── */
    .d-nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(24px);border-bottom:0.5px solid var(--border);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;}
    .d-nav-title{font-size:20px;font-weight:700;letter-spacing:-0.3px;color:var(--label);display:flex;align-items:center;gap:8px;}
    .d-nav-right{display:flex;gap:10px;align-items:center;}
    .d-user-bar{display:flex;align-items:center;gap:10px;background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;padding:5px 14px 5px 8px;}
    .d-user-pic{width:28px;height:28px;border-radius:6px;object-fit:cover;}
    .d-user-email{font-size:13px;font-weight:500;color:var(--label);}
    .d-user-role{font-size:11px;color:var(--label3);background:var(--bg);padding:2px 7px;border-radius:5px;}
    .d-logout{background:none;border:none;padding:5px 10px;cursor:pointer;color:var(--label3);font-size:13px;border-radius:6px;}
    .d-logout:hover{color:var(--red);background:var(--red-light);}
    .d-btn{background:var(--surface);border:0.5px solid var(--border2);border-radius:8px;padding:7px 20px;font-size:13px;font-weight:600;color:var(--blue-mid);cursor:pointer;display:flex;align-items:center;gap:7px;transition:all 0.15s;}
    .d-btn:hover{background:var(--blue-light);}

    /* ─── DESKTOP PAGE ─── */
    .d-page{padding:24px 32px 60px;display:flex;flex-direction:column;gap:24px;}
    .d-ctrl{display:flex;gap:16px;align-items:center;flex-wrap:wrap;background:var(--surface);border-radius:10px;padding:14px 24px;border:0.5px solid var(--border);}
    .d-cal-btn{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:0 18px;height:50px;cursor:pointer;transition:all 0.15s;font-family:var(--font);}
    .d-cal-btn:hover{border-color:var(--blue-mid);background:#fff;}
    .d-cal-icon{color:var(--blue-mid);font-size:16px;}
    .d-cal-text{font-size:15px;font-weight:600;color:var(--label);}
    .d-btn-book{height:50px;padding:0 32px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.15s;}
    .d-btn-book:hover{background:#1e2d6b;}
    .d-btn-drag{height:50px;padding:0 28px;background:var(--surface2);color:var(--label2);border:0.5px solid var(--border2);border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.15s;}
    .d-btn-drag.on{background:var(--blue);color:#fff;border-color:var(--blue);}
    .d-temp-strip{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-left:auto;}
    .d-temp-card{display:flex;align-items:center;gap:10px;background:var(--blue-light);border:1px solid rgba(37,99,235,0.2);border-radius:8px;padding:6px 14px 6px 18px;font-size:13px;font-weight:500;color:var(--blue);}
    .d-temp-card .tc-time{font-family:monospace;font-size:12px;background:rgba(37,99,235,0.08);padding:3px 10px;border-radius:5px;}
    .d-temp-card .tc-rm{width:24px;height:24px;border-radius:5px;background:rgba(185,28,28,0.1);border:none;cursor:pointer;color:var(--red);font-size:14px;}
    .d-grid-card{background:var(--surface);border-radius:10px;overflow:hidden;border:0.5px solid var(--border);}
    .d-grid-scroll{overflow-x:auto;position:relative;}
    #dTable{border-collapse:collapse;table-layout:fixed;width:100%;min-width:1100px;font-size:13px;}
    #dTable thead th{height:50px;font-size:12px;font-weight:700;color:var(--label3);border-bottom:1px solid var(--border2);border-right:0.5px solid var(--border);text-align:center;background:#f8fafc;}
    #dTable thead th.corner{width:100px;position:sticky;left:0;z-index:5;font-size:14px;font-weight:700;color:var(--label);background:#eff2f6;}
    #dTable thead th.th-t{width:64px;}
    #dTable tbody tr{height:50px;}
    #dTable tbody td.lane-h{width:100px;font-size:16px;font-weight:700;border-bottom:0.5px solid var(--border2);border-right:1px solid var(--border2);text-align:center;position:sticky;left:0;z-index:2;}
    .lane-h.lc-b{background:#2c5f7a;color:#fff;}
    .lane-h.lc-g{background:#4f6b4e;color:#fff;}
    .lane-h.lc-r{background:#9b4b4b;color:#fff;}
    #dTable tbody td.sl{background:#fff;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);transition:background 0.1s;cursor:pointer;}
    #dTable tbody tr:hover td.sl{background:#f8fafc;}
    #dTable tbody td.sl.bp{background:#fef3c7!important;}
    #dTable tbody td.sl.bc{background:#dcfce7!important;}
    #dTable tbody td.sl.br{background:#fee2e2!important;}
    #dTable tbody td.sl.th{background:#dbeafe!important;border:1px solid #93c5fd!important;}
    #dTable tbody td.sl.do{background:#e2e8f0!important;}
    #dSliders{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;}
    .dslider{position:absolute;border-radius:5px;pointer-events:auto;cursor:pointer;padding:4px 10px 4px 26px;display:flex;flex-direction:column;justify-content:center;gap:2px;box-shadow:0 2px 8px rgba(0,0,0,0.18);will-change:left,top;transition:left 0.1s,top 0.1s;font-family:var(--font);overflow:hidden;white-space:nowrap;}
    .dslider[data-lt="b"]{background:rgba(44,95,122,0.93);color:#fff;}
    .dslider[data-lt="g"]{background:rgba(79,107,78,0.93);color:#fff;}
    .dslider[data-lt="r"]{background:rgba(155,75,75,0.93);color:#fff;}
    .dslider.sc[data-lt="b"]{background:#2c5f7a;}
    .dslider.sc[data-lt="g"]{background:#4f6b4e;}
    .dslider.sc[data-lt="r"]{background:#9b4b4b;}
    .dslider.sr[data-lt="b"]{opacity:0.6;}
    .dslider.sr[data-lt="g"]{opacity:0.6;}
    .dslider.sr[data-lt="r"]{opacity:0.6;}
    .dslider.tmp{border:1.5px dashed rgba(255,255,255,0.5);}
    .ds-dot{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:#fbbf24;}
    .dslider.sc .ds-dot{background:#4ade80;}
    .dslider.sr .ds-dot{background:#f87171;}
    .dslider.tmp .ds-dot{background:#94a3b8;}
    .ds-name{font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;padding-right:6px;}
    .ds-time{font-size:9px;opacity:0.8;font-weight:500;}
    .drag-h{position:absolute;inset:0;z-index:2;pointer-events:auto;cursor:pointer;}
    .drag-h.dm{cursor:grab;}.drag-h.dm:active{cursor:grabbing;}
    .ghost-sl{position:absolute;border-radius:5px;pointer-events:none;padding:4px 10px 4px 26px;background:rgba(0,0,0,0.5)!important;border:2px dashed rgba(255,215,0,0.9)!important;z-index:999;font-family:var(--font);overflow:hidden;white-space:nowrap;transition:none;color:#fff;}

    /* ─── SHARED OVERLAY/MODAL ─── */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(16px);z-index:2000;justify-content:center;align-items:center;}
    .overlay.open{display:flex;}
    .sheet{background:#fff;border-radius:14px;width:100%;max-width:500px;box-shadow:0 24px 48px rgba(0,0,0,0.2);}
    .sh-head{padding:22px 24px 10px;display:flex;justify-content:space-between;align-items:center;}
    .sh-title{font-size:22px;font-weight:700;letter-spacing:-0.4px;display:flex;align-items:center;gap:10px;color:var(--label);}
    .sh-x{width:36px;height:36px;border-radius:8px;background:var(--surface2);border:none;font-size:20px;cursor:pointer;color:var(--label2);}
    .sh-body{padding:12px 24px 28px;}
    .f-grp{margin-bottom:20px;}
    .f-lbl{font-size:12px;font-weight:700;color:var(--label3);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:0.4px;}
    .f-inp{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;font-size:15px;padding:12px 16px;font-family:var(--font);}
    .f-inp:focus{outline:none;border-color:var(--blue-mid);background:#fff;}
    .f-row{display:flex;gap:12px;margin-top:24px;}
    .f-ok{flex:1;height:50px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:15px;cursor:pointer;}
    .f-cancel{flex:1;height:50px;background:var(--surface2);border:none;border-radius:8px;font-weight:600;font-size:15px;cursor:pointer;color:var(--label2);}
    .i-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border);font-size:15px;}
    .i-row:last-child{border:none;}
    .i-key{color:var(--label2);}
    .i-val{font-weight:600;color:var(--label);}
    .cb-row{display:flex;gap:12px;margin-top:18px;}
    .cb-y{flex:1;height:48px;background:var(--green-light);color:var(--green);border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px;}
    .cb-n{flex:1;height:48px;background:var(--red-light);color:var(--red);border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px;}
    .del-btn{width:100%;height:48px;background:#f1f5f9;color:var(--red);border:none;border-radius:8px;margin-top:12px;cursor:pointer;font-weight:700;font-size:14px;}
    .del-btn:hover{background:var(--red-light);}

    /* ─── ADMIN ─── */
    .admin-sheet{max-width:760px;width:92%;max-height:82vh;overflow-y:auto;}
    .adm-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);}
    .adm-ttl{font-size:20px;font-weight:700;}
    .adm-add{background:var(--green);color:#fff;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;display:flex;align-items:center;gap:7px;}
    .u-tbl{width:100%;border-collapse:collapse;font-size:13px;}
    .u-tbl th,.u-tbl td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);}
    .u-tbl th{background:var(--surface2);font-weight:700;color:var(--label2);}
    .ua-e,.ua-d{padding:5px 10px;border:none;border-radius:6px;cursor:pointer;font-size:12px;}
    .ua-e{background:var(--blue-light);color:var(--blue-mid);}
    .ua-d{background:var(--red-light);color:var(--red);}
    .uf-form{display:flex;flex-direction:column;gap:14px;}
    .uf-form input{padding:11px 14px;border:1px solid var(--border2);border-radius:8px;font-size:14px;font-family:var(--font);}
    .uf-form input:focus{outline:none;border-color:var(--blue-mid);}
    .uf-row{display:flex;gap:10px;margin-top:6px;}
    .uf-save{flex:1;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;}
    .uf-cancel{flex:1;padding:11px;background:var(--surface2);color:var(--label2);border:none;border-radius:8px;cursor:pointer;font-weight:600;}

    /* ─── LOADER ─── */
    #loader{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.6);backdrop-filter:blur(12px);z-index:5000;align-items:center;justify-content:center;}
    .spin{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg);}}

    /* ──────────────────────────────────────────────────
       MOBILE  (≤ 767 px)
    ────────────────────────────────────────────────── */
    @media(max-width:767px){
      /* hide desktop */
      .d-nav,.d-page{display:none!important;}

      /* ── mobile header ── */
      .m-hdr{
        position:sticky;top:0;z-index:100;
        background:rgba(15,23,42,0.97);
        backdrop-filter:blur(20px);
        display:flex;align-items:center;justify-content:space-between;
        padding:0 14px;height:52px;flex-shrink:0;
      }
      .m-hdr-logo{font-size:15px;font-weight:800;letter-spacing:-0.2px;color:#fff;display:flex;align-items:center;gap:7px;}
      .m-hdr-logo i{color:#60a5fa;}
      .m-hdr-r{display:flex;align-items:center;gap:6px;}
      .m-hdr-btn{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.75);font-size:14px;}
      .m-hdr-btn.admin-only{display:none;}

      /* ── date strip ── */
      .m-date-strip{
        background:rgba(15,23,42,0.95);
        border-bottom:0.5px solid rgba(255,255,255,0.08);
        padding:8px 14px 10px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;
      }
      .m-date-chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
      .m-date-chips::-webkit-scrollbar{display:none;}
      .m-chip{
        flex-shrink:0;display:flex;flex-direction:column;align-items:center;
        padding:6px 12px;border-radius:8px;cursor:pointer;
        background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.08);
        transition:all 0.15s;min-width:46px;
      }
      .m-chip.act{background:#2563eb;border-color:#2563eb;}
      .m-chip-d{font-size:16px;font-weight:700;color:#fff;line-height:1.1;}
      .m-chip-w{font-size:10px;color:rgba(255,255,255,0.45);font-weight:500;margin-top:1px;}
      .m-chip.act .m-chip-w{color:rgba(255,255,255,0.7);}
      .m-selected-label{
        font-size:12px;color:rgba(255,255,255,0.5);font-weight:500;
        display:flex;align-items:center;gap:6px;padding:0 2px;
      }
      .m-sel-items{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;}
      .m-sel-card{
        display:inline-flex;align-items:center;gap:6px;
        background:rgba(37,99,235,0.25);border:0.5px solid rgba(96,165,250,0.4);
        border-radius:6px;padding:4px 8px 4px 10px;font-size:12px;color:#93c5fd;font-weight:600;
      }
      .m-sel-rm{background:none;border:none;color:#f87171;cursor:pointer;font-size:14px;padding:0 0 0 2px;line-height:1;}

      /* ── grid wrapper ── */
      .m-grid-wrap{
        flex:1;overflow:auto;-webkit-overflow-scrolling:touch;
        position:relative;background:var(--bg);
      }
      /* the actual grid */
      .m-grid{
        display:inline-flex;flex-direction:column;
        position:relative;min-width:max-content;
        /* padding-bottom for FAB */
        padding-bottom:calc(72px + var(--safe-b));
      }

      /* header row (table numbers) */
      .m-head-row{
        display:flex;position:sticky;top:0;z-index:50;
        background:#1e293b;
        border-bottom:1px solid rgba(255,255,255,0.1);
      }
      .m-head-corner{
        width:var(--time-w);flex-shrink:0;height:36px;
        display:flex;align-items:center;justify-content:center;
        background:#0f172a;position:sticky;left:0;z-index:51;
        font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:0.5px;
        border-right:1px solid rgba(255,255,255,0.08);
      }
      .m-head-cell{
        width:var(--col-w);flex-shrink:0;height:36px;
        display:flex;align-items:center;justify-content:center;
        font-size:12px;font-weight:800;color:rgba(255,255,255,0.8);
        border-right:0.5px solid rgba(255,255,255,0.06);
        transition:background 0.15s;cursor:pointer;
        user-select:none;
      }
      .m-head-cell.lc-b{background:rgba(44,95,122,0.6);}
      .m-head-cell.lc-g{background:rgba(79,107,78,0.6);}
      .m-head-cell.lc-r{background:rgba(155,75,75,0.6);}
      .m-head-cell.sel-lane{background:#2563eb!important;color:#fff;}

      /* data rows */
      .m-row{display:flex;align-items:stretch;}
      .m-row:nth-child(odd) .m-cell{background:rgba(255,255,255,0.97);}
      .m-row:nth-child(even) .m-cell{background:rgba(248,250,252,0.97);}

      /* time label */
      .m-time{
        width:var(--time-w);flex-shrink:0;height:var(--cell-h);
        display:flex;align-items:center;justify-content:center;
        font-size:11px;font-weight:600;color:#64748b;
        background:#f8fafc;border-right:1px solid #e2e8f0;
        border-bottom:0.5px solid #e9ecef;
        position:sticky;left:0;z-index:10;cursor:pointer;
        transition:all 0.12s;user-select:none;
      }
      .m-time.half{color:#94a3b8;font-weight:400;}
      /* highlight states for time column */
      .m-time.step1{background:#dbeafe;color:#1d4ed8;font-weight:700;}
      .m-time.step2-start{background:#2563eb;color:#fff;font-weight:700;}
      .m-time.step2-end{background:#2563eb;color:#fff;font-weight:700;}

      /* data cell */
      .m-cell{
        width:var(--col-w);flex-shrink:0;height:var(--cell-h);
        border-right:0.5px solid #e9ecef;border-bottom:0.5px solid #e9ecef;
        transition:background 0.1s;cursor:pointer;position:relative;
        user-select:none;
      }
      /* column color tints */
      .m-cell.lc-b{background:rgba(147,197,253,0.18)!important;}
      .m-cell.lc-b:nth-child(even){background:rgba(147,197,253,0.12)!important;}
      .m-cell.lc-g{background:rgba(134,239,172,0.2)!important;}
      .m-cell.lc-r{background:rgba(252,165,165,0.2)!important;}
      /* selection states */
      .m-cell.sel-lane-hi{background:rgba(37,99,235,0.06)!important;}
      .m-cell.sel-range{background:#bfdbfe!important;border-color:#93c5fd!important;}
      .m-cell.sel-touch{background:#dbeafe!important;}

      /* booking sliders layer */
      #mSliders{
        position:absolute;top:0;left:var(--time-w);
        height:100%;pointer-events:none;z-index:30;
      }
      .m-slider{
        position:absolute;border-radius:5px;
        pointer-events:auto;cursor:pointer;
        display:flex;flex-direction:column;justify-content:center;
        padding:3px 6px 3px 18px;overflow:hidden;
        box-shadow:0 2px 6px rgba(0,0,0,0.2);
        font-family:var(--font);
        transition:opacity 0.15s;
        -webkit-tap-highlight-color:transparent;
      }
      .m-slider:active{opacity:0.75;}
      .m-slider.lc-b{background:rgba(44,95,122,0.9);color:#fff;}
      .m-slider.lc-g{background:rgba(79,107,78,0.9);color:#fff;}
      .m-slider.lc-r{background:rgba(155,75,75,0.9);color:#fff;}
      .m-slider.sc.lc-b{background:#2c5f7a;}

<script>
// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const AUTH_SID   = '1zwi1CInK3NZ8YRAegRMAdjin6XPacVkAkFsjAiqVE0w';
const AUTH_SHEET = '1';
const API_KEY    = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
const GAS_URL    = 'https://script.google.com/macros/s/AKfycbyVH7brTDjP-ori4QFy_wAMkjPkqKYcd8WHtMYFlPH4Kl1wzAYSSWdN-C_CzBucuOhG/exec';

const LANES=12, SH=11, EH=22;
const slots=[];
for(let h=SH;h<=EH;h++){
  slots.push({label:`${h}:00`,key:h});
  if(h<EH) slots.push({label:`${h}:30`,key:h+0.5});
}

// group: 0=blue 1=green 2=red
function laneGroup(lane){
  const n=lane+1;
  if(n<=3) return 0;
  if(n===4) return 1;
  if(n<=6) return 0;
  return 2;
}
const LC_D=['lc-b','lc-g','lc-r'];
const LT_D=['b','g','r'];

let bookings=[], tempBooks=[], nextTid=1;
let dragOn=false, curBook=null;
const $=id=>document.getElementById(id);
const isMob=()=>window.innerWidth<768;

// ═══════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════
let curUser=null;

function parseJwt(t){
  try{
    const b=t.split('.')[1];
    return JSON.parse(decodeURIComponent(atob(b.replace(/-/g,'+').replace(/_/g,'/')).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
  }catch(e){return{};}
}
function loadSheets(){
  return new Promise((res,rej)=>{
    if(window.gapi&&gapi.client){res();return;}
    gapi.load('client',{callback:res,onerror:()=>rej('err'),timeout:8000,ontimeout:()=>rej('timeout')});
  });
}
function cacheU(e,n,r,p){
  try{localStorage.setItem('bU_e',e);localStorage.setItem('bU_n',n);localStorage.setItem('bU_r',r);localStorage.setItem('bU_p',p);localStorage.setItem('bU_ok','1');}catch(e){}
}
function getCacheU(){
  try{
    if(localStorage.getItem('bU_ok')==='1'){
      const e=localStorage.getItem('bU_e');
      if(e) return{email:e.toLowerCase().trim(),name:localStorage.getItem('bU_n'),role:localStorage.getItem('bU_r'),picture:localStorage.getItem('bU_p')};
    }
  }catch(e){}
  return null;
}
async function checkEmail(email){
  try{
    await loadSheets();
    await gapi.client.init({apiKey:API_KEY,discoveryDocs:['https://sheets.googleapis.com/$discovery/rest?version=v4']});
    const r=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId:AUTH_SID,range:`${AUTH_SHEET}!A:C`});
    const rows=r.result.values||[];
    for(let i=1;i<rows.length;i++){
      if(rows[i][0]&&rows[i][0].toLowerCase().trim()===email)
        return{found:true,name:(rows[i][1]||email.split('@')[0]).trim(),role:(rows[i][2]||'').trim()};
    }
    return{found:false};
  }catch(e){return{found:false};}
}
function showLoginLoad(on){
  const d=$('login');
  if(on){if(!d.dataset.orig)d.dataset.orig=d.innerHTML;d.innerHTML='<div style="padding:40px;text-align:center;color:rgba(255,255,255,0.6)"><div style="width:36px;height:36px;border:3px solid rgba(255,255,255,0.15);border-top-color:#60a5fa;border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 14px"></div>Проверка доступа…</div>';}
  else{if(d.dataset.orig&&d.style.display!=='none'){d.innerHTML=d.dataset.orig;google?.accounts?.id?.renderButton(d.querySelector('.g_id_signin'),{type:'standard',shape:'pill',theme:'filled_blue',text:'signin_with',size:'large',logo_alignment:'left'});}}
}
async function handleCredentialResponse(resp){
  try{
    const pl=parseJwt(resp.credential);
    const email=pl.email.toLowerCase().trim();
    showLoginLoad(true);
    const ck=await checkEmail(email);
    if(ck.found){
      curUser={email,name:ck.name||pl.name,role:ck.role||'',picture:pl.picture};
      cacheU(email,curUser.name,curUser.role,curUser.picture);
      loginUser(curUser);
    } else {
      showLoginLoad(false);
      alert('Доступ запрещён: ваш email не найден в списке');
    }
  }catch(e){showLoginLoad(false);alert('Ошибка: '+e.message);}
}
function loginUser(u){
  $('login').style.display='none';
  $('content').style.display='block';
  // desktop
  const ui=$('dUserInfo');ui.style.display='flex';
  $('dUserPic').src=u.picture||'';
  $('dUserEmail').textContent=u.email;
  const rsp=$('dUserRole');
  if(u.role){rsp.textContent=u.role;rsp.style.display='inline';}else rsp.style.display='none';
  // admin visibility
  const allow=['разработчик','управляющий'].includes((u.role||'').toLowerCase().trim());
  $('dAdminBtn').style.display=allow?'flex':'none';
  const mab=$('mAdminBtn');if(mab)mab.style.display=allow?'flex':'none';
  // mobile user icon
  const mlb=$('mLogoutBtn');if(mlb)mlb.style.display='flex';
  showLoginLoad(false);
  initApp();
}
function signOut(){
  ['bU_e','bU_n','bU_r','bU_p','bU_ok'].forEach(k=>localStorage.removeItem(k));
  location.reload();
}
window.addEventListener('load',()=>{const cu=getCacheU();if(cu?.email){curUser=cu;loginUser(cu);}});

// ═══════════════════════════════════════════════
//  ADMIN
// ═══════════════════════════════════════════════
async function openAdminPanel(){showLoad();$('adminModal').classList.add('open');await loadUsers();hideLoad();}
function closeAdminModal(){$('adminModal').classList.remove('open');}
async function loadUsers(){
  try{
    const r=await fetch(`${GAS_URL}?action=getUsers&_=${Date.now()}`);
    const d=await r.json();
    const c=$('usersList');
    if(!d.success||!d.users?.length){c.innerHTML='<div style="padding:30px;text-align:center;color:var(--label3);">Нет сотрудников</div>';return;}
    c.innerHTML=`<table class="u-tbl"><thead><tr><th>Email</th><th>Имя</th><th>Роль</th><th></th></tr></thead><tbody>${d.users.map(u=>`<tr><td>${esc(u.email)}</td><td>${esc(u.name||'—')}</td><td>${esc(u.role||'—')}</td><td style="display:flex;gap:6px"><button class="ua-e" onclick='editUser(${u.row},"${esc(u.email)}","${esc(u.name||'')}","${esc(u.role||'')}") '><i class="fas fa-edit"></i></button><button class="ua-d" onclick='delUser(${u.row},"${esc(u.email)}")'><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table>`;
  }catch(e){$('usersList').innerHTML='<div style="padding:30px;text-align:center;color:var(--red);">Ошибка загрузки</div>';}
}
function showAddUser(){$('ufTitle').innerHTML='<i class="fas fa-user-plus"></i> Добавить';$('ufRow').value='';$('ufEmail').value='';$('ufName').value='';$('ufRole').value='';$('ufEmail').disabled=false;$('userFormModal').classList.add('open');}

function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function enc(s){return encodeURIComponent(s);}
function fmtKey(k){const h=Math.floor(k);return`${h}:${k%1===0.5?'30':'00'}`;}
function fmtRange(si,ei){return`${slots[si].label}–${slots[ei+1]?.label||(Math.floor(slots[ei].key)+1)+':00'}`;}
function fmtDate(ds){
  if(!ds)return'Выбрать';
  const d=new Date(ds),t=new Date();t.setHours(0,0,0,0);
  const tm=new Date(t);tm.setDate(t.getDate()+1);
  if(d.getTime()===t.getTime())return'Сегодня';
  if(d.getTime()===tm.getTime())return'Завтра';
  const M=['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
  const W=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  return`${W[d.getDay()]}, ${d.getDate()} ${M[d.getMonth()]}`;
}
function hasConflict(lane,si,ei,xid=null){
  const s=slots[si].key,e=slots[ei+1]?.key||(slots[ei].key+0.5);
  return bookings.some(b=>{
    if(xid!=null&&b.id===xid)return false;
    if(b.lane!==lane)return false;
    return!(e<=b.start||s>=b.end);
  });
}
function showLoad(){$('loader').style.display='flex';}
function hideLoad(){$('loader').style.display='none';}

let gDate=new Date().toISOString().split('T')[0];

async function loadFromServer(){
  showLoad();
  try{
    const res=await fetch(`${GAS_URL}?action=get&date=${gDate}`);
    const d=await res.json();
    bookings=(d.bookings||[]).map(b=>{
      const sk=parseFloat(b.start),ek=parseFloat(b.end);
      const si=slots.findIndex(s=>s.key===sk);
      let ei=slots.findIndex(s=>s.key===ek)-1;
      if(ei<0)ei=slots.length-1;
      return{id:b.id,lane:b.table-1,start:sk,end:ek,startSlotIdx:si,endSlotIdx:ei,
        name:b.name,phone:b.phone,comment:b.comment,
        confirmed:b.confirmed==='Да'?true:(b.confirmed==='Нет'?false:null)};
    });
    if(!isMob()){renderDSliders();updateDCells();}
    renderMGrid();
  }catch(e){console.error(e);}
  hideLoad();
}

function getDCell(lane,si){return $('dTBody')?.rows[lane]?.cells[si+1];}
function updateDCells(){

  for(const b of bookings){if(b.startSlotIdx==null)continue;for(let i=b.startSlotIdx;i<=b.endSlotIdx;i++){const c=getDCell(b.lane,i);if(c)c.classList.add(b.confirmed===true?'bc':(b.confirmed===false?'br':'bp'));}}

function renderDSliders(){
  const c=$('dSliders');if(!c)return;c.innerHTML='';
  const rows=Array.from($('dTBody')?.querySelectorAll('tr')||[]);if(!rows.length)return;
  [...bookings,...tempBooks.map(t=>({...t,isTemp:true}))].forEach(item=>{
    const si=item.startSlotIdx,ei=item.endSlotIdx;
    if(si==null||ei==null)return;
    const row=rows[item.lane];if(!row)return;
    const sc=row.cells[si+1],ec=row.cells[ei+1];if(!sc||!ec)return;
    const left=sc.offsetLeft+1,top=row.offsetTop+1,
          width=(ec.offsetLeft+ec.offsetWidth)-sc.offsetLeft-2,height=row.offsetHeight-2;
    const status=item.isTemp?'tmp':(item.confirmed===true?'sc':(item.confirmed===false?'sr':''));
    const lt=LT_D[laneGroup(item.lane)];
    const sl=document.createElement('div');sl.className=`dslider ${status}`;sl.setAttribute('data-lt',lt);
    sl.style.cssText=`left:${left}px;top:${top}px;width:${width}px;height:${height}px;`;
    const dot=document.createElement('div');dot.className='ds-dot';sl.appendChild(dot);
    const nm=document.createElement('div');nm.className='ds-name';nm.textContent=item.isTemp?'…':(item.name||'Бронь');
    const tm=document.createElement('div');tm.className='ds-time';tm.textContent=fmtRange(si,ei);
    sl.append(nm,tm);
    const dh=document.createElement('div');dh.className=`drag-h${dragOn?' dm':''}`;
    if(dragOn&&!item.isTemp)dh.addEventListener('mousedown',ev=>{ev.stopPropagation();startDDrag(item,ev,rows);});
    else if(dragOn&&item.isTemp)dh.addEventListener('mousedown',ev=>{ev.stopPropagation();startDTempDrag(item,ev,rows);});
    else dh.addEventListener('click',ev=>{ev.stopPropagation();if(!item.isTemp&&item.id)showDInfo(item);});
    sl.appendChild(dh);c.appendChild(sl);
  });
}
// desktop mouse-select
let dIsDrag=false,dDragStart=null,dDragInt=null;
function onDMouseDown(e){
  if(dragOn)return;
  const t=e.target;
  if(t.classList?.contains('sl')){
    e.preventDefault();
    const lane=parseInt(t.dataset.lane),si=parseInt(t.dataset.si);
    dIsDrag=true;dDragStart={lane,si};dDragInt={lane,si:si,ei:si};
    hiDragInt(lane,si,si);
  }
}
function onDMouseMove(e){
  if(!dragOn&&dIsDrag&&dDragStart){
    const el=document.elementsFromPoint(e.clientX,e.clientY).find(el=>el.classList?.contains('sl'));
    if(el){
      const lane=parseInt(el.dataset.lane),idx=parseInt(el.dataset.si);
      if(lane===dDragStart.lane){
        const ns=Math.min(dDragStart.si,idx),ne=Math.max(dDragStart.si,idx);
        dDragInt={lane,si:ns,ei:ne};hiDragInt(lane,ns,ne);
      }
    }
  }
}
function hiDragInt(lane,si,ei){
  document.querySelectorAll('#dTable td.sl.do').forEach(td=>td.classList.remove('do'));
  for(let i=si;i<=ei;i++){const c=getDCell(lane,i);if(c)c.classList.add('do');}
}
function onDMouseUp(){
  if(!dragOn&&dIsDrag&&dDragInt){
    const{lane,si,ei}=dDragInt;
    if(hasConflict(lane,si,ei))alert('Это время уже занято');
    else tempBooks.push({id:nextTid++,lane,startSlotIdx:si,endSlotIdx:ei});
    renderDTempStrip();renderDSliders();updateDCells();
  }
  dIsDrag=false;dDragInt=null;dDragStart=null;
  document.querySelectorAll('#dTable td.sl.do').forEach(td=>td.classList.remove('do'));
}
function renderDTempStrip(){
  const c=$('dTempStrip');if(!c)return;c.innerHTML='';
  tempBooks.forEach((tb,i)=>{
    const card=document.createElement('div');card.className='d-temp-card';
    card.innerHTML=`<strong>Стол ${tb.lane+1}</strong><span class="tc-time">${fmtRange(tb.startSlotIdx,tb.endSlotIdx)}</span><button class="tc-rm" onclick="rmTemp(${i})">×</button>`;
    c.appendChild(card);

}
function rmTemp(i){tempBooks.splice(i,1);renderDTempStrip();renderDSliders();updateDCells();}

// desktop drag-move
function startDDrag(b,e,rows){
  const sl=e.currentTarget.closest('.dslider');if(!sl)return;
  const dur=b.endSlotIdx-b.startSlotIdx;
  const ghost=createDGhost(sl);
  dMoveLogic(ghost,sl,rows,dur,(fl,fsi)=>{
    const ne=fsi+dur;
    if(!hasConflict(fl,fsi,ne,b.id)){b.lane=fl;b.startSlotIdx=fsi;b.endSlotIdx=ne;b.start=slots[fsi].key;b.end=slots[ne+1]?.key||(slots[ne].key+0.5);serverAction({action:'update',id:b.id,date:gDate,tableNumber:fl+1,start:b.start,end:b.end,name:b.name,phone:b.phone,comment:b.comment});renderDSliders();updateDCells();}else alert('Конфликт');
  },b.lane,b.startSlotIdx);
}
function startDTempDrag(tmp,e,rows){
  const sl=e.currentTarget.closest('.dslider');if(!sl)return;
  const dur=tmp.endSlotIdx-tmp.startSlotIdx;
  const ghost=createDGhost(sl);
  dMoveLogic(ghost,sl,rows,dur,(fl,fsi)=>{
    const ne=fsi+dur;
    if(!hasConflict(fl,fsi,ne)){tmp.lane=fl;tmp.startSlotIdx=fsi;tmp.endSlotIdx=ne;renderDTempStrip();renderDSliders();updateDCells();}else alert('Конфликт');
  },tmp.lane,tmp.startSlotIdx);
}
function createDGhost(sl){
  const g=document.createElement('div');g.className='ghost-sl';
  g.style.cssText=sl.style.cssText;
  ['ds-name','ds-time','ds-dot'].forEach(cn=>{const el=sl.querySelector('.'+cn);if(el)g.appendChild(el.cloneNode(true));});
  $('dSliders').appendChild(g);sl.classList.add('dragging');return g;
}
function dMoveLogic(ghost,sl,rows,dur,onDrop,iL,iSi){
  let cL=iL,cSi=iSi;
  function upd(l,si){const row=rows[l];if(!row)return;const sc=row.cells[si+1],ec=row.cells[si+dur+1];if(sc&&ec){ghost.style.left=(sc.offsetLeft+1)+'px';ghost.style.top=(row.offsetTop+1)+'px';ghost.style.width=(ec.offsetLeft+ec.offsetWidth-sc.offsetLeft-2)+'px';ghost.style.height=(row.offsetHeight-2)+'px';}}
  function getT(e){const el=document.elementsFromPoint(e.clientX,e.clientY).find(el=>el.classList?.contains('sl'));return el?{lane:parseInt(el.dataset.lane),si:parseInt(el.dataset.si)}:null;}
  function mv(ev){const t=getT(ev);if(t){const nl=t.lane,ns=Math.min(Math.max(0,t.si),slots.length-dur-1);if(nl!==cL||ns!==cSi){cL=nl;cSi=ns;upd(cL,cSi);}}}
  function up(ev){const t=getT(ev);if(t)onDrop(t.lane,Math.min(Math.max(0,t.si),slots.length-dur-1));ghost?.remove();sl?.classList.remove('dragging');document.body.style.cursor='';document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);renderDSliders();}
  document.body.style.cursor='grabbing';document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);upd(cL,cSi);
}

// ═══════════════════════════════════════════════
//  MOBILE GRID
// ═══════════════════════════════════════════════
// selection state machine
// step 0 = idle
// step 1 = lane chosen, waiting for start time tap
// step 2 = start chosen, waiting for end time tap
let mStep=0, mLane=null, mStartKey=null, mStartSi=null;
let mSelections=[]; // {lane, startSlotIdx, endSlotIdx}
const CELL_H=52, COL_W=62, TIME_W=52;
const LC_MOB=['lc-b','lc-b','lc-b','lc-g','lc-b','lc-b','lc-r','lc-r','lc-r','lc-r','lc-r','lc-r'];

function buildMGrid(){
  const grid=$('mGrid');
  if(!grid) return;
  grid.innerHTML='<div id="mSliders"></div>';

  // head row
  const hrow=document.createElement('div');hrow.className='m-head-row';
  const corner=document.createElement('div');corner.className='m-head-corner';corner.textContent='ВРЕМЯ';
  hrow.appendChild(corner);
  for(let lane=0;lane<LANES;lane++){
    const hc=document.createElement('div');hc.className=`m-head-cell ${LC_MOB[lane]}`;hc.dataset.lane=lane;
    hc.textContent=`№${lane+1}`;
    hc.addEventListener('click',()=>tapLane(lane));
    hrow.appendChild(hc);
  }
  grid.insertBefore(hrow,grid.firstChild);

  // rows
  slots.forEach((sl,si)=>{
    const row=document.createElement('div');row.className='m-row';row.dataset.si=si;
    // time cell
    const tc=document.createElement('div');tc.className='m-time'+(sl.key%1===0.5?' half':'');tc.textContent=sl.label;tc.dataset.si=si;
    tc.addEventListener('click',()=>tapTime(si));
    row.appendChild(tc);
    // data cells
    for(let lane=0;lane<LANES;lane++){
      const cell=document.createElement('div');cell.className=`m-cell ${LC_MOB[lane]}`;cell.dataset.lane=lane;cell.dataset.si=si;
      row.appendChild(cell);
    }
    grid.insertBefore(row,grid.querySelector('#mSliders'));
  });
}

function tapLane(lane){
  if(mStep===0){
    mLane=lane;mStep=1;mStartKey=null;mStartSi=null;
    updateMStepUI();highlightMLane(lane);
  } else if(mStep===1){
    if(lane===mLane){cancelMStep();}
    else{mLane=lane;updateMStepUI();highlightMLane(lane);}
  } else if(mStep===2){
    // changing lane mid-select, restart step1
    mLane=lane;mStep=1;mStartKey=null;mStartSi=null;
    updateMStepUI();highlightMLane(lane);
  }
}

function tapTime(si){
  if(mStep===0){
    // no lane selected yet
    updateMStepUI();return;
  }
  if(mStep===1){
    mStartSi=si;mStartKey=slots[si].key;mStep=2;
    updateMStepUI();highlightMTimeCols();
    return;
  }
  if(mStep===2){
    // end time tap
    const ei=si;
    if(ei<=mStartSi){alert('Конец должен быть позже начала');return;}
    if(hasConflict(mLane,mStartSi,ei-1)){alert('Это время уже занято');return;}
    mSelections.push({lane:mLane,startSlotIdx:mStartSi,endSlotIdx:ei-1});
    // reset to step0
    mLane=null;mStep=0;mStartKey=null;mStartSi=null;
    updateMStepUI();renderMSelChips();renderMSliders();highlightMCells();
  }
}

function cancelMStep(){
  mLane=null;mStep=0;mStartKey=null;mStartSi=null;
  updateMStepUI();highlightMLane(-1);highlightMTimeCols();highlightMCells();
}

function updateMStepUI(){
  const bar=$('mStepBar');if(!bar)return;
  const txt=$('mStepTxt');
  if(mStep===0){bar.style.display='none';}
  else{bar.style.display='block';}
  if(mStep===1)txt.innerHTML=`Стол <b>№${mLane+1}</b> — теперь тапни на <b>начало</b> в колонке времени`;
  if(mStep===2)txt.innerHTML=`Стол <b>№${mLane+1}</b>, с <b>${slots[mStartSi].label}</b> — тапни на <b>конец</b>`;
}

function highlightMLane(lane){
  document.querySelectorAll('.m-head-cell').forEach(hc=>{
    hc.classList.toggle('sel-lane',parseInt(hc.dataset.lane)===lane);
  });
  document.querySelectorAll('.m-cell').forEach(cell=>{
    cell.classList.toggle('sel-lane-hi',parseInt(cell.dataset.lane)===lane&&mStep>0);
  });
}

function highlightMTimeCols(){
  document.querySelectorAll('.m-time').forEach(tc=>{
    const si=parseInt(tc.dataset.si);
    tc.classList.remove('step1','step2-start','step2-end');
    if(mStep===1) tc.classList.add('step1');
    if(mStep===2){
      if(si===mStartSi) tc.classList.add('step2-start');
      else if(si>mStartSi) tc.classList.add('step2-end');
    }
  });
}

function highlightMCells(){
  document.querySelectorAll('.m-cell').forEach(cell=>{
    cell.classList.remove('sel-range');
  });
  // paint confirmed selections
  mSelections.forEach(s=>{
    for(let i=s.startSlotIdx;i<=s.endSlotIdx;i++){
      const cells=document.querySelectorAll(`.m-cell[data-lane="${s.lane}"][data-si="${i}"]`);
      cells.forEach(c=>c.classList.add('sel-range'));
    }
  });
}

function renderMSelChips(){
  const c=$('mSelItems');if(!c)return;c.innerHTML='';
  const bar=$('mStepBar');
  if(mSelections.length>0){
    if(bar)bar.style.display='block';
    const lbl=bar.querySelector('.m-selected-label');if(lbl)lbl.style.display='flex';
  }
  mSelections.forEach((s,i)=>{
    const chip=document.createElement('div');chip.className='m-sel-card';
    chip.innerHTML=`Стол ${s.lane+1} · ${fmtRange(s.startSlotIdx,s.endSlotIdx)}<button class="m-sel-rm" onclick="rmMSel(${i})">×</button>`;
    c.appendChild(chip);
  });
}
function rmMSel(i){mSelections.splice(i,1);renderMSelChips();renderMSliders();highlightMCells();if(!mSelections.length&&mStep===0){const bar=$('mStepBar');if(bar)bar.style.display='none';}}

// mobile sliders
function renderMSliders(){
  const c=$('mSliders');if(!c)return;c.innerHTML='';
  // combine bookings + selections
  const headH=36; // header row height
  bookings.forEach(b=>{
    const si=b.startSlotIdx,ei=b.endSlotIdx;
    if(si==null||ei==null)return;
    const top=headH+si*CELL_H+2;
    const height=(ei-si+1)*CELL_H-4;
    const left=(b.lane)*COL_W+2;
    const width=COL_W-4;
    const status=b.confirmed===true?'sc':(b.confirmed===false?'sr':'');
    const lc=LC_MOB[b.lane];
    const sl=document.createElement('div');
    sl.className=`m-slider ${lc} ${status}`;
    sl.style.cssText=`top:${top}px;left:${left}px;width:${width}px;height:${height}px;`;
    const dot=document.createElement('div');dot.className='ms-dot';
    const nm=document.createElement('div');nm.className='ms-name';nm.textContent=b.name||'Бронь';
    sl.append(dot,nm);
    if(height>=32){const tm=document.createElement('div');tm.className='ms-time';tm.textContent=fmtRange(si,ei);sl.appendChild(tm);}
    sl.addEventListener('click',e=>{e.stopPropagation();showMInfo(b);});
    c.appendChild(sl);
  });
  // temp selections (ghost)
  mSelections.forEach(s=>{
    const si=s.startSlotIdx,ei=s.endSlotIdx;
    const top=headH+si*CELL_H+2;
    const height=(ei-si+1)*CELL_H-4;
    const left=s.lane*COL_W+2;
    const width=COL_W-4;
    const sl=document.createElement('div');
    sl.className=`m-slider ${LC_MOB[s.lane]}`;
    sl.style.cssText=`top:${top}px;left:${left}px;width:${width}px;height:${height}px;opacity:0.6;border:2px dashed rgba(255,255,255,0.6);`;
    const nm=document.createElement('div');nm.className='ms-name';nm.textContent='…';
    sl.appendChild(nm);
    c.appendChild(sl);
  });
  // set grid height so sliders layer aligns
  const gridH=headH+slots.length*CELL_H+8;
  c.style.height=gridH+'px';
  $('mGrid').style.minHeight=gridH+'px';
}

function renderMGrid(){
  if(!isMob())return;
  renderMSliders();
  renderMSelChips();
  highlightMCells();
  highlightMLane(mStep>0?mLane:-1);
  highlightMTimeCols();
}

// mobile book sheet
function openMBookSheet(){
  if(!mSelections.length)return alert('Выделите интервал: тап на стол → тап на начало → тап на конец');
  $('mBookPreview').textContent=mSelections.map(s=>`Стол ${s.lane+1} (${fmtRange(s.startSlotIdx,s.endSlotIdx)})`).join(' · ');
  $('mName').value='';$('mPhone').value='';$('mComment').value='';
  openBS('mBookSheet','mBookOv');
}
function closeMBookSheet(){closeBS('mBookSheet','mBookOv');}
async function submitMBook(){
  const name=$('mName').value.trim();if(!name)return alert('Введите имя');
  showLoad();
  try{
    await saveBookings(mSelections.map(s=>({date:gDate,tableNumber:s.lane+1,start:slots[s.startSlotIdx].key,end:slots[s.endSlotIdx+1]?.key||(slots[s.endSlotIdx].key+0.5),name,phone:$('mPhone').value.trim(),comment:$('mComment').value.trim()})));
    mSelections=[];renderMSelChips();cancelMStep();closeMBookSheet();await loadFromServer();
  }catch(e){alert('Ошибка');}
  hideLoad();
}

// mobile info sheet
function showMInfo(b){
  curBook=b;
  const status=b.confirmed===true?'✅ Пришли':(b.confirmed===false?'❌ Не пришли':'⏳ Ожидание');
  const lc=LC_MOB[b.lane];
  $('mInfoBody').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;background:#f8fafc;border-radius:10px;padding:12px 14px;margin-bottom:14px;">
      <div style="width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;background:${lc==='lc-b'?'#2c5f7a':lc==='lc-g'?'#4f6b4e':'#9b4b4b'}">№${b.lane+1}</div>
      <div><div style="font-size:16px;font-weight:800;color:var(--label)">${esc(b.name)}</div><div style="font-size:12px;color:var(--label2);margin-top:2px">${fmtRange(b.startSlotIdx,b.endSlotIdx)}</div></div>
    </div>
    <div class="mi-row"><span class="mi-key">Телефон</span><span class="mi-val">${esc(b.phone||'—')}</span></div>
    <div class="mi-row"><span class="mi-key">Комментарий</span><span class="mi-val">${esc(b.comment||'—')}</span></div>
    <div class="mi-row"><span class="mi-key">Статус</span><span class="mi-val">${status}</span></div>
    <div class="m-cb-row">
      <button class="m-cb-y" onclick="mConfirm(true)"><i class="fas fa-check"></i> Пришли</button>
      <button class="m-cb-n" onclick="mConfirm(false)"><i class="fas fa-times"></i> Не пришли</button>
    </div>
    <button class="m-del" onclick="mDelete()"><i class="fas fa-trash-alt"></i> Удалить бронь</button>`;
  openBS('mInfoSheet','mInfoOv');
}
function closeMInfoSheet(){closeBS('mInfoSheet','mInfoOv');curBook=null;}
async function mConfirm(yes){if(!curBook)return;showLoad();await serverAction({action:'confirm',id:curBook.id,confirmed:yes});closeMInfoSheet();await loadFromServer();hideLoad();}
async function mDelete(){if(!curBook||!confirm('Удалить?'))return;showLoad();await serverAction({action:'delete',id:curBook.id});closeMInfoSheet();await loadFromServer();hideLoad();}

// bottom sheet helpers
function openBS(sid,oid){$(oid).classList.add('open');setTimeout(()=>$(sid).classList.add('open'),10);}
function closeBS(sid,oid){$(sid).classList.remove('open');setTimeout(()=>$(oid).classList.remove('open'),320);}

// ═══════════════════════════════════════════════
//  DATE CHIPS
// ═══════════════════════════════════════════════
function buildDateChips(){
  const c=$('mDateChips');if(!c)return;c.innerHTML='';
  const W=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const today=new Date();
  for(let i=-1;i<=6;i++){
    const d=new Date(today);d.setDate(today.getDate()+i);
    const ds=d.toISOString().split('T')[0];
    const chip=document.createElement('div');chip.className='m-chip'+(ds===gDate?' act':'');
    chip.innerHTML=`<span class="m-chip-d">${d.getDate()}</span><span class="m-chip-w">${W[d.getDay()]}</span>`;
    chip.onclick=()=>selectDate(ds);
    c.appendChild(chip);
  }
  // scroll active into view
  const act=c.querySelector('.act');if(act)act.scrollIntoView({inline:'center',behavior:'instant'});
}
function selectDate(ds){
  gDate=ds;
  buildDateChips();
  $('dDateTxt').textContent=fmtDate(ds);
  if($('dHiddenDate'))$('dHiddenDate').value=ds;
  mSelections=[];cancelMStep();renderMSelChips();
  loadFromServer();
}
function openMDatePicker(){const p=$('mHiddenDate');if(p){if(p.showPicker)p.showPicker();else{p.click();p.focus();}}}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function initApp(){
  document.addEventListener('dragstart',e=>{if(e.target.closest('.drag-h,.dslider'))e.preventDefault();});

  // desktop date picker
  const calBtn=$('dCalBtn'),dp=$('dHiddenDate');
  if(dp)dp.value=gDate;
  if($('dDateTxt'))$('dDateTxt').textContent=fmtDate(gDate);
  if(calBtn&&dp){
    calBtn.addEventListener('click',e=>{e.preventDefault();if(dp.showPicker)dp.showPicker();else{dp.click();dp.focus();}});
    dp.addEventListener('change',e=>{if(e.target.value)selectDate(e.target.value);});
  }
  const mdp=$('mHiddenDate');
  if(mdp){mdp.value=gDate;mdp.addEventListener('change',e=>{if(e.target.value)selectDate(e.target.value);});}

  // desktop drag toggle
  const dtb=$('dDragBtn');
  if(dtb)dtb.addEventListener('click',()=>{
    dragOn=!dragOn;
    dtb.innerHTML=dragOn?'<i class="fas fa-lock"></i> Перетяжка: ВКЛ':'<i class="fas fa-arrows-alt"></i> Перетяжка: ВЫКЛ';
    dtb.classList.toggle('on',dragOn);
    renderDSliders();
  });

  // desktop table mouse events
  $('dTable')?.addEventListener('mousedown',onDMouseDown);
  document.body.addEventListener('mousemove',onDMouseMove);
  document.body.addEventListener('mouseup',onDMouseUp);

  // close overlays on bg click
  ['dBookModal','dInfoModal','adminModal','userFormModal'].forEach(id=>{
    $(id)?.addEventListener('click',e=>{if(e.target===$(id))$(id).classList.remove('open');});
  });

  if(!isMob())buildDTable();
  buildMGrid();
  buildDateChips();
  loadFromServer();
}
</script>
